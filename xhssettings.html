<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       设计令牌 (沿用站点配色)
       ============================================================ */
    :root {
      --bg:        #faf7f2;
      --surface:   #ffffff;
      --ink:       #1a1a1a;
      --ink-soft:  #6b6b6b;
      --ink-faint: #9a9a9a;
      --line:      #ece7df;
      --line-soft: #f4f0e8;
      --accent:    #e33932;
      --accent-soft: #fde8e7;
      --shadow:    0 1px 2px rgba(0,0,0,0.04), 0 8px 24px -12px rgba(0,0,0,0.08);
      --shadow-lift: 0 2px 4px rgba(0,0,0,0.06), 0 20px 40px -16px rgba(0,0,0,0.18);
      --radius:    14px;
      --font-display: 'Bricolage Grotesque', 'Noto Sans SC', system-ui, sans-serif;
      --font-body:    'Noto Sans SC', system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 36px 32px 96px;
    }

    @media (max-width: 640px) {
      .container { padding: 24px 18px 64px; }
    }


    /* ============================================================
       1. 顶部导航 (Logo + 返回)
       ============================================================ */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 24px;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--line);
    }

    .site-logo { display: inline-block; line-height: 0; }
    .site-logo img { height: 90px; width: auto; display: block; }
    @media (max-width: 640px) { .site-logo img { height: 60px; } }

    .back-link {
      font-size: 14px;
      color: var(--ink-soft);
      text-decoration: none;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      transition: all 0.2s;
    }

    .back-link:hover {
      color: var(--ink);
      border-color: var(--ink);
      transform: translateX(-2px);
    }


    /* ============================================================
       2. 页面标题
       ============================================================ */
    .page-title {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 36px;
      letter-spacing: -0.025em;
      color: var(--ink);
      margin-bottom: 28px;
    }

    @media (max-width: 640px) {
      .page-title { font-size: 28px; margin-bottom: 22px; }
    }


    /* ============================================================
       3. 设置项列表 (卡片式列表)
       ============================================================ */
    .settings-list {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .settings-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line-soft);
      text-decoration: none;
      color: inherit;
      cursor: not-allowed;
      opacity: 0.5;
      transition: background 0.15s, opacity 0.15s;
    }

    .settings-item:last-child { border-bottom: none; }

    /* 唯一可点击的项 */
    .settings-item.active {
      cursor: pointer;
      opacity: 1;
    }

    .settings-item.active:hover {
      background: var(--line-soft);
    }

    /* 图标方框 */
    .settings-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--line-soft);
      color: var(--ink-soft);
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .settings-icon svg {
      width: 20px;
      height: 20px;
      stroke-width: 1.8;
    }

    /* 可点击项的图标:换成红色调,引导用户的视觉 */
    .settings-item.active .settings-icon {
      background: var(--accent-soft);
      color: var(--accent);
    }

    /* 名称 */
    .settings-name {
      flex: 1;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 15px;
      color: var(--ink);
      letter-spacing: -0.005em;
    }

    /* 右箭头 */
    .settings-arrow {
      color: var(--ink-faint);
      flex-shrink: 0;
    }

    .settings-arrow svg {
      width: 16px;
      height: 16px;
      stroke-width: 2;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- ═══════════ 1. 顶部导航 ═══════════ -->
    <header>
      <a href="xhs1.html" class="site-logo">
        <img src="images/tomatologo.png" alt="帖子">
      </a>
      <a href="javascript:history.back()" class="back-link">← 返回</a>
    </header>

    <!-- ═══════════ 2. 页面标题 ═══════════ -->
    <h1 class="page-title">设置</h1>

    <!-- ═══════════ 3. 设置项列表 ═══════════
         8 个项目,只有"内部入口"那条可以点 -->
    <div class="settings-list">

      <!-- 1. 账号与安全 -->
      <div class="settings-item" aria-disabled="true">
        <div class="settings-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            <polyline points="9 12 11 14 15 10"/>
          </svg>
        </div>
        <div class="settings-name">账号与安全</div>
        <div class="settings-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>
      </div>

      <!-- 2. 隐私设置 -->
      <div class="settings-item" aria-disabled="true">
        <div class="settings-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </div>
        <div class="settings-name">隐私设置</div>
        <div class="settings-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>
      </div>

      <!-- 3. 通知 -->
      <div class="settings-item" aria-disabled="true">
        <div class="settings-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
        </div>
        <div class="settings-name">消息通知</div>
        <div class="settings-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>
      </div>

      <!-- 4. 通用 -->
      <div class="settings-item" aria-disabled="true">
        <div class="settings-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <line x1="4" y1="21" x2="4" y2="14"/>
            <line x1="4" y1="10" x2="4" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="12"/>
            <line x1="12" y1="8" x2="12" y2="3"/>
            <line x1="20" y1="21" x2="20" y2="16"/>
            <line x1="20" y1="12" x2="20" y2="3"/>
            <line x1="1" y1="14" x2="7" y2="14"/>
            <line x1="9" y1="8" x2="15" y2="8"/>
            <line x1="17" y1="16" x2="23" y2="16"/>
          </svg>
        </div>
        <div class="settings-name">通用</div>
        <div class="settings-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>
      </div>

      <!-- ★ 5. 内部入口 (唯一可点击!跳转链接) -->
      <a class="settings-item active" href="xhsyuangong.html">
        <div class="settings-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
          </svg>
        </div>
        <div class="settings-name">内部入口</div>
        <div class="settings-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>
      </a>

      <!-- 6. 数据与存储 -->
      <div class="settings-item" aria-disabled="true">
        <div class="settings-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <ellipse cx="12" cy="5" rx="9" ry="3"/>
            <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
            <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
          </svg>
        </div>
        <div class="settings-name">数据与存储</div>
        <div class="settings-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>
      </div>

      <!-- 7. 帮助与反馈 -->
      <div class="settings-item" aria-disabled="true">
        <div class="settings-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        </div>
        <div class="settings-name">帮助与反馈</div>
        <div class="settings-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>
      </div>

      <!-- 8. 关于 -->
      <div class="settings-item" aria-disabled="true">
        <div class="settings-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="16" x2="12" y2="12"/>
            <line x1="12" y1="8" x2="12.01" y2="8"/>
          </svg>
        </div>
        <div class="settings-name">关于</div>
        <div class="settings-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>
      </div>

    </div>

  </div>
</body>
</html>
