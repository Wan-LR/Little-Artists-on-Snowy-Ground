<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>已处理Case</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700&family=Noto+Sans+SC:wght@500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:        #faf7f2;
      --surface:   #ffffff;
      --ink:       #1a1a1a;
      --ink-soft:  #6b6b6b;
      --line:      #ece7df;
      --accent:    #e33932;
      --warning:   #d97706;
      --shadow:    0 1px 2px rgba(0,0,0,0.04), 0 8px 24px -12px rgba(0,0,0,0.08);
      --shadow-lift: 0 2px 4px rgba(0,0,0,0.06), 0 20px 40px -16px rgba(0,0,0,0.18);
      --radius:    14px;
      --font-display: 'Bricolage Grotesque', 'Noto Sans SC', system-ui, sans-serif;
      --font-body:    'Noto Sans SC', system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      line-height: 1.5;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 32px 80px;
    }

    @media (max-width: 640px) {
      .container { padding: 28px 18px 56px; }
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-bottom: 32px;
      margin-bottom: 36px;
      border-bottom: 1px solid var(--line);
    }

    .site-logo {
      display: inline-flex;
      align-items: baseline;
      gap: 10px;
      text-decoration: none;
      color: var(--ink);
    }

    .site-logo .logo-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 28px;
      letter-spacing: -0.02em;
    }

    .site-logo .logo-sub {
      font-size: 13px;
      color: var(--ink-soft);
      letter-spacing: 0.04em;
    }

    @media (max-width: 480px) {
      .site-logo .logo-title { font-size: 22px; }
      .site-logo .logo-sub { display: none; }
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .progress-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 13px;
      color: var(--ink-soft);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 999px;
      transition: all 0.3s;
    }

    .progress-pill .dots {
      display: inline-flex;
      gap: 4px;
    }

    .progress-pill .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--line);
      transition: background 0.3s;
    }

    .progress-pill .dot.on {
      background: var(--accent);
    }

    .progress-pill.done {
      color: var(--accent);
      border-color: var(--accent);
    }

    .profile-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 14px;
      color: var(--ink-soft);
      text-decoration: none;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 999px;
      transition: all 0.2s;
      cursor: pointer;
    }

    .profile-link:hover {
      color: var(--ink);
      border-color: var(--ink);
      transform: translateY(-1px);
    }

    .profile-link svg {
      width: 14px;
      height: 14px;
      stroke-width: 2;
    }

    @media (max-width: 600px) {
      .profile-link span { display: none; }
      .profile-link { padding: 8px 10px; }
    }

    /* ===== 瀑布流 ===== */
    .grid {
      column-count: 3;
      column-gap: 24px;
    }

    @media (max-width: 900px) {
      .grid { column-count: 2; }
    }

    @media (max-width: 480px) {
      .grid { column-count: 2; column-gap: 14px; }
    }

    .post-card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1),
                  box-shadow 0.25s cubic-bezier(0.4, 0, 0.2, 1),
                  opacity 0.4s ease;
      border: 1px solid var(--line);
      break-inside: avoid;
      margin-bottom: 24px;
      width: 100%;
      cursor: pointer;
      position: relative;
    }

    .post-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lift);
      opacity: 1;
    }

    .post-card:active {
      transform: translateY(-1px);
      transition-duration: 0.1s;
    }

    .post-card .image {
      width: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #f0ece4 0%, #e6e0d4 100%);
      position: relative;
    }

    .post-card .image img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                  filter 0.4s ease;
    }

    .post-card:hover .image img {
      transform: scale(1.05);
    }

    /* 已查看状态 - 视觉柔和但仍清晰可点 */
    .post-card.viewed { opacity: 0.85; }
    .post-card.viewed .image img {
      filter: grayscale(0.35) brightness(0.97);
    }
    .post-card.viewed:hover .image img {
      filter: none;
    }

    /* 查看勾选标 */
    .check-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(227, 57, 50, 0.3);
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 0.3s, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 2;
    }

    .post-card.viewed .check-badge {
      opacity: 1;
      transform: scale(1);
    }

    .check-badge svg {
      width: 16px;
      height: 16px;
      stroke: white;
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .post-card .title {
      padding: 16px 16px 8px;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 16px;
      line-height: 1.35;
      letter-spacing: -0.01em;
      color: var(--ink);
    }

    .case-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin: 0 16px 14px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      background: rgba(227, 57, 50, 0.08);
      border-radius: 999px;
      letter-spacing: 0.02em;
    }

    .case-tag::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
    }

    /* 已限流 — 用琥珀色,与已删除的红色区分 */
    .case-tag.limited {
      color: var(--warning);
      background: rgba(217, 119, 6, 0.09);
    }
    .case-tag.limited::before {
      background: var(--warning);
    }
    .post-card.limited .check-badge {
      background: var(--warning);
      box-shadow: 0 4px 12px rgba(217, 119, 6, 0.3);
    }

    @media (max-width: 480px) {
      .post-card .title { padding: 12px 12px 6px; font-size: 14px; }
      .case-tag { margin: 0 12px 12px; font-size: 10px; }
    }

    /* ===== 提示条 ===== */
    .hint {
      text-align: center;
      margin: -8px 0 28px;
      font-size: 13px;
      color: var(--ink-soft);
      font-style: italic;
    }
    .hint .reset {
      margin-left: 14px;
      font-style: normal;
      color: #c4b9a8;
      text-decoration: underline;
      text-decoration-color: #e3d9c8;
      text-underline-offset: 3px;
      cursor: pointer;
      font-size: 12px;
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
    }
    .hint .reset:hover { color: var(--ink-soft); }

    /* ===== 弹窗 ===== */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(26, 26, 26, 0.45);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      z-index: 100;
    }

    .modal-backdrop.show {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: var(--surface);
      border-radius: 20px;
      padding: 40px 36px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 30px 80px -20px rgba(0,0,0,0.3);
      transform: scale(0.85) translateY(20px);
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
    }

    .modal-backdrop.show .modal {
      transform: scale(1) translateY(0);
    }

    .modal-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff6b5e 0%, #e33932 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(227, 57, 50, 0.35);
      animation: bounce 0.6s ease 0.2s both;
    }

    @keyframes bounce {
      0%   { transform: scale(0); }
      60%  { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    .modal-icon svg {
      width: 32px;
      height: 32px;
      stroke: white;
      stroke-width: 3;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .modal-label {
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.15em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .modal-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 22px;
      line-height: 1.4;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin-bottom: 10px;
    }

    .modal-text {
      font-size: 14px;
      color: var(--ink-soft);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .modal-btn {
      display: inline-block;
      padding: 11px 28px;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 14px;
      color: white;
      background: var(--ink);
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .modal-btn:hover {
      transform: translateY(-1px);
      background: #000;
    }

    /* ===== 确认弹窗(reset 用) ===== */
    .modal.modal-confirm {
      padding: 32px 28px 24px;
      max-width: 360px;
    }
    .modal.modal-confirm .modal-title {
      font-size: 18px;
      margin-bottom: 8px;
    }
    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 8px;
    }
    .modal-btn.secondary {
      background: transparent;
      color: var(--ink-soft);
      border: 1px solid var(--line);
      padding: 10px 22px;
    }
    .modal-btn.secondary:hover {
      background: var(--bg);
      color: var(--ink);
      border-color: var(--ink-soft);
    }
    .modal-btn.danger {
      background: var(--accent);
      padding: 10px 22px;
    }
    .modal-btn.danger:hover {
      background: #c92e28;
    }

    /* 五彩纸屑 */
    .confetti {
      position: fixed;
      top: -20px;
      width: 8px;
      height: 14px;
      pointer-events: none;
      z-index: 99;
      opacity: 0;
    }

    @keyframes fall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0.2; }
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <a href="#" class="site-logo">
        <span class="logo-title">已处理 Case</span>
      </a>
      <div class="header-right">
        <div class="progress-pill" id="progress">
          <span id="progress-num">0 / 5</span>
          <span class="dots">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </span>
        </div>

      </div>
    </header>

    <p class="hint">
 共 5 条
      <button class="reset" id="reset-btn" type="button">重置进度</button>
    </p>

    <!--
      ============================================
      ↓↓↓ 改这里:每张卡片的 href 换成你想跳转的页面 ↓↓↓
      ============================================
      data-id 不要改 — 它用来记忆"这张看过没"
    -->
    <div class="grid">

      <a class="post-card limited" href="xhscasetubu.html" data-id="case-01">
        <div class="image">
          <img src="images/tubuluoyuan.png" alt="" loading="lazy">
          <div class="check-badge">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
        </div>
        <h2 class="title">在徒步时看到不属于人类的脚印</h2>
        <span class="case-tag limited">已限流</span>
      </a>

      <a class="post-card" href="xhscasexiaban.html" data-id="case-02">
        <div class="image">
          <img src="images/xiabanluoyuan.png" alt="" loading="lazy">
          <div class="check-badge">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
        </div>
        <h2 class="title">晚上下班看到高大的裸猿的身影</h2>
        <span class="case-tag">已删除</span>
      </a>

      <a class="post-card" href="xhscaseyouyong.html" data-id="case-03">
        <div class="image">
          <img src="images/youyongluoyuan.png" alt="" loading="lazy">
          <div class="check-badge">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
        </div>
        <h2 class="title">湖里看到水猴子(? 了</h2>
        <span class="case-tag">已删除</span>
      </a>

      <a class="post-card limited" href="" data-id="case-04">
        <div class="image">
          <img src="images/huajiaphoto.png" alt="" loading="lazy">
          <div class="check-badge">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
        </div>
        <h2 class="title">语文书的配图是不是有问题啊</h2>
        <span class="case-tag limited">已限流</span>
      </a>

      <a class="post-card limited" href="xhscasexiangxia.html" data-id="case-05">
        <div class="image">
          <img src="images/xiangxialuoyuan.png" alt="" loading="lazy">
          <div class="check-badge">
            <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
        </div>
        <h2 class="title">这是什么啊？</h2>
        <span class="case-tag limited">已限流</span>
      </a>

    </div>

  </div>

  <!-- ===== 庆祝弹窗 ===== -->
  <div class="modal-backdrop" id="modal">
    <div class="modal">
      <div class="modal-icon">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="modal-label">RESOLVED</div>
      <h3 class="modal-title">啊 西红柿首页的<br>评论好像修好了</h3>

      <button class="modal-btn" id="modal-close">收到</button>
    </div>
  </div>

  <!-- ===== 重置确认弹窗(替代浏览器原生 confirm,在 sandboxed iframe 里也能用) ===== -->
  <div class="modal-backdrop" id="confirm-modal">
    <div class="modal modal-confirm">
      <h3 class="modal-title">清空所有"已看过"的记录?</h3>
      <p class="modal-text">进度会重置回 0 / 5</p>
      <div class="modal-actions">
        <button class="modal-btn secondary" id="confirm-cancel" type="button">取消</button>
        <button class="modal-btn danger" id="confirm-ok" type="button">重置</button>
      </div>
    </div>
  </div>

  <script>
    // ============================================================
    //  持久化:用 localStorage 存"看过哪些帖子"
    //  刷新 / 关闭浏览器 / 退回来 都能记住
    // ============================================================
    const STORAGE_KEY = 'xhs-cases-viewed';      // 看过的帖子 id 集合
    const MODAL_KEY   = 'xhs-cases-modal-shown'; // 弹窗是否已经看过

    function loadViewed() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return new Set(raw ? JSON.parse(raw) : []);
      } catch (e) {
        return new Set();
      }
    }
    function saveViewed(set) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify([...set]));
      } catch (e) {}
    }
    function modalShown() {
      return localStorage.getItem(MODAL_KEY) === '1';
    }
    function markModalShown() {
      try { localStorage.setItem(MODAL_KEY, '1'); } catch (e) {}
    }

    // —— DOM ——
    const cards = document.querySelectorAll('.post-card');
    const dots = document.querySelectorAll('.progress-pill .dot');
    const progressNum = document.getElementById('progress-num');
    const progressPill = document.getElementById('progress');
    const modal = document.getElementById('modal');
    const modalClose = document.getElementById('modal-close');
    const resetBtn = document.getElementById('reset-btn');

    const confirmModal  = document.getElementById('confirm-modal');
    const confirmOkBtn  = document.getElementById('confirm-ok');
    const confirmCancelBtn = document.getElementById('confirm-cancel');

    const total = cards.length;
    let viewed = loadViewed();

    function updateProgress() {
      const n = viewed.size;
      progressNum.textContent = `${n} / ${total}`;
      dots.forEach((d, i) => d.classList.toggle('on', i < n));
      progressPill.classList.toggle('done', n === total);
    }

    function applyViewedState() {
      cards.forEach(card => {
        if (viewed.has(card.dataset.id)) {
          card.classList.add('viewed');
        } else {
          card.classList.remove('viewed');
        }
      });
      updateProgress();
    }

    // —— 点击帖子:记录 + 跳转 ——
    cards.forEach(card => {
      card.addEventListener('click', () => {
        const id = card.dataset.id;
        if (!viewed.has(id)) {
          viewed.add(id);
          saveViewed(viewed);
          card.classList.add('viewed');
          updateProgress();
        }
      });
    });

    // —— 庆祝弹窗 ——
    function maybeShowModal() {
      if (viewed.size === total && !modalShown()) {
        setTimeout(() => {
          modal.classList.add('show');
          confetti();
        }, 500);
      }
    }

    function closeModal() {
      modal.classList.remove('show');
      markModalShown();
    }
    modalClose.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => {
      if (e.target === modal) closeModal();
    });

    // —— 自定义 confirm 弹窗(替代浏览器原生 confirm) ——
    // 原本用 window.confirm(),但在 sandboxed iframe(预览/嵌入环境)里
    // 浏览器会忽略它并直接返回 false,导致 reset 走不下去。
    // 这个版本用页面自己的 modal,任何环境都能弹出来。
    function askConfirm() {
      return new Promise(resolve => {
        confirmModal.classList.add('show');

        const cleanup = (result) => {
          confirmModal.classList.remove('show');
          confirmOkBtn.removeEventListener('click', onOk);
          confirmCancelBtn.removeEventListener('click', onCancel);
          confirmModal.removeEventListener('click', onBackdrop);
          document.removeEventListener('keydown', onKey);
          resolve(result);
        };
        const onOk      = () => cleanup(true);
        const onCancel  = () => cleanup(false);
        const onBackdrop = (e) => { if (e.target === confirmModal) cleanup(false); };
        const onKey     = (e) => {
          if (e.key === 'Escape') cleanup(false);
          else if (e.key === 'Enter') cleanup(true);
        };

        confirmOkBtn.addEventListener('click', onOk);
        confirmCancelBtn.addEventListener('click', onCancel);
        confirmModal.addEventListener('click', onBackdrop);
        document.addEventListener('keydown', onKey);
      });
    }

    // —— 重置进度 ——
    resetBtn.addEventListener('click', async () => {
      const ok = await askConfirm();
      if (!ok) return;
      try {
        localStorage.removeItem(STORAGE_KEY);
        localStorage.removeItem(MODAL_KEY);
      } catch (e) {}
      viewed = new Set();
      applyViewedState();
    });

    // —— 五彩纸屑 ——
    function confetti() {
      const colors = ['#e33932', '#ff8a65', '#ffb74d', '#1a1a1a', '#6b6b6b'];
      for (let i = 0; i < 40; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.background = colors[Math.floor(Math.random() * colors.length)];
        c.style.animation = `fall ${1.8 + Math.random() * 1.5}s cubic-bezier(0.4, 0, 0.6, 1) ${Math.random() * 0.4}s forwards`;
        c.style.transform = `rotate(${Math.random() * 360}deg)`;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 4000);
      }
    }

    // —— 启动 ——
    applyViewedState();
    maybeShowModal();
  </script>
</body>
</html>
