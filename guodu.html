<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天中断</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  /* 中文字体走和「消除」页一样的代理源 */
  @import url('https://gs.jurieo.com/gemini/fonts-googleapis/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #0a0a0a;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    overflow: hidden;
  }

  /* ════════ 聊天界面（已结束的整段记录，作为背景） ════════ */
  .screen {
    height: 100vh;
    padding: 24px;
    background:
      radial-gradient(ellipse at center, rgba(0,40,0,0.15) 0%, rgba(0,0,0,0.6) 100%),
      #0a0e0a;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .screen::before {
    content: ''; position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg,
      rgba(0,255,100,0.04) 0px, rgba(0,255,100,0.04) 1px,
      transparent 1px, transparent 3px);
    pointer-events: none; z-index: 2;
  }
  .screen::after {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(120,255,150,0.06), transparent 60%);
    pointer-events: none; z-index: 1;
  }
  .titlebar {
    flex-shrink: 0; color: #6cb88a; font-size: 12px;
    letter-spacing: 2px; opacity: 0.7; margin-bottom: 12px;
    position: relative; z-index: 3;
  }
  .titlebar .dot {
    display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: #d9685a; margin-right: 6px; vertical-align: middle;
    box-shadow: 0 0 6px rgba(217,104,90,0.7);
  }
  .terminal {
    flex: 1; min-height: 0; color: #6cf08a; font-size: 15px; line-height: 1.6;
    text-shadow: 0 0 6px rgba(108,240,138,0.5);
    display: flex; flex-direction: column; position: relative; z-index: 3;
  }
  .output {
    flex: 1; overflow-y: auto; padding-right: 8px;
    scrollbar-width: thin; scrollbar-color: #2a5a2a transparent;
  }
  .output::-webkit-scrollbar { width: 6px; }
  .output::-webkit-scrollbar-thumb { background: #2a5a2a; border-radius: 3px; }

  .line { white-space: pre-wrap; word-break: break-word; margin-bottom: 2px; }
  .line.user   { color: #b8ffcc; }   /* 关策喆（这次是“我”） */
  .line.system { color: #6cf08a; }   /* 昴星人（对面，> 开头） */
  .line.dim    { color: #3a7a4a; opacity: 0.85; }

  /* ════════ 回想：独白浮现，背景就是上面的聊天界面 ════════ */
  .recall-overlay {
    position: fixed; inset: 0; z-index: 40;
    background: rgba(4,8,14,0.58);
    -webkit-backdrop-filter: blur(1.5px); backdrop-filter: blur(1.5px);
    display: flex; align-items: center; justify-content: center;
    padding: 8vh 8vw; opacity: 0; pointer-events: none;
    transition: opacity 1.3s ease;
  }
  .recall-overlay.show { opacity: 1; }
  .recall-box {
    display: flex; flex-direction: column; gap: 14px;
    max-width: 720px; text-align: center; transition: opacity 0.9s ease;
  }
  .recall-box.fade { opacity: 0; }
  .recall-line {
    color: #93e6ab; font-weight: 300; font-size: clamp(15px, 2.3vw, 21px);
    line-height: 1.9; letter-spacing: 1.5px; text-shadow: 0 0 14px rgba(108,240,138,0.3);
    opacity: 0; transform: translateY(10px);
    transition: opacity 1.1s ease, transform 1.1s ease;
  }
  .recall-line.in { opacity: 0.94; transform: translateY(0); }

  /* ════════ 鸡 NPC（图片）+ 对话框（沿用「消除」页设计）════════ */
  .rooster-container {
    position: fixed; bottom: 0; left: 50%;
    transform: translate(-50%, 100%);
    z-index: 50;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    pointer-events: none;
    transition: transform 1s cubic-bezier(0.16, 0.7, 0.2, 1);
  }
  .rooster-container.up { transform: translate(-50%, 35%); }
  .rooster-container.fade-out { opacity: 0; transition: opacity 0.4s ease, transform 1s cubic-bezier(0.16,0.7,0.2,1); }

  .speech-bubble {
    position: relative;
    background: linear-gradient(135deg, rgba(244, 233, 210, 0.97), rgba(220, 207, 178, 0.95));
    color: #2a1a0a;
    padding: 14px 18px 22px 18px;
    border-radius: 4px;
    font-family: 'Noto Serif SC', serif;
    font-size: 0.86rem;
    font-weight: 500;
    line-height: 1.6;
    letter-spacing: 0.04em;
    max-width: 280px;
    min-width: 180px;
    box-shadow:
      0 6px 24px rgba(0,0,0,0.55),
      0 0 0 1px rgba(139, 90, 43, 0.5),
      inset 0 1px 0 rgba(255, 255, 255, 0.5);
    opacity: 0;
    transform: translateY(8px) scale(0.96);
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
    will-change: transform, opacity;
  }
  .speech-bubble.show { opacity: 1; transform: translateY(0) scale(1); }
  .speech-bubble::after {
    content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 10px solid rgba(228, 215, 186, 0.96);
    filter: drop-shadow(0 2px 1px rgba(139, 90, 43, 0.4));
  }
  .speech-bubble::before {
    content: ''; position: absolute; inset: 4px;
    border: 1px dashed rgba(139, 90, 43, 0.35);
    border-radius: 2px; pointer-events: none;
  }
  .next-arrow {
    position: absolute; right: 12px; bottom: 4px;
    font-size: 0.85rem; color: #8b5a2b;
    animation: arrow-blink 1.2s ease-in-out infinite;
  }
  @keyframes arrow-blink {
    0%, 100% { opacity: 0.25; transform: translateX(0); }
    50%      { opacity: 1;    transform: translateX(3px); }
  }
  .rooster {
    width: 260px; height: 260px; cursor: pointer; user-select: none;
    pointer-events: auto; position: relative;
    filter: drop-shadow(0 10px 18px rgba(0,0,0,0.6));
    transition: filter 0.3s ease, transform 0.2s ease;
  }
  .rooster.bobbing { animation: rooster-bob 0.8s ease-in-out 5; }
  @keyframes rooster-bob {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    25%      { transform: translateY(-9px) rotate(-2.5deg); }
    50%      { transform: translateY(0) rotate(0deg); }
    75%      { transform: translateY(-9px) rotate(2.5deg); }
  }
  .rooster:hover {
    filter: drop-shadow(0 10px 20px rgba(108,240,138,0.5))
            drop-shadow(0 8px 14px rgba(0,0,0,0.55));
  }
  .rooster img {
    width: 100%; height: 100%; object-fit: contain; display: block;
    -webkit-user-drag: none; pointer-events: none;
  }
  .rooster-fallback {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 8rem; line-height: 1; pointer-events: none;
  }

  body.leaving { opacity: 0; transition: opacity 0.8s ease; }
</style>
</head>
<body>

<!-- 已结束的整段聊天，作为回想的背景 -->
<div class="screen" id="screen">
  <div class="titlebar"><span class="dot"></span>SESSION // guan@earth — 连接已中断</div>
  <div class="terminal"><div class="output" id="output"></div></div>
</div>

<!-- 回想独白 -->
<div class="recall-overlay" id="recall-overlay"><div class="recall-box" id="recall-box"></div></div>

<!-- 鸡（图片，放 images/mojingji.png 即可替换；缺图退回 🐓） -->
<div class="rooster-container" id="rooster-container">
  <div class="speech-bubble" id="speech-bubble">
    <span id="bubble-text"></span>
    <span class="next-arrow">▸</span>
  </div>
  <div class="rooster" id="rooster">
    <img id="rooster-img" src="images/mojingji.png" alt="鸡"
         onerror="this.style.display='none';document.getElementById('rooster-fallback').style.display='flex';">
    <div class="rooster-fallback" id="rooster-fallback" style="display:none;">🐓</div>
  </div>
</div>

<script>
  // ═══════════════════════════════════════════
  const NEXT_PAGE = "mxhuitu.html";   // ← 鸡说完后的跳转目标，自行修改
  // ═══════════════════════════════════════════

  var output           = document.getElementById('output');
  var recallOverlay    = document.getElementById('recall-overlay');
  var recallBox        = document.getElementById('recall-box');
  var roosterContainer = document.getElementById('rooster-container');
  var rooster          = document.getElementById('rooster');
  var bubble           = document.getElementById('speech-bubble');
  var bubbleText       = document.getElementById('bubble-text');

  // ── 视角对调 ──
  // 'guan'  = 关策喆（我，亮绿，guan@earth:~$）   ← 原界面里“对面”的台词
  // 'spica' = 昴星人（对面，常规绿，> 开头）       ← 原界面里“玩家”的台词
  var convo = [
    { who:'guan',  t:'你找来的很快啊' },
    { who:'spica', t:'这居然真的是个对话框……我还以为是什么无聊的人做出来的解谜游戏' },
    { who:'guan',  t:'某种意义上来说也是吧。因为是我把你引到这里来的。' },
    { who:'spica', t:'你是关策喆？' },
    { who:'guan',  t:'是的，哎，早知道上网不用大名了' },
    { who:'guan',  t:'我不是昴星人。' },
    { who:'spica', t:'那你是外星人？' },
    { who:'guan',  t:'……听外星人叫自己外星人的感觉还真奇怪。' },
    { who:'guan',  t:'你现在可以看看你的课本。' },
    { img:'images/huajia.png' },
    { who:'spica', t:'脚印又出现了...你是怎么做到的？！' },
    { who:'guan',  t:'别紧张，我没有恶意。大约一周前，我找到了这个奇怪的网站——它能与你们星球产生直接联系。准确来说，是没有时间差的联系。' },
    { who:'spica', t:'网站？……就是这个网站？' },
    { who:'guan',  t:'对，就是这里。我把它叫做"蠕虫网站"。' },
    { who:'spica', t:'...姑且相信你的话，你是...?' },
    { who:'guan',  t:'地球人。根据我这几天的观察，地球和昴星几乎一模一样，我猜我说我是高中生你应该听的懂吧。唯一的区别是——地球的智慧生物是人类。' },
    { who:'spica', t:'我们的智慧生物也是人类啊' },
    { who:'guan',  t:'抱歉，应该说，地球人类是你们口中的"裸猿"。' },
    { who:'guan',  t:'说起这个，从别的产物，尤其是上爪来看，你们的科技水平应该足以进行探索宇宙了，怎么会连登月都做不到。' },
    { who:'guan',  t:'难道你们昴星发生过什么重大的天灾还是战争吗？' },
    { who:'spica', t:'完全没有...' },
    { who:'guan',  t:'奇怪，那科技树也能点歪吗？' },
    { who:'spica', t:'因为对我们来说宇宙探索天文学更偏向于神秘事物或者宗教' },
    { who:'spica', t:'知道地球人登月和知道世界上有沃斯湖水怪几乎没有区别' },
    { who:'guan',  t:'怎么会这样...你们怎么会有这种想法' },
    { who:'spica', t:'因为*是超&说的，天@学已经不再作为科学!域的研究+向了' },
    { who:'guan',  t:'等@下……蠕虫￥网站的信%变差了——' },
  ];

  // 关策喆崩溃乞求 → 然后信号断了
  var panic = [
    '总@不要把我……存在）&说出去*！',
    '我没）恶意的！',
    '不要说出去',
    '不要说出去',
    '不要说出去',
    '不要说出去——',
  ];

  // 回想独白
  var recallLines = [
    '啊……聊天，中断了。',
    '蠕虫网站之前没有出现过链接不好的情况啊',
    '我只是个无聊的高中生，',
    '深夜里翻到了一个奇怪的网站，',
    '没想过它真能连上另一颗星球。',
    '他们……会把我说出去吗？地球会有危险吗',
  ];

  // 鸡说的话（点击鸡逐句推进）
  var chickenLines = [
    '咯咯咯——你好啊，关策喆？',
    '怎么样，我们做的这个聊天界面是不是挺炫酷的',
    '鉴于某人的优异表现，我想我们需要在处理你之前先给你看点东西',
    '咯咯咯——',
  ];

  // ═══════════ 引擎 ═══════════
  var phase = 'chat';          // chat → recall → chicken → done
  var chickenIdx = 0;
  var _resolve = null, _timer = null;

  function sleep(ms) {
    return new Promise(function (res) {
      _resolve = function () { clearTimeout(_timer); _resolve = null; res(); };
      _timer = setTimeout(function () { _resolve = null; res(); }, ms);
    });
  }
  // 回想阶段：点击 / 空格 快进当前停顿
  document.addEventListener('click', function () { if (phase === 'recall' && _resolve) _resolve(); });
  document.addEventListener('keydown', function (e) {
    if ((e.key === ' ' || e.key === 'Enter') && phase === 'recall') { e.preventDefault(); if (_resolve) _resolve(); }
  });

  function prefixOf(who) { return who === 'guan' ? 'guan@earth:~$ ' : who === 'spica' ? '> ' : ''; }
  function classOf(who)  { return who === 'guan' ? 'line user' : who === 'spica' ? 'line system' : 'line dim'; }
  function pushLine(cls, text) {
    var d = document.createElement('div'); d.className = cls; d.textContent = text; output.appendChild(d);
  }
  function scrollBottom() { output.scrollTop = output.scrollHeight; }

  // 一次性铺满整段已结束的聊天
  function renderChatLog() {
    pushLine('line dim', '蠕虫网络 // 会话记录   guan@earth  <->  昴-星');
    pushLine('line dim', '────────────────────────────────────');
    for (var i = 0; i < convo.length; i++) {
      var item = convo[i];
      if (item.img) { pushLine('line dim', '［ 已发送图像 · ' + item.img + ' ］'); continue; }
      pushLine(classOf(item.who), prefixOf(item.who) + item.t);
    }
    for (var j = 0; j < panic.length; j++) pushLine('line user', prefixOf('guan') + panic[j]);
    pushLine('line dim', '');
    pushLine('line dim', '────────────────────────────────────');
    pushLine('line dim', '蠕虫网络 // 信号丢失 — 连接已中断');
    pushLine('line dim', 'link terminated — peer unreachable');
  }

  function mkRecallLine(text) {
    var d = document.createElement('div'); d.className = 'recall-line'; d.textContent = text;
    recallBox.appendChild(d); return d;
  }

  async function playRecall() {
    phase = 'recall';
    recallOverlay.classList.add('show');
    await sleep(3200);
    for (var i = 0; i < recallLines.length; i++) {
      var d = mkRecallLine(recallLines[i]);
      void d.offsetWidth; d.classList.add('in');
      await sleep(1700 + Math.min(recallLines[i].length * 55, 900));
    }
    await sleep(2200);
    recallBox.classList.add('fade');      // 独白淡出，聊天背景仍在
    await sleep(900);
  }

  // 鸡：对话框样式照搬「消除」页
  function showBubble(text) {
    bubbleText.textContent = text;
    bubble.classList.remove('show'); void bubble.offsetWidth; bubble.classList.add('show');
    rooster.classList.remove('bobbing'); void rooster.offsetWidth; rooster.classList.add('bobbing');
  }
  function hideBubble() {
    bubble.classList.remove('show'); rooster.classList.remove('bobbing');
  }

  async function startChicken() {
    phase = 'chicken';
    roosterContainer.classList.add('up');    // 从屏幕最底下钻出来
    await sleep(1050);
    showBubble(chickenLines[0]);
  }

  rooster.addEventListener('click', function () {
    if (phase !== 'chicken') return;
    chickenIdx++;
    if (chickenIdx < chickenLines.length) {
      showBubble(chickenLines[chickenIdx]);
    } else {
      phase = 'done';
      hideBubble();
      roosterContainer.classList.add('fade-out');
      setTimeout(function () {
        document.body.classList.add('leaving');
        setTimeout(function () { window.location.href = NEXT_PAGE; }, 800);
      }, 500);
    }
  });

  async function run() {
    renderChatLog();
    scrollBottom();
    phase = 'chat';
    await sleep(1700);     // 先停一下，让“连接已中断”被看到
    await playRecall();
    await sleep(300);
    await startChicken();  // 之后点击鸡逐句推进
  }

  window.onload = run;
</script>
</body>
</html>
