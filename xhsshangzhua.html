  <style>
    :root {
      --bg:        #faf7f2;
      --surface:   #ffffff;
      --ink:       #1a1a1a;
      --ink-soft:  #6b6b6b;
      --ink-faint: #9a9a9a;
      --line:      #ece7df;
      --line-soft: #f4f0e8;
      --accent:    #e33932;
      --accent-soft: #fde8e7;
      --shadow:    0 1px 2px rgba(0,0,0,0.04), 0 8px 24px -12px rgba(0,0,0,0.08);
      --shadow-lift: 0 2px 4px rgba(0,0,0,0.06), 0 20px 40px -16px rgba(0,0,0,0.18);
      --radius:    14px;
      --radius-sm: 10px;
      --font-display: 'Bricolage Grotesque', 'Noto Sans SC', system-ui, sans-serif;
      --font-body:    'Noto Sans SC', system-ui, -apple-system, sans-serif;
    }
 
    * { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      line-height: 1.6;
    }
 
    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 36px 24px 96px;
    }
 
    @media (max-width: 640px) {
      .container { padding: 20px 16px 64px; }
    }


    /* ===== Header ===== */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 24px;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--line);
    }
 
    .site-logo {
      display: inline-block;
      line-height: 0;
    }

    .site-logo img {
      height: 90px;
      width: auto;
      display: block;
    }
 
    .site-logo .dot {
      display: inline-block;
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: 2px;
    }
 
    .back-link {
      font-size: 14px;
      color: var(--ink-soft);
      text-decoration: none;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      transition: all 0.2s;
    }
 
    .back-link:hover {
      color: var(--ink);
      border-color: var(--ink);
      transform: translateX(-2px);
    }
 
    /* ===== Hero Image ===== */
    .hero {
      width: 100%;
      border-radius: var(--radius);
      overflow: hidden;
      background: linear-gradient(135deg, #f0ece4 0%, #e6e0d4 100%);
      box-shadow: var(--shadow);
      margin-bottom: 28px;
    }
 
    .hero img {
      width: 100%;
      height: auto;
      display: block;
      max-height: 520px;
      object-fit: cover;
    }
 
    /* ===== Author meta ===== */
    .post-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
 
    .avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 16px;
      flex-shrink: 0;
      letter-spacing: -0.02em;
    }
 
    .avatar.sm { width: 36px; height: 36px; font-size: 14px; }
 
    .meta-text { line-height: 1.3; }
 
    .user-id {
      font-weight: 700;
      font-size: 14.5px;
      color: var(--ink);
    }
 
    .meta-sub {
      font-size: 12.5px;
      color: var(--ink-faint);
      margin-top: 2px;
    }
 
    /* ===== Title ===== */
    .post-title {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 38px;
      line-height: 1.18;
      letter-spacing: -0.025em;
      color: var(--ink);
      margin-bottom: 24px;
    }
 
    @media (max-width: 640px) {
      .post-title { font-size: 28px; }
    }
 
    /* ===== Body ===== */
    .post-body {
      font-size: 16px;
      line-height: 1.8;
      color: #2a2a2a;
      margin-bottom: 36px;
    }
 
    .post-body p { margin-bottom: 18px; }
    .post-body p:last-child { margin-bottom: 0; }
 
    .post-body ol {
      padding-left: 22px;
      margin-bottom: 18px;
    }
 
    .post-body ol li {
      margin-bottom: 8px;
      padding-left: 4px;
    }
 
    .post-body ol li::marker {
      color: var(--accent);
      font-weight: 700;
    }

    /* ===== Post Tags ===== */
    .post-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: -16px 0 32px;
    }
 
    .tag {
      display: inline-flex;
      align-items: center;
      padding: 5px 12px;
      background: #eaf1ff;
      color: #2563eb;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: all 0.18s ease;
    }
 
    .tag::before {
      content: '#';
      margin-right: 2px;
      opacity: 0.7;
    }
 
    .tag:hover {
      background: #2563eb;
      color: #fff;
      transform: translateY(-1px);
    }

    /* ===== Action bar ===== */
    .post-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 4px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      margin-bottom: 40px;
    }
 
    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 14px;
      background: transparent;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: var(--ink-soft);
      transition: all 0.18s ease;
    }
 
    .action-btn:hover {
      background: var(--line-soft);
      color: var(--ink);
    }
 
    .action-btn svg {
      width: 18px; height: 18px;
      stroke-width: 1.8;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
 
    .action-btn.liked {
      color: var(--accent);
      background: var(--accent-soft);
    }
 
    .action-btn.liked svg {
      fill: var(--accent);
      stroke: var(--accent);
      animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
 
    @keyframes pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.35); }
      100% { transform: scale(1); }
    }
 
    .action-btn .count {
      font-variant-numeric: tabular-nums;
    }
 
    .action-btn.share-btn {
      margin-left: auto;
    }
 
    /* ===== Comments ===== */
    .comments-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 22px;
      letter-spacing: -0.01em;
      margin-bottom: 18px;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
 
    .comments-title .num {
      color: var(--accent);
      font-size: 18px;
    }
 
    /* Input row */
    .comment-input {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
      margin-bottom: 28px;
      transition: border-color 0.2s;
    }
 
    .comment-input:focus-within {
      border-color: var(--ink);
    }
 
    .input-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
 
    .comment-input textarea {
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      font-family: inherit;
      font-size: 15px;
      line-height: 1.55;
      color: var(--ink);
      background: transparent;
      min-height: 24px;
      max-height: 160px;
    }
 
    .comment-input textarea::placeholder {
      color: var(--ink-faint);
    }
 
    .input-foot {
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }
 
    .input-hint {
      font-size: 12px;
      color: var(--ink-faint);
    }
 
    .submit-btn {
      padding: 8px 18px;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 999px;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 13.5px;
      cursor: pointer;
      transition: all 0.18s;
      letter-spacing: 0.01em;
    }
 
    .submit-btn:hover:not(:disabled) {
      background: var(--accent);
      transform: translateY(-1px);
    }
 
    .submit-btn:disabled {
      background: var(--line);
      color: var(--ink-faint);
      cursor: not-allowed;
    }
 
    /* Comment list */
    .comment-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
 
    .comment {
      display: flex;
      gap: 12px;
      padding: 18px 4px;
      border-bottom: 1px solid var(--line-soft);
      animation: slideIn 0.3s ease-out;
    }
 
    .comment:last-child { border-bottom: none; }
 
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
 
    .comment-body { flex: 1; min-width: 0; }
 
    .comment-head {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }
 
    .comment-head .user-id { font-size: 14px; }
    .comment-head .time {
      font-size: 12.5px;
      color: var(--ink-faint);
    }
 
    .comment-text {
      font-size: 14.5px;
      line-height: 1.65;
      color: #2a2a2a;
      margin-bottom: 8px;
      word-wrap: break-word;
    }
 
    .comment-actions {
      display: flex;
      gap: 4px;
    }
 
    .comment-action {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px 4px 6px;
      background: transparent;
      border: none;
      border-radius: 999px;
      font-family: inherit;
      font-size: 12.5px;
      color: var(--ink-faint);
      cursor: pointer;
      transition: all 0.15s;
    }
 
    .comment-action:hover { color: var(--ink); background: var(--line-soft); }
 
    .comment-action svg {
      width: 14px; height: 14px;
      stroke-width: 1.8;
      transition: transform 0.2s;
    }
 
    .comment-action.liked {
      color: var(--accent);
    }
 
    .comment-action.liked svg {
      fill: var(--accent);
      stroke: var(--accent);
      animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* ===== ★ 嵌套回复(从语文书帖子搬过来)===== */
    .comment-replies {
      list-style: none;
      margin: 12px 0 0;
      padding: 0 0 0 16px;
      border-left: 2px solid var(--line);
    }

    .comment-replies .comment {
      padding: 12px 0;
      border-bottom: 1px solid var(--line-soft);
    }

    .comment-replies .comment:first-child { padding-top: 4px; }
    .comment-replies .comment:last-child {
      padding-bottom: 0;
      border-bottom: none;
    }

    .comment-replies .reply-to {
      color: #2563eb;
      font-weight: 500;
      margin-right: 4px;
    }

     /* ===== Top Toast ===== */
    .toast {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translate(-50%, -100%);
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 22px 14px 18px;
      margin-top: 18px;
      background: var(--ink);
      color: #fff;
      border-radius: 999px;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 14.5px;
      letter-spacing: 0.005em;
      box-shadow: 0 10px 40px -10px rgba(0,0,0,0.35), 0 4px 12px rgba(0,0,0,0.15);
      transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1),
                  opacity 0.3s ease;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
      max-width: calc(100vw - 32px);
    }
    
    .toast.show {
      transform: translate(-50%, 0);
      opacity: 1;
      pointer-events: auto;
    }
 
    .toast .toast-dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
      animation: pulse 1.6s ease-in-out infinite;
    }
 
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(0.85); }
    }
 
    @media (max-width: 480px) {
      .toast {
        font-size: 13px;
        padding: 12px 18px 12px 14px;
        white-space: normal;
        text-align: center;
      }
    }
 
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-4px); }
      40%, 80% { transform: translateX(4px); }
    }
 
    .comment-input.shake {
      animation: shake 0.4s ease;
      border-color: var(--accent) !important;
    }

  </style>
</head>

    // ===== 行内格式化 (**粗** *斜*) =====
    function appendFormatted(parent, text) {
      const regex = /\*\*\*([^*]+)\*\*\*|\*\*([^*]+)\*\*|\*([^*]+)\*/g;
      let last = 0, m;
      while ((m = regex.exec(text)) !== null) {
        if (m.index > last) {
          parent.appendChild(document.createTextNode(text.slice(last, m.index)));
        }
        if (m[1]) {
          const s = document.createElement('strong');
          const e = document.createElement('em');
          e.textContent = m[1];
          s.appendChild(e);
          parent.appendChild(s);
        } else if (m[2]) {
          const s = document.createElement('strong');
          s.textContent = m[2];
          parent.appendChild(s);
        } else if (m[3]) {
          const e = document.createElement('em');
          e.textContent = m[3];
          parent.appendChild(e);
        }
        last = m.index + m[0].length;
      }
      if (last < text.length) {
        parent.appendChild(document.createTextNode(text.slice(last)));
      }
    }

    // ===== 渲染评论 =====
    const commentList = document.getElementById('commentList');

    function renderComment(c, prepend = false) {
      const li = document.createElement('li');
      li.className = 'comment';
      li.innerHTML = `
        <div class="avatar sm ${c.avatar}">${c.initial}</div>
        <div class="comment-body">
          <div class="comment-head">
            <span class="user-id">${c.userId}</span>
            <span class="time">${c.time}</span>
          </div>
          <p class="comment-text"></p>
          <div class="comment-actions">
            <button class="comment-action like-comment" data-likes="${c.likes}" aria-pressed="false">
              ${HEART_SVG}<span class="lc">${c.likes}</span>
            </button>
            <button class="comment-action">
              ${REPLY_SVG}回复
            </button>
          </div>
        </div>
      `;

      // 如果是回复(有 replyTo),前面带"回复 @xxx:"标签
      const textEl = li.querySelector('.comment-text');
      if (c.replyTo) {
        const replyMark = document.createElement('span');
        replyMark.className = 'reply-to';
        replyMark.textContent = '回复 ' + c.replyTo + ':';
        textEl.appendChild(replyMark);
        appendFormatted(textEl, c.text);
      } else {
        appendFormatted(textEl, c.text);
      }

      // 如果该评论有嵌套回复,渲染它们
      if (Array.isArray(c.replies) && c.replies.length > 0) {
        const repliesUl = document.createElement('ul');
        repliesUl.className = 'comment-replies';
        c.replies.forEach(r => {
          const replyLi = renderReplyItem(r);
          repliesUl.appendChild(replyLi);
        });
        li.querySelector('.comment-body').appendChild(repliesUl);
      }

      if (prepend) commentList.prepend(li);
      else commentList.appendChild(li);
      return li;
    }

    // 单独渲染一条回复(结构跟评论一样,只是不再嵌套)
    function renderReplyItem(r) {
      const li = document.createElement('li');
      li.className = 'comment';
      li.innerHTML = `
        <div class="avatar sm ${r.avatar}">${r.initial}</div>
        <div class="comment-body">
          <div class="comment-head">
            <span class="user-id">${r.userId}</span>
            <span class="time">${r.time}</span>
          </div>
          <p class="comment-text"></p>
          <div class="comment-actions">
            <button class="comment-action like-comment" data-likes="${r.likes}" aria-pressed="false">
              ${HEART_SVG}<span class="lc">${r.likes}</span>
            </button>
            <button class="comment-action">
              ${REPLY_SVG}回复
            </button>
          </div>
        </div>
      `;
      const textEl = li.querySelector('.comment-text');
      if (r.replyTo) {
        const replyMark = document.createElement('span');
        replyMark.className = 'reply-to';
        replyMark.textContent = '回复 ' + r.replyTo + ':';
        textEl.appendChild(replyMark);
        appendFormatted(textEl, r.text);
      } else {
        appendFormatted(textEl, r.text);
      }
      return li;
    }
 
    seedComments.forEach(c => renderComment(c));
 
    // ===== 帖子主点赞 =====
    const likeBtn = document.getElementById('likeBtn');
    const likeCount = document.getElementById('likeCount');
    let postLiked = false;
    let postLikes = 734;
 
    likeBtn.addEventListener('click', () => {
      postLiked = !postLiked;
      postLikes += postLiked ? 1 : -1;
      likeCount.textContent = postLikes;
      likeBtn.classList.toggle('liked', postLiked);
      likeBtn.setAttribute('aria-pressed', postLiked);
    });
 
    // ===== 评论点赞(事件委托)=====
    document.addEventListener('click', e => {
      const btn = e.target.closest('.like-comment');
      if (!btn) return;
      const isLiked = btn.classList.toggle('liked');
      let n = parseInt(btn.dataset.likes, 10);
      n += isLiked ? 1 : -1;
      btn.dataset.likes = n;
      btn.querySelector('.lc').textContent = n;
      btn.setAttribute('aria-pressed', isLiked);
    });
 
    // ===== 评论输入框 =====
    const input = document.getElementById('commentInput');
    const submitBtn = document.getElementById('submitBtn');
    const commentNumLabel = document.getElementById('commentNumLabel');
    const commentTopCount = document.getElementById('commentTopCount');
    let commentTotal = seedComments.length;
 
    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 160) + 'px';
      submitBtn.disabled = input.value.trim().length === 0;
    });
 
    function submit() {
      const text = input.value.trim();
      if (!text) return;
 
      showToast();
 
      const inputBox = document.querySelector('.comment-input');
      inputBox.classList.remove('shake');
      void inputBox.offsetWidth;
      inputBox.classList.add('shake');
    }
 
    // ===== Toast =====
    const toast = document.getElementById('toast');
    let toastTimer = null;
 
    function showToast() {
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove('show');
      }, 2600);
    }
 
    toast.addEventListener('click', () => {
      toast.classList.remove('show');
      clearTimeout(toastTimer);
    });
 
    submitBtn.addEventListener('click', submit);
 
    input.addEventListener('keydown', e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        e.preventDefault();
        submit();
      }
    });
  </script>
<script src="nav.js"></script>
</body>
</html>
