<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>能吃与不能吃</title>
<style>
  @import url('https://gs.jurieo.com/gemini/fonts-googleapis/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap');

  :root {
    --bg:     #0a1628;
    --accent: #4a90d9;
    --light:  #a8ccf0;
    --white:  #e8f2ff;
    --border: #2a4a7a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Ma Shan Zheng', 'Noto Serif SC', serif;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 28% 22%, rgba(74,144,217,0.18) 0%, transparent 52%),
      radial-gradient(ellipse at 76% 80%, rgba(20,60,140,0.22) 0%, transparent 50%),
      repeating-linear-gradient(45deg, transparent, transparent 38px,
        rgba(74,144,217,0.022) 38px, rgba(74,144,217,0.022) 39px);
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
  }

  .subtitle {
    font-size: 0.72rem;
    color: rgba(168,204,240,0.45);
    letter-spacing: 0.28em;
    text-align: center;
    font-family: 'Noto Serif SC', serif;
  }

  /* ── 3D 卡片 ── */
  .card-scene {
    width: 442px;
    height: 442px;
    perspective: 1600px;
    position: relative;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.75s cubic-bezier(0.4, 0.2, 0.2, 1);
  }
  .card.flipped { transform: rotateY(180deg); }

  .card-scene.zooming-in {
    position: fixed;
    z-index: 100;
    transition:
      top 0.7s cubic-bezier(0.4, 0, 0.2, 1),
      left 0.7s cubic-bezier(0.4, 0, 0.2, 1),
      width 0.7s cubic-bezier(0.4, 0, 0.2, 1),
      height 0.7s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 4px;
    overflow: hidden;
  }

  .card-front { cursor: default; }

  .card-back {
    transform: rotateY(180deg);
    cursor: pointer;
  }
  .card-back img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }

  /* ── 游戏棋盘 ── */
  .board-wrap {
    width: 100%;
    height: 100%;
    padding: 10px;
    background: rgba(8,18,36,0.9);
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow:
      0 0 0 1px rgba(74,144,217,0.08),
      0 10px 44px rgba(0,0,0,0.65),
      0 0 60px rgba(74,144,217,0.07),
      inset 0 1px 0 rgba(74,144,217,0.13);
  }

  #game-board {
    width: 100%;
    height: 100%;
    background: #040a14;
    position: relative;
    overflow: hidden;
    border-radius: 2px;
  }

  /* 题目 */
  .quiz-question {
    position: absolute;
    top: 28px;
    left: 0; right: 0;
    text-align: center;
    color: var(--white);
    font-family: 'Noto Serif SC', serif;
    font-size: 1.08rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 0 22px;
    text-shadow: 0 0 12px rgba(74,144,217,0.4);
  }
  .quiz-round-no {
    position: absolute;
    top: 60px;
    left: 0; right: 0;
    text-align: center;
    color: rgba(168,204,240,0.4);
    font-family: 'Noto Serif SC', serif;
    font-size: 0.66rem;
    letter-spacing: 0.24em;
  }

  /* 选项行 */
  .options-row {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    display: flex;
    gap: 22px;
  }
  .options-row.locked .option-tile { pointer-events: none; }

  .option-tile {
    position: relative;
    width: 104px;
    height: 104px;
    background: linear-gradient(135deg, rgba(74,144,217,0.12), rgba(20,60,140,0.20));
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    cursor: pointer;
    user-select: none;
    transition: transform 0.15s ease, border-color 0.2s, box-shadow 0.2s, opacity 0.3s;
    box-shadow: inset 0 1px 0 rgba(74,144,217,0.15), 0 4px 10px rgba(0,0,0,0.45);
    /* 让卡片处于 3D 上下文里时，瓦片始终正面朝向、独立成层，避免抖动时被剔除而"消失" */
    backface-visibility: visible;
    -webkit-backface-visibility: visible;
    transform: translateZ(0);
  }
  .option-tile:hover {
    transform: translateZ(0) translateY(-4px) scale(1.04);
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(74,144,217,0.25), 0 8px 16px rgba(0,0,0,0.55);
  }
  .option-tile:active { transform: translateZ(0) scale(0.97); }

  .option-tile .letter-badge {
    position: absolute;
    right: -7px; bottom: -7px;
    width: 27px; height: 27px;
    background: var(--accent);
    color: #fff;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Noto Serif SC', serif;
    font-size: 0.86rem; font-weight: 700;
    letter-spacing: 0;
    box-shadow: 0 2px 6px rgba(0,0,0,0.55);
    border: 1px solid rgba(255,255,255,0.35);
  }

  .option-tile.correct {
    border-color: #4ad980;
    box-shadow: 0 0 0 2px rgba(74,217,128,0.45), 0 0 22px rgba(74,217,128,0.32);
  }
  .option-tile.correct .letter-badge { background: #4ad980; }
  .option-tile.wrong {
    border-color: #d94a4a !important;
    background: rgba(217,74,74,0.22);
    box-shadow: 0 0 0 2px rgba(217,74,74,0.5), 0 0 18px rgba(217,74,74,0.35);
    animation: tile-shake 0.4s ease;
  }
  .option-tile.wrong .letter-badge { background: #d94a4a; }
  /* 抖动保留 translateZ(0)，避免在 3D 卡片里被剔除而消失 */
  @keyframes tile-shake {
    0%,100% { transform: translateZ(0) translateX(0); }
    25%     { transform: translateZ(0) translateX(-6px); }
    75%     { transform: translateZ(0) translateX(6px); }
  }
  .option-tile.dimmed { opacity: 0.3; }

  #success-msg {
    display: none;
    position: absolute;
    inset: 0;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    color: var(--light);
    letter-spacing: 0.2em;
    animation: fadeInUp 0.6s ease forwards;
  }

  /* ── 底部交互区 ── */
  .action-area {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .action-area.show { display: flex; animation: fadeInUp 0.4s ease; }

  .word-input-wrap { display: flex; align-items: center; gap: 8px; }
  .btn-row { display: flex; gap: 16px; }

  .btn-replay, .btn-submit {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    padding: 7px 18px;
    border: 1px solid var(--border);
    background: rgba(8,18,36,0.8);
    color: var(--light);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.25s ease;
  }
  .btn-replay:hover, .btn-submit:hover {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(74,144,217,0.2);
  }
  .btn-submit { background: rgba(74,144,217,0.2); border-color: var(--accent); }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .word-input {
    font-family: 'Noto Serif SC', serif;
    font-size: 1rem;
    letter-spacing: 0.12em;
    padding: 8px 16px;
    border: 1px solid var(--border);
    background: rgba(8,18,36,0.8);
    color: var(--white);
    border-radius: 3px;
    width: 180px;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
    text-align: center;
  }
  .word-input::placeholder { color: rgba(168,204,240,0.3); font-size: 0.82rem; letter-spacing: 0.1em; }
  .word-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(74,144,217,0.2); }
  .word-input.correct { border-color: #4ad980; box-shadow: 0 0 0 2px rgba(74,217,128,0.25); }
  .word-input.wrong {
    border-color: #d94a4a;
    box-shadow: 0 0 0 2px rgba(217,74,74,0.25);
    animation: shake 0.35s ease;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-6px); }
    75%      { transform: translateX(6px); }
  }

  .hint {
    font-size: 0.66rem;
    color: rgba(168,204,240,0.28);
    letter-spacing: 0.1em;
    text-align: center;
    font-family: 'Noto Serif SC', serif;
    transition: opacity 0.3s;
  }

  #flip-hint {
    font-size: 0.66rem;
    color: rgba(168,204,240,0.35);
    letter-spacing: 0.15em;
    text-align: center;
    font-family: 'Noto Serif SC', serif;
    opacity: 0;
    transition: opacity 0.5s ease;
    height: 1em;
  }
  #flip-hint.show { opacity: 1; }

  .container.exiting .subtitle,
  .container.exiting .action-area,
  .container.exiting .hint,
  .container.exiting #flip-hint {
    transition: opacity 0.35s ease;
    opacity: 0;
  }

  /* ───────────── 公鸡 NPC ───────────── */
  .rooster-container {
    position: fixed;
    right: 36px;
    bottom: 28px;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 14px;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .rooster-container.fade-out { opacity: 0; pointer-events: none; }

  .speech-bubble {
    position: relative;
    background: linear-gradient(135deg, rgba(244, 233, 210, 0.97), rgba(220, 207, 178, 0.95));
    color: #2a1a0a;
    padding: 14px 18px 22px 18px;
    border-radius: 4px;
    font-family: 'Noto Serif SC', serif;
    font-size: 0.86rem;
    font-weight: 500;
    line-height: 1.6;
    letter-spacing: 0.04em;
    max-width: 280px;
    min-width: 180px;
    box-shadow:
      0 6px 24px rgba(0,0,0,0.55),
      0 0 0 1px rgba(139, 90, 43, 0.5),
      inset 0 1px 0 rgba(255, 255, 255, 0.5);
    opacity: 0;
    transform: translateY(8px) scale(0.96);
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
    margin-right: 40px;
    will-change: transform, opacity;
  }
  .speech-bubble.show { opacity: 1; transform: translateY(0) scale(1); }
  .speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -10px;
    right: 32px;
    width: 0; height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 10px solid rgba(228, 215, 186, 0.96);
    filter: drop-shadow(0 2px 1px rgba(139, 90, 43, 0.4));
  }
  .speech-bubble::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px dashed rgba(139, 90, 43, 0.35);
    border-radius: 2px;
    pointer-events: none;
  }

  .next-arrow {
    position: absolute;
    right: 12px;
    bottom: 4px;
    font-size: 0.85rem;
    color: #8b5a2b;
    animation: arrow-blink 1.2s ease-in-out infinite;
  }
  @keyframes arrow-blink {
    0%, 100% { opacity: 0.25; transform: translateX(0); }
    50%      { opacity: 1;    transform: translateX(3px); }
  }

  .rooster {
    width: 260px;
    height: 260px;
    cursor: pointer;
    user-select: none;
    pointer-events: auto;
    position: relative;
    filter: drop-shadow(0 10px 18px rgba(0,0,0,0.6));
    transition: filter 0.3s ease;
  }
  .rooster.bobbing { animation: rooster-bob 0.8s ease-in-out 5; }
  @keyframes rooster-bob {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    25%      { transform: translateY(-9px) rotate(-2.5deg); }
    50%      { transform: translateY(0) rotate(0deg); }
    75%      { transform: translateY(-9px) rotate(2.5deg); }
  }
  .rooster:hover {
    filter: drop-shadow(0 10px 20px rgba(74,144,217,0.5))
            drop-shadow(0 8px 14px rgba(0,0,0,0.55));
  }
  .rooster img {
    width: 100%; height: 100%;
    object-fit: contain;
    display: block;
    -webkit-user-drag: none;
    pointer-events: none;
  }
  .rooster-fallback {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 8rem; line-height: 1;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="container" id="page-container">
  <p class="subtitle">互动收集 · 还原密码</p>

  <div class="card-scene" id="card-scene">
    <div class="card" id="card">
      <div class="card-face card-front" id="card-front">
        <div class="board-wrap">
          <div id="game-board">
            <div class="quiz-question" id="quiz-question"></div>
            <div class="quiz-round-no" id="quiz-round-no"></div>
            <div class="options-row" id="options-row"></div>
            <div id="success-msg">六轮作答完毕</div>
          </div>
        </div>
      </div>
      <div class="card-face card-back" id="card-back">
        <img id="back-img" src="images/yazi.png" alt="背面">
      </div>
    </div>
  </div>

  <div class="action-area" id="action-area">
    <div class="word-input-wrap">
      <input class="word-input" id="word-input" type="text"
             placeholder="输入密码…" autocomplete="off" spellcheck="false">
    </div>
    <div class="btn-row">
      <button class="btn-replay" id="btn-replay" onclick="resetGame()">↻ 重新作答</button>
      <button class="btn-submit" id="btn-submit" onclick="checkPassword()">确 认</button>
    </div>
  </div>

  <p class="hint" id="main-hint"></p>
  <p id="flip-hint">点击图片可翻回正面</p>
</div>

<!-- ───────────── 公鸡 NPC ───────────── -->
<div class="rooster-container" id="rooster-container">
  <div class="speech-bubble" id="speech-bubble">
    <span id="bubble-text"></span>
    <span class="next-arrow">▸</span>
  </div>
  <div class="rooster" id="rooster">
    <img id="rooster-img" src="images/mojingji.png" alt="公鸡"
         onerror="this.style.display='none';document.getElementById('rooster-fallback').style.display='flex';">
    <div class="rooster-fallback" id="rooster-fallback" style="display:none;">🐓</div>
  </div>
</div>

<script>
  // ═══════════════════════════════════════════
  const BACK_IMAGE  = 'images/yazi.png';   // ← 换成你的背面图
  const PASSWORD    = 'sawney';
  const PUZZLE_ID   = 'puzzle_2';
  const PUZZLE_INDEX = 1;          // 九宫格里的第 2 格（索引 1）
  const RETURN_URL  = 'mxhuitu.html';
  // ═══════════════════════════════════════════

  // ── 六轮题目 ──────────────────────────────────────────────
  // canEat:true  → 题目“选出能吃的东西”，正确答案是【食物】
  // canEat:false → 题目“选出不能吃的东西”，正确答案是【杂物】
  // 每轮 options 里 correct:true 的那一项带着答案字母（按顺序拼成 sawney）
  // 其余两项是干扰项，字母随意（不影响答案）
  const ROUNDS = [
    { canEat: true,  options: [
        { emoji: '🌽', letter: 's', correct: true  },   // 面包 = 能吃
        { emoji: '🪨', letter: 'k', correct: false },   // 石头
        { emoji: '🧼', letter: 'q', correct: false } ]  // 肥皂
    },
    { canEat: false, options: [
        { emoji: '🐛', letter: 't', correct: false },   // 苹果
        { emoji: '🔩', letter: 'a', correct: true  },   // 螺丝 = 不能吃
        { emoji: '🍇', letter: 'm', correct: false } ]  // 葡萄
    },
    { canEat: true,  options: [
        { emoji: '🪵', letter: 'r', correct: false },   // 木头
        { emoji: '🍐', letter: 'w', correct: true  },   // 披萨 = 能吃
        { emoji: '🧷', letter: 'z', correct: false } ]  // 别针
    },
    { canEat: false, options: [
        { emoji: '🍌', letter: 'b', correct: false },   // 香蕉
        { emoji: '🥕', letter: 'f', correct: false },   // 胡萝卜
        { emoji: '💡', letter: 'n', correct: true  } ]  // 灯泡 = 不能吃
    },
    { canEat: true,  options: [
        { emoji: '🔧', letter: 'x', correct: false },   // 扳手
        { emoji: '🥚', letter: 'e', correct: true  },   // 鸡蛋 = 能吃
        { emoji: '⛓️', letter: 'g', correct: false } ]  // 铁链
    },
    { canEat: true, options: [
        { emoji: '🌽', letter: 'd', correct: false },   // 草莓
        { emoji: '🦆', letter: 'y', correct: true  },   // 硬币 = 不能吃
        { emoji: '🐛', letter: 'p', correct: false } ]  // 樱桃
    },
  ];

  const targetWord = PASSWORD.split('');   // ['s','a','w','n','e','y']
  let currentRound = 0;
  let isAnimating = false;
  let gameSolved = false;

  let gamePhase = 'intro';
  let dialogueIndex = 0;

  const dialogues = {
    intro: [
      '咯咯咯——旗开得胜啊',
      '顺便说一句 你看到的画面都是按照时间顺序来的哟',
      '这一题与吃的有关',
      '民以食为天嘛',
      '根据问题选择，记得记住密码哟',
      
    ],
    playing: [
      '咯咯咯，再想想',
      '是不是食物，有时候在一念之间',

    ],
    ending: [
      '我们曾经认为鸭子也是拥有智慧的生物',
      '所以很少会有人去食用鸭子',
      '直到有一段时间我们平常吃的食物，比如谷物和虫类，突然大量枯死或死亡',
      '于是大家将目光放到了鸭子上',
      '更加奇怪的是，开始吃鸭子之后，那些食物的来源又开始稳定起来，而一旦停止食用，我们又会陷入同样的境地',
      '就好像是有谁想让我们将鸭子加入食谱一样',
      '当然了，我们也无法抵抗',
      '让它归位吧,咯咯咯——'
    ]
  };

  window.onload = () => {
    document.getElementById('back-img').src = BACK_IMAGE;

    document.getElementById('card-back').addEventListener('click', () => {
      if (gameSolved && gamePhase === 'done') flipCard();
    });

    document.getElementById('rooster').addEventListener('click', clickRooster);

    document.getElementById('word-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkPassword();
    });

    buildOptionsAndStart();

    playEnterAnimation(() => {
      setTimeout(() => { showDialogue(dialogues.intro[0]); }, 250);
    });
  };

  function buildOptionsAndStart() {
    setupRound(); // intro 阶段 setupRound 会自动把选项锁住
  }

  // ── 入场展开动画（与 puzzle1 完全一致）──
  function playEnterAnimation(onDone) {
    let originRaw = sessionStorage.getItem('puzzle_origin');
    let origin = null;
    if (originRaw) { try { origin = JSON.parse(originRaw); } catch (e) {} }

    const scene = document.getElementById('card-scene');

    if (!origin || origin.index !== PUZZLE_INDEX) {
      if (onDone) onDone();
      return;
    }

    const finalRect = scene.getBoundingClientRect();

    scene.classList.add('zooming-in');
    scene.style.left   = origin.left + 'px';
    scene.style.top    = origin.top + 'px';
    scene.style.width  = origin.width + 'px';
    scene.style.height = origin.height + 'px';

    void scene.offsetWidth;

    requestAnimationFrame(() => {
      scene.style.left   = finalRect.left + 'px';
      scene.style.top    = finalRect.top + 'px';
      scene.style.width  = finalRect.width + 'px';
      scene.style.height = finalRect.height + 'px';
    });

    setTimeout(() => {
      scene.classList.remove('zooming-in');
      scene.style.left = ''; scene.style.top = '';
      scene.style.width = ''; scene.style.height = '';
      if (onDone) onDone();
    }, 720);
  }

  // ── 公鸡说话与摆动（与 puzzle1 一致）──
  function showDialogue(text) {
    const bubble = document.getElementById('speech-bubble');
    const bubbleText = document.getElementById('bubble-text');
    const rooster = document.getElementById('rooster');
    bubbleText.textContent = text;
    bubble.classList.remove('show');
    void bubble.offsetWidth;
    bubble.classList.add('show');
    rooster.classList.remove('bobbing');
    void rooster.offsetWidth;
    rooster.classList.add('bobbing');
  }
  function hideDialogue() {
    document.getElementById('speech-bubble').classList.remove('show');
    document.getElementById('rooster').classList.remove('bobbing');
  }

  function clickRooster() {
    if (gamePhase === 'intro') {
      dialogueIndex++;
      if (dialogueIndex < dialogues.intro.length) {
        showDialogue(dialogues.intro[dialogueIndex]);
      } else {
        gamePhase = 'playing';
        dialogueIndex = -1;
        hideDialogue();
        document.getElementById('options-row').classList.remove('locked');
        document.getElementById('main-hint').textContent = '点击你认为正确的那一项';
      }
    } else if (gamePhase === 'playing') {
      dialogueIndex = (dialogueIndex + 1) % dialogues.playing.length;
      showDialogue(dialogues.playing[dialogueIndex]);
    } else if (gamePhase === 'ending') {
      dialogueIndex++;
      if (dialogueIndex < dialogues.ending.length) {
        showDialogue(dialogues.ending[dialogueIndex]);
      } else {
        hideDialogue();
        gamePhase = 'done';
        setTimeout(() => triggerFlyOut(), 450);
      }
    }
  }

  // ── 游戏核心逻辑 ──────────────────────────────────────────────
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function setupRound() {
    if (currentRound >= ROUNDS.length) { onGameComplete(); return; }

    const round = ROUNDS[currentRound];
    document.getElementById('quiz-question').textContent =
      round.canEat ? '选出昴星人能吃的东西' : '选出昴星人不能吃的东西';
    document.getElementById('quiz-round-no').textContent =
      '第 ' + (currentRound + 1) + ' / ' + ROUNDS.length + ' 轮';

    const row = document.getElementById('options-row');
    row.innerHTML = '';

    shuffle(round.options).forEach(opt => {
      const tile = document.createElement('div');
      tile.className = 'option-tile';
      tile.innerHTML = opt.emoji + '<span class="letter-badge">' +
                       opt.letter.toUpperCase() + '</span>';
      tile.addEventListener('click', () => selectOption(opt, tile));
      row.appendChild(tile);
    });

    // intro 阶段锁住选项，进入 playing 后解锁（修复"第二轮点不动"）
    if (gamePhase === 'intro') row.classList.add('locked');
    else                       row.classList.remove('locked');

    isAnimating = false;
  }

  function selectOption(opt, tile) {
    // intro 阶段：点选项 → 让公鸡接着说，不计入答题
    if (gamePhase === 'intro') {
      const rooster = document.getElementById('rooster');
      rooster.classList.remove('bobbing');
      void rooster.offsetWidth;
      rooster.classList.add('bobbing');
      const bubble = document.getElementById('speech-bubble');
      if (!bubble.classList.contains('show')) {
        showDialogue(dialogues.intro[dialogueIndex] || dialogues.intro[0]);
      }
      return;
    }
    if (isAnimating || currentRound >= ROUNDS.length) return;

    if (opt.correct) {
      isAnimating = true;
      tile.classList.add('correct');
      document.getElementById('options-row').classList.add('locked');
      // 把其他项淡掉
      [...document.querySelectorAll('.option-tile')].forEach(t => {
        if (t !== tile) t.classList.add('dimmed');
      });

      // 停留一会儿让你看清这一项的字母，再进入下一轮（不汇总、不剧透整词）
      setTimeout(() => {
        currentRound++;
        setupRound();
      }, 850);
    } else {
    // 选错：该选项直接消失（保留占位，其余选项不位移）
    tile.style.pointerEvents = 'none';
    tile.style.opacity = '0';
    showDialogue(dialogues.playing[0]);
    }
  }

  function onGameComplete() {
    gameSolved = true;

    document.getElementById('quiz-question').style.display = 'none';
    document.getElementById('quiz-round-no').style.display = 'none';
    document.getElementById('options-row').style.display = 'none';
    document.getElementById('success-msg').style.display = 'flex';

    document.getElementById('action-area').classList.add('show');
    document.getElementById('main-hint').style.opacity = '0';

    setTimeout(() => { document.getElementById('word-input').focus(); }, 400);
  }

  function resetGame() {
    currentRound = 0;
    gameSolved = false;

    if (gamePhase === 'ending' || gamePhase === 'done') {
      gamePhase = 'playing';
      dialogueIndex = -1;
      hideDialogue();
    }

    document.getElementById('quiz-question').style.display = '';
    document.getElementById('quiz-round-no').style.display = '';
    document.getElementById('options-row').style.display = '';
    document.getElementById('options-row').classList.remove('locked');
    document.getElementById('success-msg').style.display = 'none';

    document.getElementById('action-area').classList.remove('show');
    document.getElementById('main-hint').style.opacity = '';
    document.getElementById('main-hint').textContent = '点击你认为正确的那一项';

    const input = document.getElementById('word-input');
    input.value = '';
    input.disabled = false;
    input.classList.remove('correct', 'wrong');

    const card = document.getElementById('card');
    if (card.classList.contains('flipped')) card.classList.remove('flipped');
    document.getElementById('flip-hint').classList.remove('show');

    setupRound();
  }

  function flipCard() {
    const card = document.getElementById('card');
    const nowFlipped = card.classList.toggle('flipped');
    document.getElementById('flip-hint').classList.add('show');

    if (nowFlipped) {
      document.getElementById('flip-hint').textContent = '听我说完先…';
      setTimeout(() => {
        gamePhase = 'ending';
        dialogueIndex = 0;
        showDialogue(dialogues.ending[0]);
      }, 850);
    } else {
      document.getElementById('flip-hint').textContent = '密码已解锁,再次点击图片查看';
    }
  }

  // ── 飞回九宫格（与 puzzle1 完全一致）──
  function triggerFlyOut() {
    const scene = document.getElementById('card-scene');
    const r = scene.getBoundingClientRect();

    sessionStorage.setItem('puzzle_returning', JSON.stringify({
      index: PUZZLE_INDEX,
      from: { left: r.left, top: r.top, width: r.width, height: r.height }
    }));

    document.getElementById('page-container').classList.add('exiting');
    document.getElementById('rooster-container').classList.add('fade-out');
    document.getElementById('flip-hint').textContent = '即将返回大九宫格…';

    scene.classList.add('zooming-in');
    scene.style.left   = r.left + 'px';
    scene.style.top    = r.top + 'px';
    scene.style.width  = r.width + 'px';
    scene.style.height = r.height + 'px';
    void scene.offsetWidth;

    requestAnimationFrame(() => {
      scene.style.transition =
        'top 0.5s ease, left 0.5s ease, width 0.5s ease, height 0.5s ease, opacity 0.5s ease';
      scene.style.opacity = '0';
      scene.style.left   = (r.left + r.width * 0.15) + 'px';
      scene.style.top    = (r.top + r.height * 0.15) + 'px';
      scene.style.width  = (r.width * 0.7) + 'px';
      scene.style.height = (r.height * 0.7) + 'px';
    });

    setTimeout(() => { window.location.href = RETURN_URL; }, 550);
  }

  function checkPassword() {
    const input = document.getElementById('word-input');
    const val = input.value.trim();

    if (val.toLowerCase() === PASSWORD.toLowerCase()) {
      input.classList.remove('wrong');
      input.classList.add('correct');

      const card = document.getElementById('card');
      if (!card.classList.contains('flipped')) flipCard();

      localStorage.setItem(PUZZLE_ID + '_unlocked', 'true');
      input.disabled = true;
    } else {
      input.classList.remove('correct', 'wrong');
      void input.offsetWidth;
      input.classList.add('wrong');
      input.value = '';
      setTimeout(() => input.classList.remove('wrong'), 400);
    }
  }
</script>
</body>
