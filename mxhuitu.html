<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大九宫格</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap');

  :root {
    --bg:     #0a1628;
    --accent: #4a90d9;
    --light:  #a8ccf0;
    --white:  #e8f2ff;
    --border: #2a4a7a;
    --locked: #0d1e38;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Ma Shan Zheng', 'Noto Serif SC', serif;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 25% 20%, rgba(74,144,217,0.16) 0%, transparent 52%),
      radial-gradient(ellipse at 78% 80%, rgba(20,60,140,0.2) 0%, transparent 50%),
      repeating-linear-gradient(45deg, transparent, transparent 38px,
        rgba(74,144,217,0.018) 38px, rgba(74,144,217,0.018) 39px);
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .subtitle {
    font-size: 0.72rem;
    color: rgba(168,204,240,0.4);
    letter-spacing: 0.3em;
    font-family: 'Noto Serif SC', serif;
    text-align: center;
  }

  /* ── 大棋盘 ── */
  .big-board-wrap {
    padding: 10px;
    background: rgba(8,18,36,0.9);
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow:
      0 0 0 1px rgba(74,144,217,0.08),
      0 12px 48px rgba(0,0,0,0.65),
      0 0 70px rgba(74,144,217,0.07),
      inset 0 1px 0 rgba(74,144,217,0.12);
  }

  #big-board {
    display: grid;
    grid-template-columns: repeat(3, 140px);
    grid-template-rows: repeat(3, 140px);
    gap: 4px;
    background: #040a14;
  }

  /* ── 每格 ── */
  .cell {
    width: 140px;
    height: 140px;
    position: relative;
    overflow: hidden;
    border-radius: 2px;
    cursor: pointer;
    background: var(--locked);
    transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.3s ease;
  }

  /* 未解锁 */
  .cell.locked {
    cursor: pointer;
  }
  .cell.locked:hover {
    transform: scale(0.96);
    box-shadow: 0 0 14px rgba(74,144,217,0.4);
  }
  .cell.locked:active { transform: scale(0.93); }

  /* 锁定状态内容 */
  .lock-icon {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    pointer-events: none;
  }
  .lock-svg {
    opacity: 0.2;
  }
  .cell-num {
    font-family: 'Ma Shan Zheng', serif;
    font-size: 1.1rem;
    color: rgba(168,204,240,0.2);
    letter-spacing: 0.05em;
  }

  /* 已解锁 */
  .cell.unlocked {
    cursor: pointer;
  }
  .cell.unlocked:hover {
    transform: scale(0.97);
    z-index: 2;
    box-shadow: 0 0 18px rgba(74,144,217,0.6);
    filter: brightness(1.08);
  }
  .cell.unlocked:active { transform: scale(0.94); }

  .cell-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
    user-select: none;
    -webkit-user-drag: none;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .cell-img.loaded { opacity: 1; }

  /* 解锁动画 */
  @keyframes unlockReveal {
    0%   { opacity: 0; transform: scale(0.8); filter: blur(6px); }
    60%  { transform: scale(1.04); filter: blur(0); }
    100% { opacity: 1; transform: scale(1); filter: blur(0); }
  }
  .cell.just-unlocked {
    animation: unlockReveal 0.6s cubic-bezier(.34,1.56,.64,1) forwards;
  }

  /* 角标 */
  .cell-badge {
    position: absolute;
    top: 4px;
    left: 4px;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 700;
    color: #fff;
    background: rgba(74,144,217,0.85);
    border-radius: 50%;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    box-shadow: 0 1px 4px rgba(0,0,0,0.5);
    pointer-events: none;
    font-family: 'Noto Serif SC', serif;
    z-index: 3;
    opacity: 0;
    transition: opacity 0.3s ease 0.3s;
  }
  .cell.unlocked .cell-badge { opacity: 1; }

  /* 进度提示 */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .progress-text {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.72rem;
    color: rgba(168,204,240,0.4);
    letter-spacing: 0.15em;
  }
  .progress-dots {
    display: flex;
    gap: 5px;
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.4s ease;
  }
  .dot.on { background: var(--accent); box-shadow: 0 0 5px rgba(74,144,217,0.6); }

  /* 全部完成提示 */
  #complete-msg {
    font-family: 'Ma Shan Zheng', serif;
    font-size: 1.1rem;
    color: var(--light);
    letter-spacing: 0.2em;
    text-shadow: 0 0 16px rgba(74,144,217,0.5);
    opacity: 0;
    transition: opacity 0.8s ease;
    height: 1.5em;
    text-align: center;
  }
  #complete-msg.show { opacity: 1; }
</style>
</head>
<body>
<div class="container">
  <p class="subtitle">完成拼图 · 解锁方格</p>

  <div class="big-board-wrap">
    <div id="big-board"></div>
  </div>

  <div class="progress-row">
    <span class="progress-text" id="progress-text">0 / 9</span>
    <div class="progress-dots" id="dots"></div>
  </div>

  <p id="complete-msg">全部解锁！</p>
</div>

<script>
  // ═══════════════════════════════════════════════════════════════
  // 9 个格子的配置，按顺序填写
  // image: 拼完后正面图片路径
  // url:   对应的华容道 HTML 文件路径
  // id:    与华容道页面里 PUZZLE_ID 保持一致
  // ═══════════════════════════════════════════════════════════════
  const PUZZLES = [
    { id: 'puzzle_1', image: 'images/gongyegming.png', url: 'puzzle_1.html' },
    { id: 'puzzle_2', image: 'images/p2.png',          url: 'puzzle_2.html' },
    { id: 'puzzle_3', image: 'images/p3.png',          url: 'puzzle_3.html' },
    { id: 'puzzle_4', image: 'images/p4.png',          url: 'puzzle_4.html' },
    { id: 'puzzle_5', image: 'images/p5.png',          url: 'puzzle_5.html' },
    { id: 'puzzle_6', image: 'images/p6.png',          url: 'puzzle_6.html' },
    { id: 'puzzle_7', image: 'images/p7.png',          url: 'puzzle_7.html' },
    { id: 'puzzle_8', image: 'images/p8.png',          url: 'puzzle_8.html' },
    { id: 'puzzle_9', image: 'images/p9.png',          url: 'puzzle_9.html' },
  ];
  // ═══════════════════════════════════════════════════════════════

  let unlockedCount = 0;

  window.onload = () => {
    buildBoard();
    // 每次页面可见时重新检查解锁状态（从子页面返回时）
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') refreshAll();
    });
  };

  function buildBoard() {
    const board = document.getElementById('big-board');
    const dotsEl = document.getElementById('dots');
    board.innerHTML = '';
    dotsEl.innerHTML = '';

    PUZZLES.forEach((p, i) => {
      // 格子
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.id = 'cell_' + i;
      cell.addEventListener('click', () => goToPuzzle(p.url));

      // 角标
      const badge = document.createElement('span');
      badge.className = 'cell-badge';
      badge.textContent = i + 1;
      cell.appendChild(badge);

      // 锁定图标层
      const lockLayer = document.createElement('div');
      lockLayer.className = 'lock-icon';
      lockLayer.id = 'lock_' + i;
      lockLayer.innerHTML = `
        <svg class="lock-svg" width="36" height="36" viewBox="0 0 24 24" fill="none"
             stroke="rgba(168,204,240,0.9)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <span class="cell-num">${i + 1}</span>
      `;
      cell.appendChild(lockLayer);

      // 图片层
      const img = document.createElement('img');
      img.className = 'cell-img';
      img.alt = '第' + (i + 1) + '格';
      img.id = 'img_' + i;
      img.onload = () => img.classList.add('loaded');
      cell.appendChild(img);

      board.appendChild(cell);

      // 进度点
      const dot = document.createElement('div');
      dot.className = 'dot';
      dot.id = 'dot_' + i;
      dotsEl.appendChild(dot);
    });

    refreshAll();
  }

  function refreshAll() {
    unlockedCount = 0;
    PUZZLES.forEach((p, i) => updateCell(i, false));
    updateProgress();
  }

  function updateCell(i, animate) {
    const p = PUZZLES[i];
    const isUnlocked = localStorage.getItem(p.id + '_unlocked') === 'true';
    const cell  = document.getElementById('cell_' + i);
    const lock  = document.getElementById('lock_' + i);
    const img   = document.getElementById('img_' + i);
    const dot   = document.getElementById('dot_' + i);

    if (isUnlocked) {
      unlockedCount++;
      if (!cell.classList.contains('unlocked')) {
        // 首次解锁
        cell.classList.remove('locked');
        cell.classList.add('unlocked');
        if (animate) cell.classList.add('just-unlocked');
        lock.style.display = 'none';
        img.src = p.image;
        dot.classList.add('on');
      }
    } else {
      cell.classList.remove('unlocked', 'just-unlocked');
      cell.classList.add('locked');
      lock.style.display = '';
      img.src = '';
      img.classList.remove('loaded');
      dot.classList.remove('on');
    }
  }

  function updateProgress() {
    document.getElementById('progress-text').textContent = unlockedCount + ' / 9';
    const msg = document.getElementById('complete-msg');
    if (unlockedCount === 9) msg.classList.add('show');
    else msg.classList.remove('show');
  }

  function goToPuzzle(url) {
    window.location.href = url;
  }

  // 开发用：重置所有解锁状态（在控制台调用 resetAll()）
  window.resetAll = () => {
    PUZZLES.forEach(p => localStorage.removeItem(p.id + '_unlocked'));
    refreshAll();
  };
</script>
</body>
</html>
