<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>语文书的配图是不是有问题啊</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       设计令牌 (颜色 / 字体 / 阴影 / 圆角)
       ============================================================ */
    :root {
      --bg:        #faf7f2;
      --surface:   #ffffff;
      --ink:       #1a1a1a;
      --ink-soft:  #6b6b6b;
      --ink-faint: #9a9a9a;
      --line:      #ece7df;
      --line-soft: #f4f0e8;
      --accent:    #e33932;
      --accent-soft: #fde8e7;
      --shadow:    0 1px 2px rgba(0,0,0,0.04), 0 8px 24px -12px rgba(0,0,0,0.08);
      --shadow-lift: 0 2px 4px rgba(0,0,0,0.06), 0 20px 40px -16px rgba(0,0,0,0.18);
      --radius:    14px;
      --radius-sm: 10px;
      --font-display: 'Bricolage Grotesque', 'Noto Sans SC', system-ui, sans-serif;
      --font-body:    'Noto Sans SC', system-ui, -apple-system, sans-serif;
    }

    /* ============================================================
       全局重置 & 页面容器
       ============================================================ */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 36px 24px 96px;
    }

    @media (max-width: 640px) {
      .container { padding: 20px 16px 64px; }
    }


    /* ============================================================
       1. 顶部导航栏 (Logo + 返回)
       ============================================================ */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 24px;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--line);
    }

    .site-logo {
      display: inline-block;
      line-height: 0;       /* 去掉图片下方空隙 */
    }

    .site-logo img {
      height: 90px;         /* 想多大改这里就行 */
      width: auto;
      display: block;
    }

    .site-logo .dot {
      display: inline-block;
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: 2px;
    }

    .back-link {
      font-size: 14px;
      color: var(--ink-soft);
      text-decoration: none;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      transition: all 0.2s;
    }

    .back-link:hover {
      color: var(--ink);
      border-color: var(--ink);
      transform: translateX(-2px);
    }


    /* ============================================================
       ★ 1.5 帖子状态横幅 (限流提示)  【最近改动 — 新增】
       ────────────────────────────────────────────────────────────
       显示在 header 下方、Hero 主图上方,用软琥珀色调表达警示但不刺眼。
       "管理员"是指向 admin.html 的超链接(可改成你想跳转的页面)
       ============================================================ */
    .status-banner {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: #fef7e0;
      border: 1px solid #f4d893;
      border-radius: var(--radius);
      margin-bottom: 24px;
      font-size: 13.5px;
      color: #7c5a17;
      line-height: 1.5;
    }

    .status-banner svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      stroke-width: 2;
    }

    .status-banner strong {
      font-weight: 700;
    }

    .status-banner a {
      color: #7c5a17;
      text-decoration: underline;
      font-weight: 600;
      text-underline-offset: 2px;
      transition: color 0.15s;
    }

    .status-banner a:hover {
      color: var(--accent);
    }


    /* ============================================================
       2. 帖子主图 (Hero)
       ============================================================ */
    .hero {
      width: 100%;
      border-radius: var(--radius);
      overflow: hidden;
      background: linear-gradient(135deg, #f0ece4 0%, #e6e0d4 100%);
      box-shadow: var(--shadow);
      margin-bottom: 28px;
    }

    .hero img {
      width: 100%;
      height: auto;
      display: block;
      max-height: 520px;
      object-fit: cover;
    }


    /* ============================================================
       3. 作者信息 (头像 + 用户ID + 时间)
       ============================================================ */
    .post-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 16px;
      flex-shrink: 0;
      letter-spacing: -0.02em;
    }

    .avatar.sm { width: 36px; height: 36px; font-size: 14px; }
    .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;     /* 不变形,自动裁切填满 */
    border-radius: 50%;    /* 跟着圆形头像剪 */
    display: block;
    }
    .meta-text { line-height: 1.3; }

    .user-id {
      font-weight: 700;
      font-size: 14.5px;
      color: var(--ink);
    }

    .meta-sub {
      font-size: 12.5px;
      color: var(--ink-faint);
      margin-top: 2px;
    }


    /* ============================================================
       4. 标题
       ============================================================ */
    .post-title {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 38px;
      line-height: 1.18;
      letter-spacing: -0.025em;
      color: var(--ink);
      margin-bottom: 24px;
    }

    @media (max-width: 640px) {
      .post-title { font-size: 28px; }
    }


    /* ============================================================
       5. 正文
       ============================================================ */
    .post-body {
      font-size: 16px;
      line-height: 1.8;
      color: #2a2a2a;
      margin-bottom: 36px;
    }

    .post-body p { margin-bottom: 18px; }
    .post-body p:last-child { margin-bottom: 0; }

    .post-body ol {
      padding-left: 22px;
      margin-bottom: 18px;
    }

    .post-body ol li {
      margin-bottom: 8px;
      padding-left: 4px;
    }

    .post-body ol li::marker {
      color: var(--accent);
      font-weight: 700;
    }


    /* ============================================================
       6. 帖子 Tags
       ────────────────────────────────────────────────────────────
       蓝色胶囊标签,放在正文和操作栏之间。# 符号由 ::before 自动添加。
       ============================================================ */
    .post-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: -16px 0 32px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 5px 12px;
      background: #eaf1ff;
      color: #2563eb;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: all 0.18s ease;
    }

    .tag::before {
      content: '#';
      margin-right: 2px;
      opacity: 0.7;
    }

    .tag:hover {
      background: #2563eb;
      color: #fff;
      transform: translateY(-1px);
    }


    /* ============================================================
       7. 操作栏 (点赞 / 评论数 / 分享)
       ============================================================ */
    .post-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 4px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      margin-bottom: 40px;
    }

    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 14px;
      background: transparent;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: var(--ink-soft);
      transition: all 0.18s ease;
    }

    .action-btn:hover {
      background: var(--line-soft);
      color: var(--ink);
    }

    .action-btn svg {
      width: 18px; height: 18px;
      stroke-width: 1.8;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .action-btn.liked {
      color: var(--accent);
      background: var(--accent-soft);
    }

    .action-btn.liked svg {
      fill: var(--accent);
      stroke: var(--accent);
      animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.35); }
      100% { transform: scale(1); }
    }

    .action-btn .count {
      font-variant-numeric: tabular-nums;
    }

    .action-btn.share-btn {
      margin-left: auto;
    }


    /* ============================================================
       8. 评论区 — 标题
       ============================================================ */
    .comments-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 22px;
      letter-spacing: -0.01em;
      margin-bottom: 18px;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .comments-title .num {
      color: var(--accent);
      font-size: 18px;
    }


    /* ============================================================
       9. 评论区 — 输入框
       ────────────────────────────────────────────────────────────
       ★【上一轮改动】底部已删除"以xx身份发布"提示行,
                      .input-foot 改为 flex-end → "发布"按钮靠右
       ============================================================ */
    .comment-input {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
      margin-bottom: 28px;
      transition: border-color 0.2s;
    }

    .comment-input:focus-within {
      border-color: var(--ink);
    }

    .input-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .comment-input textarea {
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      font-family: inherit;
      font-size: 15px;
      line-height: 1.55;
      color: var(--ink);
      background: transparent;
      min-height: 24px;
      max-height: 160px;
    }

    .comment-input textarea::placeholder {
      color: var(--ink-faint);
    }

    .input-foot {
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .input-hint {
      font-size: 12px;
      color: var(--ink-faint);
    }

    .submit-btn {
      padding: 8px 18px;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 999px;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 13.5px;
      cursor: pointer;
      transition: all 0.18s;
      letter-spacing: 0.01em;
    }

    .submit-btn:hover:not(:disabled) {
      background: var(--accent);
      transform: translateY(-1px);
    }

    .submit-btn:disabled {
      background: var(--line);
      color: var(--ink-faint);
      cursor: not-allowed;
    }


    /* ============================================================
       10. 评论列表
       ============================================================ */
    .comment-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .comment {
      display: flex;
      gap: 12px;
      padding: 18px 4px;
      border-bottom: 1px solid var(--line-soft);
      animation: slideIn 0.3s ease-out;
    }

    .comment:last-child { border-bottom: none; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .comment-body { flex: 1; min-width: 0; }

    .comment-head {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }

    .comment-head .user-id { font-size: 14px; }
    .comment-head .time {
      font-size: 12.5px;
      color: var(--ink-faint);
    }

    .comment-text {
      font-size: 14.5px;
      line-height: 1.65;
      color: #2a2a2a;
      margin-bottom: 8px;
      word-wrap: break-word;
    }

    .comment-actions {
      display: flex;
      gap: 4px;
    }

    .comment-action {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px 4px 6px;
      background: transparent;
      border: none;
      border-radius: 999px;
      font-family: inherit;
      font-size: 12.5px;
      color: var(--ink-faint);
      cursor: pointer;
      transition: all 0.15s;
    }

    .comment-action:hover { color: var(--ink); background: var(--line-soft); }

    .comment-action svg {
      width: 14px; height: 14px;
      stroke-width: 1.8;
      transition: transform 0.2s;
    }

    .comment-action.liked {
      color: var(--accent);
    }

    .comment-action.liked svg {
      fill: var(--accent);
      stroke: var(--accent);
      animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* ===== 嵌套回复 (评论里的回复) ===== */
    .comment-replies {
      list-style: none;
      margin: 12px 0 0;
      padding: 0 0 0 16px;
      border-left: 2px solid var(--line);
    }
 
    .comment-replies .comment {
      padding: 12px 0;
      border-bottom: 1px solid var(--line-soft);
    }
 
    .comment-replies .comment:first-child { padding-top: 4px; }
    .comment-replies .comment:last-child {
      padding-bottom: 0;
      border-bottom: none;
    }
 
    .comment-replies .reply-to {
      color: #2563eb;
      font-weight: 500;
      margin-right: 4px;
    }

    /* ============================================================
       11. 顶部 Toast 弹窗 (评论拦截提示)
       ────────────────────────────────────────────────────────────
       触发场景:用户点"发布"评论时
       行为:从屏幕顶部滑下,显示"你不想留下任何评论",
             2.6 秒后自动收回(也可点击立即关闭)
       配套:.comment-input.shake → 输入框左右抖一下作为反馈
       ============================================================ */
    .toast {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translate(-50%, -100%);
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 22px 14px 18px;
      margin-top: 18px;
      background: var(--ink);
      color: #fff;
      border-radius: 999px;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 14.5px;
      letter-spacing: 0.005em;
      box-shadow: 0 10px 40px -10px rgba(0,0,0,0.35), 0 4px 12px rgba(0,0,0,0.15);
      transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1),
                  opacity 0.3s ease;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
      max-width: calc(100vw - 32px);
    }

    .toast.show {
      transform: translate(-50%, 0);
      opacity: 1;
      pointer-events: auto;
    }

    .toast .toast-dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
      animation: pulse 1.6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(0.85); }
    }

    @media (max-width: 480px) {
      .toast {
        font-size: 13px;
        padding: 12px 18px 12px 14px;
        white-space: normal;
        text-align: center;
      }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-4px); }
      40%, 80% { transform: translateX(4px); }
    }

    .comment-input.shake {
      animation: shake 0.4s ease;
      border-color: var(--accent) !important;
    }


    /* ============================================================
       12. 头像渐变色变体 (av-1 ~ av-6)
       ============================================================ */
    .av-1 { background: linear-gradient(135deg, #e33932, #c2241d); }
    .av-2 { background: linear-gradient(135deg, #2d8a87, #1f6663); }
    .av-3 { background: linear-gradient(135deg, #d4a226, #b08418); }
    .av-4 { background: linear-gradient(135deg, #8e4a7e, #6f3760); }
    .av-5 { background: linear-gradient(135deg, #6b8e5a, #4f6d40); }
    .av-6 { background: linear-gradient(135deg, #c97b3a, #a55e22); }
  </style>
</head>
<body>

  <!-- 顶部 Toast 弹窗 (默认隐藏) -->
  <div class="toast" id="toast" role="status" aria-live="polite">
    <span class="toast-dot"></span>
    <span class="toast-text">你不想留下任何评论</span>
  </div>

  <div class="container">

    <!-- ═══════════ 1. 顶部导航栏 ═══════════ -->
    <header>
      <a href="xhs1.html" class="site-logo">
        <img src="images/tomatologo.png">
      </a>
      <a href="xhs1.html" class="back-link">← 返回列表</a>
    </header>

    <!-- ═══════════ ★ 1.5 帖子状态横幅 ═══════════
         【最近改动 — 新增】"管理员"链接到 admin.html,
         你可以把 href 改成实际的申诉/管理页面路径 -->
    <div class="status-banner">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/>
        <line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <span>贴子状态:<strong>限流</strong> 如需申诉可向<a href="xhsglylb.html">管理员</a>反应</span>
    </div>

    <!-- ═══════════ 2. 帖子主图 ═══════════ -->
    <div class="hero">
      <img src="images/huajiaphoto.png" alt="毛米">
    </div>

    <!-- ═══════════ 3. 作者信息 ═══════════ -->
    <div class="post-meta">
    <div class="avatar">
        <img src="images/coco.png" alt="头像">
    </div>
    <div class="meta-text">
        <div class="user-id">@咱们又鸟 (你)</div>
        <div class="meta-sub">3 小时前 · 阅读 73</div>
    </div>
    </div>

    <!-- ═══════════ 4. 标题 ═══════════ -->
    <h1 class="post-title">语文书的配图是不是有问题啊</h1>

    <!-- ═══════════ 5. 正文 ═══════════ -->
    <div class="post-body">
      <p>主包昨天晚上闲得没事翻妹妹的语文书看 结果看到一篇课文的插图有点奇怪 出现了从来没见过的脚印</p>
      <p>因为觉得太奇怪了所以当即拍了照 结果今天早上跟妹妹说起这件事之后 那串脚印就不见了！</p>
      <p>妹妹现在说是我用ai在逗她玩，难道这是什么曼德拉效应吗</p>
    </div>

    <!-- ═══════════ 6. Tags ═══════════ -->
    <div class="post-tags">
      <span class="tag">语文书</span>
      <span class="tag">灵异</span>
    </div>

    <!-- ═══════════ 7. 操作栏 (点赞 / 评论 / 分享) ═══════════ -->
    <div class="post-actions">
      <button class="action-btn" id="likeBtn" aria-pressed="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 21s-7-4.35-7-10a4 4 0 0 1 7-2.65A4 4 0 0 1 19 11c0 5.65-7 10-7 10z" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="count" id="likeCount">13</span>
      </button>
      <button class="action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="count" id="commentTopCount">4</span>
      </button>
      <button class="action-btn share-btn" onclick="alert('链接已复制!')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13" stroke-linecap="round" stroke-linejoin="round"/></svg>
        分享
      </button>
    </div>

    <!-- ═══════════ 8. 评论区标题 ═══════════ -->
    <h2 class="comments-title">
      评论 <span class="num" id="commentNumLabel">4</span>
    </h2>

    <!-- ═══════════ 9. 评论输入框 ═══════════ -->
    <div class="comment-input">
      <div class="avatar sm av-3">你</div>
      <div class="input-wrap">
        <textarea id="commentInput" placeholder="留下你的看法..." rows="1"></textarea>
        <div class="input-foot">
            <button class="submit-btn" id="submitBtn" disabled>发布</button>
        </div>
      </div>
    </div>

    <!-- ═══════════ ★ 10. 评论列表 ═══════════
         【最近改动】替换了之前的"评论加载失败"占位 UI,
         评论由 JS 中的 seedComments 数组渲染 -->
    <ul class="comment-list" id="commentList"></ul>

  </div>

  <script>
    /* ============================================================
       通用:复用的 SVG 图标字符串
       ============================================================ */
    const HEART_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 21s-7-4.35-7-10a4 4 0 0 1 7-2.65A4 4 0 0 1 19 11c0 5.65-7 10-7 10z" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const REPLY_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 17l-5-5 5-5M4 12h11a5 5 0 0 1 5 5v3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;


    /* ============================================================
       ★ 种子评论数据  【最近改动 — 新增】
       ────────────────────────────────────────────────────────────
       4 条契合本帖主题(灵异/曼德拉效应)的评论。
       每条字段:userId / avatar(av-X 头像色) / initial(头像首字母) /
                 time(时间) / text(内容) / likes(点赞数)
       ============================================================ */
    const seedComments = [
      {
        userId: '@一般路过大海鸥',
        avatar: 'av-2',
        initial: 'Y',
        time: '2 小时前',
        text: '看之前：记性差嘴硬则曼德拉 看之后：不是你这个怎么真的不一样啊',
        likes: 3
      },
      {
        userId: '@风清',
        avatar: 'av-4',
        initial: 'F',
        time: '1 小时前',
        text: '铁柱虽然我不知道但我能为你摇来一堆应声虫',
        likes: 2,
        replies: [
          {
            userId: '@风清',
            replyTo: '@风清',
            avatar: 'av-1',
            initial: 'F',
            time: '45 分钟前',
            text: '铁柱啊我帮不了你了...你的帖子好像被限了；；',
            likes: 0
          }
        ]
      },
      {
        userId: '@zreebe',
        avatar: 'av-5',
        initial: 'Z',
        time: '52 分钟前',
        text: '互联网发达后大家确实分享欲旺盛...',
        likes: 1
      },
      {
        userId: '@力大无穷',
        avatar: 'av-5',
        initial: 'L',
        time: '2 分钟前',
        text: '怎么没有一个人真的回答贴主问题啊...这脚印确实不对劲吧（如果贴主不是真的拿AI开玩笑的话）',
        likes: 1
      },
    ];


    /* ============================================================
       1. 评论渲染函数
       ============================================================ */
    const commentList = document.getElementById('commentList');
 
    function renderComment(c, prepend = false) {
      const li = document.createElement('li');
      li.className = 'comment';
      li.innerHTML = `
        <div class="avatar sm ${c.avatar}">${c.initial}</div>
        <div class="comment-body">
          <div class="comment-head">
            <span class="user-id">${c.userId}</span>
            <span class="time">${c.time}</span>
          </div>
          <p class="comment-text"></p>
          <div class="comment-actions">
            <button class="comment-action like-comment" data-likes="${c.likes}" aria-pressed="false">
              ${HEART_SVG}<span class="lc">${c.likes}</span>
            </button>
            <button class="comment-action">
              ${REPLY_SVG}回复
            </button>
          </div>
        </div>
      `;
      // Set text safely (with optional "回复 @xxx" prefix for replies)
      const textEl = li.querySelector('.comment-text');
      if (c.replyTo) {
        const replyMark = document.createElement('span');
        replyMark.className = 'reply-to';
        replyMark.textContent = '回复 ' + c.replyTo + ':';
        textEl.appendChild(replyMark);
        textEl.appendChild(document.createTextNode(c.text));
      } else {
        textEl.textContent = c.text;
      }
 
      // Render nested replies if this comment has any
      if (Array.isArray(c.replies) && c.replies.length > 0) {
        const repliesUl = document.createElement('ul');
        repliesUl.className = 'comment-replies';
        c.replies.forEach(r => {
          const replyLi = renderReplyItem(r);
          repliesUl.appendChild(replyLi);
        });
        li.querySelector('.comment-body').appendChild(repliesUl);
      }
 
      if (prepend) commentList.prepend(li);
      else commentList.appendChild(li);
      return li;
    }
 
    // 单独渲染一条回复 (跟主评论结构相同,只是不再递归嵌套)
    function renderReplyItem(r) {
      const li = document.createElement('li');
      li.className = 'comment';
      li.innerHTML = `
        <div class="avatar sm ${r.avatar}">${r.initial}</div>
        <div class="comment-body">
          <div class="comment-head">
            <span class="user-id">${r.userId}</span>
            <span class="time">${r.time}</span>
          </div>
          <p class="comment-text"></p>
          <div class="comment-actions">
            <button class="comment-action like-comment" data-likes="${r.likes}" aria-pressed="false">
              ${HEART_SVG}<span class="lc">${r.likes}</span>
            </button>
            <button class="comment-action">
              ${REPLY_SVG}回复
            </button>
          </div>
        </div>
      `;
      const textEl = li.querySelector('.comment-text');
      if (r.replyTo) {
        const replyMark = document.createElement('span');
        replyMark.className = 'reply-to';
        replyMark.textContent = '回复 ' + r.replyTo + ':';
        textEl.appendChild(replyMark);
        textEl.appendChild(document.createTextNode(r.text));
      } else {
        textEl.textContent = r.text;
      }
      return li;
    }

    seedComments.forEach(c => renderComment(c));


    /* ============================================================
       2. 帖子主点赞按钮 (爱心图标切换 + 计数 ±1)
       ============================================================ */
    const likeBtn = document.getElementById('likeBtn');
    const likeCount = document.getElementById('likeCount');
    let postLiked = false;
    let postLikes = 128;

    likeBtn.addEventListener('click', () => {
      postLiked = !postLiked;
      postLikes += postLiked ? 1 : -1;
      likeCount.textContent = postLikes;
      likeBtn.classList.toggle('liked', postLiked);
      likeBtn.setAttribute('aria-pressed', postLiked);
    });


    /* ============================================================
       3. 评论点赞 (事件委托 — 给所有 .like-comment 按钮)
       ============================================================ */
    document.addEventListener('click', e => {
      const btn = e.target.closest('.like-comment');
      if (!btn) return;
      const isLiked = btn.classList.toggle('liked');
      let n = parseInt(btn.dataset.likes, 10);
      n += isLiked ? 1 : -1;
      btn.dataset.likes = n;
      btn.querySelector('.lc').textContent = n;
      btn.setAttribute('aria-pressed', isLiked);
    });


    /* ============================================================
       4. 评论输入框 — 自动撑高 + 发布按钮启用/禁用
       ============================================================ */
    const input = document.getElementById('commentInput');
    const submitBtn = document.getElementById('submitBtn');
    const commentNumLabel = document.getElementById('commentNumLabel');
    const commentTopCount = document.getElementById('commentTopCount');
    let commentTotal = seedComments.length;

    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 160) + 'px';
      submitBtn.disabled = input.value.trim().length === 0;
    });


    /* ============================================================
       5. 提交评论 (拦截 → 触发顶部弹窗)
       ────────────────────────────────────────────────────────────
       行为:点"发布"不真发送,而是:
              ① 调用 showToast() 显示顶部弹窗
              ② 给输入框加 .shake 类做抖动反馈
       ============================================================ */
    function submit() {
      const text = input.value.trim();
      if (!text) return;

      // Block submission — show top toast instead
      showToast();

      // Visual feedback on the input box
      const inputBox = document.querySelector('.comment-input');
      inputBox.classList.remove('shake');
      // Force reflow so animation can replay
      void inputBox.offsetWidth;
      inputBox.classList.add('shake');
    }


    /* ============================================================
       6. Toast 弹窗显隐控制
       ────────────────────────────────────────────────────────────
       showToast()  → 加 .show 类显示,2.6 秒后自动收回
       点击 toast   → 立即关闭(不用等)
       ============================================================ */
    const toast = document.getElementById('toast');
    let toastTimer = null;

    function showToast() {
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove('show');
      }, 2600);
    }

    // Click toast to dismiss early
    toast.addEventListener('click', () => {
      toast.classList.remove('show');
      clearTimeout(toastTimer);
    });


    /* ============================================================
       7. 提交事件绑定 (按钮点击 + Cmd/Ctrl + Enter 快捷键)
       ============================================================ */
    submitBtn.addEventListener('click', submit);

    input.addEventListener('keydown', e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        e.preventDefault();
        submit();
      }
    });
  </script>
</body>
</html>
