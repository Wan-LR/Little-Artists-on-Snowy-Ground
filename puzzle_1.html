<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>苹果与篮子</title>
<style>
  @import url('https://gs.jurieo.com/gemini/fonts-googleapis/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap');

  :root {
    --bg:     #0a1628;
    --accent: #4a90d9;
    --light:  #a8ccf0;
    --white:  #e8f2ff;
    --border: #2a4a7a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Ma Shan Zheng', 'Noto Serif SC', serif;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 28% 22%, rgba(74,144,217,0.18) 0%, transparent 52%),
      radial-gradient(ellipse at 76% 80%, rgba(20,60,140,0.22) 0%, transparent 50%),
      repeating-linear-gradient(45deg, transparent, transparent 38px,
        rgba(74,144,217,0.022) 38px, rgba(74,144,217,0.022) 39px);
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
  }

  .subtitle {
    font-size: 0.72rem;
    color: rgba(168,204,240,0.45);
    letter-spacing: 0.28em;
    text-align: center;
    font-family: 'Noto Serif SC', serif;
  }

  /* ── 3D 卡片 ── */
  .card-scene {
    width: 442px;
    height: 442px;
    perspective: 1600px;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.75s cubic-bezier(0.4, 0.2, 0.2, 1);
  }
  .card.flipped { transform: rotateY(180deg); }

  .card.fly-out {
    animation: flyToGrid 0.7s cubic-bezier(0.4, 0, 0.2, 1) 0.6s forwards;
    pointer-events: none;
  }

  @keyframes flyToGrid {
    0%   { transform: rotateY(180deg) scale(1); opacity: 1; }
    100% { transform: rotateY(180deg) scale(0.32) translate(-52%, -58%); opacity: 0.4; }
  }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 4px;
    overflow: hidden;
  }

  /* 正面：游戏区 */
  .card-front { cursor: default; }

  /* 反面 */
  .card-back {
    transform: rotateY(180deg);
    cursor: pointer;
  }
  .card-back img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }

  /* ── 游戏棋盘 ── */
  .board-wrap {
    width: 100%;
    height: 100%;
    padding: 10px;
    background: rgba(8,18,36,0.9);
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow:
      0 0 0 1px rgba(74,144,217,0.08),
      0 10px 44px rgba(0,0,0,0.65),
      0 0 60px rgba(74,144,217,0.07),
      inset 0 1px 0 rgba(74,144,217,0.13);
  }

  #game-board {
    width: 100%;
    height: 100%;
    background: #040a14;
    position: relative;
    overflow: hidden;
    border-radius: 2px;
  }

  /* 篮子样式 */
  .basket {
    position: absolute;
    width: 70px;
    height: 70px;
    background: linear-gradient(135deg, #d4a373, #a98467);
    border: 2px solid #8b5a2b;
    border-radius: 8px 8px 16px 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    font-weight: 700;
    color: #fff;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.6);
    box-shadow: inset 0 6px 10px rgba(0,0,0,0.2), 0 4px 8px rgba(0,0,0,0.5);
  }
  .basket::after {
    content: '';
    position: absolute;
    top: 6px; left: 6px; right: 6px; bottom: 6px;
    border: 1px dashed rgba(255,255,255,0.3);
    border-radius: 4px 4px 10px 10px;
  }

  #basket-top { top: 20px; left: 50%; margin-left: -35px; }
  #basket-bottom { bottom: 20px; left: 50%; margin-left: -35px; }
  #basket-left { left: 20px; top: 50%; margin-top: -35px; }
  #basket-right { right: 20px; top: 50%; margin-top: -35px; }

  /* 苹果样式 */
  #apple {
    position: absolute;
    width: 60px;
    height: 60px;
    top: 50%; left: 50%;
    margin-top: -30px; margin-left: -30px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    cursor: pointer;
    user-select: none;
    transition: transform 0.15s ease;
    z-index: 10;
  }
  #apple:hover {
    transform: scale(1.1);
  }
  #apple:active {
    transform: scale(0.95);
  }
  /* 苹果掉落动画 */
  #apple.falling {
    transition: all 0.6s cubic-bezier(0.5, 0, 0.5, 1);
    top: calc(100% - 75px);
    transform: scale(0.4) rotate(20deg);
    opacity: 0;
  }

  /* 游戏结束提示语 */
  #success-msg {
    display: none;
    position: absolute;
    inset: 0;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    color: var(--light);
    letter-spacing: 0.2em;
    animation: fadeInUp 0.6s ease forwards;
  }

  /* ── 底部交互区 ── */
  .action-area {
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .word-input-wrap {
    display: none;
    align-items: center;
    gap: 8px;
  }
  .word-input-wrap.show { display: flex; animation: fadeInUp 0.4s ease; }

  .btn-replay {
    display: none;
    align-items: center;
    gap: 6px;
    font-family: 'Noto Serif SC', serif;
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    padding: 7px 18px;
    border: 1px solid var(--border);
    background: rgba(8,18,36,0.8);
    color: var(--light);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.25s ease;
  }
  .btn-replay.show { display: flex; animation: fadeInUp 0.4s ease 0.2s; }
  .btn-replay:hover {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(74,144,217,0.2);
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .word-input {
    font-family: 'Noto Serif SC', serif;
    font-size: 1rem;
    letter-spacing: 0.12em;
    padding: 8px 16px;
    border: 1px solid var(--border);
    background: rgba(8,18,36,0.8);
    color: var(--white);
    border-radius: 3px;
    width: 180px;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
    text-align: center;
  }
  .word-input::placeholder {
    color: rgba(168,204,240,0.3);
    font-size: 0.82rem;
    letter-spacing: 0.1em;
  }
  .word-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(74,144,217,0.2);
  }
  .word-input.correct {
    border-color: #4ad980;
    box-shadow: 0 0 0 2px rgba(74,217,128,0.25);
  }
  .word-input.wrong {
    border-color: #d94a4a;
    box-shadow: 0 0 0 2px rgba(217,74,74,0.25);
    animation: shake 0.35s ease;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-6px); }
    75%      { transform: translateX(6px); }
  }

  .hint {
    font-size: 0.66rem;
    color: rgba(168,204,240,0.28);
    letter-spacing: 0.1em;
    text-align: center;
    font-family: 'Noto Serif SC', serif;
    transition: opacity 0.3s;
  }

  #flip-hint {
    font-size: 0.66rem;
    color: rgba(168,204,240,0.35);
    letter-spacing: 0.15em;
    text-align: center;
    font-family: 'Noto Serif SC', serif;
    opacity: 0;
    transition: opacity 0.5s ease;
    height: 1em;
  }
  #flip-hint.show { opacity: 1; }
</style>
</head>
<body>
<div class="container">
  <p class="subtitle">互动收集 · 还原密码</p>

  <div class="card-scene">
    <div class="card" id="card">
      <div class="card-face card-front" id="card-front">
        <div class="board-wrap">
          <div id="game-board">
            <div id="basket-top" class="basket"></div>
            <div id="basket-left" class="basket"></div>
            <div id="basket-right" class="basket"></div>
            <div id="basket-bottom" class="basket"></div>
            <div id="apple">🍎</div>
            <div id="success-msg">所有苹果收集完毕</div>
          </div>
        </div>
      </div>
      <div class="card-face card-back" id="card-back">
        <img id="back-img" src="images/gongyegeming.png" alt="背面">
      </div>
    </div>
  </div>

  <div class="action-area">
    <div class="word-input-wrap" id="word-wrap">
      <input class="word-input" id="word-input" type="text"
             placeholder="输入密码…" autocomplete="off" spellcheck="false">
    </div>
    <button class="btn-replay" id="btn-replay" onclick="resetGame()">↻ 重新掉落</button>
  </div>

  <p class="hint" id="main-hint">点击苹果 它会落入哪个袋子</p>
  <p id="flip-hint">点击图片可翻回正面</p>
</div>

<script>
  // ═══════════════════════════════════════════
  const BACK_IMAGE  = 'images/mx1.png';
  const PASSWORD    = 'ceres';           // ← 在这里改密码（大小写均可）
  const PUZZLE_ID   = 'puzzle_1';       // ← 传给大九宫格的标识
  // ═══════════════════════════════════════════

  // 游戏逻辑变量
  const targetWord = ['c', 'e', 'r', 'e', 's'];
  let currentRound = 0;
  let isAnimating = false;
  let gameSolved = false;

  window.onload = () => {
    document.getElementById('back-img').src = BACK_IMAGE;

    // 绑定苹果点击事件
    document.getElementById('apple').addEventListener('click', dropApple);

    // 绑定卡片背面点击翻转事件
    document.getElementById('card-back').addEventListener('click', () => {
      if (gameSolved) flipCard();
    });

    // 密码框回车确认
    document.getElementById('word-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkPassword();
    });

    // 游戏初始化
    setupRound();
  };

  // ── 游戏核心逻辑 ──────────────────────────────────────────────
  // 获取随机字母 (排除指定的字母，确保不重复)
  function getRandomLetter(excludeArr) {
    const chars = 'abcdefghijklmnopqrstuvwxyz'.split('');
    const validChars = chars.filter(c => !excludeArr.includes(c));
    return validChars[Math.floor(Math.random() * validChars.length)];
  }

  // 设置新的一轮
  function setupRound() {
    if (currentRound >= 5) {
      onGameComplete();
      return;
    }

    const currentTarget = targetWord[currentRound];
    document.getElementById('basket-bottom').textContent = currentTarget.toUpperCase();

    // 生成三个不同且不与currentTarget相同的字母
    const topLetter = getRandomLetter([currentTarget]);
    const leftLetter = getRandomLetter([currentTarget, topLetter]);
    const rightLetter = getRandomLetter([currentTarget, topLetter, leftLetter]);

    document.getElementById('basket-top').textContent = topLetter.toUpperCase();
    document.getElementById('basket-left').textContent = leftLetter.toUpperCase();
    document.getElementById('basket-right').textContent = rightLetter.toUpperCase();

    // 恢复苹果状态
    const apple = document.getElementById('apple');
    apple.classList.remove('falling');
    isAnimating = false;
  }

  // 苹果掉落
  function dropApple() {
    if (isAnimating || currentRound >= 5) return;
    isAnimating = true;
    
    const apple = document.getElementById('apple');
    apple.classList.add('falling');

    // 动画结束后进入下一轮
    setTimeout(() => {
      currentRound++;
      setupRound();
    }, 600); // 对应CSS中的0.6s动画
  }

  // 5轮结束
  function onGameComplete() {
    gameSolved = true;
    
    // 隐藏篮子和苹果
    document.querySelectorAll('.basket').forEach(el => el.style.display = 'none');
    document.getElementById('apple').style.display = 'none';
    document.getElementById('success-msg').style.display = 'flex';

    // 出现密码框和重播按钮
    document.getElementById('word-wrap').classList.add('show');
    document.getElementById('btn-replay').classList.add('show');
    document.getElementById('main-hint').style.opacity = '0';

    setTimeout(() => {
      document.getElementById('word-input').focus();
    }, 400);
  }

  // ── 重新播放掉落过程 ──────────────────────────────────────
  function resetGame() {
    currentRound = 0;
    gameSolved = false;

    // 恢复篮子和苹果
    document.querySelectorAll('.basket').forEach(el => el.style.display = '');
    document.getElementById('apple').style.display = '';
    document.getElementById('success-msg').style.display = 'none';

    // 隐藏密码框和重播按钮
    const wordWrap = document.getElementById('word-wrap');
    wordWrap.classList.remove('show');
    document.getElementById('btn-replay').classList.remove('show');
    document.getElementById('main-hint').style.opacity = '';

    // 重置密码输入框
    const input = document.getElementById('word-input');
    input.value = '';
    input.disabled = false;
    input.classList.remove('correct', 'wrong');

    // 翻回正面
    const card = document.getElementById('card');
    if (card.classList.contains('flipped')) {
      card.classList.remove('flipped');
    }
    document.getElementById('flip-hint').classList.remove('show');

    setupRound();
  }

  // ── 翻转（正反可无限来回）──────────────────────────────────────
  function flipCard() {
    const card = document.getElementById('card');
    const nowFlipped = card.classList.toggle('flipped');
    document.getElementById('flip-hint').classList.add('show');

    if (nowFlipped) {
      document.getElementById('flip-hint').textContent = '即将返回大九宫格…';
      card.classList.add('fly-out');
      setTimeout(() => {
        window.location.href = 'mxhuitu.html';
      }, 1400); // 0.6s延迟 + 0.7s动画 + 少量余量
    } else {
      document.getElementById('flip-hint').textContent = '密码已解锁，再次输入或点击背面查看图片';
    }
  }

  // ── 密码验证 ──────────────────────────────────────────────────
  function checkPassword() {
    const input = document.getElementById('word-input');
    const val = input.value.trim();

    if (val.toLowerCase() === PASSWORD.toLowerCase()) {
      // 正确：翻转卡片
      input.classList.remove('wrong');
      input.classList.add('correct');

      const card = document.getElementById('card');
      if (!card.classList.contains('flipped')) {
        flipCard();
      }

      // 通知大九宫格这一关已解锁
      localStorage.setItem(PUZZLE_ID + '_unlocked', 'true');

      // 禁用输入框
      input.disabled = true;

    } else {
      // 错误：抖动提示
      input.classList.remove('correct', 'wrong');
      void input.offsetWidth; // 触发重绘让动画重新播放
      input.classList.add('wrong');
      input.value = '';
      setTimeout(() => input.classList.remove('wrong'), 400);
    }
  }
</script>
</body>
</html>
