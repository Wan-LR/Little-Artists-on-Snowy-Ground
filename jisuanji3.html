<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一点都没用的计算机小知识 Day1</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       设计令牌 (颜色 / 字体 / 阴影 / 圆角)
       ============================================================ */
    :root {
      --bg:        #faf7f2;
      --surface:   #ffffff;
      --ink:       #1a1a1a;
      --ink-soft:  #6b6b6b;
      --ink-faint: #9a9a9a;
      --line:      #ece7df;
      --line-soft: #f4f0e8;
      --accent:    #e33932;
      --accent-soft: #fde8e7;
      --shadow:    0 1px 2px rgba(0,0,0,0.04), 0 8px 24px -12px rgba(0,0,0,0.08);
      --shadow-lift: 0 2px 4px rgba(0,0,0,0.06), 0 20px 40px -16px rgba(0,0,0,0.18);
      --radius:    14px;
      --radius-sm: 10px;
      --font-display: 'Bricolage Grotesque', 'Noto Sans SC', system-ui, sans-serif;
      --font-body:    'Noto Sans SC', system-ui, -apple-system, sans-serif;
    }

    /* ============================================================
       全局重置 & 页面容器
       ============================================================ */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 36px 24px 96px;
    }

    @media (max-width: 640px) {
      .container { padding: 20px 16px 64px; }
    }


    /* ============================================================
       1. 顶部导航栏 (Logo + 返回)
       ============================================================ */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 24px;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--line);
    }

    .site-logo {
      display: inline-block;
      line-height: 0;       /* 去掉图片下方空隙 */
    }

    .site-logo img {
      height: 90px;         /* 想多大改这里就行 */
      width: auto;
      display: block;
    }

    .site-logo .dot {
      display: inline-block;
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: 2px;
    }

    .back-link {
      font-size: 14px;
      color: var(--ink-soft);
      text-decoration: none;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      transition: all 0.2s;
    }

    .back-link:hover {
      color: var(--ink);
      border-color: var(--ink);
      transform: translateX(-2px);
    }


    /* ============================================================
       2. 帖子主图 (Hero)
       ============================================================ */
    .hero {
      width: 100%;
      border-radius: var(--radius);
      overflow: hidden;
      background: linear-gradient(135deg, #f0ece4 0%, #e6e0d4 100%);
      box-shadow: var(--shadow);
      margin-bottom: 28px;
    }

    .hero img {
      width: 100%;
      height: auto;
      display: block;
      max-height: 520px;
      object-fit: cover;
    }


    /* ============================================================
       3. 作者信息 (头像 + 用户ID + 时间)
       ============================================================ */
    .post-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 16px;
      flex-shrink: 0;
      letter-spacing: -0.02em;
    }

    .avatar.sm { width: 36px; height: 36px; font-size: 14px; }

    .meta-text { line-height: 1.3; }

    .user-id {
      font-weight: 700;
      font-size: 14.5px;
      color: var(--ink);
    }

    .meta-sub {
      font-size: 12.5px;
      color: var(--ink-faint);
      margin-top: 2px;
    }


    /* ============================================================
       4. 标题
       ============================================================ */
    .post-title {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 38px;
      line-height: 1.18;
      letter-spacing: -0.025em;
      color: var(--ink);
      margin-bottom: 24px;
    }

    @media (max-width: 640px) {
      .post-title { font-size: 28px; }
    }


    /* ============================================================
       5. 正文
       ============================================================ */
    .post-body {
      font-size: 16px;
      line-height: 1.8;
      color: #2a2a2a;
      margin-bottom: 36px;
    }

    .post-body p { margin-bottom: 18px; }
    .post-body p:last-child { margin-bottom: 0; }

    .post-body ol {
      padding-left: 22px;
      margin-bottom: 18px;
    }

    .post-body ol li {
      margin-bottom: 8px;
      padding-left: 4px;
    }

    .post-body ol li::marker {
      color: var(--accent);
      font-weight: 700;
    }


    /* ============================================================
       6. 帖子 Tags
       ============================================================ */
    .post-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: -16px 0 32px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 5px 12px;
      background: #eaf1ff;
      color: #2563eb;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: all 0.18s ease;
    }

    .tag::before {
      content: '#';
      margin-right: 2px;
      opacity: 0.7;
    }

    .tag:hover {
      background: #2563eb;
      color: #fff;
      transform: translateY(-1px);
    }


    /* ============================================================
       7. 操作栏 (点赞 / 评论数 / 分享)
       ============================================================ */
    .post-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 4px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      margin-bottom: 40px;
    }

    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 14px;
      background: transparent;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: var(--ink-soft);
      transition: all 0.18s ease;
    }

    .action-btn:hover {
      background: var(--line-soft);
      color: var(--ink);
    }

    .action-btn svg {
      width: 18px; height: 18px;
      stroke-width: 1.8;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .action-btn.liked {
      color: var(--accent);
      background: var(--accent-soft);
    }

    .action-btn.liked svg {
      fill: var(--accent);
      stroke: var(--accent);
      animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.35); }
      100% { transform: scale(1); }
    }

    .action-btn .count {
      font-variant-numeric: tabular-nums;
    }

    .action-btn.share-btn {
      margin-left: auto;
    }


    /* ============================================================
       8. 评论区 — 标题
       ============================================================ */
    .comments-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 22px;
      letter-spacing: -0.01em;
      margin-bottom: 18px;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .comments-title .num {
      color: var(--accent);
      font-size: 18px;
    }


    /* ============================================================
       9. 评论区 — 输入框
       ============================================================ */
    .comment-input {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
      margin-bottom: 28px;
      transition: border-color 0.2s;
    }

    .comment-input:focus-within {
      border-color: var(--ink);
    }

    .input-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .comment-input textarea {
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      font-family: inherit;
      font-size: 15px;
      line-height: 1.55;
      color: var(--ink);
      background: transparent;
      min-height: 24px;
      max-height: 160px;
    }

    .comment-input textarea::placeholder {
      color: var(--ink-faint);
    }

    .input-foot {
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .input-hint {
      font-size: 12px;
      color: var(--ink-faint);
    }

    .submit-btn {
      padding: 8px 18px;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 999px;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 13.5px;
      cursor: pointer;
      transition: all 0.18s;
      letter-spacing: 0.01em;
    }

    .submit-btn:hover:not(:disabled) {
      background: var(--accent);
      transform: translateY(-1px);
    }

    .submit-btn:disabled {
      background: var(--line);
      color: var(--ink-faint);
      cursor: not-allowed;
    }


    /* ============================================================
       10. 评论列表样式 (当前未渲染 — 因评论加载失败被替换)
       ============================================================ */
    .comment-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .comment {
      display: flex;
      gap: 12px;
      padding: 18px 4px;
      border-bottom: 1px solid var(--line-soft);
      animation: slideIn 0.3s ease-out;
    }

    .comment:last-child { border-bottom: none; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .comment-body { flex: 1; min-width: 0; }

    .comment-head {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }

    .comment-head .user-id { font-size: 14px; }
    .comment-head .time {
      font-size: 12.5px;
      color: var(--ink-faint);
    }

    .comment-text {
      font-size: 14.5px;
      line-height: 1.65;
      color: #2a2a2a;
      margin-bottom: 8px;
      word-wrap: break-word;
    }

    .comment-actions {
      display: flex;
      gap: 4px;
    }

    .comment-action {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px 4px 6px;
      background: transparent;
      border: none;
      border-radius: 999px;
      font-family: inherit;
      font-size: 12.5px;
      color: var(--ink-faint);
      cursor: pointer;
      transition: all 0.15s;
    }

    .comment-action:hover { color: var(--ink); background: var(--line-soft); }

    .comment-action svg {
      width: 14px; height: 14px;
      stroke-width: 1.8;
      transition: transform 0.2s;
    }

    .comment-action.liked {
      color: var(--accent);
    }

    .comment-action.liked svg {
      fill: var(--accent);
      stroke: var(--accent);
      animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }


    /* ============================================================
       11. 顶部 Toast 弹窗（评论被拦截时）
       ============================================================ */
    .toast {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translate(-50%, -100%);
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 22px 14px 18px;
      margin-top: 18px;
      background: var(--ink);
      color: #fff;
      border-radius: 999px;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 14.5px;
      letter-spacing: 0.005em;
      box-shadow: 0 10px 40px -10px rgba(0,0,0,0.35), 0 4px 12px rgba(0,0,0,0.15);
      transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1),
                  opacity 0.3s ease;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
      max-width: calc(100vw - 32px);
    }

    .toast.show {
      transform: translate(-50%, 0);
      opacity: 1;
      pointer-events: auto;
    }

    .toast .toast-dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
      animation: pulse 1.6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(0.85); }
    }

    @media (max-width: 480px) {
      .toast {
        font-size: 13px;
        padding: 12px 18px 12px 14px;
        white-space: normal;
        text-align: center;
      }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-4px); }
      40%, 80% { transform: translateX(4px); }
    }

    .comment-input.shake {
      animation: shake 0.4s ease;
      border-color: var(--accent) !important;
    }


    /* ============================================================
       12. 评论加载失败状态
       ============================================================ */
    .comment-error {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 56px 24px 52px;
      background: var(--surface);
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      margin-top: 8px;
    }

    .comment-error .icon-wrap {
      width: 64px;
      height: 64px;
      display: grid;
      place-items: center;
      background: var(--line-soft);
      border-radius: 50%;
      margin-bottom: 18px;
      color: var(--ink-soft);
    }

    .comment-error .icon-wrap svg {
      width: 28px;
      height: 28px;
      stroke-width: 1.6;
    }

    .comment-error .error-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 18px;
      color: var(--ink);
      letter-spacing: -0.01em;
      margin-bottom: 6px;
    }

    .comment-error .error-sub {
      font-size: 13.5px;
      color: var(--ink-faint);
      margin-bottom: 20px;
    }

    .comment-error .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 18px;
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 999px;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 13.5px;
      cursor: pointer;
      transition: all 0.18s;
    }

    .comment-error .retry-btn:hover {
      border-color: var(--ink);
      background: var(--ink);
      color: #fff;
    }

    .comment-error .retry-btn svg {
      width: 14px;
      height: 14px;
      stroke-width: 2;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .comment-error .retry-btn.loading svg {
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }


    /* ============================================================
       13. 头像渐变色变体 (av-1 ~ av-6)
       ============================================================ */
    .av-1 { background: linear-gradient(135deg, #e33932, #c2241d); }
    .av-2 { background: linear-gradient(135deg, #2d8a87, #1f6663); }
    .av-3 { background: linear-gradient(135deg, #d4a226, #b08418); }
    .av-4 { background: linear-gradient(135deg, #8e4a7e, #6f3760); }
    .av-5 { background: linear-gradient(135deg, #6b8e5a, #4f6d40); }
    .av-6 { background: linear-gradient(135deg, #c97b3a, #a55e22); }


    /* ============================================================
       ★ 14. Steam 风格成就弹窗（仿熏鱼帖：右上角滑入，5 秒自动收回，不跳转）
       ============================================================ */
    .achievement-toast {
      position: fixed;
      top: 28px;
      right: 28px;
      z-index: 10000;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 22px 16px 16px;
      min-width: 340px;
      max-width: 420px;
      background: linear-gradient(135deg, #1b2838 0%, #1e3a2f 50%, #1b2838 100%);
      border: 1px solid #4a6741;
      border-radius: 4px;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.5),
        0 0 20px rgba(78, 154, 65, 0.25),
        0 8px 32px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.06);
      opacity: 0;
      transform: translateX(120%) scale(0.95);
      pointer-events: none;
      transition:
        opacity 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
        transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-family: var(--font-body);
    }

    .achievement-toast.show {
      opacity: 1;
      transform: translateX(0) scale(1);
      pointer-events: auto;
    }

    .achievement-icon {
      width: 64px;
      height: 64px;
      flex-shrink: 0;
      border-radius: 4px;
      background: linear-gradient(145deg, #2a4a3a 0%, #1a3028 100%);
      border: 2px solid #5a8a50;
      display: grid;
      place-items: center;
      box-shadow:
        0 0 12px rgba(78, 154, 65, 0.3),
        inset 0 1px 0 rgba(255,255,255,0.08);
      position: relative;
      overflow: hidden;
    }

    .achievement-icon::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.05) 50%, transparent 70%);
      animation: iconShine 3s ease-in-out infinite;
    }

    @keyframes iconShine {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }

    .achievement-icon .icon-emoji {
      font-size: 30px;
      line-height: 1;
      filter: drop-shadow(0 0 6px rgba(180, 220, 100, 0.55));
      position: relative;
      z-index: 1;
      text-shadow: 0 0 10px rgba(143, 188, 90, 0.7), 0 0 20px rgba(143, 188, 90, 0.35);
    }

    .achievement-text {
      flex: 1;
      min-width: 0;
    }

    .achievement-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #8fbc5a;
      margin-bottom: 3px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .achievement-label::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #8fbc5a;
      border-radius: 50%;
      box-shadow: 0 0 6px #8fbc5a;
      animation: dotPulse 2s ease-in-out infinite;
    }

    @keyframes dotPulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 6px #8fbc5a; }
      50% { opacity: 0.6; box-shadow: 0 0 2px #8fbc5a; }
    }

    .achievement-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 17px;
      color: #e5e5e5;
      line-height: 1.2;
      margin-bottom: 3px;
      letter-spacing: -0.01em;
    }

    .achievement-desc {
      font-size: 12.5px;
      color: #8f98a0;
      line-height: 1.4;
    }

    .achievement-toast::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      width: 100%;
      background: linear-gradient(90deg, #5a8a2a, #8fbc5a, #b8e060);
      border-radius: 0 0 4px 4px;
      transform-origin: left;
      transform: scaleX(0);
    }

    .achievement-toast.show::after {
      animation: progressShrink 5s 0.5s linear forwards;
    }

    @keyframes progressShrink {
      0%   { transform: scaleX(1); }
      100% { transform: scaleX(0); }
    }

    .achievement-particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      border-radius: 4px;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #8fbc5a;
      border-radius: 50%;
      opacity: 0;
    }

    .achievement-toast.show .particle {
      animation: particleFloat 2s ease-out forwards;
    }

    @keyframes particleFloat {
      0%   { opacity: 0.8; transform: translate(0, 0) scale(1); }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
    }

    @media (max-width: 480px) {
      .achievement-toast {
        top: 16px;
        right: 16px;
        left: 16px;
        min-width: auto;
        max-width: none;
      }
    }
  </style>
</head>
<body>

  <!-- 顶部 Toast 弹窗（评论被拦截时滑下） -->
  <div class="toast" id="toast" role="status" aria-live="polite">
    <span class="toast-dot"></span>
    <span class="toast-text">你不想留下任何评论</span>
  </div>

  <div class="container">

    <!-- ═══════════ 1. 顶部导航栏 ═══════════ -->
    <header>
      <a href="xhs1.html" class="site-logo">
        <img src="images/tomatologo.png">
      </a>
      <a href="jiait.html" class="back-link">← 返回列表</a>
    </header>

  <!-- ★ Steam 风格成就弹窗：右上角滑入，5 秒后自动收回，不跳转 -->

    <div class="achievement-particles" id="achParticles"></div>
    <div class="achievement-icon">
      <span class="icon-emoji">💻</span>
    </div>
    <div class="achievement-text">
      <div class="achievement-label">成就已解锁</div>
      <div class="achievement-title">计算机0.5级</div>
      <div class="achievement-desc">你学完了三个知识</div>
    </div>
  </div>

  <script>
    /* ============================================================
       通用:复用的 SVG 图标字符串
       ============================================================ */
    const HEART_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 21s-7-4.35-7-10a4 4 0 0 1 7-2.65A4 4 0 0 1 19 11c0 5.65-7 10-7 10z" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const REPLY_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 17l-5-5 5-5M4 12h11a5 5 0 0 1 5 5v3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;


    /* ============================================================
       ★ 0. 评论数据占位（关键修复：原代码用了未定义的 seedComments
              会抛 ReferenceError 中断整段脚本）。评论本是“加载失败”
              占位，这里给个空数组即可。
       ============================================================ */
    const seedComments = [];


    /* ============================================================
       1. 评论渲染函数 (当前未被实际调用 — 评论加载失败)
       ============================================================ */
    const commentList = document.getElementById('commentList');

    function renderComment(c, prepend = false) {
      const li = document.createElement('li');
      li.className = 'comment';
      li.innerHTML = `
        <div class="avatar sm ${c.avatar}">${c.initial}</div>
        <div class="comment-body">
          <div class="comment-head">
            <span class="user-id">${c.userId}</span>
            <span class="time">${c.time}</span>
          </div>
          <p class="comment-text"></p>
          <div class="comment-actions">
            <button class="comment-action like-comment" data-likes="${c.likes}" aria-pressed="false">
              ${HEART_SVG}<span class="lc">${c.likes}</span>
            </button>
            <button class="comment-action">
              ${REPLY_SVG}回复
            </button>
          </div>
        </div>
      `;
      li.querySelector('.comment-text').textContent = c.text;
      if (!commentList) return li;
      if (prepend) commentList.prepend(li);
      else commentList.appendChild(li);
      return li;
    }

    seedComments.forEach(c => renderComment(c));


    /* ============================================================
       2. 帖子主点赞按钮
       ============================================================ */
    const likeBtn = document.getElementById('likeBtn');
    const likeCount = document.getElementById('likeCount');
    let postLiked = false;
    let postLikes = 128;

    likeBtn.addEventListener('click', () => {
      postLiked = !postLiked;
      postLikes += postLiked ? 1 : -1;
      likeCount.textContent = postLikes;
      likeBtn.classList.toggle('liked', postLiked);
      likeBtn.setAttribute('aria-pressed', postLiked);
    });


    /* ============================================================
       3. 评论点赞 (事件委托)
       ============================================================ */
    document.addEventListener('click', e => {
      const btn = e.target.closest('.like-comment');
      if (!btn) return;
      const isLiked = btn.classList.toggle('liked');
      let n = parseInt(btn.dataset.likes, 10);
      n += isLiked ? 1 : -1;
      btn.dataset.likes = n;
      btn.querySelector('.lc').textContent = n;
      btn.setAttribute('aria-pressed', isLiked);
    });


    /* ============================================================
       4. 评论输入框 — 自动撑高 + 发布按钮启用/禁用
       ============================================================ */
    const input = document.getElementById('commentInput');
    const submitBtn = document.getElementById('submitBtn');
    const commentNumLabel = document.getElementById('commentNumLabel');
    const commentTopCount = document.getElementById('commentTopCount');
    let commentTotal = seedComments.length;

    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 160) + 'px';
      submitBtn.disabled = input.value.trim().length === 0;
    });


    /* ============================================================
       5. 提交评论 (拦截 → 顶部 Toast + 输入框抖动)
       ============================================================ */
    function submit() {
      const text = input.value.trim();
      if (!text) return;
      showToast();
      const inputBox = document.querySelector('.comment-input');
      inputBox.classList.remove('shake');
      void inputBox.offsetWidth;
      inputBox.classList.add('shake');
    }


    /* ============================================================
       6. 顶部 Toast 显隐控制
       ============================================================ */
    const toast = document.getElementById('toast');
    let toastTimer = null;

    function showToast() {
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove('show');
      }, 2600);
    }

    toast.addEventListener('click', () => {
      toast.classList.remove('show');
      clearTimeout(toastTimer);
    });


    /* ============================================================
       7. 提交事件绑定
       ============================================================ */
    submitBtn.addEventListener('click', submit);

    input.addEventListener('keydown', e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        e.preventDefault();
        submit();
      }
    });


    /* ════════════════════════════════════════════════════════════
       ★ 成就:看完三篇计算机小知识
       → Steam 风格右上角弹窗（仿熏鱼帖），自动消失，【不跳转】
       ════════════════════════════════════════════════════════════ */
    (function () {
      const POST_ID   = 'ji-day3';                 // ← 每页不同：day1 / day2 / day3
      const ALL       = ['ji-day1', 'ji-day2', 'ji-day3'];
      const STORE_KEY = 'ji-posts-viewed';
      const SHOWN_KEY = 'ji-ach-shown';            // 用新 key，旧的居中弹窗用的是 ji-modal-shown

      function getViewed() {
        try { return new Set(JSON.parse(localStorage.getItem(STORE_KEY) || '[]')); }
        catch (e) { return new Set(); }
      }
      function saveViewed(s) {
        try { localStorage.setItem(STORE_KEY, JSON.stringify(Array.from(s))); } catch (e) {}
      }
      const shown = function () { return localStorage.getItem(SHOWN_KEY) === '1'; };
      const mark  = function () { localStorage.setItem(SHOWN_KEY, '1'); };

      const viewed = getViewed();
      viewed.add(POST_ID);
      saveViewed(viewed);

      if (ALL.every(function (id) { return viewed.has(id); }) && !shown()) {
        setTimeout(showAchievement, 600);
      }

      function spawnParticles() {
        const c = document.getElementById('achParticles');
        if (!c) return;
        c.innerHTML = '';
        for (let i = 0; i < 12; i++) {
          const p = document.createElement('span');
          p.className = 'particle';
          p.style.left = Math.random() * 100 + '%';
          p.style.top  = Math.random() * 100 + '%';
          p.style.setProperty('--dx', (Math.random() - 0.5) * 80 + 'px');
          p.style.setProperty('--dy', (Math.random() - 0.5) * 80 + 'px');
          p.style.animationDelay = Math.random() * 0.6 + 's';
          c.appendChild(p);
        }
      }

      function showAchievement() {
        const toastEl = document.getElementById('achievementToast');
        if (!toastEl) return;
        spawnParticles();

        // 解锁音效（和喂鱼那页一样，浏览器拦截也不影响）
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const playNote = function (freq, t, dur) {
            const osc = ctx.createOscillator(), gain = ctx.createGain();
            osc.type = 'sine'; osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.18, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
            osc.connect(gain).connect(ctx.destination);
            osc.start(t); osc.stop(t + dur);
          };
          const t = ctx.currentTime;
          playNote(587, t, 0.15);
          playNote(784, t + 0.12, 0.15);
          playNote(988, t + 0.24, 0.3);
        } catch (e) { /* 无声也行 */ }

        requestAnimationFrame(function () { toastEl.classList.add('show'); });
        setTimeout(function () { toastEl.classList.remove('show'); }, 5500);

        mark();
        localStorage.setItem('ach-computer', '1');
      }
    })();
  </script>
