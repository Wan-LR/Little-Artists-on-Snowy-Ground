<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大九宫格</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap');

  :root {
    --bg:     #0a1628;
    --accent: #4a90d9;
    --light:  #a8ccf0;
    --white:  #e8f2ff;
    --border: #2a4a7a;
    --locked: #0d1e38;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Ma Shan Zheng', 'Noto Serif SC', serif;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 25% 20%, rgba(74,144,217,0.16) 0%, transparent 52%),
      radial-gradient(ellipse at 78% 80%, rgba(20,60,140,0.2) 0%, transparent 50%),
      repeating-linear-gradient(45deg, transparent, transparent 38px,
        rgba(74,144,217,0.018) 38px, rgba(74,144,217,0.018) 39px);
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .subtitle {
    font-size: 0.72rem;
    color: rgba(168,204,240,0.4);
    letter-spacing: 0.3em;
    font-family: 'Noto Serif SC', serif;
    text-align: center;
  }

  /* ── 大棋盘 ── */
  .big-board-wrap {
    padding: 10px;
    background: rgba(8,18,36,0.9);
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow:
      0 0 0 1px rgba(74,144,217,0.08),
      0 12px 48px rgba(0,0,0,0.65),
      0 0 70px rgba(74,144,217,0.07),
      inset 0 1px 0 rgba(74,144,217,0.12);
  }

  #big-board {
    display: grid;
    grid-template-columns: repeat(3, 140px);
    grid-template-rows: repeat(3, 140px);
    gap: 4px;
    background: #040a14;
  }

  /* ── 每格 ── */
  .cell {
    width: 140px;
    height: 140px;
    position: relative;
    overflow: hidden;
    border-radius: 2px;
    background: var(--locked);
    transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.3s ease;
  }

  /* 完全锁定 */
  .cell.state-locked { cursor: not-allowed; }

  /* 可挑战 */
  .cell.state-available { cursor: pointer; }
  .cell.state-available:hover {
    transform: scale(0.97);
    z-index: 2;
    box-shadow: 0 0 16px rgba(74,144,217,0.5);
    filter: brightness(1.08);
  }
  .cell.state-available:active { transform: scale(0.94); }

  /* 已通关 */
  .cell.state-done { cursor: pointer; }
  .cell.state-done:hover {
    transform: scale(0.97);
    z-index: 2;
    box-shadow: 0 0 18px rgba(74,144,217,0.6);
    filter: brightness(1.08);
  }
  .cell.state-done:active { transform: scale(0.94); }

  /* 锁层 */
  .lock-icon {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    pointer-events: none;
  }
  .cell.state-locked .lock-icon { display: flex; }
  .lock-svg { opacity: 0.2; }
  .cell-num {
    font-family: 'Ma Shan Zheng', serif;
    font-size: 1.1rem;
    color: rgba(168,204,240,0.2);
    letter-spacing: 0.05em;
  }

  /* Emoji 入口 */
  .emoji-hint {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 3.6rem;
    pointer-events: none;
    text-shadow: 0 4px 16px rgba(74,144,217,0.5);
    animation: emoji-pulse 2.4s ease-in-out infinite;
  }
  .cell.state-available .emoji-hint { display: flex; }

  @keyframes emoji-pulse {
    0%, 100% { transform: scale(1); opacity: 0.95; }
    50%      { transform: scale(1.08); opacity: 1; }
  }

  /* 原图层 */
  .cell-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
    user-select: none;
    -webkit-user-drag: none;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .cell-img.loaded { opacity: 1; }
  .cell:not(.state-done) .cell-img { opacity: 0 !important; }

  @keyframes unlockReveal {
    0%   { opacity: 0; transform: scale(0.8); filter: blur(6px); }
    60%  { transform: scale(1.04); filter: blur(0); }
    100% { opacity: 1; transform: scale(1); filter: blur(0); }
  }
  .cell.just-unlocked {
    animation: unlockReveal 0.6s cubic-bezier(.34,1.56,.64,1) forwards;
  }

  @keyframes availableReveal {
    0%   { opacity: 0; transform: scale(0.85); }
    100% { opacity: 1; transform: scale(1); }
  }
  .cell.just-available .emoji-hint {
    animation: availableReveal 0.5s ease-out 0.2s backwards,
               emoji-pulse 2.4s ease-in-out infinite 0.7s;
  }

  /* 角标 */
  .cell-badge {
    position: absolute;
    top: 4px;
    left: 4px;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 700;
    color: #fff;
    background: rgba(74,144,217,0.85);
    border-radius: 50%;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    box-shadow: 0 1px 4px rgba(0,0,0,0.5);
    pointer-events: none;
    font-family: 'Noto Serif SC', serif;
    z-index: 3;
    opacity: 0;
    transition: opacity 0.3s ease 0.3s;
  }
  .cell.state-done .cell-badge,
  .cell.state-available .cell-badge { opacity: 1; }
  .cell.state-available .cell-badge { background: rgba(168,204,240,0.6); }

  /* 进度提示 */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .progress-text {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.72rem;
    color: rgba(168,204,240,0.4);
    letter-spacing: 0.15em;
  }
  .progress-dots {
    display: flex;
    gap: 5px;
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.4s ease;
  }
  .dot.on { background: var(--accent); box-shadow: 0 0 5px rgba(74,144,217,0.6); }

  #complete-msg {
    font-family: 'Ma Shan Zheng', serif;
    font-size: 1.1rem;
    color: var(--light);
    letter-spacing: 0.2em;
    text-shadow: 0 0 16px rgba(74,144,217,0.5);
    opacity: 0;
    transition: opacity 0.8s ease;
    height: 1.5em;
    text-align: center;
  }
  #complete-msg.show { opacity: 1; }

  /* 飞入图片 */
  #fly-in-img {
    position: fixed;
    z-index: 999;
    pointer-events: none;
    object-fit: cover;
    border-radius: 2px;
    display: none;
    box-shadow: 0 0 36px rgba(74,144,217,0.7);
    will-change: top, left, width, height, transform, opacity;
  }
  #fly-in-img.flying {
    display: block;
    transition:
      top 0.85s cubic-bezier(0.4, 0, 0.2, 1),
      left 0.85s cubic-bezier(0.4, 0, 0.2, 1),
      width 0.85s cubic-bezier(0.4, 0, 0.2, 1),
      height 0.85s cubic-bezier(0.4, 0, 0.2, 1),
      box-shadow 0.85s ease,
      opacity 0.3s ease 0.7s;
  }

  /* ───────────── 公鸡 NPC（与各 puzzle 同一套） ───────────── */
  .rooster-container {
    position: fixed;
    right: 36px;
    bottom: 28px;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 14px;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }
  .rooster-container.fade-out { opacity: 0; pointer-events: none; }

  .speech-bubble {
    position: relative;
    background: linear-gradient(135deg, rgba(244, 233, 210, 0.97), rgba(220, 207, 178, 0.95));
    color: #2a1a0a;
    padding: 14px 18px 22px 18px;
    border-radius: 4px;
    font-family: 'Noto Serif SC', serif;
    font-size: 0.86rem;
    font-weight: 500;
    line-height: 1.6;
    letter-spacing: 0.04em;
    max-width: 300px;
    min-width: 180px;
    box-shadow:
      0 6px 24px rgba(0,0,0,0.55),
      0 0 0 1px rgba(139, 90, 43, 0.5),
      inset 0 1px 0 rgba(255, 255, 255, 0.5);
    opacity: 0;
    transform: translateY(8px) scale(0.96);
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
    margin-right: 40px;
    will-change: transform, opacity;
  }
  .speech-bubble.show { opacity: 1; transform: translateY(0) scale(1); }
  .speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -10px;
    right: 32px;
    width: 0; height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 10px solid rgba(228, 215, 186, 0.96);
    filter: drop-shadow(0 2px 1px rgba(139, 90, 43, 0.4));
  }
  .speech-bubble::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px dashed rgba(139, 90, 43, 0.35);
    border-radius: 2px;
    pointer-events: none;
  }

  .next-arrow {
    position: absolute;
    right: 12px;
    bottom: 4px;
    font-size: 0.85rem;
    color: #8b5a2b;
    animation: arrow-blink 1.2s ease-in-out infinite;
  }
  @keyframes arrow-blink {
    0%, 100% { opacity: 0.25; transform: translateX(0); }
    50%      { opacity: 1;    transform: translateX(3px); }
  }

  .rooster {
    width: 260px;
    height: 260px;
    cursor: pointer;
    user-select: none;
    pointer-events: auto;
    position: relative;
    filter: drop-shadow(0 10px 18px rgba(0,0,0,0.6));
    transition: filter 0.3s ease, transform 0.2s ease;
  }
  .rooster.bobbing { animation: rooster-bob 0.8s ease-in-out 5; }
  @keyframes rooster-bob {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    25%      { transform: translateY(-9px) rotate(-2.5deg); }
    50%      { transform: translateY(0) rotate(0deg); }
    75%      { transform: translateY(-9px) rotate(2.5deg); }
  }
  .rooster:hover {
    filter: drop-shadow(0 10px 20px rgba(74,144,217,0.5))
            drop-shadow(0 8px 14px rgba(0,0,0,0.55));
  }
  .rooster img {
    width: 100%; height: 100%;
    object-fit: contain;
    display: block;
    -webkit-user-drag: none;
    pointer-events: none;
  }
  .rooster-fallback {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 8rem; line-height: 1;
    pointer-events: none;
  }

  /* ── 公鸡掏出的「笔」（用你的图案代替）── */
  .pen {
    position: absolute;
    right: 70px;
    bottom: 60px;
    width: 96px;
    height: 96px;
    transform-origin: bottom center;
    opacity: 0;
    transform: translateY(46px) scale(0.3) rotate(-38deg);
    pointer-events: none;
    z-index: 60;
    filter: drop-shadow(0 8px 18px rgba(0,0,0,0.6))
            drop-shadow(0 0 16px rgba(74,144,217,0.55));
  }
  .pen img {
    width: 100%; height: 100%;
    object-fit: contain;
    display: block;
    -webkit-user-drag: none;
    pointer-events: none;
  }
  .pen-fallback {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 5rem; line-height: 1;
  }
  .pen.show { animation: penOut 0.85s cubic-bezier(.34,1.56,.64,1) forwards; }
  @keyframes penOut {
    0%   { opacity: 0; transform: translateY(46px) scale(0.3) rotate(-38deg); }
    60%  { opacity: 1; transform: translateY(-10px) scale(1.14) rotate(-12deg); }
    100% { opacity: 1; transform: translateY(0) scale(1) rotate(-18deg); }
  }

  /* ── 收尾白光 ── */
  #white-flash {
    position: fixed;
    inset: 0;
    background: #ffffff;
    opacity: 0;
    pointer-events: none;
    z-index: 9999;
    transition: opacity 0.6s ease;
  }
  #white-flash.show { opacity: 1; pointer-events: auto; }
</style>
</head>
<body>
<div class="container">
  <p class="subtitle">完成拼图 · 解锁方格</p>

  <div class="big-board-wrap">
    <div id="big-board"></div>
  </div>

  <div class="progress-row">
    <span class="progress-text" id="progress-text">0 / 9</span>
    <div class="progress-dots" id="dots"></div>
  </div>

  <p id="complete-msg">全部解锁！</p>
</div>

<img id="fly-in-img" alt="">

<!-- ───────────── 公鸡 NPC ───────────── -->
<div class="rooster-container" id="rooster-container">
  <div class="speech-bubble" id="speech-bubble">
    <span id="bubble-text"></span>
    <span class="next-arrow">▸</span>
  </div>

  <!-- 公鸡掏出的笔：把 PEN_IMAGE 换成你的图案即可 -->
  <div class="pen" id="pen">
    <img id="pen-img" alt="笔"
         onerror="this.style.display='none';document.getElementById('pen-fallback').style.display='flex';">
    <span class="pen-fallback" id="pen-fallback" style="display:none;">🖊️</span>
  </div>

  <div class="rooster" id="rooster">
    <img id="rooster-img" alt="公鸡"
         onerror="this.style.display='none';document.getElementById('rooster-fallback').style.display='flex';">
    <div class="rooster-fallback" id="rooster-fallback" style="display:none;">🐓</div>
  </div>
</div>

<!-- 收尾白光层 -->
<div id="white-flash"></div>

<script>
  // ═══════════════════════════════════════════════════════════════
  // 9 个格子的配置
  // ═══════════════════════════════════════════════════════════════
  const PUZZLES = [
    { id: 'puzzle_1', emoji: '🍎', image: 'images/gongyegeming.png', url: 'puzzle_1.html' },
    { id: 'puzzle_2', emoji: '🦆', image: 'images/yazi.png',           url: 'puzzle_2.html' },
    { id: 'puzzle_3', emoji: '🥣', image: 'images/aizheng.png',           url: 'puzzle_3.html' },
    { id: 'puzzle_4', emoji: '🥚', image: 'images/p4.png',           url: 'puzzle_4.html' },
    { id: 'puzzle_5', emoji: '💻', image: 'images/p5.png',           url: 'puzzle_5.html' },
    { id: 'puzzle_6', emoji: '💥', image: 'images/p6.png',           url: 'puzzle_6.html' },
    { id: 'puzzle_7', emoji: '🪖', image: 'images/p7.png',           url: 'puzzle_7.html' },
    { id: 'puzzle_8', emoji: '🧠', image: 'images/p8.png',           url: 'puzzle_8.html' },
    { id: 'puzzle_9', emoji: '👁️', image: 'images/p9.png',           url: 'puzzle_9.html' },
  ];

  // ═══════════════════════════════════════════════════════════════
  // 收尾相关配置 —— 这几样换成你自己的
  // ═══════════════════════════════════════════════════════════════
  const ROOSTER_IMAGE = 'images/mojingji.png';  // 公鸡图（和各 puzzle 一致）
  const PEN_IMAGE      = 'images/pen.png';       // ← 「笔」用你的图案代替
  const NEXT_URL       = 'ending.html';          // ← 白光之后要跳转到的界面

  // ↓↓↓【你来写】刚进入大九宫格时，公鸡先说的开场白（想加几句就加几句）
  //   只在“还没解开任何一关”的第一次进入时播放一次；台词里同样可用 {name}
  const INTRO_SPEECH = [
    '咯咯咯——欢迎啊',
    '这里锁着九张图，是我们昴星的九段过去',
    '从第一格开始，一格一格把它们解开',
    '每解开一张，下一张就会亮起来',
    '试着点点吧',
  ];

  // ↓↓↓【你来写】九张图全部解锁后，公鸡说的一大段话（想加几句就加几句）
  const SPEECH = [
    '这就是我们的全部过去了',
    '而你是我们的现在，关策喆',
    '根据超脑的计算，我们在许久之前就知道，有一个时间点发生了急剧熵增，这个时间点后的昴星不再是一条直线，而是多出了不少的可能性',
    '这个时间点就是现在',
    '在此之后，我们不会再受之前的不可控变量控制，但我们有了新的观测者',
    '之所以需要你，是因为我们需要你把ta带来我们面前',
    '所以你已经完成使命了，关策喆',
  ];
  // 
  //   台词里写 {name} 会被替换成玩家在引导页输入的 id（见下方 PLAYER_NAME）
  const PEN_SPEECH = [
    '你好，屏幕后的{name}',
    '以后就需要拜托你了吧',
    '有时候一念之间可以决定很多事情',
    '我们一定控制不了了，只能向你祈祷了',
    '噢还有就是得委屈你一下，关策喆和你用的是同一个屏幕，为了消除ta的记忆，这个光也会闪到你，但放心，对你不会有效',
    '不用担心肖佑袅噢，ta的记忆已经完全被消除了',
    '好吧，其实是超脑说前任观测者强烈表达了想让下一任观测者吃个闪的意愿',
    '昴星就交给你了'
  ];
  // 
  const IDLE_LINES = [
    '咯咯咯，九张都点亮了，再来找我',
  ];
  // ═══════════════════════════════════════════════════════════════

  // 玩家在引导页输入的 id：引导页用 localStorage.setItem('nickname', ...) 存的；
  // 这里再兼容 ?name= 传参；都读不到时用兜底词。
  // 用法：在任意台词（INTRO_SPEECH / SPEECH / PEN_SPEECH / IDLE_LINES）里写 {name}，显示时会替换成它。
  const PLAYER_NAME = (
    localStorage.getItem('nickname') ||
    new URLSearchParams(location.search).get('name') ||
    '观测者'                                    // ← 兜底：万一没读到 id，就用这个
  ).trim();

  let unlockedCount = 0;

  // 公鸡对话状态
  let roosterPhase = 'idle';   // intro → idle → speech → penAnim → pen → done
  let dialogueIndex = 0;
  let endingStarted = false;
  let introSeen = localStorage.getItem('hub_intro_seen') === 'true';   // 开场白只播一次
  function markIntroSeen() { introSeen = true; localStorage.setItem('hub_intro_seen', 'true'); }

  window.onload = () => {
    document.getElementById('rooster-img').src = ROOSTER_IMAGE;
    document.getElementById('pen-img').src = PEN_IMAGE;
    document.getElementById('rooster').addEventListener('click', clickRooster);

    buildBoard();   // 内部会 refreshAll，算出 unlockedCount

    // 返回动画（若刚从某关回来）放完后：先判断结局，否则尝试播放开场白
    handleReturnAnimation(() => {
      if (!maybeStartEnding()) maybeStartIntro();
    });

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') { refreshAll(); maybeStartEnding(); }
    });
  };

  function buildBoard() {
    const board = document.getElementById('big-board');
    const dotsEl = document.getElementById('dots');
    board.innerHTML = '';
    dotsEl.innerHTML = '';

    PUZZLES.forEach((p, i) => {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.id = 'cell_' + i;
      cell.addEventListener('click', () => onCellClick(i));

      const badge = document.createElement('span');
      badge.className = 'cell-badge';
      badge.textContent = i + 1;
      cell.appendChild(badge);

      const lockLayer = document.createElement('div');
      lockLayer.className = 'lock-icon';
      lockLayer.id = 'lock_' + i;
      lockLayer.innerHTML = `
        <svg class="lock-svg" width="36" height="36" viewBox="0 0 24 24" fill="none"
             stroke="rgba(168,204,240,0.9)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <span class="cell-num">${i + 1}</span>
      `;
      cell.appendChild(lockLayer);

      const emojiLayer = document.createElement('div');
      emojiLayer.className = 'emoji-hint';
      emojiLayer.id = 'emoji_' + i;
      emojiLayer.textContent = p.emoji;
      cell.appendChild(emojiLayer);

      const img = document.createElement('img');
      img.className = 'cell-img';
      img.alt = '第' + (i + 1) + '格';
      img.id = 'img_' + i;
      img.onload = () => img.classList.add('loaded');
      cell.appendChild(img);

      board.appendChild(cell);

      const dot = document.createElement('div');
      dot.className = 'dot';
      dot.id = 'dot_' + i;
      dotsEl.appendChild(dot);
    });

    refreshAll();
  }

  function getCellState(i) {
    if (isPuzzleDone(i)) return 'done';
    if (i === 0) return 'available';
    if (isPuzzleDone(i - 1)) return 'available';
    return 'locked';
  }

  function isPuzzleDone(i) {
    return localStorage.getItem(PUZZLES[i].id + '_unlocked') === 'true';
  }

  function refreshAll() {
    unlockedCount = 0;
    PUZZLES.forEach((p, i) => updateCell(i));
    updateProgress();
  }

  function updateCell(i) {
    const p = PUZZLES[i];
    const state = getCellState(i);
    const cell = document.getElementById('cell_' + i);
    const img  = document.getElementById('img_' + i);
    const dot  = document.getElementById('dot_' + i);

    cell.classList.remove('state-done', 'state-available', 'state-locked');
    cell.classList.add('state-' + state);

    if (state === 'done') {
      unlockedCount++;
      if (!img.src.endsWith(p.image)) {
        img.src = p.image;
      }
      dot.classList.add('on');
    } else {
      img.src = '';
      img.classList.remove('loaded');
      dot.classList.remove('on');
    }
  }

  function updateProgress() {
    document.getElementById('progress-text').textContent = unlockedCount + ' / 9';
    const msg = document.getElementById('complete-msg');
    if (unlockedCount === 9) msg.classList.add('show');
    else msg.classList.remove('show');
  }

  function onCellClick(i) {
    if (endingStarted) return;   // 结局演出中，禁止再点格子离开
    const state = getCellState(i);
    if (state === 'locked') {
      shakeCell(i);
      return;
    }
    goToPuzzle(i, PUZZLES[i].url);
  }

  function shakeCell(i) {
    const cell = document.getElementById('cell_' + i);
    cell.animate(
      [
        { transform: 'translateX(0)' },
        { transform: 'translateX(-4px)' },
        { transform: 'translateX(4px)' },
        { transform: 'translateX(-3px)' },
        { transform: 'translateX(3px)' },
        { transform: 'translateX(0)' },
      ],
      { duration: 280, easing: 'ease-out' }
    );
  }

  function goToPuzzle(i, url) {
    const cell = document.getElementById('cell_' + i);
    const r = cell.getBoundingClientRect();
    sessionStorage.setItem('puzzle_origin', JSON.stringify({
      index: i,
      left:  r.left,
      top:   r.top,
      width: r.width,
      height: r.height
    }));
    window.location.href = url;
  }

  // onComplete: 返回动画结束（或本来就没有动画）后回调
  function handleReturnAnimation(onComplete) {
    const done = () => { if (onComplete) onComplete(); };

    const raw = sessionStorage.getItem('puzzle_returning');
    if (!raw) { done(); return; }

    let data;
    try { data = JSON.parse(raw); } catch (e) { sessionStorage.removeItem('puzzle_returning'); done(); return; }
    sessionStorage.removeItem('puzzle_returning');

    const i = data.index;
    if (i == null || !PUZZLES[i]) { done(); return; }

    const p = PUZZLES[i];
    if (!isPuzzleDone(i)) { done(); return; }

    const targetImg = document.getElementById('img_' + i);
    const targetCell = document.getElementById('cell_' + i);
    targetImg.style.opacity = '0';

    const targetRect = targetCell.getBoundingClientRect();

    const start = data.from || {
      left:  window.innerWidth / 2 - 110,
      top:   window.innerHeight / 2 - 110,
      width: 220,
      height: 220
    };

    const flyImg = document.getElementById('fly-in-img');
    flyImg.src = p.image;

    flyImg.style.display = 'block';
    flyImg.style.left   = start.left + 'px';
    flyImg.style.top    = start.top + 'px';
    flyImg.style.width  = start.width + 'px';
    flyImg.style.height = start.height + 'px';
    flyImg.style.opacity = '1';

    const startAnim = () => {
      void flyImg.offsetWidth;
      flyImg.classList.add('flying');

      requestAnimationFrame(() => {
        flyImg.style.left   = targetRect.left + 'px';
        flyImg.style.top    = targetRect.top + 'px';
        flyImg.style.width  = targetRect.width + 'px';
        flyImg.style.height = targetRect.height + 'px';
        flyImg.style.boxShadow = '0 0 0 rgba(74,144,217,0)';
      });

      setTimeout(() => {
        targetImg.style.opacity = '';
        targetImg.classList.add('loaded');
        targetCell.classList.add('just-unlocked');
        flyImg.classList.remove('flying');
        flyImg.style.display = 'none';
        flyImg.style.opacity = '';
        flyImg.style.boxShadow = '';

        // 下一格也"点亮"动画
        const nextIdx = i + 1;
        if (nextIdx < PUZZLES.length) {
          const nextCell = document.getElementById('cell_' + nextIdx);
          nextCell.classList.add('just-available');
          setTimeout(() => nextCell.classList.remove('just-available'), 1500);
        }

        done();   // ← 飞入动画完成
      }, 900);
    };

    if (flyImg.complete && flyImg.naturalWidth > 0) {
      startAnim();
    } else {
      flyImg.onload = startAnim;
      setTimeout(() => {
        if (flyImg.style.display !== 'none' && !flyImg.classList.contains('flying')) startAnim();
      }, 800);
    }
  }

  // ═══════════════════════════════════════════════════════════════
  // 公鸡说话 / 开场白 / 结局演出
  // ═══════════════════════════════════════════════════════════════
  function showDialogue(text) {
    const bubble = document.getElementById('speech-bubble');
    const bubbleText = document.getElementById('bubble-text');
    const rooster = document.getElementById('rooster');
    bubbleText.textContent = String(text).replace(/\{name\}/g, PLAYER_NAME);   // {name} → 玩家 id
    bubble.classList.remove('show');
    void bubble.offsetWidth;
    bubble.classList.add('show');
    rooster.classList.remove('bobbing');
    void rooster.offsetWidth;
    rooster.classList.add('bobbing');
  }
  function hideDialogue() {
    document.getElementById('speech-bubble').classList.remove('show');
    document.getElementById('rooster').classList.remove('bobbing');
  }

  // 第一次进入大九宫格时的开场白（只触发一次；已开始解关或已全解锁都不再播）
  function maybeStartIntro() {
    if (endingStarted || introSeen) return;
    if (unlockedCount !== 0) return;           // 已经动过格子了，就不再当开场
    if (!INTRO_SPEECH.length) { markIntroSeen(); return; }
    setTimeout(startIntroSpeech, 500);
  }
  function startIntroSpeech() {
    if (endingStarted || introSeen) return;
    roosterPhase = 'intro';
    dialogueIndex = 0;
    showDialogue(INTRO_SPEECH[0]);
  }

  // 全部解锁后触发（只触发一次）。返回 true 表示结局已安排启动。
  function maybeStartEnding() {
    if (endingStarted) return false;
    if (unlockedCount >= PUZZLES.length) {
      setTimeout(startEndingSpeech, 600);
      return true;
    }
    return false;
  }

  function startEndingSpeech() {
    if (endingStarted) return;
    endingStarted = true;
    roosterPhase = 'speech';
    dialogueIndex = 0;
    if (SPEECH.length) showDialogue(SPEECH[0]);
    else startPenScene();   // 没写台词就直接进掏笔环节
  }

  // 掏出笔的动画
  function startPenScene() {
    roosterPhase = 'penAnim';   // 动画中，点击无效
    hideDialogue();

    const pen = document.getElementById('pen');
    pen.classList.add('show');

    const rooster = document.getElementById('rooster');
    rooster.classList.remove('bobbing'); void rooster.offsetWidth; rooster.classList.add('bobbing');

    setTimeout(() => {
      roosterPhase = 'pen';
      dialogueIndex = 0;
      if (PEN_SPEECH.length) showDialogue(PEN_SPEECH[0]);
      else startWhiteFlash();
    }, 1000);
  }

  // 白光 → 跳转
  function startWhiteFlash() {
    roosterPhase = 'done';
    hideDialogue();

    // 公鸡与笔淡出
    document.getElementById('rooster-container').classList.add('fade-out');

    // 一阵白光
    const flash = document.getElementById('white-flash');
    flash.classList.add('show');

    setTimeout(() => { window.location.href = NEXT_URL; }, 1100);
  }

  function clickRooster() {
    if (roosterPhase === 'intro') {
      dialogueIndex++;
      if (dialogueIndex < INTRO_SPEECH.length) {
        showDialogue(INTRO_SPEECH[dialogueIndex]);
      } else {
        hideDialogue();          // 开场白说完 → 进入普通(闲话)状态
        markIntroSeen();
        roosterPhase = 'idle';
        dialogueIndex = 0;
      }

    } else if (roosterPhase === 'idle') {
      if (!IDLE_LINES.length) return;
      dialogueIndex = (dialogueIndex + 1) % IDLE_LINES.length;
      showDialogue(IDLE_LINES[dialogueIndex]);

    } else if (roosterPhase === 'speech') {
      dialogueIndex++;
      if (dialogueIndex < SPEECH.length) {
        showDialogue(SPEECH[dialogueIndex]);
      } else {
        startPenScene();          // 大段话说完 → 掏笔
      }

    } else if (roosterPhase === 'pen') {
      dialogueIndex++;
      if (dialogueIndex < PEN_SPEECH.length) {
        showDialogue(PEN_SPEECH[dialogueIndex]);
      } else {
        startWhiteFlash();        // 拿着笔说完 → 白光跳转
      }
    }
    // penAnim / done：忽略点击
  }

  // ── 开发用 ──
  window.resetAll = () => {
    PUZZLES.forEach(p => localStorage.removeItem(p.id + '_unlocked'));
    localStorage.removeItem('hub_intro_seen');     // 让开场白能重新播放
    sessionStorage.clear();
    location.reload();
  };
  // 一键解锁全部（方便测试结局演出）
  window.unlockAll = () => {
    PUZZLES.forEach(p => localStorage.setItem(p.id + '_unlocked', 'true'));
    refreshAll();
    endingStarted = false;
    maybeStartEnding();
  };
</script>
