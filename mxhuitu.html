<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大九宫格</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap');

  :root {
    --bg:     #0a1628;
    --accent: #4a90d9;
    --light:  #a8ccf0;
    --white:  #e8f2ff;
    --border: #2a4a7a;
    --locked: #0d1e38;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Ma Shan Zheng', 'Noto Serif SC', serif;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 25% 20%, rgba(74,144,217,0.16) 0%, transparent 52%),
      radial-gradient(ellipse at 78% 80%, rgba(20,60,140,0.2) 0%, transparent 50%),
      repeating-linear-gradient(45deg, transparent, transparent 38px,
        rgba(74,144,217,0.018) 38px, rgba(74,144,217,0.018) 39px);
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .subtitle {
    font-size: 0.72rem;
    color: rgba(168,204,240,0.4);
    letter-spacing: 0.3em;
    font-family: 'Noto Serif SC', serif;
    text-align: center;
  }

  /* ── 大棋盘 ── */
  .big-board-wrap {
    padding: 10px;
    background: rgba(8,18,36,0.9);
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow:
      0 0 0 1px rgba(74,144,217,0.08),
      0 12px 48px rgba(0,0,0,0.65),
      0 0 70px rgba(74,144,217,0.07),
      inset 0 1px 0 rgba(74,144,217,0.12);
  }

  #big-board {
    display: grid;
    grid-template-columns: repeat(3, 140px);
    grid-template-rows: repeat(3, 140px);
    gap: 4px;
    background: #040a14;
  }

  /* ── 每格 ── */
  .cell {
    width: 140px;
    height: 140px;
    position: relative;
    overflow: hidden;
    border-radius: 2px;
    background: var(--locked);
    transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.3s ease;
  }

  /* 完全锁定 */
  .cell.state-locked { cursor: not-allowed; }

  /* 可挑战 */
  .cell.state-available { cursor: pointer; }
  .cell.state-available:hover {
    transform: scale(0.97);
    z-index: 2;
    box-shadow: 0 0 16px rgba(74,144,217,0.5);
    filter: brightness(1.08);
  }
  .cell.state-available:active { transform: scale(0.94); }

  /* 已通关 */
  .cell.state-done { cursor: pointer; }
  .cell.state-done:hover {
    transform: scale(0.97);
    z-index: 2;
    box-shadow: 0 0 18px rgba(74,144,217,0.6);
    filter: brightness(1.08);
  }
  .cell.state-done:active { transform: scale(0.94); }

  /* 锁层 */
  .lock-icon {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    pointer-events: none;
  }
  .cell.state-locked .lock-icon { display: flex; }
  .lock-svg { opacity: 0.2; }
  .cell-num {
    font-family: 'Ma Shan Zheng', serif;
    font-size: 1.1rem;
    color: rgba(168,204,240,0.2);
    letter-spacing: 0.05em;
  }

  /* Emoji 入口 */
  .emoji-hint {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 3.6rem;
    pointer-events: none;
    text-shadow: 0 4px 16px rgba(74,144,217,0.5);
    animation: emoji-pulse 2.4s ease-in-out infinite;
  }
  .cell.state-available .emoji-hint { display: flex; }

  @keyframes emoji-pulse {
    0%, 100% { transform: scale(1); opacity: 0.95; }
    50%      { transform: scale(1.08); opacity: 1; }
  }

  /* 原图层 */
  .cell-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
    user-select: none;
    -webkit-user-drag: none;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .cell-img.loaded { opacity: 1; }
  .cell:not(.state-done) .cell-img { opacity: 0 !important; }

  @keyframes unlockReveal {
    0%   { opacity: 0; transform: scale(0.8); filter: blur(6px); }
    60%  { transform: scale(1.04); filter: blur(0); }
    100% { opacity: 1; transform: scale(1); filter: blur(0); }
  }
  .cell.just-unlocked {
    animation: unlockReveal 0.6s cubic-bezier(.34,1.56,.64,1) forwards;
  }

  @keyframes availableReveal {
    0%   { opacity: 0; transform: scale(0.85); }
    100% { opacity: 1; transform: scale(1); }
  }
  .cell.just-available .emoji-hint {
    animation: availableReveal 0.5s ease-out 0.2s backwards,
               emoji-pulse 2.4s ease-in-out infinite 0.7s;
  }

  /* 角标 */
  .cell-badge {
    position: absolute;
    top: 4px;
    left: 4px;
    width: 22px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 700;
    color: #fff;
    background: rgba(74,144,217,0.85);
    border-radius: 50%;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    box-shadow: 0 1px 4px rgba(0,0,0,0.5);
    pointer-events: none;
    font-family: 'Noto Serif SC', serif;
    z-index: 3;
    opacity: 0;
    transition: opacity 0.3s ease 0.3s;
  }
  .cell.state-done .cell-badge,
  .cell.state-available .cell-badge { opacity: 1; }
  .cell.state-available .cell-badge { background: rgba(168,204,240,0.6); }

  /* 进度提示 */
  .progress-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .progress-text {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.72rem;
    color: rgba(168,204,240,0.4);
    letter-spacing: 0.15em;
  }
  .progress-dots {
    display: flex;
    gap: 5px;
  }
  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--border);
    transition: background 0.4s ease;
  }
  .dot.on { background: var(--accent); box-shadow: 0 0 5px rgba(74,144,217,0.6); }

  #complete-msg {
    font-family: 'Ma Shan Zheng', serif;
    font-size: 1.1rem;
    color: var(--light);
    letter-spacing: 0.2em;
    text-shadow: 0 0 16px rgba(74,144,217,0.5);
    opacity: 0;
    transition: opacity 0.8s ease;
    height: 1.5em;
    text-align: center;
  }
  #complete-msg.show { opacity: 1; }

  /* 飞入图片 */
  #fly-in-img {
    position: fixed;
    z-index: 999;
    pointer-events: none;
    object-fit: cover;
    border-radius: 2px;
    display: none;
    box-shadow: 0 0 36px rgba(74,144,217,0.7);
    will-change: top, left, width, height, transform, opacity;
  }
  #fly-in-img.flying {
    display: block;
    transition:
      top 0.85s cubic-bezier(0.4, 0, 0.2, 1),
      left 0.85s cubic-bezier(0.4, 0, 0.2, 1),
      width 0.85s cubic-bezier(0.4, 0, 0.2, 1),
      height 0.85s cubic-bezier(0.4, 0, 0.2, 1),
      box-shadow 0.85s ease,
      opacity 0.3s ease 0.7s;
  }
</style>
</head>
<body>
<div class="container">
  <p class="subtitle">完成拼图 · 解锁方格</p>

  <div class="big-board-wrap">
    <div id="big-board"></div>
  </div>

  <div class="progress-row">
    <span class="progress-text" id="progress-text">0 / 9</span>
    <div class="progress-dots" id="dots"></div>
  </div>

  <p id="complete-msg">全部解锁！</p>
</div>

<img id="fly-in-img" alt="">

<script>
  // ═══════════════════════════════════════════════════════════════
  // 9 个格子的配置
  //   id    : localStorage 标记键
  //   emoji : 该格"可挑战"时显示的入口提示 emoji（你可以随时替换）
  //   image : 该题通关后显示的原图
  //   url   : 谜题页面
  // ═══════════════════════════════════════════════════════════════
  const PUZZLES = [
    { id: 'puzzle_1', emoji: '🍎', image: 'images/gongyegeming.png', url: 'puzzle_1.html' },
    { id: 'puzzle_2', emoji: '🦆', image: 'images/p2.png',           url: 'puzzle_2.html' },
    { id: 'puzzle_3', emoji: '🥣', image: 'images/p3.png',           url: 'puzzle_3.html' },
    { id: 'puzzle_4', emoji: '🥚', image: 'images/p4.png',           url: 'puzzle_4.html' },
    { id: 'puzzle_5', emoji: '💻', image: 'images/p5.png',           url: 'puzzle_5.html' },
    { id: 'puzzle_6', emoji: '💥', image: 'images/p6.png',           url: 'puzzle_6.html' },
    { id: 'puzzle_7', emoji: '🪖', image: 'images/p7.png',           url: 'puzzle_7.html' },
    { id: 'puzzle_8', emoji: '🧠', image: 'images/p8.png',           url: 'puzzle_8.html' },
    { id: 'puzzle_9', emoji: '👁️', image: 'images/p9.png',           url: 'puzzle_9.html' },
  ];
  // ═══════════════════════════════════════════════════════════════

  let unlockedCount = 0;

  window.onload = () => {
    buildBoard();
    handleReturnAnimation();
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') refreshAll();
    });
  };

  function buildBoard() {
    const board = document.getElementById('big-board');
    const dotsEl = document.getElementById('dots');
    board.innerHTML = '';
    dotsEl.innerHTML = '';

    PUZZLES.forEach((p, i) => {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.id = 'cell_' + i;
      cell.addEventListener('click', () => onCellClick(i));

      const badge = document.createElement('span');
      badge.className = 'cell-badge';
      badge.textContent = i + 1;
      cell.appendChild(badge);

      const lockLayer = document.createElement('div');
      lockLayer.className = 'lock-icon';
      lockLayer.id = 'lock_' + i;
      lockLayer.innerHTML = `
        <svg class="lock-svg" width="36" height="36" viewBox="0 0 24 24" fill="none"
             stroke="rgba(168,204,240,0.9)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <span class="cell-num">${i + 1}</span>
      `;
      cell.appendChild(lockLayer);

      const emojiLayer = document.createElement('div');
      emojiLayer.className = 'emoji-hint';
      emojiLayer.id = 'emoji_' + i;
      emojiLayer.textContent = p.emoji;
      cell.appendChild(emojiLayer);

      const img = document.createElement('img');
      img.className = 'cell-img';
      img.alt = '第' + (i + 1) + '格';
      img.id = 'img_' + i;
      img.onload = () => img.classList.add('loaded');
      cell.appendChild(img);

      board.appendChild(cell);

      const dot = document.createElement('div');
      dot.className = 'dot';
      dot.id = 'dot_' + i;
      dotsEl.appendChild(dot);
    });

    refreshAll();
  }

  // 判断某格当前状态
  // done       : 已通关 → 显示原图，可点击重看
  // available  : 可挑战 → 显示 emoji，可点击进入
  // locked     : 前置未通关 → 显示锁，不可点击
  function getCellState(i) {
    if (isPuzzleDone(i)) return 'done';
    if (i === 0) return 'available';
    if (isPuzzleDone(i - 1)) return 'available';
    return 'locked';
  }

  function isPuzzleDone(i) {
    return localStorage.getItem(PUZZLES[i].id + '_unlocked') === 'true';
  }

  function refreshAll() {
    unlockedCount = 0;
    PUZZLES.forEach((p, i) => updateCell(i));
    updateProgress();
  }

  function updateCell(i) {
    const p = PUZZLES[i];
    const state = getCellState(i);
    const cell = document.getElementById('cell_' + i);
    const img  = document.getElementById('img_' + i);
    const dot  = document.getElementById('dot_' + i);

    cell.classList.remove('state-done', 'state-available', 'state-locked');
    cell.classList.add('state-' + state);

    if (state === 'done') {
      unlockedCount++;
      if (!img.src.endsWith(p.image)) {
        img.src = p.image;
      }
      dot.classList.add('on');
    } else {
      img.src = '';
      img.classList.remove('loaded');
      dot.classList.remove('on');
    }
  }

  function updateProgress() {
    document.getElementById('progress-text').textContent = unlockedCount + ' / 9';
    const msg = document.getElementById('complete-msg');
    if (unlockedCount === 9) msg.classList.add('show');
    else msg.classList.remove('show');
  }

  function onCellClick(i) {
    const state = getCellState(i);
    if (state === 'locked') {
      shakeCell(i);
      return;
    }
    goToPuzzle(i, PUZZLES[i].url);
  }

  function shakeCell(i) {
    const cell = document.getElementById('cell_' + i);
    cell.animate(
      [
        { transform: 'translateX(0)' },
        { transform: 'translateX(-4px)' },
        { transform: 'translateX(4px)' },
        { transform: 'translateX(-3px)' },
        { transform: 'translateX(3px)' },
        { transform: 'translateX(0)' },
      ],
      { duration: 280, easing: 'ease-out' }
    );
  }

  function goToPuzzle(i, url) {
    const cell = document.getElementById('cell_' + i);
    const r = cell.getBoundingClientRect();
    sessionStorage.setItem('puzzle_origin', JSON.stringify({
      index: i,
      left:  r.left,
      top:   r.top,
      width: r.width,
      height: r.height
    }));
    window.location.href = url;
  }

  function handleReturnAnimation() {
    const raw = sessionStorage.getItem('puzzle_returning');
    if (!raw) return;

    let data;
    try { data = JSON.parse(raw); } catch (e) { sessionStorage.removeItem('puzzle_returning'); return; }
    sessionStorage.removeItem('puzzle_returning');

    const i = data.index;
    if (i == null || !PUZZLES[i]) return;

    const p = PUZZLES[i];
    if (!isPuzzleDone(i)) return;

    const targetImg = document.getElementById('img_' + i);
    const targetCell = document.getElementById('cell_' + i);
    targetImg.style.opacity = '0';

    const targetRect = targetCell.getBoundingClientRect();

    const start = data.from || {
      left:  window.innerWidth / 2 - 110,
      top:   window.innerHeight / 2 - 110,
      width: 220,
      height: 220
    };

    const flyImg = document.getElementById('fly-in-img');
    flyImg.src = p.image;

    flyImg.style.display = 'block';
    flyImg.style.left   = start.left + 'px';
    flyImg.style.top    = start.top + 'px';
    flyImg.style.width  = start.width + 'px';
    flyImg.style.height = start.height + 'px';
    flyImg.style.opacity = '1';

    const startAnim = () => {
      void flyImg.offsetWidth;
      flyImg.classList.add('flying');

      requestAnimationFrame(() => {
        flyImg.style.left   = targetRect.left + 'px';
        flyImg.style.top    = targetRect.top + 'px';
        flyImg.style.width  = targetRect.width + 'px';
        flyImg.style.height = targetRect.height + 'px';
        flyImg.style.boxShadow = '0 0 0 rgba(74,144,217,0)';
      });

      setTimeout(() => {
        targetImg.style.opacity = '';
        targetImg.classList.add('loaded');
        targetCell.classList.add('just-unlocked');
        flyImg.classList.remove('flying');
        flyImg.style.display = 'none';
        flyImg.style.opacity = '';
        flyImg.style.boxShadow = '';

        // 下一格也"点亮"动画
        const nextIdx = i + 1;
        if (nextIdx < PUZZLES.length) {
          const nextCell = document.getElementById('cell_' + nextIdx);
          nextCell.classList.add('just-available');
          setTimeout(() => nextCell.classList.remove('just-available'), 1500);
        }
      }, 900);
    };

    if (flyImg.complete && flyImg.naturalWidth > 0) {
      startAnim();
    } else {
      flyImg.onload = startAnim;
      setTimeout(() => {
        if (flyImg.style.display !== 'none' && !flyImg.classList.contains('flying')) startAnim();
      }, 800);
    }
  }

  // 开发用
  window.resetAll = () => {
    PUZZLES.forEach(p => localStorage.removeItem(p.id + '_unlocked'));
    sessionStorage.clear();
    refreshAll();
  };
</script>
</body>
</html>
