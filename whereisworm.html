<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>terminal</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #0a0a0a;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    overflow: hidden;
  }

  .screen {
    height: 100vh;
    padding: 24px;
    background:
      radial-gradient(ellipse at center, rgba(0,40,0,0.15) 0%, rgba(0,0,0,0.6) 100%),
      #0a0e0a;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,255,100,0.04) 0px,
      rgba(0,255,100,0.04) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
    z-index: 2;
  }
  .screen::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(120,255,150,0.06), transparent 60%);
    pointer-events: none;
    z-index: 1;
  }

  .titlebar {
    flex-shrink: 0;
    color: #5fd97a;
    font-size: 12px;
    letter-spacing: 2px;
    opacity: 0.7;
    margin-bottom: 12px;
    position: relative;
    z-index: 3;
  }
  .titlebar .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #5fd97a;
    margin-right: 6px;
    animation: blink 1.4s infinite;
    vertical-align: middle;
  }
  @keyframes blink { 50% { opacity: 0.3; } }

  .terminal {
    flex: 1;
    min-height: 0;
    color: #6cf08a;
    font-size: 15px;
    line-height: 1.6;
    text-shadow: 0 0 6px rgba(108,240,138,0.5);
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 3;
  }

  .output {
    flex: 1;
    overflow-y: auto;
    padding-right: 8px;
    scrollbar-width: thin;
    scrollbar-color: #2a5a2a transparent;
  }
  .output::-webkit-scrollbar { width: 6px; }
  .output::-webkit-scrollbar-thumb { background: #2a5a2a; border-radius: 3px; }

  .line { white-space: pre-wrap; word-break: break-word; margin-bottom: 2px; }
  .line.user   { color: #b8ffcc; }
  .line.system { color: #6cf08a; }
  .line.dim    { color: #3a7a4a; opacity: 0.8; }

  .choice-area {
    flex-shrink: 0;
    padding-top: 10px;
    min-height: 0;
  }

  /* 选项列表 */
  .user-choices {
    display: none;
    flex-direction: column;
    gap: 5px;
  }
  .user-choices.show { display: flex; }

  /* 每一层菜单（主菜单 / 子菜单）都是一个独立容器 */
  .menu-level {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .menu-level.hidden { display: none; }

  .uchoice-btn {
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-size: 13.5px;
    padding: 7px 14px 7px 10px;
    background: transparent;
    border: 1px solid #1e4a1e;
    color: #6cf08a;
    cursor: pointer;
    letter-spacing: .3px;
    text-shadow: 0 0 6px rgba(108,240,138,0.3);
    transition: all 0.15s ease;
    text-align: left;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .uchoice-btn .idx {
    color: #3a7a4a;
    font-size: 11px;
    flex-shrink: 0;
    padding-top: 2px;
    letter-spacing: 1px;
    min-width: 20px;
  }
  .uchoice-btn .txt { flex: 1; }
  .uchoice-btn:hover {
    border-color: #5fd97a;
    background: rgba(108,240,138,0.06);
    box-shadow: 0 0 8px rgba(108,240,138,0.12);
    padding-left: 16px;
  }
  .uchoice-btn:active { transform: scale(0.99); }

  /* 已选过：灰掉，不可再点 */
  .uchoice-btn.used {
    pointer-events: none;
    opacity: 0.22;
    border-color: #1a3a1a;
    color: #4a8a5a;
    text-shadow: none;
  }
  /* 正在等待回复时锁住所有按钮 */
  .uchoice-btn.locked {
    pointer-events: none;
  }

  /* 结局选项 */
  .ending-choices {
    display: none;
    flex-direction: column;
    gap: 14px;
    padding-top: 14px;
  }
  .ending-choices.show { display: flex; }
  .ending-q {
    color: #6cf08a;
    text-shadow: 0 0 6px rgba(108,240,138,0.5);
    font-size: 15px;
    letter-spacing: 1px;
  }
  .ending-btns { display: flex; gap: 16px; }
  .ending-btn {
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-size: 14px;
    padding: 8px 24px;
    background: transparent;
    border: 1px solid #3a7a4a;
    color: #6cf08a;
    cursor: pointer;
    letter-spacing: 2px;
    text-shadow: 0 0 6px rgba(108,240,138,0.5);
    transition: all 0.2s ease;
  }
  .ending-btn:hover {
    border-color: #6cf08a;
    box-shadow: 0 0 12px rgba(108,240,138,0.3);
    background: rgba(108,240,138,0.08);
  }
  .ending-btn:active { transform: scale(0.96); }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeInUp .3s ease forwards; }

  .image-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 99;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }
  .image-overlay.show { opacity: 1; pointer-events: auto; }
  .image-overlay img {
    max-width: 80vw;
    max-height: 80vh;
    object-fit: contain;
    filter: drop-shadow(0 0 30px rgba(108,240,138,0.3));
    animation: imgReveal 0.6s ease forwards;
  }
  @keyframes imgReveal {
    from { transform: scale(0.9); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }

  /* ════════ 信号崩坏：抖动 + 闪烁 ════════ */
  /* 进入 glitch 节点时给 .screen 加 .glitching；刷屏加速时再加 .intense */
  .screen.glitching {
    animation: glitchShake .18s infinite, sigFlicker 1.2s infinite;
  }
  .screen.glitching.intense {
    animation: glitchShake .1s infinite, sigFlicker .55s infinite;
  }
  @keyframes glitchShake {
    0%, 100% { transform: translate(0, 0); }
    20%      { transform: translate(-2px, 1px); }
    40%      { transform: translate(2px, -1px); filter: hue-rotate(22deg) saturate(1.3); }
    60%      { transform: translate(-1px, -2px); }
    80%      { transform: translate(1px, 2px);  filter: hue-rotate(-22deg) saturate(1.3); }
  }
  /* 偶发的“信号掉线”闪烁：大部分时间正常，偶尔骤暗一下 */
  @keyframes sigFlicker {
    0%, 84% { opacity: 1; }
    86%     { opacity: 0.3; }
    88%     { opacity: 1; }
    92%     { opacity: 0.68; }
    94%     { opacity: 1; }
    100%    { opacity: 1; }
  }
  /* 崩坏时扫描线变密 */
  .screen.glitching::before {
    background: repeating-linear-gradient(
      0deg,
      rgba(0,255,100,0.11) 0px,
      rgba(0,255,100,0.11) 1px,
      transparent 1px,
      transparent 2px
    );
  }

  /* 连接中断时的一次性黑屏闪烁 */
  .blackout {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 95;
    opacity: 0;
    pointer-events: none;
  }
  .blackout.flash { animation: blackoutFlash .55s ease forwards; }
  @keyframes blackoutFlash {
    0%   { opacity: 0; }
    28%  { opacity: 1; }
    100% { opacity: 0; }
  }
</style>
</head>

<div class="image-overlay" id="image-overlay">

// ══════════════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════════════
// 引擎
// ══════════════════════════════════════════════════════════════
let busy = false;

function print(text, cls = 'system') {
  const div = document.createElement('div');
  div.className = 'line ' + cls;
  div.textContent = text;
  output.appendChild(div);
  output.scrollTop = output.scrollHeight;
}

// 锁 / 解锁所有层级的选项按钮（解锁时不会动已经选过的）
function lockAll(lock) {
  [...userChoices.querySelectorAll('.uchoice-btn')].forEach(b => {
    if (lock) b.classList.add('locked');
    else if (!b.classList.contains('used')) b.classList.remove('locked');
  });
}

// 渲染一层菜单（可多选，选过的灰掉）。
// 本层全部选完后：移除本层 → 恢复父层 → 调用 onAllUsed()。
// parentMenuEl 为 null 表示这是顶层主菜单。
// 子菜单（choice.extra）通过递归调用本函数实现，行为与主菜单完全一致。
function runMenu(choices, onAllUsed, parentMenuEl) {
  if (parentMenuEl) parentMenuEl.classList.add('hidden'); // 进子菜单时先把父层藏起来

  const menuEl = document.createElement('div');
  menuEl.className = 'menu-level';
  userChoices.appendChild(menuEl);

  choices.forEach((c, idx) => {
    const btn = document.createElement('button');
    btn.className = 'uchoice-btn fade-in';
    btn.style.animationDelay = (idx * 55) + 'ms';
    btn.innerHTML = `<span class="idx">${idx + 1}.</span><span class="txt">${c.text}</span>`;

    btn.addEventListener('click', () => {
      if (busy || btn.classList.contains('used')) return;

      // 锁住所有按钮，等回复打完再解锁
      busy = true;
      lockAll(true);
      btn.classList.add('used'); // 立即灰掉自己

      print('guest@local:~$ ' + c.text, 'user');

      // 本条分支结束后的收尾：判断【本层】是否全部选完
      const finalize = () => {
        const allUsed = [...menuEl.querySelectorAll('.uchoice-btn')]
                          .every(b => b.classList.contains('used'));
        if (allUsed) {
          // 本层全选完 → 移除本层、恢复父层、交给 onAllUsed
          // （顶层 onAllUsed = 前进到 next；子层 onAllUsed = 父分支的 finalize）
          setTimeout(() => {
            menuEl.remove();
            if (parentMenuEl) parentMenuEl.classList.remove('hidden');
            onAllUsed();
          }, 600);
        } else {
          // 还有剩余 → 解锁继续选（即"回到本菜单"）
          busy = false;
          lockAll(false);
        }
      };

      setTimeout(() => {
        print('> ' + c.branchReply, 'system');

        if (c.extra && c.extra.length) {
          // 这条分支带【子菜单】：和主菜单一样，可以一个个点选；
          // 子菜单全部选完后回到本层（此期间 busy 维持锁定，由 finalize 解锁）
          setTimeout(() => runMenu(c.extra, finalize, menuEl), 450);
        } else {
          setTimeout(finalize, 500);
        }
      }, 380);
    });

    menuEl.appendChild(btn);
  });

  busy = false; // 本层渲染完毕，可以点击了
}

// 顶层菜单入口：所有选项汇合到同一个 next
function startMenu(choices) {
  userChoices.classList.add('show');
  const nextId = choices[0].next;
  runMenu(choices, () => {
    userChoices.classList.remove('show');
    userChoices.innerHTML = '';
    go(nextId);
  }, null);
}

function showImage(src, onDone) {
  overlayImg.src = src;
  imgOverlay.classList.add('show');
  setTimeout(() => {
    imgOverlay.classList.remove('show');
    setTimeout(() => { overlayImg.src = ''; onDone(); }, 500);
  }, 3000);
}

function go(id) {
  if (!id) return;
  const node = NODES[id];
  if (!node) return;

  // ── 信号崩坏：进入 glitch 序列开始抖动闪烁，刷屏加速时升级为剧烈 ──
  if (id === 'glitch') screenEl.classList.add('glitching');
  if (id === 'g3')     screenEl.classList.add('intense');

  if (node.end) {
    // 连接彻底中断：黑屏闪一下 → 抖动停止 → 画面定住后弹出结局
    blackout.classList.add('flash');
    setTimeout(() => screenEl.classList.remove('glitching', 'intense'), 150);
    setTimeout(() => endingChoices.classList.add('show'), 560);
    return;
  }

  if (node.image) {
    busy = true;
    setTimeout(() => {
      showImage(node.image, () => { busy = false; go(node.next); });
    }, node.delay || 600);
    return;
  }

  if (node.reply) {
    busy = true;
    // from:'user' → 显示为玩家说的话；否则为对方/系统说
    const prefix = node.from === 'user' ? 'guest@local:~$ ' : '> ';
    const cls    = node.from === 'user' ? 'user' : 'system';
    setTimeout(() => {
      print(prefix + node.reply, cls);
      if (node.choices) {
        setTimeout(() => startMenu(node.choices), 400);
      } else {
        setTimeout(() => { busy = false; go(node.next); }, node.delay || 1800);
      }
    }, 300);
  } else if (node.choices) {
    setTimeout(() => startMenu(node.choices), 400);
  }
}

// ── 启动 ──
const boot = [
  ['booting tty0 ...',                    'dim'],
  ['kernel loaded. memory ok.',           'dim'],
  ['establishing link ............ ok',   'dim'],
  ['',                                    'dim'],
  ['',                                    'system'],
];
let bi = 0;
(function bootSeq() {
  if (bi >= boot.length) { go('n0'); return; }
  print(boot[bi][0], boot[bi][1]);
  bi++;
  setTimeout(bootSeq, 220);
})();
</script>
