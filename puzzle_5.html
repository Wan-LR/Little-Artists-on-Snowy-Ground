<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>循环</title>
<style>
  @import url('https://gs.jurieo.com/gemini/fonts-googleapis/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap');

  :root {
    --bg:     #0a1628;
    --accent: #4a90d9;
    --light:  #a8ccf0;
    --white:  #e8f2ff;
    --border: #2a4a7a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Ma Shan Zheng', 'Noto Serif SC', serif;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 28% 22%, rgba(74,144,217,0.18) 0%, transparent 52%),
      radial-gradient(ellipse at 76% 80%, rgba(20,60,140,0.22) 0%, transparent 50%),
      repeating-linear-gradient(45deg, transparent, transparent 38px,
        rgba(74,144,217,0.022) 38px, rgba(74,144,217,0.022) 39px);
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
  }

  .subtitle {
    font-size: 0.72rem;
    color: rgba(168,204,240,0.45);
    letter-spacing: 0.28em;
    text-align: center;
    font-family: 'Noto Serif SC', serif;
  }

  /* ── 3D 卡片 ── */
  .card-scene {
    width: 442px;
    height: 442px;
    perspective: 1600px;
    position: relative;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.75s cubic-bezier(0.4, 0.2, 0.2, 1);
  }
  .card.flipped { transform: rotateY(180deg); }

  .card-scene.zooming-in {
    position: fixed;
    z-index: 100;
    transition:
      top 0.7s cubic-bezier(0.4, 0, 0.2, 1),
      left 0.7s cubic-bezier(0.4, 0, 0.2, 1),
      width 0.7s cubic-bezier(0.4, 0, 0.2, 1),
      height 0.7s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 4px;
    overflow: hidden;
  }

  .card-front { cursor: default; }

  .card-back {
    transform: rotateY(180deg);
    cursor: pointer;
  }
  .card-back img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }

  /* ── 游戏棋盘 ── */
  .board-wrap {
    width: 100%;
    height: 100%;
    padding: 10px;
    background: rgba(8,18,36,0.9);
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow:
      0 0 0 1px rgba(74,144,217,0.08),
      0 10px 44px rgba(0,0,0,0.65),
      0 0 60px rgba(74,144,217,0.07),
      inset 0 1px 0 rgba(74,144,217,0.13);
  }

  #game-board {
    width: 100%;
    height: 100%;
    background: #040a14;
    position: relative;
    overflow: hidden;
    border-radius: 2px;
  }

  /* 题目 */
  .quiz-question {
    position: absolute;
    top: 22px;
    left: 0; right: 0;
    text-align: center;
    color: var(--white);
    font-family: 'Noto Serif SC', serif;
    font-size: 1.0rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 0 22px;
    text-shadow: 0 0 12px rgba(74,144,217,0.4);
  }
  .quiz-round-no {
    position: absolute;
    top: 50px;
    left: 0; right: 0;
    text-align: center;
    color: rgba(168,204,240,0.4);
    font-family: 'Noto Serif SC', serif;
    font-size: 0.64rem;
    letter-spacing: 0.24em;
  }

  /* ── 左右两栏 ── */
  .split {
    position: absolute;
    top: 66px; left: 12px; right: 12px; bottom: 14px;
    display: flex;
    gap: 12px;
  }
  .panel {
    flex: 1;
    min-width: 0;
    position: relative;
    background: rgba(74,144,217,0.05);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 32px 12px 12px;
    display: flex;
    flex-direction: column;
  }
  .panel-title {
    position: absolute;
    top: 9px; left: 0; right: 0;
    text-align: center;
    font-family: 'Noto Serif SC', serif;
    font-size: 0.72rem; letter-spacing: 0.18em;
    color: rgba(168,204,240,0.55);
  }

  .cipher-text {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Noto Serif SC', serif;
    color: var(--white);
    font-size: 0.95rem; line-height: 1.75;
    letter-spacing: 0.05em;
    text-align: center;
    word-break: break-word;
    text-shadow: 0 0 10px rgba(74,144,217,0.35);
    padding: 2px;
  }

  /* 猪圈密码：把每个字母画成符号 */
  .pigpen-row {
    display: flex; flex-wrap: wrap;
    gap: 8px 7px;
    align-items: center; justify-content: center;
  }
  .pigpen-row .pp {
    width: 26px; height: 26px;
    filter: drop-shadow(0 0 5px rgba(74,144,217,0.4));
  }

  .decode-row { display: flex; gap: 6px; margin-top: 8px; }
  .decode-input {
    flex: 1; min-width: 0;
    font-family: 'Noto Serif SC', serif; font-size: 0.85rem;
    padding: 6px 8px;
    background: rgba(8,18,36,0.8);
    border: 1px solid var(--border); border-radius: 4px;
    color: var(--white); outline: none; text-align: center;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .decode-input::placeholder { color: rgba(168,204,240,0.3); font-size: 0.78rem; }
  .decode-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(74,144,217,0.2); }
  .decode-input.wrong { border-color: #d94a4a; animation: shake 0.35s ease; }
  .decode-input.ok { border-color: #4ad980; box-shadow: 0 0 0 2px rgba(74,217,128,0.25); }
  .decode-btn {
    font-family: 'Noto Serif SC', serif; font-size: 0.76rem;
    padding: 6px 10px;
    border: 1px solid var(--accent); background: rgba(74,144,217,0.2);
    color: var(--light); border-radius: 4px; cursor: pointer; white-space: nowrap;
    transition: box-shadow 0.2s;
  }
  .decode-btn:hover { box-shadow: 0 0 0 2px rgba(74,144,217,0.2); }

  .answer-list {
    list-style: none; flex: 1; overflow-y: auto;
    margin: 0; padding: 0;
    display: flex; flex-direction: column; gap: 7px;
  }
  .answer-list li {
    font-family: 'Noto Serif SC', serif; font-size: 0.92rem;
    color: var(--white);
    background: rgba(74,144,217,0.08);
    border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 10px; letter-spacing: 0.04em;
    animation: fadeInUp 0.35s ease;
  }
  /* 首字母用淡蓝区分（克制的线索，不直接点破） */
  .answer-list li .initial { color: var(--light); transition: color 0.4s, text-shadow 0.4s; }
  .answer-list.loop-clue li .initial {
    color: #ffd97a; font-weight: 700; text-shadow: 0 0 9px rgba(255,210,120,0.7);
  }
  .answer-empty {
    color: rgba(168,204,240,0.28);
    font-size: 0.72rem; text-align: center; margin-top: 10px;
    font-family: 'Noto Serif SC', serif;
  }

  #success-msg {
    display: none;
    position: absolute;
    inset: 0;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    color: var(--light);
    letter-spacing: 0.2em;
    animation: fadeInUp 0.6s ease forwards;
  }

  /* ── 底部交互区 ── */
  .action-area {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .action-area.show { display: flex; animation: fadeInUp 0.4s ease; }

  .word-input-wrap { display: flex; align-items: center; gap: 8px; }
  .btn-row { display: flex; gap: 16px; }

  .btn-replay, .btn-submit {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    padding: 7px 18px;
    border: 1px solid var(--border);
    background: rgba(8,18,36,0.8);
    color: var(--light);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.25s ease;
  }
  .btn-replay:hover, .btn-submit:hover {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(74,144,217,0.2);
  }
  .btn-submit { background: rgba(74,144,217,0.2); border-color: var(--accent); }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .word-input {
    font-family: 'Noto Serif SC', serif;
    font-size: 1rem;
    letter-spacing: 0.12em;
    padding: 8px 16px;
    border: 1px solid var(--border);
    background: rgba(8,18,36,0.8);
    color: var(--white);
    border-radius: 3px;
    width: 200px;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
    text-align: center;
  }
  .word-input::placeholder { color: rgba(168,204,240,0.3); font-size: 0.82rem; letter-spacing: 0.1em; }
  .word-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(74,144,217,0.2); }
  .word-input.correct { border-color: #4ad980; box-shadow: 0 0 0 2px rgba(74,217,128,0.25); }
  .word-input.wrong {
    border-color: #d94a4a;
    box-shadow: 0 0 0 2px rgba(217,74,74,0.25);
    animation: shake 0.35s ease;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-6px); }
    75%      { transform: translateX(6px); }
  }

  .hint {
    font-size: 0.66rem;
    color: rgba(168,204,240,0.28);
    letter-spacing: 0.1em;
    text-align: center;
    font-family: 'Noto Serif SC', serif;
    transition: opacity 0.3s;
  }

  #flip-hint {
    font-size: 0.66rem;
    color: rgba(168,204,240,0.35);
    letter-spacing: 0.15em;
    text-align: center;
    font-family: 'Noto Serif SC', serif;
    opacity: 0;
    transition: opacity 0.5s ease;
    height: 1em;
  }
  #flip-hint.show { opacity: 1; }

  .container.exiting .subtitle,
  .container.exiting .action-area,
  .container.exiting .hint,
  .container.exiting #flip-hint {
    transition: opacity 0.35s ease;
    opacity: 0;
  }

  /* ───────────── 公鸡 NPC ───────────── */
  .rooster-container {
    position: fixed;
    right: 36px;
    bottom: 28px;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 14px;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .rooster-container.fade-out { opacity: 0; pointer-events: none; }

  .speech-bubble {
    position: relative;
    background: linear-gradient(135deg, rgba(244, 233, 210, 0.97), rgba(220, 207, 178, 0.95));
    color: #2a1a0a;
    padding: 14px 18px 22px 18px;
    border-radius: 4px;
    font-family: 'Noto Serif SC', serif;
    font-size: 0.86rem;
    font-weight: 500;
    line-height: 1.6;
    letter-spacing: 0.04em;
    max-width: 280px;
    min-width: 180px;
    box-shadow:
      0 6px 24px rgba(0,0,0,0.55),
      0 0 0 1px rgba(139, 90, 43, 0.5),
      inset 0 1px 0 rgba(255, 255, 255, 0.5);
    opacity: 0;
    transform: translateY(8px) scale(0.96);
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
    margin-right: 40px;
    will-change: transform, opacity;
  }
  .speech-bubble.show { opacity: 1; transform: translateY(0) scale(1); }
  .speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -10px;
    right: 32px;
    width: 0; height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 10px solid rgba(228, 215, 186, 0.96);
    filter: drop-shadow(0 2px 1px rgba(139, 90, 43, 0.4));
  }
  .speech-bubble::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px dashed rgba(139, 90, 43, 0.35);
    border-radius: 2px;
    pointer-events: none;
  }

  .next-arrow {
    position: absolute;
    right: 12px;
    bottom: 4px;
    font-size: 0.85rem;
    color: #8b5a2b;
    animation: arrow-blink 1.2s ease-in-out infinite;
  }
  @keyframes arrow-blink {
    0%, 100% { opacity: 0.25; transform: translateX(0); }
    50%      { opacity: 1;    transform: translateX(3px); }
  }

  .rooster {
    width: 180px;
    height: 180px;
    cursor: pointer;
    user-select: none;
    pointer-events: auto;
    position: relative;
    filter: drop-shadow(0 10px 18px rgba(0,0,0,0.6));
    transition: filter 0.3s ease, transform 0.2s ease;
  }
  .rooster.bobbing { animation: rooster-bob 0.8s ease-in-out 5; }
  @keyframes rooster-bob {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    25%      { transform: translateY(-9px) rotate(-2.5deg); }
    50%      { transform: translateY(0) rotate(0deg); }
    75%      { transform: translateY(-9px) rotate(2.5deg); }
  }
  .rooster:hover {
    filter: drop-shadow(0 10px 20px rgba(74,144,217,0.5))
            drop-shadow(0 8px 14px rgba(0,0,0,0.55));
  }
  .rooster img {
    width: 100%; height: 100%;
    object-fit: contain;
    display: block;
    -webkit-user-drag: none;
    pointer-events: none;
  }
  .rooster-fallback {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 8rem; line-height: 1;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="container" id="page-container">
  <p class="subtitle">互动收集 · 还原密码</p>

  <div class="card-scene" id="card-scene">
    <div class="card" id="card">
      <div class="card-face card-front" id="card-front">
        <div class="board-wrap">
          <div id="game-board">
            <div class="quiz-question" id="quiz-question"></div>
            <div class="quiz-round-no" id="quiz-round-no"></div>

            <div class="split" id="split">
              <!-- 左：题目 -->
              <div class="panel" id="panel-left">
                <div class="panel-title">题目</div>
                <div class="cipher-text" id="cipher-text"></div>
                <div class="decode-row">
                  <input class="decode-input" id="decode-input" type="text"
                         placeholder="解出的词…" autocomplete="off" spellcheck="false">
                  <button class="decode-btn" id="decode-btn" onclick="checkDecode()">解码</button>
                </div>
              </div>
              <!-- 右：答案 -->
              <div class="panel" id="panel-right">
                <div class="panel-title">答案</div>
                <ul class="answer-list" id="answer-list"></ul>
                <div class="answer-empty" id="answer-empty">还没有破译出任何词</div>
              </div>
            </div>

            <div id="success-msg">看出来了</div>
          </div>
        </div>
      </div>
      <div class="card-face card-back" id="card-back">
        <img id="back-img" src="images/loop.png" alt="背面">
      </div>
    </div>
  </div>

  <div class="action-area" id="action-area">
    <div class="word-input-wrap">
      <input class="word-input" id="word-input" type="text"
             placeholder="输入最终密码…" autocomplete="off" spellcheck="false">
    </div>
    <div class="btn-row">
      <button class="btn-replay" id="btn-replay" onclick="resetGame()">↻ 重新作答</button>
      <button class="btn-submit" id="btn-submit" onclick="checkPassword()">确 认</button>
    </div>
  </div>

  <p class="hint" id="main-hint"></p>
  <p id="flip-hint">点击图片可翻回正面</p>
</div>

<!-- ───────────── 公鸡 NPC ───────────── -->
<div class="rooster-container" id="rooster-container">
  <div class="speech-bubble" id="speech-bubble">
    <span id="bubble-text"></span>
    <span class="next-arrow">▸</span>
  </div>
  <div class="rooster" id="rooster">
    <img id="rooster-img" src="images/mojingji.png" alt="公鸡"
         onerror="this.style.display='none';document.getElementById('rooster-fallback').style.display='flex';">
    <div class="rooster-fallback" id="rooster-fallback" style="display:none;">🐓</div>
  </div>
</div>

<script>
  // ═══════════════════════════════════════════
  const BACK_IMAGE  = 'images/loop.png';   // ← 换成你的背面图
  const PASSWORD    = 'loop';
  const PUZZLE_ID   = 'puzzle_5';
  const PUZZLE_INDEX = 4;          // 九宫格里的第 5 格（索引 4）
  const RETURN_URL  = 'mxhuitu.html';
  // ═══════════════════════════════════════════

  // ── 循环出现的四个词；首字母连起来 = LOOP ──
  // method: 'a1z26' | 'railfence'(可带 rails，默认 2) | 'morse' | 'pigpen'
  // 注意：解码方法【不再显示在角上】，玩家点公鸡才会得到对应提示
  const WORDS = [
    { word: 'liquid',   method: 'a1z26' },
    { word: 'original', method: 'railfence', rails: 2 },
    { word: 'orange',   method: 'morse'  },
    { word: 'packaged', method: 'pigpen'  },
  ];

  let solveIndex = 0;     // 当前在循环里的第几个（会一直 +1，不断循环）
  let solvedCount = 0;    // 累计破译数量
  let gameSolved = false;
  let gamePhase = 'intro';   // intro → playing → ending → done
  let dialogueIndex = 0;

  const dialogues = {
    intro: [
      '咯咯咯——',
      '左边是一段密文',
      '解出来的答案，会记到右边那一栏',
      '如果猜不出加密手法，可以问问我',
      '想到最终答案，就填到下面那个框里'
    ],
    wrong: '咯咯咯，不对——再想想这段该怎么解',
    ending: [
      '这是跨时代的发明',
      '基于常温超导等成果，我们终于做出了超级计算机',
      '我们叫它超脑',
      '在它的建议下，上爪也诞生了',
      '上爪，你知道的吧',
      '让它归位吧,咯咯咯——'
    ]
  };

  // 点公鸡时，针对【当前密文】给出的解法提示（替代原来角上的方法名）
  const METHOD_HINT = {
    a1z26:     '咯咯咯——这串数字是A1Z26',
    railfence: '咯咯咯——栅栏密码（2 栏）',
    morse:     '咯咯咯——摩斯电码',
    pigpen:    '咯咯咯——猪圈密码',
  };

  // 每绕回开头一次，公鸡自动嘀咕一句，逐步往“规律”上引——但始终不说破 loop
  const LOOP_NUDGE = [
    '咯咯咯……咦，怎么又转回第一个词了？',
    '解来解去，是不是一直在原地打转',
  ];

  // ── 编码工具（密文实时生成，换词也不会错）──
  function toA1Z26(w) {
    return w.toLowerCase().split('').map(c => c.charCodeAt(0) - 96).join('-');
  }
  // 栅栏密码（zigzag，rails 行；rails=2 即最常见的“隔一个取一个”）
  function toRailFence(w, rails) {
    w = w.toLowerCase();
    rails = rails || 2;
    if (rails < 2) return w;
    const rows = Array.from({ length: rails }, () => []);
    let r = 0, dir = 1;
    for (const ch of w) {
      rows[r].push(ch);
      if (r === 0) dir = 1;
      else if (r === rails - 1) dir = -1;
      r += dir;
    }
    return rows.map(a => a.join('')).join('');
  }
  const MORSE = {
    a:'.-', b:'-...', c:'-.-.', d:'-..', e:'.', f:'..-.', g:'--.', h:'....',
    i:'..', j:'.---', k:'-.-', l:'.-..', m:'--', n:'-.', o:'---', p:'.--.',
    q:'--.-', r:'.-.', s:'...', t:'-', u:'..-', v:'...-', w:'.--', x:'-..-',
    y:'-.--', z:'--..'
  };
  function toMorse(w) {
    return w.toLowerCase().split('').map(c => MORSE[c] || '').join(' ');
  }

  // 猪圈密码：把每个字母画成一个 SVG 符号（标准猪圈：ABC/DEF/GHI 无点，JKL/MNO/PQR 带点，叉号格 STUV / WXYZ）
  const PIGPEN_GRID = ['RB','LRB','LB','TRB','TRBL','TLB','TR','TLR','TL'];
  const PIGPEN_SEG  = { T:'M4 4 H20', R:'M20 4 V20', B:'M4 20 H20', L:'M4 4 V20' };
  function pigpenGlyphSVG(ch) {
    const i = ch.toLowerCase().charCodeAt(0) - 97;
    let walls = null, wedge = null, dot = false;
    if (i >= 0 && i <= 8)        { walls = PIGPEN_GRID[i]; }
    else if (i >= 9 && i <= 17)  { walls = PIGPEN_GRID[i - 9]; dot = true; }
    else if (i >= 18 && i <= 21) { wedge = ['top','left','right','bottom'][i - 18]; }
    else if (i >= 22 && i <= 25) { wedge = ['top','left','right','bottom'][i - 22]; dot = true; }
    else return '<span>' + ch + '</span>';

    let paths = '';
    if (walls) for (const w of walls) paths += '<path d="' + PIGPEN_SEG[w] + '"/>';
    if (wedge) {
      const arms = {
        top:    ['M12 12 L4 4','M12 12 L20 4'],
        bottom: ['M12 12 L4 20','M12 12 L20 20'],
        left:   ['M12 12 L4 4','M12 12 L4 20'],
        right:  ['M12 12 L20 4','M12 12 L20 20'],
      }[wedge];
      for (const d of arms) paths += '<path d="' + d + '"/>';
    }
    let dotEl = '';
    if (dot) {
      let cx = 12, cy = 12;
      if (wedge === 'top') cy = 7;
      else if (wedge === 'bottom') cy = 17;
      else if (wedge === 'left') cx = 7;
      else if (wedge === 'right') cx = 17;
      dotEl = '<circle cx="' + cx + '" cy="' + cy + '" r="1.7" fill="#e8f2ff" stroke="none"/>';
    }
    return '<svg class="pp" viewBox="0 0 24 24" fill="none" stroke="#e8f2ff" stroke-width="2" ' +
           'stroke-linecap="round" stroke-linejoin="round">' + paths + dotEl + '</svg>';
  }
  function pigpenHTML(w) {
    return '<div class="pigpen-row">' +
           w.toLowerCase().split('').map(pigpenGlyphSVG).join('') +
           '</div>';
  }

  // 返回 { cipher: 文本 } 或 { html: 图形(猪圈) }
  function encodeRound(r) {
    if (r.method === 'a1z26')     return { cipher: toA1Z26(r.word) };
    if (r.method === 'railfence') return { cipher: toRailFence(r.word, r.rails) };
    if (r.method === 'morse')     return { cipher: toMorse(r.word) };
    if (r.method === 'pigpen')    return { html: pigpenHTML(r.word) };
    return { cipher: r.word };
  }

  window.onload = () => {
    document.getElementById('back-img').src = BACK_IMAGE;

    document.getElementById('card-back').addEventListener('click', () => {
      if (gameSolved && gamePhase === 'done') flipCard();
    });

    document.getElementById('rooster').addEventListener('click', clickRooster);

    document.getElementById('decode-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkDecode();
    });
    document.getElementById('word-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkPassword();
    });

    setupBoard();

    playEnterAnimation(() => {
      setTimeout(() => { showDialogue(dialogues.intro[0]); }, 250);
    });
  };

  function setupBoard() {
    document.getElementById('quiz-question').textContent = '破译左边的密文';
    document.getElementById('quiz-round-no').textContent = '';
    setupCipher();
  }

  function setupCipher() {
    const r = WORDS[solveIndex % WORDS.length];
    const enc = encodeRound(r);
    const ct = document.getElementById('cipher-text');
    if (enc.html) ct.innerHTML = enc.html;
    else ct.textContent = enc.cipher;
    const di = document.getElementById('decode-input');
    di.value = '';
    di.classList.remove('wrong', 'ok');
  }

  function addAnswer(word) {
    const ul = document.getElementById('answer-list');
    const empty = document.getElementById('answer-empty');
    if (empty) empty.style.display = 'none';
    const li = document.createElement('li');
    li.innerHTML = '<span class="initial">' + word.charAt(0) + '</span>' + word.slice(1);
    ul.appendChild(li);
    ul.scrollTop = ul.scrollHeight;
  }

  // ── 入场展开动画（与其它 puzzle 完全一致）──
  function playEnterAnimation(onDone) {
    let originRaw = sessionStorage.getItem('puzzle_origin');
    let origin = null;
    if (originRaw) { try { origin = JSON.parse(originRaw); } catch (e) {} }

    const scene = document.getElementById('card-scene');

    if (!origin || origin.index !== PUZZLE_INDEX) {
      if (onDone) onDone();
      return;
    }

    const finalRect = scene.getBoundingClientRect();

    scene.classList.add('zooming-in');
    scene.style.left   = origin.left + 'px';
    scene.style.top    = origin.top + 'px';
    scene.style.width  = origin.width + 'px';
    scene.style.height = origin.height + 'px';

    void scene.offsetWidth;

    requestAnimationFrame(() => {
      scene.style.left   = finalRect.left + 'px';
      scene.style.top    = finalRect.top + 'px';
      scene.style.width  = finalRect.width + 'px';
      scene.style.height = finalRect.height + 'px';
    });

    setTimeout(() => {
      scene.classList.remove('zooming-in');
      scene.style.left = ''; scene.style.top = '';
      scene.style.width = ''; scene.style.height = '';
      if (onDone) onDone();
    }, 720);
  }

  // ── 公鸡说话与摆动 ──
  function showDialogue(text) {
    const bubble = document.getElementById('speech-bubble');
    const bubbleText = document.getElementById('bubble-text');
    const rooster = document.getElementById('rooster');
    bubbleText.textContent = text;
    bubble.classList.remove('show');
    void bubble.offsetWidth;
    bubble.classList.add('show');
    rooster.classList.remove('bobbing');
    void rooster.offsetWidth;
    rooster.classList.add('bobbing');
  }
  function hideDialogue() {
    document.getElementById('speech-bubble').classList.remove('show');
    document.getElementById('rooster').classList.remove('bobbing');
  }

  function clickRooster() {
    if (gamePhase === 'intro') {
      dialogueIndex++;
      if (dialogueIndex < dialogues.intro.length) {
        showDialogue(dialogues.intro[dialogueIndex]);
      } else {
        gamePhase = 'playing';
        dialogueIndex = -1;
        hideDialogue();
        document.getElementById('main-hint').textContent = '解出密文把词敲进左边；想到最终答案填到下面';
        document.getElementById('action-area').classList.add('show');  // 最终密码框：一开始就给出
        document.getElementById('decode-input').focus();
      }
    } else if (gamePhase === 'playing') {
      // 点公鸡 → 当前这段密文的解法提示
      const r = WORDS[solveIndex % WORDS.length];
      showDialogue(METHOD_HINT[r.method] || '咯咯咯，再仔细看看左边那段');
    } else if (gamePhase === 'ending') {
      dialogueIndex++;
      if (dialogueIndex < dialogues.ending.length) {
        showDialogue(dialogues.ending[dialogueIndex]);
      } else {
        hideDialogue();
        gamePhase = 'done';
        setTimeout(() => triggerFlyOut(), 450);
      }
    }
  }

  // ── 解码核对（解对就记到右边，并循环到下一段；不会自动结束）──
  function checkDecode() {
    if (gamePhase !== 'playing' || gameSolved) return;
    const di = document.getElementById('decode-input');
    const val = di.value.trim().toLowerCase();
    if (!val) { di.focus(); return; }

    const r = WORDS[solveIndex % WORDS.length];

    if (val === r.word) {
      di.classList.remove('wrong');
      di.classList.add('ok');
      addAnswer(r.word);
      solvedCount++;
      solveIndex++;

      // 又绕回开头时，公鸡自动嘀咕一句（逐步引导，但不说破 loop）
      if (solveIndex % WORDS.length === 0) {
        const idx = Math.min(solveIndex / WORDS.length - 1, LOOP_NUDGE.length - 1);
        setTimeout(() => showDialogue(LOOP_NUDGE[idx]), 750);
      }

      setTimeout(() => { setupCipher(); di.focus(); }, 350);
    } else {
      di.classList.remove('ok');
      void di.offsetWidth;
      di.classList.add('wrong');
      showDialogue(dialogues.wrong);
      setTimeout(() => di.classList.remove('wrong'), 400);
    }
  }

  function resetGame() {
    solveIndex = 0;
    solvedCount = 0;
    gameSolved = false;
    gamePhase = 'playing';
    dialogueIndex = -1;
    hideDialogue();

    document.getElementById('quiz-question').textContent = '破译左边的密文';
    document.getElementById('panel-left').style.display = '';
    document.getElementById('answer-list').classList.remove('loop-clue');
    document.getElementById('answer-list').innerHTML = '';
    const empty = document.getElementById('answer-empty');
    empty.style.display = '';

    const di = document.getElementById('decode-input');
    di.disabled = false;
    di.classList.remove('wrong', 'ok');
    document.getElementById('decode-btn').disabled = false;

    // 最终密码框：保持显示（循环关一直可作答）
    document.getElementById('action-area').classList.add('show');
    document.getElementById('main-hint').textContent = '解出密文把词敲进左边；想到最终答案填到下面';

    const input = document.getElementById('word-input');
    input.value = '';
    input.disabled = false;
    input.classList.remove('correct', 'wrong');

    const card = document.getElementById('card');
    if (card.classList.contains('flipped')) card.classList.remove('flipped');
    document.getElementById('flip-hint').classList.remove('show');

    setupCipher();
    di.focus();
  }

  function flipCard() {
    const card = document.getElementById('card');
    const nowFlipped = card.classList.toggle('flipped');
    document.getElementById('flip-hint').classList.add('show');

    if (nowFlipped) {
      document.getElementById('flip-hint').textContent = '听我说完先…';
      setTimeout(() => {
        gamePhase = 'ending';
        dialogueIndex = 0;
        showDialogue(dialogues.ending[0]);
      }, 850);
    } else {
      document.getElementById('flip-hint').textContent = '密码已解锁,再次点击图片查看';
    }
  }

  // ── 飞回九宫格（与其它 puzzle 完全一致）──
  function triggerFlyOut() {
    const scene = document.getElementById('card-scene');
    const r = scene.getBoundingClientRect();

    sessionStorage.setItem('puzzle_returning', JSON.stringify({
      index: PUZZLE_INDEX,
      from: { left: r.left, top: r.top, width: r.width, height: r.height }
    }));

    document.getElementById('page-container').classList.add('exiting');
    document.getElementById('rooster-container').classList.add('fade-out');
    document.getElementById('flip-hint').textContent = '即将返回大九宫格…';

    scene.classList.add('zooming-in');
    scene.style.left   = r.left + 'px';
    scene.style.top    = r.top + 'px';
    scene.style.width  = r.width + 'px';
    scene.style.height = r.height + 'px';
    void scene.offsetWidth;

    requestAnimationFrame(() => {
      scene.style.transition =
        'top 0.5s ease, left 0.5s ease, width 0.5s ease, height 0.5s ease, opacity 0.5s ease';
      scene.style.opacity = '0';
      scene.style.left   = (r.left + r.width * 0.15) + 'px';
      scene.style.top    = (r.top + r.height * 0.15) + 'px';
      scene.style.width  = (r.width * 0.7) + 'px';
      scene.style.height = (r.height * 0.7) + 'px';
    });

    setTimeout(() => { window.location.href = RETURN_URL; }, 550);
  }

  function checkPassword() {
    const input = document.getElementById('word-input');
    const val = input.value.trim();

    if (val.toLowerCase() === PASSWORD.toLowerCase()) {
      input.classList.remove('wrong');
      input.classList.add('correct');
      gameSolved = true;

      // 解出最终答案 → 锁住循环破译区
      document.getElementById('decode-input').disabled = true;
      document.getElementById('decode-btn').disabled = true;
      document.getElementById('answer-list').classList.add('loop-clue');  // 点亮首字母，呼应 LOOP

      const card = document.getElementById('card');
      if (!card.classList.contains('flipped')) flipCard();

      localStorage.setItem(PUZZLE_ID + '_unlocked', 'true');
      input.disabled = true;
    } else {
      input.classList.remove('correct', 'wrong');
      void input.offsetWidth;
      input.classList.add('wrong');
      input.value = '';
      setTimeout(() => input.classList.remove('wrong'), 400);
    }
  }
</script>
