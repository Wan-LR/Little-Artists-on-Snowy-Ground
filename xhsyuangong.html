<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>员工登录</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:        #faf7f2;
      --surface:   #ffffff;
      --ink:       #1a1a1a;
      --ink-soft:  #6b6b6b;
      --ink-faint: #9a9a9a;
      --line:      #ece7df;
      --line-soft: #f4f0e8;
      --accent:    #e33932;
      --accent-hover: #c2241d;
      --accent-soft: #fde8e7;
      --shadow:      0 1px 2px rgba(0,0,0,0.04), 0 8px 24px -12px rgba(0,0,0,0.08);
      --shadow-lift: 0 2px 4px rgba(0,0,0,0.06), 0 20px 40px -16px rgba(0,0,0,0.18);
      --radius:    14px;
      --font-display: 'Bricolage Grotesque', 'Noto Sans SC', system-ui, sans-serif;
      --font-body:    'Noto Sans SC', system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      line-height: 1.6;
      background-image:
        radial-gradient(circle at 12% 18%, rgba(227, 57, 50, 0.06) 0, transparent 38%),
        radial-gradient(circle at 88% 82%, rgba(227, 57, 50, 0.05) 0, transparent 42%);
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .top-logo { margin-bottom: 28px; line-height: 0; }
    .top-logo img { height: 72px; width: auto; display: block; }
    @media (max-width: 480px) {
      .top-logo img { height: 56px; }
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px 36px 32px;
    }
    @media (max-width: 480px) {
      .login-card { padding: 32px 22px 26px; }
    }

    .login-header {
      padding-bottom: 24px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--line);
    }

    .login-title {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 28px;
      letter-spacing: -0.02em;
      line-height: 1.2;
      color: var(--ink);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .login-title::before {
      content: "";
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
    }

    .login-subtitle {
      color: var(--ink-soft);
      font-size: 14px;
    }

    .form-field { margin-bottom: 18px; }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-soft);
      margin-bottom: 8px;
    }

    .input-wrap { position: relative; }

    .input-wrap > svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      color: var(--ink-faint);
      pointer-events: none;
      transition: color 0.2s;
    }

    .form-input {
      width: 100%;
      height: 46px;
      padding: 0 14px 0 42px;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 10px;
      font-family: var(--font-body);
      font-size: 14.5px;
      color: var(--ink);
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    .form-input::placeholder { color: var(--ink-faint); }
    .form-input:hover { border-color: #d6d0c4; }
    .form-input:focus {
      outline: none;
      background: var(--surface);
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    .input-wrap:focus-within > svg { color: var(--accent); }

    .toggle-pw {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      color: var(--ink-faint);
      cursor: pointer;
      display: grid;
      place-items: center;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }
    .toggle-pw:hover { color: var(--ink-soft); background: var(--line-soft); }
    .toggle-pw svg { width: 18px; height: 18px; }

    .error-msg {
      display: none;
      background: var(--accent-soft);
      color: var(--accent-hover);
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      border: 1px solid rgba(227, 57, 50, 0.2);
    }
    .error-msg.show { display: block; }

    .submit-btn {
      width: 100%;
      height: 48px;
      margin-top: 8px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 12px -4px rgba(227, 57, 50, 0.4);
    }
    .submit-btn:hover {
      background: var(--accent-hover);
      box-shadow: 0 6px 18px -4px rgba(227, 57, 50, 0.5);
    }
    .submit-btn:active { transform: translateY(1px); }
    .submit-btn:disabled {
      background: var(--ink-faint);
      cursor: not-allowed;
      box-shadow: none;
    }

    .page-footer {
      margin-top: 32px;
      font-size: 12.5px;
      color: var(--ink-faint);
      text-align: center;
    }

    /* ============================================================
       Steam 风格成就弹窗
       ============================================================ */
    .achievement-toast {
      position: fixed;
      top: 28px;
      right: 28px;
      z-index: 10000;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 22px 16px 16px;
      min-width: 340px;
      max-width: 420px;
      background: linear-gradient(135deg, #1b2838 0%, #1e3a2f 50%, #1b2838 100%);
      border: 1px solid #4a6741;
      border-radius: 4px;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.5),
        0 0 20px rgba(78, 154, 65, 0.25),
        0 8px 32px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.06);
      opacity: 0;
      transform: translateX(120%) scale(0.95);
      pointer-events: none;
      transition:
        opacity 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
        transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-family: var(--font-body);
    }

    .achievement-toast.show {
      opacity: 1;
      transform: translateX(0) scale(1);
      pointer-events: auto;
    }

    .achievement-icon {
      width: 64px;
      height: 64px;
      flex-shrink: 0;
      border-radius: 4px;
      background: linear-gradient(145deg, #2a4a3a 0%, #1a3028 100%);
      border: 2px solid #5a8a50;
      display: grid;
      place-items: center;
      box-shadow:
        0 0 12px rgba(78, 154, 65, 0.3),
        inset 0 1px 0 rgba(255,255,255,0.08);
      position: relative;
      overflow: hidden;
    }

    .achievement-icon::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.05) 50%, transparent 70%);
      animation: iconShine 3s ease-in-out infinite;
    }

    @keyframes iconShine {
      0%, 100% { opacity: 0; }
      50%       { opacity: 1; }
    }

    .achievement-icon .icon-emoji {
      font-size: 30px;
      line-height: 1;
      filter: drop-shadow(0 0 6px rgba(180, 220, 100, 0.55));
      position: relative;
      z-index: 1;
      text-shadow: 0 0 10px rgba(143, 188, 90, 0.7), 0 0 20px rgba(143, 188, 90, 0.35);
    }

    .achievement-text { flex: 1; min-width: 0; }

    .achievement-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #8fbc5a;
      margin-bottom: 3px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .achievement-label::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #8fbc5a;
      border-radius: 50%;
      box-shadow: 0 0 6px #8fbc5a;
      animation: dotPulse 2s ease-in-out infinite;
    }

    @keyframes dotPulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 6px #8fbc5a; }
      50%       { opacity: 0.6; box-shadow: 0 0 2px #8fbc5a; }
    }

    .achievement-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 17px;
      color: #e5e5e5;
      line-height: 1.2;
      margin-bottom: 3px;
      letter-spacing: -0.01em;
    }

    .achievement-desc {
      font-size: 12.5px;
      color: #8f98a0;
      line-height: 1.4;
    }

    /* 底部进度条倒计时 */
    .achievement-toast::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      height: 3px;
      width: 100%;
      background: linear-gradient(90deg, #5a8a2a, #8fbc5a, #b8e060);
      border-radius: 0 0 4px 4px;
      transform-origin: left;
      transform: scaleX(0);
    }

    .achievement-toast.show::after {
      animation: progressShrink 5s 0.5s linear forwards;
    }

    @keyframes progressShrink {
      0%   { transform: scaleX(1); }
      100% { transform: scaleX(0); }
    }

    .achievement-particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      border-radius: 4px;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #8fbc5a;
      border-radius: 50%;
      opacity: 0;
    }

    .achievement-toast.show .particle {
      animation: particleFloat 2s ease-out forwards;
    }

    @keyframes particleFloat {
      0%   { opacity: 0.8; transform: translate(0, 0) scale(1); }
      100% { opacity: 0;   transform: translate(var(--dx), var(--dy)) scale(0); }
    }

    @media (max-width: 480px) {
      .achievement-toast {
        top: 16px; right: 16px; left: 16px;
        min-width: auto; max-width: none;
      }
    }
  </style>
</head>
<body>

  <div class="page">

    <a href="xhs1.html" class="top-logo" aria-label="返回首页">
      <img src="images/tomatologo.png" alt="">
    </a>

    <div class="login-card">

      <div class="login-header">
        <h1 class="login-title">员工登录</h1>
        <p class="login-subtitle">请使用公司分配的账号登录后台</p>
      </div>

      <div class="error-msg" id="errorMsg">账号或密码不正确,请重新输入</div>

      <form id="loginForm" novalidate>

        <!-- 账号 -->
        <div class="form-field">
          <label class="form-label" for="account">账号</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="account" class="form-input"
              placeholder="请输入工号或邮箱" autocomplete="off" required>
          </div>
        </div>

        <!-- 密码 -->
        <div class="form-field">
          <label class="form-label" for="password">密码</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password" class="form-input"
              placeholder="请输入密码" autocomplete="current-password" required>
            <button type="button" class="toggle-pw" id="togglePw" aria-label="显示/隐藏密码">
              <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">登 录</button>

      </form>

    </div>

    <p class="page-footer">© 2025 西红柿好吃公司 · 仅限授权员工访问</p>

  </div>


  <!-- ============================================================
       Steam 风格成就弹窗
       ============================================================ -->
  <div class="achievement-toast" id="achievementToast" role="alert">
    <div class="achievement-particles" id="achievementParticles"></div>
    <div class="achievement-icon">
      <span class="icon-emoji" id="achievementEmoji">🔓</span>
    </div>
    <div class="achievement-text">
      <div class="achievement-label">成就已解锁</div>
      <div class="achievement-title" id="achievementTitle">有些事情没那么难</div>
      <div class="achievement-desc"  id="achievementDesc">你找到了隐藏的控制台功能</div>
    </div>
  </div>


  <script>
    /* ============================================================
       密码配置
       ────────────────────────────────────────────────────────────
       · 两个账号都能登录，密码输入时【忽略大小写和空格】，怎么打都行：
           TOMATO642 → 密码 thesims    （靠输入：直接在登录框里打）
           TOMATO845 → 密码 helloworld （靠破解：F12 控制台输命令拿到）
       · console 里 password("工号") 按工号返回密码：
           password("TOMATO642") → thesims
           password("TOMATO845") → helloworld
           其它工号 / 不带参数     → 查无此工号(不破解)
       · 破解成功后会自动跳转到 xhsit.html（登录框输入正确密码也跳同一页）
       ============================================================ */
    const REDIRECT_TO = 'xhsit.html';
    const CRACK_REDIRECT_DELAY = 2800;   // 控制台破解出密码后，停留多少毫秒再跳转

    // 登录接受的密码（已是“去空格 + 小写”后的形式）
    const VALID_PASSWORDS = ['thesims', 'helloworld'];

    // 工号 → 密码 对照表（key 用去空格小写后的工号）
    const PW_TABLE = {
      'tomato642': 'thesims',     // 靠输入：直接在登录框里打 thesims
      'tomato845': 'helloworld',  // 靠破解：F12 控制台 password("TOMATO845") 得到
    };

    // 统一归一化：去掉所有空格 + 转小写
    function normalize(s) {
      return String(s == null ? '' : s).toLowerCase().replace(/\s/g, '');
    }
    // 按工号查密码
    function lookupPassword(id) {
      return PW_TABLE[normalize(id)] || null;
    }
    // 登录校验：两个密码都行，忽略大小写和空格
    function checkPassword(input) {
      return VALID_PASSWORDS.indexOf(normalize(input)) !== -1;
    }


    /* ============================================================
       成就弹窗函数
       ============================================================ */
    function showAchievement({ emoji = '🔓', title = '成就解锁', desc = '' } = {}) {
      const toast    = document.getElementById('achievementToast');
      const emojiEl  = document.getElementById('achievementEmoji');
      const titleEl  = document.getElementById('achievementTitle');
      const descEl   = document.getElementById('achievementDesc');
      const particles= document.getElementById('achievementParticles');

      emojiEl.textContent = emoji;
      titleEl.textContent = title;
      descEl.textContent  = desc;

      /* 粒子 */
      particles.innerHTML = '';
      for (let i = 0; i < 14; i++) {
        const p = document.createElement('span');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.top  = Math.random() * 100 + '%';
        p.style.setProperty('--dx', (Math.random() - 0.5) * 90 + 'px');
        p.style.setProperty('--dy', (Math.random() - 0.5) * 90 + 'px');
        p.style.animationDelay = Math.random() * 0.5 + 's';
        particles.appendChild(p);
      }

      /* 音效 */
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const playNote = (freq, time, dur) => {
          const osc  = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0.15, time);
          gain.gain.exponentialRampToValueAtTime(0.001, time + dur);
          osc.connect(gain).connect(ctx.destination);
          osc.start(time);
          osc.stop(time + dur);
        };
        const t = ctx.currentTime;
        playNote(523, t,      0.12);
        playNote(659, t + 0.10, 0.12);
        playNote(784, t + 0.20, 0.25);
      } catch(e) { /* 静音也无妨 */ }

      /* 显示 → 5.5s 后自动消失 */
      toast.classList.remove('show');
      void toast.offsetWidth;                   /* 强制重排，让动画重置 */
      requestAnimationFrame(() => toast.classList.add('show'));
      setTimeout(() => toast.classList.remove('show'), 5500);
      localStorage.setItem('ach-console', '1');
    }


    /* ============================================================
       控制台"破解"彩蛋 — password("工号")
       ────────────────────────────────────────────────────────────
       password("TOMATO642") → 破解出 thesims    → 跳转 xhsit.html
       password("TOMATO845") → 破解出 helloworld → 跳转 xhsit.html
       其它工号 / 不带参数      → 查无此工号，不破解、不跳转
       ============================================================ */
    window.password = function(id) {
      const _delay = (ms) => new Promise(r => setTimeout(r, ms));

      const queriedId = (id == null || String(id).trim() === '') ? '未指定' : String(id).trim();
      const realPw    = lookupPassword(id);     // 按工号取对应密码

      const _run = async () => {
        const S = {
          title: 'font-size:14px;font-weight:bold;color:#e33932;',
          info:  'font-size:12px;color:#6b6b6b;',
          step:  'font-size:12px;color:#00b894;font-weight:bold;',
          warn:  'font-size:12px;color:#fdcb6e;',
          hash:  'font-size:11px;color:#636e72;font-family:monospace;',
          ok:    'font-size:13px;color:#00b894;font-weight:bold;',
          pw:    'font-size:16px;color:#e33932;font-weight:bold;background:#fde8e7;padding:4px 12px;border-radius:4px;',
        };

        console.clear();
        console.log('%c🍅 TOMATO INTERNAL — PASSWORD RECOVERY TOOL v2.4', S.title);
        console.log('%c─────────────────────────────────────────────────', S.info);
        await _delay(400);

        console.log('%c[1/6] 连接内部认证服务器...', S.step);
        await _delay(800);
        console.log('%c  ✓ 已连接 auth.tomato-internal.cn:8443', S.info);
        await _delay(400);

        console.log('%c[2/6] 查询员工档案数据库  [账号: ' + queriedId + ']...', S.step);
        await _delay(1000);

        // 查不到这个工号 → 直接失败，不破解、不跳转
        if (!realPw) {
          console.log('%c  ✗ 未找到该工号的密码记录', 'font-size:12px;color:#e33932;font-weight:bold;');
          console.log('%c  请用正确的工号重试，例如 password("TOMATO642") 或 password("TOMATO845")', S.info);
          return;
        }

        console.log('%c  ✓ 匹配到 1 条员工记录', S.info);
        await _delay(500);

        console.log('%c[3/6] 提取加密密码哈希...', S.step);
        await _delay(700);
        const fakeHash = Array.from({length: 3}, () =>
          Array.from({length: 32}, () => '0123456789abcdef'[Math.random()*16|0]).join('')
        );
        for (const h of fakeHash) {
          console.log('%c  ' + h, S.hash);
          await _delay(200);
        }
        await _delay(300);

        console.log('%c[4/6] 尝试解密 (AES-256-GCM → Base64 → plaintext)...', S.step);
        await _delay(600);

        const pwLen = realPw.length;
        const chars = 'abcdefghijklmnopqrstuvwxyz0123456789!@#$%&*';
        let display = Array(pwLen).fill('_');

        console.log('%c[5/6] 获取中...', S.step);
        await _delay(300);

        for (let i = 0; i < pwLen; i++) {
          const flickers = 2 + Math.floor(Math.random() * 3);
          for (let f = 0; f < flickers; f++) {
            display[i] = chars[Math.random() * chars.length | 0];
            console.log('%c  ⟫ ' + display.join(''), S.hash);
            await _delay(120);
          }
          display[i] = realPw[i];
          console.log('%c  ⟫ ' + display.join('') + '  ← 位置 ' + (i+1) + ' 已破解', S.warn);
          await _delay(200);
        }

        await _delay(400);
        console.log('%c[6/6] 验证完整性校验...', S.step);
        await _delay(600);
        console.log('%c  ✓ SHA-256 校验通过', S.info);
        await _delay(300);

        console.log('%c─────────────────────────────────────────────────', S.info);
        console.log('%c✅ 破解完成!', S.ok);
        console.log('%c密码: ' + realPw, S.pw);
        console.log('%c─────────────────────────────────────────────────', S.info);
        console.log('%c⚠ 本工具仅限内部调试使用,请勿外传', S.warn);

        showAchievement({
          emoji: '🔓',
          title: '密码破解成功',
          desc:  '你找到了隐藏指令'
        });

        // 破解出来 → 跳转到 xhsit.html
        await _delay(CRACK_REDIRECT_DELAY);
        console.log('%c⟫ 正在跳转至 ' + REDIRECT_TO + ' ...', S.step);
        window.location.href = REDIRECT_TO;
      };

      _run();
      return realPw
        ? '⏳ 正在破解,请查看控制台输出...'
        : '⚠ 该工号无效,请查看控制台输出';
    };


    /* ============================================================
       密码显隐切换
       ============================================================ */
    const pwInput  = document.getElementById('password');
    const togglePw = document.getElementById('togglePw');
    const eyeIcon  = document.getElementById('eyeIcon');

    const eyeOpen = `
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
      <circle cx="12" cy="12" r="3"/>`;
    const eyeClosed = `
      <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
      <line x1="1" y1="1" x2="23" y2="23"/>`;

    togglePw.addEventListener('click', () => {
      const show = pwInput.type === 'password';
      pwInput.type = show ? 'text' : 'password';
      eyeIcon.innerHTML = show ? eyeOpen : eyeClosed;
    });


    /* ============================================================
       表单提交
       ============================================================ */
    const accountInput = document.getElementById('account');
    const form         = document.getElementById('loginForm');
    const errorMsg     = document.getElementById('errorMsg');
    const submitBtn    = document.getElementById('submitBtn');

    form.addEventListener('submit', e => {
      e.preventDefault();
      errorMsg.classList.remove('show');

      const account  = accountInput.value.trim();
      const password = pwInput.value;

      if (!account || !password) {
        errorMsg.textContent = '账号和密码都要填哦';
        errorMsg.classList.add('show');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = '登录中…';

      setTimeout(() => {
        submitBtn.disabled = false;
        submitBtn.textContent = '登 录';

        if (checkPassword(password)) {
          window.location.href = REDIRECT_TO;
        } else {
          errorMsg.textContent = '账号或密码不正确,请重新输入';
          errorMsg.classList.add('show');
        }
      }, 600);
    });
  </script>
