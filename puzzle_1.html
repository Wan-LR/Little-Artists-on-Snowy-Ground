<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>苹果与篮子</title>
<style>
  @import url('https://gs.jurieo.com/gemini/fonts-googleapis/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap');

  :root {
    --bg:     #0a1628;
    --accent: #4a90d9;
    --light:  #a8ccf0;
    --white:  #e8f2ff;
    --border: #2a4a7a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Ma Shan Zheng', 'Noto Serif SC', serif;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 28% 22%, rgba(74,144,217,0.18) 0%, transparent 52%),
      radial-gradient(ellipse at 76% 80%, rgba(20,60,140,0.22) 0%, transparent 50%),
      repeating-linear-gradient(45deg, transparent, transparent 38px,
        rgba(74,144,217,0.022) 38px, rgba(74,144,217,0.022) 39px);
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
  }

  .subtitle {
    font-size: 0.72rem;
    color: rgba(168,204,240,0.45);
    letter-spacing: 0.28em;
    text-align: center;
    font-family: 'Noto Serif SC', serif;
  }

  /* ── 3D 卡片 ── */
  .card-scene {
    width: 442px;
    height: 442px;
    perspective: 1600px;
    position: relative;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.75s cubic-bezier(0.4, 0.2, 0.2, 1);
  }
  .card.flipped { transform: rotateY(180deg); }

  /* 进入时的展开动画（从九宫格的格子位置展开） */
  .card-scene.zooming-in {
    position: fixed;
    z-index: 100;
    transition:
      top 0.7s cubic-bezier(0.4, 0, 0.2, 1),
      left 0.7s cubic-bezier(0.4, 0, 0.2, 1),
      width 0.7s cubic-bezier(0.4, 0, 0.2, 1),
      height 0.7s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 4px;
    overflow: hidden;
  }

  .card-front { cursor: default; }

  .card-back {
    transform: rotateY(180deg);
    cursor: pointer;
  }
  .card-back img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }

  /* ── 游戏棋盘 ── */
  .board-wrap {
    width: 100%;
    height: 100%;
    padding: 10px;
    background: rgba(8,18,36,0.9);
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow:
      0 0 0 1px rgba(74,144,217,0.08),
      0 10px 44px rgba(0,0,0,0.65),
      0 0 60px rgba(74,144,217,0.07),
      inset 0 1px 0 rgba(74,144,217,0.13);
  }

  #game-board {
    width: 100%;
    height: 100%;
    background: #040a14;
    position: relative;
    overflow: hidden;
    border-radius: 2px;
  }

  /* 篮子样式 */
  .basket {
    position: absolute;
    width: 70px;
    height: 70px;
    background: linear-gradient(135deg, #d4a373, #a98467);
    border: 2px solid #8b5a2b;
    border-radius: 8px 8px 16px 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8rem;
    font-weight: 700;
    color: #fff;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.6);
    box-shadow: inset 0 6px 10px rgba(0,0,0,0.2), 0 4px 8px rgba(0,0,0,0.5);
  }
  .basket::after {
    content: '';
    position: absolute;
    top: 6px; left: 6px; right: 6px; bottom: 6px;
    border: 1px dashed rgba(255,255,255,0.3);
    border-radius: 4px 4px 10px 10px;
  }

  #basket-top { top: 20px; left: 50%; margin-left: -35px; }
  #basket-bottom { bottom: 20px; left: 50%; margin-left: -35px; }
  #basket-left { left: 20px; top: 50%; margin-top: -35px; }
  #basket-right { right: 20px; top: 50%; margin-top: -35px; }

  /* 苹果样式 */
  #apple {
    position: absolute;
    width: 60px;
    height: 60px;
    top: 50%; left: 50%;
    margin-top: -30px; margin-left: -30px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    cursor: pointer;
    user-select: none;
    transition: transform 0.15s ease, opacity 0.3s ease;
    z-index: 10;
  }
  #apple:hover { transform: scale(1.1); }
  #apple:active { transform: scale(0.95); }
  #apple.locked {
    cursor: not-allowed;
    opacity: 0.45;
    filter: grayscale(0.6);
  }
  #apple.locked:hover { transform: none; }
  #apple.falling {
    transition: all 0.6s cubic-bezier(0.5, 0, 0.5, 1);
    top: calc(100% - 75px);
    transform: scale(0.4) rotate(20deg);
    opacity: 0;
  }

  #success-msg {
    display: none;
    position: absolute;
    inset: 0;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    color: var(--light);
    letter-spacing: 0.2em;
    animation: fadeInUp 0.6s ease forwards;
  }

  /* ── 底部交互区 ── */
  .action-area {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .action-area.show { display: flex; animation: fadeInUp 0.4s ease; }

  .word-input-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-row {
    display: flex;
    gap: 16px;
  }

  .btn-replay, .btn-submit {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    padding: 7px 18px;
    border: 1px solid var(--border);
    background: rgba(8,18,36,0.8);
    color: var(--light);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.25s ease;
  }
  .btn-replay:hover, .btn-submit:hover {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(74,144,217,0.2);
  }
  .btn-submit {
    background: rgba(74,144,217,0.2);
    border-color: var(--accent);
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .word-input {
    font-family: 'Noto Serif SC', serif;
    font-size: 1rem;
    letter-spacing: 0.12em;
    padding: 8px 16px;
    border: 1px solid var(--border);
    background: rgba(8,18,36,0.8);
    color: var(--white);
    border-radius: 3px;
    width: 180px;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
    text-align: center;
  }
  .word-input::placeholder {
    color: rgba(168,204,240,0.3);
    font-size: 0.82rem;
    letter-spacing: 0.1em;
  }
  .word-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(74,144,217,0.2);
  }
  .word-input.correct {
    border-color: #4ad980;
    box-shadow: 0 0 0 2px rgba(74,217,128,0.25);
  }
  .word-input.wrong {
    border-color: #d94a4a;
    box-shadow: 0 0 0 2px rgba(217,74,74,0.25);
    animation: shake 0.35s ease;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-6px); }
    75%      { transform: translateX(6px); }
  }

  .hint {
    font-size: 0.66rem;
    color: rgba(168,204,240,0.28);
    letter-spacing: 0.1em;
    text-align: center;
    font-family: 'Noto Serif SC', serif;
    transition: opacity 0.3s;
  }

  #flip-hint {
    font-size: 0.66rem;
    color: rgba(168,204,240,0.35);
    letter-spacing: 0.15em;
    text-align: center;
    font-family: 'Noto Serif SC', serif;
    opacity: 0;
    transition: opacity 0.5s ease;
    height: 1em;
  }
  #flip-hint.show { opacity: 1; }

  /* 退场时把外围 UI 淡出 */
  .container.exiting .subtitle,
  .container.exiting .action-area,
  .container.exiting .hint,
  .container.exiting #flip-hint {
    transition: opacity 0.35s ease;
    opacity: 0;
  }

  /* ───────────── 公鸡 NPC ───────────── */
  .rooster-container {
    position: fixed;
    right: 36px;
    bottom: 28px;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 14px;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .rooster-container.fade-out {
    opacity: 0;
    pointer-events: none;
  }

  .speech-bubble {
    position: relative;
    background: linear-gradient(135deg, rgba(244, 233, 210, 0.97), rgba(220, 207, 178, 0.95));
    color: #2a1a0a;
    /* 左右内边距对称，右下给箭头留出空间 → 文字居中显示 */
    padding: 14px 18px 22px 18px;
    border-radius: 4px;
    font-family: 'Noto Serif SC', serif;
    font-size: 0.86rem;
    font-weight: 500;
    line-height: 1.6;
    letter-spacing: 0.04em;
    max-width: 280px;
    min-width: 180px;
    box-shadow:
      0 6px 24px rgba(0,0,0,0.55),
      0 0 0 1px rgba(139, 90, 43, 0.5),
      inset 0 1px 0 rgba(255, 255, 255, 0.5);
    opacity: 0;
    transform: translateY(8px) scale(0.96);
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
    margin-right: 40px;
    will-change: transform, opacity;
  }

  .speech-bubble.show {
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  .speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -10px;
    right: 32px;
    width: 0;
    height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 10px solid rgba(228, 215, 186, 0.96);
    filter: drop-shadow(0 2px 1px rgba(139, 90, 43, 0.4));
  }

  .speech-bubble::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px dashed rgba(139, 90, 43, 0.35);
    border-radius: 2px;
    pointer-events: none;
  }

  .next-arrow {
    position: absolute;
    right: 12px;
    bottom: 4px;
    font-size: 0.85rem;
    color: #8b5a2b;
    animation: arrow-blink 1.2s ease-in-out infinite;
  }

  @keyframes arrow-blink {
    0%, 100% { opacity: 0.25; transform: translateX(0); }
    50%      { opacity: 1;    transform: translateX(3px); }
  }

  .rooster {
    width: 260px;
    height: 260px;
    cursor: pointer;
    user-select: none;
    pointer-events: auto;
    position: relative;
    filter: drop-shadow(0 10px 18px rgba(0,0,0,0.6));
    transition: filter 0.3s ease;
  }

  .rooster.bobbing {
    animation: rooster-bob 0.8s ease-in-out 5;
  }

  @keyframes rooster-bob {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    25%      { transform: translateY(-9px) rotate(-2.5deg); }
    50%      { transform: translateY(0) rotate(0deg); }
    75%      { transform: translateY(-9px) rotate(2.5deg); }
  }

  .rooster:hover {
    filter: drop-shadow(0 10px 20px rgba(74,144,217,0.5))
            drop-shadow(0 8px 14px rgba(0,0,0,0.55));
  }

  .rooster img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    -webkit-user-drag: none;
    pointer-events: none;
  }

  .rooster-fallback {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 8rem;
    line-height: 1;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="container" id="page-container">
  <p class="subtitle">互动收集 · 还原密码</p>

  <div class="card-scene" id="card-scene">
    <div class="card" id="card">
      <div class="card-face card-front" id="card-front">
        <div class="board-wrap">
          <div id="game-board">
            <div id="basket-top" class="basket"></div>
            <div id="basket-left" class="basket"></div>
            <div id="basket-right" class="basket"></div>
            <div id="basket-bottom" class="basket"></div>
            <div id="apple">🍎</div>
            <div id="success-msg">所有苹果收集完毕</div>
          </div>
        </div>
      </div>
      <div class="card-face card-back" id="card-back">
        <img id="back-img" src="images/gongyegeming.png" alt="背面">
      </div>
    </div>
  </div>

  <div class="action-area" id="action-area">
    <div class="word-input-wrap">
      <input class="word-input" id="word-input" type="text"
             placeholder="输入密码…" autocomplete="off" spellcheck="false">
    </div>
    <div class="btn-row">
      <button class="btn-replay" id="btn-replay" onclick="resetGame()">↻ 重新掉落</button>
      <button class="btn-submit" id="btn-submit" onclick="checkPassword()">确 认</button>
    </div>
  </div>

  <p class="hint" id="main-hint"></p>
  <p id="flip-hint">点击图片可翻回正面</p>
</div>

<!-- ───────────── 公鸡 NPC ───────────── -->
<div class="rooster-container" id="rooster-container">
  <div class="speech-bubble" id="speech-bubble">
    <span id="bubble-text"></span>
    <span class="next-arrow">▸</span>
  </div>
  <div class="rooster" id="rooster">
    <img id="rooster-img" src="images/mojingji.png" alt="公鸡"
         onerror="this.style.display='none';document.getElementById('rooster-fallback').style.display='flex';">
    <div class="rooster-fallback" id="rooster-fallback" style="display:none;">🐓</div>
  </div>
</div>

<script>
  // ═══════════════════════════════════════════
  const BACK_IMAGE  = 'images/gongyegeming.png';
  const PASSWORD    = 'ceres';
  const PUZZLE_ID   = 'puzzle_1';
  const PUZZLE_INDEX = 0;          // 这是九宫格里的第 1 格（索引 0）
  const RETURN_URL  = 'mxhuitu.html';
  // ═══════════════════════════════════════════

  const targetWord = ['c', 'e', 'r', 'e', 's'];
  let currentRound = 0;
  let isAnimating = false;
  let gameSolved = false;

  let gamePhase = 'intro';
  let dialogueIndex = 0;

  const dialogues = {
    intro: [
      '咯咯咯——欢迎了解我们的过去',
      '抱歉自说自话就把你带到了这里，也没有空回答你什么你怎么知道我是谁你怎么知道我的存在你怎么发现我的你怎么不惊讶我是外星人你怎么真的长成这样之类的话',
      '这其实是给我们内部实习生培训用的，但是因为不想再做第二个PPT所以就拿来用了',
      '总之你得解开一些简单的题目来了解',
      '这是第一题，很简单吧？',
      '我记得地球也有球心引力吧？'
    ],
    playing: [
      '咯咯咯,记性不好可以再来一次',
      '是有顺序的哟',
      '第一题其实不需要提示吧'

    ],
    ending: [
      '科学，很奇妙吧。',
      '苹果会落到下方的篮子里，就像太阳永远会在第二天升起',
      '一切的结果终究有一个可以探索的原因',
      '五百多年前的我们也是这么想的',
      '那时我们中的一部分人深陷其中，并有了一些切实的发现与应用，工业机器就这么诞生了',
      '噢其实我们是用不到珍妮机的，但为了让你理解还是画上去了',
      '那时的我们还是选择了美好人世间的',
      '让它归位吧,咯咯咯——'
    ]
  };

  window.onload = () => {
    document.getElementById('back-img').src = BACK_IMAGE;

    document.getElementById('apple').addEventListener('click', dropApple);

    document.getElementById('card-back').addEventListener('click', () => {
      if (gameSolved && gamePhase === 'done') flipCard();
    });

    document.getElementById('rooster').addEventListener('click', clickRooster);

    document.getElementById('word-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkPassword();
    });

    document.getElementById('apple').classList.add('locked');

    setupRound();

    // 入场展开动画
    playEnterAnimation(() => {
      // 展开完成后再让公鸡开口
      setTimeout(() => {
        showDialogue(dialogues.intro[0]);
      }, 250);
    });
  };

  // ── 入场展开动画：从九宫格那个格子的位置展开到中央 ──
  function playEnterAnimation(onDone) {
    let originRaw = sessionStorage.getItem('puzzle_origin');
    let origin = null;
    if (originRaw) {
      try { origin = JSON.parse(originRaw); } catch (e) {}
    }

    const scene = document.getElementById('card-scene');

    // 没有起点信息（比如直接打开本页）→ 跳过动画
    if (!origin || origin.index !== PUZZLE_INDEX) {
      if (onDone) onDone();
      return;
    }

    // 记下最终位置（正常布局下的位置）
    const finalRect = scene.getBoundingClientRect();

    // 切换为 fixed 定位，从原格子位置开始
    scene.classList.add('zooming-in');
    scene.style.left   = origin.left + 'px';
    scene.style.top    = origin.top + 'px';
    scene.style.width  = origin.width + 'px';
    scene.style.height = origin.height + 'px';

    // 强制 reflow
    void scene.offsetWidth;

    // 触发到最终位置
    requestAnimationFrame(() => {
      scene.style.left   = finalRect.left + 'px';
      scene.style.top    = finalRect.top + 'px';
      scene.style.width  = finalRect.width + 'px';
      scene.style.height = finalRect.height + 'px';
    });

    // 动画结束后还原为正常布局
    setTimeout(() => {
      scene.classList.remove('zooming-in');
      scene.style.left = '';
      scene.style.top = '';
      scene.style.width = '';
      scene.style.height = '';
      if (onDone) onDone();
    }, 720);
  }

  // ── 公鸡说话与摆动 ──────────────────────────────
  function showDialogue(text) {
    const bubble = document.getElementById('speech-bubble');
    const bubbleText = document.getElementById('bubble-text');
    const rooster = document.getElementById('rooster');

    bubbleText.textContent = text;
    bubble.classList.remove('show');
    void bubble.offsetWidth;
    bubble.classList.add('show');

    rooster.classList.remove('bobbing');
    void rooster.offsetWidth;
    rooster.classList.add('bobbing');
  }

  function hideDialogue() {
    const bubble = document.getElementById('speech-bubble');
    const rooster = document.getElementById('rooster');
    bubble.classList.remove('show');
    rooster.classList.remove('bobbing');
  }

  function clickRooster() {
    if (gamePhase === 'intro') {
      dialogueIndex++;
      if (dialogueIndex < dialogues.intro.length) {
        showDialogue(dialogues.intro[dialogueIndex]);
      } else {
        gamePhase = 'playing';
        dialogueIndex = -1;
        hideDialogue();
        document.getElementById('apple').classList.remove('locked');
        document.getElementById('main-hint').textContent = '点击苹果 它会落入哪个袋子';
      }
    } else if (gamePhase === 'playing') {
      dialogueIndex = (dialogueIndex + 1) % dialogues.playing.length;
      showDialogue(dialogues.playing[dialogueIndex]);
    } else if (gamePhase === 'ending') {
      dialogueIndex++;
      if (dialogueIndex < dialogues.ending.length) {
        showDialogue(dialogues.ending[dialogueIndex]);
      } else {
        hideDialogue();
        gamePhase = 'done';
        setTimeout(() => triggerFlyOut(), 450);
      }
    }
  }

  // ── 游戏核心逻辑 ──────────────────────────────────────────────
  function getRandomLetter(excludeArr) {
    const chars = 'abcdefghijklmnopqrstuvwxyz'.split('');
    const validChars = chars.filter(c => !excludeArr.includes(c));
    return validChars[Math.floor(Math.random() * validChars.length)];
  }

  function setupRound() {
    if (currentRound >= 5) {
      onGameComplete();
      return;
    }

    const currentTarget = targetWord[currentRound];
    document.getElementById('basket-bottom').textContent = currentTarget.toUpperCase();

    const topLetter = getRandomLetter([currentTarget]);
    const leftLetter = getRandomLetter([currentTarget, topLetter]);
    const rightLetter = getRandomLetter([currentTarget, topLetter, leftLetter]);

    document.getElementById('basket-top').textContent = topLetter.toUpperCase();
    document.getElementById('basket-left').textContent = leftLetter.toUpperCase();
    document.getElementById('basket-right').textContent = rightLetter.toUpperCase();

    const apple = document.getElementById('apple');
    apple.classList.remove('falling');
    isAnimating = false;
  }

  function dropApple() {
    if (gamePhase === 'intro') {
      const rooster = document.getElementById('rooster');
      rooster.classList.remove('bobbing');
      void rooster.offsetWidth;
      rooster.classList.add('bobbing');
      const bubble = document.getElementById('speech-bubble');
      if (!bubble.classList.contains('show')) {
        showDialogue(dialogues.intro[dialogueIndex] || dialogues.intro[0]);
      }
      return;
    }
    if (isAnimating || currentRound >= 5) return;

    isAnimating = true;
    const apple = document.getElementById('apple');
    apple.classList.add('falling');

    setTimeout(() => {
      currentRound++;
      setupRound();
    }, 600);
  }

  function onGameComplete() {
    gameSolved = true;

    document.querySelectorAll('.basket').forEach(el => el.style.display = 'none');
    document.getElementById('apple').style.display = 'none';
    document.getElementById('success-msg').style.display = 'flex';

    document.getElementById('action-area').classList.add('show');
    document.getElementById('main-hint').style.opacity = '0';

    setTimeout(() => {
      document.getElementById('word-input').focus();
    }, 400);
  }

  function resetGame() {
    currentRound = 0;
    gameSolved = false;

    if (gamePhase === 'ending' || gamePhase === 'done') {
      gamePhase = 'playing';
      dialogueIndex = -1;
      hideDialogue();
    }

    document.querySelectorAll('.basket').forEach(el => el.style.display = '');
    document.getElementById('apple').style.display = '';
    document.getElementById('apple').classList.remove('locked');
    document.getElementById('success-msg').style.display = 'none';

    document.getElementById('action-area').classList.remove('show');
    document.getElementById('main-hint').style.opacity = '';
    document.getElementById('main-hint').textContent = '点击苹果 它会落入哪个袋子';

    const input = document.getElementById('word-input');
    input.value = '';
    input.disabled = false;
    input.classList.remove('correct', 'wrong');

    const card = document.getElementById('card');
    if (card.classList.contains('flipped')) {
      card.classList.remove('flipped');
    }
    document.getElementById('flip-hint').classList.remove('show');

    setupRound();
  }

  function flipCard() {
    const card = document.getElementById('card');
    const nowFlipped = card.classList.toggle('flipped');
    document.getElementById('flip-hint').classList.add('show');

    if (nowFlipped) {
      document.getElementById('flip-hint').textContent = '听我说完先…';

      setTimeout(() => {
        gamePhase = 'ending';
        dialogueIndex = 0;
        showDialogue(dialogues.ending[0]);
      }, 850);
    } else {
      document.getElementById('flip-hint').textContent = '密码已解锁,再次点击图片查看';
    }
  }

  // ── 真正触发并入九宫格的动画 ─────────────────────────────────
  // 改为：记下当前卡片的屏幕位置，写入 sessionStorage，让九宫格页接力图片飞回
  function triggerFlyOut() {
    const scene = document.getElementById('card-scene');
    const r = scene.getBoundingClientRect();

    sessionStorage.setItem('puzzle_returning', JSON.stringify({
      index: PUZZLE_INDEX,
      from: {
        left:  r.left,
        top:   r.top,
        width: r.width,
        height: r.height
      }
    }));

    // 当前页同步淡出外围 UI、公鸡，卡片整体微微缩小淡出，制造"被接走"的感觉
    document.getElementById('page-container').classList.add('exiting');
    document.getElementById('rooster-container').classList.add('fade-out');
    document.getElementById('flip-hint').textContent = '即将返回大九宫格…';

    // 把卡片转为 fixed 并轻微缩小淡出，避免跳变
    scene.classList.add('zooming-in');
    scene.style.left   = r.left + 'px';
    scene.style.top    = r.top + 'px';
    scene.style.width  = r.width + 'px';
    scene.style.height = r.height + 'px';
    void scene.offsetWidth;

    requestAnimationFrame(() => {
      scene.style.transition =
        'top 0.5s ease, left 0.5s ease, width 0.5s ease, height 0.5s ease, opacity 0.5s ease';
      scene.style.opacity = '0';
      // 朝中心轻微收一点
      scene.style.left   = (r.left + r.width * 0.15) + 'px';
      scene.style.top    = (r.top + r.height * 0.15) + 'px';
      scene.style.width  = (r.width * 0.7) + 'px';
      scene.style.height = (r.height * 0.7) + 'px';
    });

    setTimeout(() => {
      window.location.href = RETURN_URL;
    }, 550);
  }

  function checkPassword() {
    const input = document.getElementById('word-input');
    const val = input.value.trim();

    if (val.toLowerCase() === PASSWORD.toLowerCase()) {
      input.classList.remove('wrong');
      input.classList.add('correct');

      const card = document.getElementById('card');
      if (!card.classList.contains('flipped')) {
        flipCard();
      }

      localStorage.setItem(PUZZLE_ID + '_unlocked', 'true');
      input.disabled = true;

    } else {
      input.classList.remove('correct', 'wrong');
      void input.offsetWidth;
      input.classList.add('wrong');
      input.value = '';
      setTimeout(() => input.classList.remove('wrong'), 400);
    }
  }
</script>
