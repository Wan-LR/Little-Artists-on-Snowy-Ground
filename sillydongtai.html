<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>周末观影团 · @景明 · Silly Silly</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:        #fff7f9;
      --surface:   #ffffff;
      --pink:      #ec4899;
      --pink-deep: #d63384;
      --pink-soft: #fce7f1;
      --pink-line: #f5d8e2;
      --pink-bg:   #fde8f0;
      --ink:       #2a1a25;
      --ink-soft:  #876e7a;
      --ink-faint: #b89eaa;
      --shadow:    0 1px 3px rgba(236,72,153,0.04), 0 8px 24px -10px rgba(236,72,153,0.10);
      --shadow-lift: 0 4px 12px rgba(236,72,153,0.12), 0 20px 40px -16px rgba(236,72,153,0.20);
      --radius:    12px;
      --font-display: 'Fredoka', 'Noto Sans SC', system-ui, sans-serif;
      --font-body:    'Noto Sans SC', 'Fredoka', system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ===== Header ===== */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--pink-line);
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .logo {
      display: block; flex-shrink: 0;
      line-height: 0; text-decoration: none;
    }
    .logo img { height: 150px; width: auto; display: block; }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      color: var(--ink-soft);
      text-decoration: none;
      background: var(--pink-soft);
      border-radius: 999px;
      font-size: 13.5px;
      font-weight: 500;
      transition: all 0.18s;
    }
    .back-link:hover {
      color: var(--pink);
      transform: translateX(-2px);
    }

    @media (max-width: 720px) {
      header { padding: 12px 16px; gap: 12px; }
      .logo img { height: 40px; }
      .back-link { padding: 7px 12px; font-size: 13px; }
    }

    /* ===== Main ===== */
    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 36px 24px 80px;
    }

    /* ===== Author Card ===== */
    .author-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      background: var(--surface);
      border: 1px solid var(--pink-line);
      border-radius: 16px;
      margin-bottom: 24px;
      box-shadow: var(--shadow);
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
    }
    .author-card.locked {
      background: linear-gradient(135deg, var(--pink-soft) 0%, #fff7f9 100%);
      border-color: var(--pink);
    }

    .avatar-btn {
      width: 50px; height: 50px;
      border-radius: 50%;
      border: 2px solid var(--pink-line);
      padding: 0;
      background: var(--pink-bg);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      transition: all 0.25s;
    }
    .avatar-btn:hover {
      transform: scale(1.05);
      border-color: var(--pink);
    }
    .avatar-btn img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .author-card.locked .avatar-btn {
      cursor: default;
      pointer-events: none;
      border-color: var(--pink);
    }

    .lock-overlay {
      position: absolute;
      inset: 0;
      background: rgba(236, 72, 153, 0.82);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .lock-overlay svg {
      width: 22px; height: 22px;
      stroke: white;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .author-card.locked .lock-overlay { opacity: 1; }

    .author-info {
      flex: 1;
      min-width: 0;
    }
    .name-btn {
      background: none;
      border: none;
      padding: 0;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      color: var(--ink);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      transition: color 0.18s;
    }
    .name-btn:hover { color: var(--pink); }
    .author-card.locked .name-btn {
      color: var(--ink-faint);
      cursor: default;
      pointer-events: none;
      text-decoration: line-through;
      text-decoration-color: var(--pink);
      text-decoration-thickness: 1.5px;
    }

    /* ★★ 新增:特别关注小标签 ★★ */
    .special-tag {
      display: inline-block;
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: white;
      background: linear-gradient(135deg, #ec4899 0%, #f472b6 100%);
      padding: 2px 8px;
      border-radius: 999px;
      text-decoration: none !important;
      box-shadow: 0 2px 6px rgba(236,72,153,0.3);
      vertical-align: middle;
    }
    .author-card.locked .special-tag {
      opacity: 0.5;
    }

    .lock-tag {
      display: none;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--pink);
      background: white;
      padding: 2px 7px;
      border-radius: 999px;
      border: 1px solid var(--pink);
      margin-left: 4px;
      text-decoration: none !important;
    }
    .author-card.locked .lock-tag { display: inline-block; }

    .meta-line {
      font-size: 12.5px;
      color: var(--ink-soft);
      margin-top: 4px;
    }
    .meta-line .dot { margin: 0 5px; color: var(--ink-faint); }

    /* 解锁按钮 */
    .unlock-btn {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 16px;
      background: var(--pink);
      color: white;
      border: none;
      border-radius: 999px;
      font-family: inherit;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      opacity: 0;
      transform: translateX(20px) scale(0.85);
      pointer-events: none;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      white-space: nowrap;
    }
    .author-card.locked .unlock-btn {
      opacity: 1;
      transform: translateX(0) scale(1);
      pointer-events: auto;
    }
    .unlock-btn:hover {
      background: var(--pink-deep);
      transform: translateY(-1px);
    }
    .unlock-btn svg {
      width: 14px; height: 14px;
      stroke: white;
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .unlock-btn.done {
      background: #16a34a;
      pointer-events: none;
    }

    /* ===== Caption ===== */
    .caption {
      font-size: 16.5px;
      line-height: 1.75;
      color: var(--ink);
      margin-bottom: 22px;
      padding: 0 4px;
    }

    /* ===== Image Grid (两张图) ===== */
    .image-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 24px;
    }
    @media (max-width: 600px) {
      .image-grid { grid-template-columns: 1fr; gap: 12px; }
    }

    .img-wrap {
      aspect-ratio: 1 / 1;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--pink-bg);
      box-shadow: var(--shadow);
      cursor: zoom-in;
      transition: all 0.25s;
    }
    .img-wrap:hover {
      box-shadow: var(--shadow-lift);
      transform: translateY(-2px);
    }
    .img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    .img-wrap:hover img { transform: scale(1.04); }

    /* ===== Action Bar ===== */
    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 16px 4px;
      border-top: 1px solid var(--pink-line);
      border-bottom: 1px solid var(--pink-line);
      margin-bottom: 28px;
    }
    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 14px;
      background: transparent;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: var(--ink-soft);
      transition: all 0.18s;
    }
    .action-btn:hover {
      background: var(--pink-soft);
      color: var(--pink);
    }
    .action-btn.liked {
      background: var(--pink-soft);
      color: var(--pink);
    }
    .action-btn.liked svg { fill: var(--pink); stroke: var(--pink); }
    .action-btn svg {
      width: 18px; height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .action-btn.liked svg {
      animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.35); }
      100% { transform: scale(1); }
    }
    .action-btn .share-only { margin-left: auto; }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translate(-50%, -150%);
      background: var(--ink);
      color: white;
      padding: 12px 22px;
      border-radius: 999px;
      font-size: 13.5px;
      font-weight: 500;
      z-index: 100;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 10px 40px rgba(42,26,37,0.3);
      pointer-events: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .toast.show { transform: translate(-50%, 0); }
    .toast .pink-dot {
      width: 7px; height: 7px;
      background: var(--pink);
      border-radius: 50%;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%      { opacity: 0.45; }
    }

    /* ============================================================
       ★★ 新增:密码弹窗 ★★
       ============================================================ */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(42, 26, 37, 0.55);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      padding: 20px;
    }
    .modal-backdrop.show {
      opacity: 1;
      pointer-events: auto;
    }
    .modal {
      background: var(--surface);
      border-radius: 20px;
      padding: 32px 28px 24px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 20px 60px rgba(236,72,153,0.25);
      transform: scale(0.85) translateY(10px);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      text-align: center;
    }
    .modal-backdrop.show .modal {
      transform: scale(1) translateY(0);
    }
    .modal-close {
      position: absolute;
      top: 12px; right: 14px;
      width: 30px; height: 30px;
      border: none;
      background: transparent;
      color: var(--ink-faint);
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      border-radius: 50%;
      transition: all 0.18s;
    }
    .modal-close:hover {
      background: var(--pink-soft);
      color: var(--pink);
    }
    .modal-icon {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--pink-soft) 0%, var(--pink-bg) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
    }
    .modal-icon svg {
      width: 26px; height: 26px;
      stroke: var(--pink);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .modal-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 8px;
    }
    .modal-hint {
      font-size: 13px;
      color: var(--ink-soft);
      background: var(--pink-soft);
      padding: 10px 14px;
      border-radius: 10px;
      margin-bottom: 18px;
      line-height: 1.5;
    }
    .modal-input {
      width: 100%;
      padding: 12px 16px;
      font-family: inherit;
      font-size: 15px;
      border: 1.5px solid var(--pink-line);
      border-radius: 10px;
      background: var(--bg);
      color: var(--ink);
      outline: none;
      transition: all 0.2s;
      text-align: center;
      letter-spacing: 0.05em;
    }
    .modal-input:focus {
      border-color: var(--pink);
      background: white;
      box-shadow: 0 0 0 3px rgba(236,72,153,0.12);
    }
    .modal-input.shake {
      animation: shake 0.45s;
      border-color: #e11d48;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }
    .modal-error {
      font-size: 12.5px;
      color: #e11d48;
      margin-top: 8px;
      height: 16px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .modal-error.show { opacity: 1; }
    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .modal-btn {
      flex: 1;
      padding: 11px 16px;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
    }
    .modal-btn.cancel {
      background: var(--pink-soft);
      color: var(--ink-soft);
    }
    .modal-btn.cancel:hover {
      background: var(--pink-line);
      color: var(--ink);
    }
    .modal-btn.confirm {
      background: var(--pink);
      color: white;
    }
    .modal-btn.confirm:hover {
      background: var(--pink-deep);
    }

    /* ============================================================
       ★★ 新增:图片放大查看(Lightbox) ★★
       ============================================================ */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(20, 10, 16, 0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
      cursor: zoom-out;
      padding: 20px;
    }
    .lightbox.show {
      opacity: 1;
      pointer-events: auto;
    }
    .lightbox img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      transform: scale(0.92);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .lightbox.show img { transform: scale(1); }
    .lightbox-close {
      position: absolute;
      top: 20px; right: 20px;
      width: 40px; height: 40px;
      border: none;
      background: rgba(255,255,255,0.15);
      color: white;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
      border-radius: 50%;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: all 0.18s;
    }
    .lightbox-close:hover {
      background: rgba(255,255,255,0.28);
      transform: scale(1.08);
    }
  </style>
</head>
<body>

  <!-- 锁定提示 toast -->
  <div class="toast" id="toast">
    <span class="pink-dot"></span>
    <span>该用户主页已锁定</span>
  </div>

  <header>
    <a class="logo" href="sillysilly.html">
      <img src="images/sillylogo.png" alt="Silly Silly">
    </a>
    <a class="back-link" href="sillysilly.html">← 返回推荐</a>
  </header>

  <main>

    <!-- ============ 作者卡片(可锁定) ============ -->
    <div class="author-card" id="authorCard">

      <button class="avatar-btn" id="avatarBtn" type="button" aria-label="景明的头像">
        <img src="https://picsum.photos/seed/jingming-avatar/120/120" alt="">
        <div class="lock-overlay">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
      </button>

      <div class="author-info">
        <button class="name-btn" id="nameBtn" type="button">
          @景明
          <span class="special-tag">特别关注</span>
          <span class="lock-tag">LOCKED</span>
        </button>
        <div class="meta-line">
          3 年前 
        </div>
      </div>

      <button class="unlock-btn" id="unlockBtn" type="button">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 9.9-1"/>
        </svg>
        <span class="unlock-text">解锁查看主页</span>
      </button>

    </div>

    <!-- ============ 文字内容 ============ -->
    <p class="caption">
      氨基酸密码子 对应记录
    </p>

    <!-- ============ 两张图 ============ -->
    <div class="image-grid">
      <div class="img-wrap">
        <img src="images/ajs.png" alt="氨基酸图1">
      </div>
      <div class="img-wrap">
        <img src="images/ajstable.png" alt="氨基酸图2">
      </div>
    </div>

    <!-- ============ 操作栏 ============ -->
    <div class="actions">
      <button class="action-btn" id="likeBtn">
        <svg viewBox="0 0 24 24"><path d="M12 21s-7-4.35-7-10a4 4 0 0 1 7-2.65A4 4 0 0 1 19 11c0 5.65-7 10-7 10z"/></svg>
        <span class="count" id="likeCount">124</span>
      </button>
      <button class="action-btn">
        <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        <span>18</span>
      </button>
      <button class="action-btn share-only">
        <svg viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>
        分享
      </button>
    </div>

  </main>

  <!-- ============ ★ 密码弹窗 ★ ============ -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal">
      <button class="modal-close" id="modalClose" aria-label="关闭">×</button>
      <div class="modal-icon">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 9.9-1"/>
        </svg>
      </div>
      <h2 class="modal-title">输入密码解锁主页</h2>
      <p class="modal-hint">💡 提示:GGA GCG UUA CUA GCC UCC(6 个大写字母)</p>
      <input type="text" class="modal-input" id="pwdInput" placeholder="请输入密码" autocomplete="off" maxlength="20">
      <div class="modal-error" id="pwdError">密码不正确,再想想~</div>
      <div class="modal-actions">
        <button class="modal-btn cancel" id="modalCancel">取消</button>
        <button class="modal-btn confirm" id="modalConfirm">确认解锁</button>
      </div>
    </div>
  </div>

  <!-- ============ ★ 图片放大查看 ★ ============ -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose" aria-label="关闭">×</button>
    <img id="lightboxImg" src="" alt="">
  </div>

  <script>
    /* ============================================================
       锁定 / 解锁 流程
       ────────────────────────────────────────────────────────────
       1. 点 头像 或 名字     → 卡片进入"已锁定"状态
       2. 弹出"解锁查看主页"按钮 + 顶部 toast 提示一次
       3. 点 解锁按钮         → 弹出密码弹窗 → 输入正确密码 → 跳转
       ============================================================ */
    const card       = document.getElementById('authorCard');
    const avatarBtn  = document.getElementById('avatarBtn');
    const nameBtn    = document.getElementById('nameBtn');
    const unlockBtn  = document.getElementById('unlockBtn');
    const unlockText = unlockBtn.querySelector('.unlock-text');
    const toast      = document.getElementById('toast');

    let toastTimer;
    function flashToast() {
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
    }

    function lock() {
      if (card.classList.contains('locked')) return;
      card.classList.add('locked');
      flashToast();
    }

    avatarBtn.addEventListener('click', lock);
    nameBtn.addEventListener('click', lock);

    /* ============================================================
       ★ 密码弹窗逻辑 ★
       ────────────────────────────────────────────────────────────
       • 想改密码:把下面 CORRECT_PASSWORD 的值改掉就行
       • 想改提示文案:改 HTML 里 .modal-hint 的内容
       ============================================================ */
    const CORRECT_PASSWORD = 'GALLAS';     // ← 在这里改密码

    const modalBackdrop = document.getElementById('modalBackdrop');
    const modalClose    = document.getElementById('modalClose');
    const modalCancel   = document.getElementById('modalCancel');
    const modalConfirm  = document.getElementById('modalConfirm');
    const pwdInput      = document.getElementById('pwdInput');
    const pwdError      = document.getElementById('pwdError');

    function openModal() {
      modalBackdrop.classList.add('show');
      pwdInput.value = '';
      pwdError.classList.remove('show');
      pwdInput.classList.remove('shake');
      setTimeout(() => pwdInput.focus(), 250);
    }
    function closeModal() {
      modalBackdrop.classList.remove('show');
    }

    function tryUnlock() {
      const val = pwdInput.value.trim().toUpperCase();
      if (val === CORRECT_PASSWORD.toUpperCase()) {
        // 密码正确
        modalConfirm.textContent = '解锁中...';
        modalConfirm.style.background = '#16a34a';
        unlockBtn.classList.add('done');
        unlockText.textContent = '已解锁 ✓';
        setTimeout(() => {
          window.location.href = 'shjm.html';
        }, 700);
      } else {
        // 密码错误
        pwdError.classList.add('show');
        pwdInput.classList.add('shake');
        setTimeout(() => pwdInput.classList.remove('shake'), 500);
        pwdInput.select();
      }
    }

    unlockBtn.addEventListener('click', openModal);
    modalClose.addEventListener('click', closeModal);
    modalCancel.addEventListener('click', closeModal);
    modalConfirm.addEventListener('click', tryUnlock);

    // 点背景关闭
    modalBackdrop.addEventListener('click', (e) => {
      if (e.target === modalBackdrop) closeModal();
    });

    // 回车提交,Esc 关闭
    pwdInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') tryUnlock();
      if (e.key === 'Escape') closeModal();
    });
    // 输入时清掉错误提示
    pwdInput.addEventListener('input', () => {
      pwdError.classList.remove('show');
    });

    /* ============================================================
       ★ 图片放大查看 ★
       ============================================================ */
    const lightbox      = document.getElementById('lightbox');
    const lightboxImg   = document.getElementById('lightboxImg');
    const lightboxClose = document.getElementById('lightboxClose');

    document.querySelectorAll('.img-wrap img').forEach(img => {
      img.parentElement.addEventListener('click', () => {
        lightboxImg.src = img.src;
        lightboxImg.alt = img.alt || '';
        lightbox.classList.add('show');
        document.body.style.overflow = 'hidden';
      });
    });

    function closeLightbox() {
      lightbox.classList.remove('show');
      document.body.style.overflow = '';
    }

    lightbox.addEventListener('click', closeLightbox);  // 点背景或图片都关闭
    lightboxClose.addEventListener('click', (e) => {
      e.stopPropagation();
      closeLightbox();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && lightbox.classList.contains('show')) closeLightbox();
    });

    /* ===== 点赞按钮 ===== */
    const likeBtn = document.getElementById('likeBtn');
    const likeCount = document.getElementById('likeCount');
    let liked = false;
    let likes = 124;
    likeBtn.addEventListener('click', () => {
      liked = !liked;
      likes += liked ? 1 : -1;
      likeCount.textContent = likes;
      likeBtn.classList.toggle('liked', liked);
    });
  </script>
  <script src="pages.js"></script>
</body>
</html>
