<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>语文书的配图是不是有问题啊</title>

  <link rel="preconnect" href="https://gs.jurieo.com/gemini/fonts-googleapis">
  <link rel="preconnect" href="https://gs.jurieo.com/gemini/fonts-gstatic" crossorigin>
  <link href="https://gs.jurieo.com/gemini/fonts-googleapis/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       设计令牌 (颜色 / 字体 / 阴影 / 圆角)
       ============================================================ */
    :root {
      --bg:        #faf7f2;
      --surface:   #ffffff;
      --ink:       #1a1a1a;
      --ink-soft:  #6b6b6b;
      --ink-faint: #9a9a9a;
      --line:      #ece7df;
      --line-soft: #f4f0e8;
      --accent:    #e33932;
      --accent-soft: #fde8e7;
      --shadow:    0 1px 2px rgba(0,0,0,0.04), 0 8px 24px -12px rgba(0,0,0,0.08);
      --shadow-lift: 0 2px 4px rgba(0,0,0,0.06), 0 20px 40px -16px rgba(0,0,0,0.18);
      --radius:    14px;
      --radius-sm: 10px;
      --font-display: 'Bricolage Grotesque', 'Noto Sans SC', system-ui, sans-serif;
      --font-body:    'Noto Sans SC', system-ui, -apple-system, sans-serif;
    }

    /* ============================================================
       全局重置 & 页面容器
       ============================================================ */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 36px 24px 96px;
    }

    @media (max-width: 640px) {
      .container { padding: 20px 16px 64px; }
    }

    /* ============================================================
       1. 顶部导航栏 (Logo + 返回)
       ============================================================ */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 24px;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--line);
    }

    .site-logo {
      display: inline-block;
      line-height: 0;
    }

    .site-logo img {
      height: 90px;
      width: auto;
      display: block;
    }

    .site-logo .dot {
      display: inline-block;
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: 2px;
    }

    .back-link {
      font-size: 14px;
      color: var(--ink-soft);
      text-decoration: none;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      transition: all 0.2s;
    }

    .back-link:hover {
      color: var(--ink);
      border-color: var(--ink);
      transform: translateX(-2px);
    }

    /* ============================================================
       2. 帖子主图 (Hero)
       ============================================================ */
    .hero {
      width: 100%;
      border-radius: var(--radius);
      overflow: hidden;
      background: linear-gradient(135deg, #f0ece4 0%, #e6e0d4 100%);
      box-shadow: var(--shadow);
      margin-bottom: 28px;
    }

    .hero img {
      width: 100%;
      height: auto;
      display: block;
      max-height: 520px;
      object-fit: cover;
    }

    /* ============================================================
       3. 作者信息 (头像 + 用户ID + 时间)
       ============================================================ */
    .post-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 16px;
      flex-shrink: 0;
      letter-spacing: -0.02em;
    }

    .avatar.sm { width: 36px; height: 36px; font-size: 14px; }
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }
    .meta-text { line-height: 1.3; }

    .user-id {
      font-weight: 700;
      font-size: 14.5px;
      color: var(--ink);
    }

    .meta-sub {
      font-size: 12.5px;
      color: var(--ink-faint);
      margin-top: 2px;
    }

    /* ============================================================
       4. 标题
       ============================================================ */
    .post-title {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 38px;
      line-height: 1.18;
      letter-spacing: -0.025em;
      color: var(--ink);
      margin-bottom: 24px;
    }

    @media (max-width: 640px) {
      .post-title { font-size: 28px; }
    }

    /* ============================================================
       5. 正文
       ============================================================ */
    .post-body {
      font-size: 16px;
      line-height: 1.8;
      color: #2a2a2a;
      margin-bottom: 36px;
    }

    .post-body p { margin-bottom: 18px; }
    .post-body p:last-child { margin-bottom: 0; }

    .post-body ol {
      padding-left: 22px;
      margin-bottom: 18px;
    }

    .post-body ol li {
      margin-bottom: 8px;
      padding-left: 4px;
    }

    .post-body ol li::marker {
      color: var(--accent);
      font-weight: 700;
    }

    /* ============================================================
       6. 帖子 Tags
       ============================================================ */
    .post-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: -16px 0 32px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 5px 12px;
      background: #eaf1ff;
      color: #2563eb;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: all 0.18s ease;
    }

    .tag::before {
      content: '#';
      margin-right: 2px;
      opacity: 0.7;
    }

    .tag:hover {
      background: #2563eb;
      color: #fff;
      transform: translateY(-1px);
    }

    /* ============================================================
       7. 操作栏 (点赞 / 评论数 / 分享)
       ============================================================ */
    .post-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 4px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      margin-bottom: 40px;
    }

    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 14px;
      background: transparent;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: var(--ink-soft);
      transition: all 0.18s ease;
    }

    .action-btn:hover {
      background: var(--line-soft);
      color: var(--ink);
    }

    .action-btn svg {
      width: 18px; height: 18px;
      stroke-width: 1.8;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .action-btn.liked {
      color: var(--accent);
      background: var(--accent-soft);
    }

    .action-btn.liked svg {
      fill: var(--accent);
      stroke: var(--accent);
      animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.35); }
      100% { transform: scale(1); }
    }

    .action-btn .count {
      font-variant-numeric: tabular-nums;
    }

    .action-btn.share-btn {
      margin-left: auto;
    }

    /* ============================================================
       8. 评论区 — 标题
       ============================================================ */
    .comments-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 22px;
      letter-spacing: -0.01em;
      margin-bottom: 18px;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .comments-title .num {
      color: var(--accent);
      font-size: 18px;
    }

    /* ============================================================
       9. 评论区 — 输入框
       ============================================================ */
    .comment-input {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
      margin-bottom: 28px;
      transition: border-color 0.2s;
    }

    .comment-input:focus-within {
      border-color: var(--ink);
    }

    .input-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .comment-input textarea {
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      font-family: inherit;
      font-size: 15px;
      line-height: 1.55;
      color: var(--ink);
      background: transparent;
      min-height: 24px;
      max-height: 160px;
    }

    .comment-input textarea::placeholder {
      color: var(--ink-faint);
    }

    .input-foot {
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .submit-btn {
      padding: 8px 18px;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 999px;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 13.5px;
      cursor: pointer;
      transition: all 0.18s;
      letter-spacing: 0.01em;
    }

    .submit-btn:hover:not(:disabled) {
      background: var(--accent);
      transform: translateY(-1px);
    }

    .submit-btn:disabled {
      background: var(--line);
      color: var(--ink-faint);
      cursor: not-allowed;
    }

    /* ============================================================
       10. 评论列表
       ============================================================ */
    .comment-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .comment {
      display: flex;
      gap: 12px;
      padding: 18px 4px;
      border-bottom: 1px solid var(--line-soft);
      animation: slideIn 0.3s ease-out;
    }

    .comment:last-child { border-bottom: none; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .comment-body { flex: 1; min-width: 0; }

    .comment-head {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }

    .comment-head .user-id { font-size: 14px; }
    .comment-head .time {
      font-size: 12.5px;
      color: var(--ink-faint);
    }

    .comment-text {
      font-size: 14.5px;
      line-height: 1.65;
      color: #2a2a2a;
      margin-bottom: 8px;
      word-wrap: break-word;
    }

    .comment-actions {
      display: flex;
      gap: 4px;
    }

    .comment-action {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px 4px 6px;
      background: transparent;
      border: none;
      border-radius: 999px;
      font-family: inherit;
      font-size: 12.5px;
      color: var(--ink-faint);
      cursor: pointer;
      transition: all 0.15s;
    }

    .comment-action:hover { color: var(--ink); background: var(--line-soft); }

    .comment-action svg {
      width: 14px; height: 14px;
      stroke-width: 1.8;
      transition: transform 0.2s;
    }

    .comment-action.liked {
      color: var(--accent);
    }

    .comment-action.liked svg {
      fill: var(--accent);
      stroke: var(--accent);
      animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* ===== 嵌套回复 (评论里的回复) ===== */
    .comment-replies {
      list-style: none;
      margin: 12px 0 0;
      padding: 0 0 0 16px;
      border-left: 2px solid var(--line);
    }
 
    .comment-replies .comment {
      padding: 12px 0;
      border-bottom: 1px solid var(--line-soft);
    }
 
    .comment-replies .comment:first-child { padding-top: 4px; }
    .comment-replies .comment:last-child {
      padding-bottom: 0;
      border-bottom: none;
    }
 
    .comment-replies .reply-to {
      color: #2563eb;
      font-weight: 500;
      margin-right: 4px;
    }

    /* ============================================================
       11. 头像渐变色变体 (av-1 ~ av-6)
       ============================================================ */
    .av-1 { background: linear-gradient(135deg, #e33932, #c2241d); }
    .av-2 { background: linear-gradient(135deg, #2d8a87, #1f6663); }
    .av-3 { background: linear-gradient(135deg, #d4a226, #b08418); }
    .av-4 { background: linear-gradient(135deg, #8e4a7e, #6f3760); }
    .av-5 { background: linear-gradient(135deg, #6b8e5a, #4f6d40); }
    .av-6 { background: linear-gradient(135deg, #c97b3a, #a55e22); }

    /* ============================================================
       12. 撕纸效果 · 问卷横幅
       ============================================================ */
    .tear-section {
      position: relative;
      margin: 56px -24px -96px;
      height: 260px;
      overflow: hidden;
      cursor: pointer;
      border-radius: var(--radius) var(--radius) 0 0;
    }
    @media (max-width: 640px) {
      .tear-section { margin: 40px -16px -64px; height: 220px; }
    }

    /* ── 底层：diaochawenjuan 风格横幅 ── */
    .tear-banner {
      position: absolute; inset: 0;
      background:
        radial-gradient(circle at 20% 30%, #4a0080 0%, transparent 45%),
        radial-gradient(circle at 80% 70%, #800040 0%, transparent 45%),
        radial-gradient(circle at 50% 50%, #1a0033 0%, #000010 80%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px;
      z-index: 1;
    }
    .tear-banner::before {
      content: '';
      position: absolute; top: 50%; left: 50%;
      width: 200%; height: 200%;
      transform: translate(-50%, -50%);
      background: repeating-conic-gradient(
        from 0deg,
        rgba(255,215,0,.03) 0deg 6deg,
        transparent 6deg 12deg
      );
      animation: tearSpin 20s linear infinite;
      pointer-events: none;
    }
    @keyframes tearSpin { to { transform: translate(-50%,-50%) rotate(360deg); } }

    .tear-marquee {
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      color: #ffd700; text-shadow: 0 0 8px rgba(255,215,0,.5);
      white-space: nowrap; overflow: hidden;
      animation: tearMarquee 8s linear infinite;
      margin-bottom: 6px;
    }
    .tear-marquee span { margin: 0 16px; }
    @keyframes tearMarquee {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .tear-title {
      font-family: var(--font-display);
      font-weight: 900; font-size: clamp(28px, 6vw, 48px);
      letter-spacing: 8px;
      background: linear-gradient(180deg, #fffacd, #ffd700, #ff8c00);
      -webkit-background-clip: text; background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 12px rgba(255,215,0,.7));
      z-index: 1;
    }

    .tear-sub {
      font-size: 13px; letter-spacing: 4px;
      color: rgba(255,255,255,.55);
      z-index: 1;
    }

    .tear-arrow-wrap {
      z-index: 1;
      animation: tearBounce 1s ease-in-out infinite;
    }
    @keyframes tearBounce {
      0%,100% { transform: translateY(0); }
      50%     { transform: translateY(-6px); }
    }
    .tear-arrow {
      display: inline-block; padding: 6px 20px; border-radius: 100px;
      background: rgba(255,0,128,.75);
      color: #fff; font-weight: 700; font-size: 13px;
      letter-spacing: 2px;
      border: 2px solid #ffd700;
      box-shadow: 0 0 16px rgba(255,0,128,.5);
    }

    /* 角落装饰 */
    .tear-corner {
      position: absolute; width: 36px; height: 36px;
      border: 2px solid rgba(255,215,0,.4); z-index: 2;
      pointer-events: none;
    }
    .tear-corner.tl { top:10px;  left:10px;  border-right:0; border-bottom:0; }
    .tear-corner.tr { top:10px;  right:10px; border-left:0;  border-bottom:0; }
    .tear-corner.bl { bottom:10px; left:10px;  border-right:0; border-top:0;   }
    .tear-corner.br { bottom:10px; right:10px; border-left:0;  border-top:0;   }

    /* ── 上层：被撕的纸 ── */
    .tear-paper {
      position: absolute; inset: 0; z-index: 3;
      background: var(--bg);
      transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .tear-paper.peeled {
      transform: translateY(105%);
    }

    /* 锯齿状撕边 (下方) */
    .tear-jagged {
      position: absolute; bottom: 0; left: 0; right: 0; height: 20px;
      background: var(--bg);
      transform: translateY(50%);
      -webkit-mask-image:
        repeating-linear-gradient(
          135deg,
          transparent 0px, transparent 9px,
          black 9px, black 12px
        );
      mask-image:
        repeating-linear-gradient(
          135deg,
          transparent 0px, transparent 9px,
          black 9px, black 12px
        );
    }

    /* 纸上阴影 — 暗示下方有内容 */
    .tear-paper {
      box-shadow: inset 0 -4px 12px rgba(0,0,0,0.06);
    }

    /* 纸上提示文字 */
    .tear-paper::before {
      content: '向下撕开';
      position: absolute; bottom: 44px; left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-display);
      font-size: 15px; font-weight: 700;
      color: var(--ink-soft);
      letter-spacing: 4px;
      animation: tearHint 2s ease-in-out infinite;
    }
    /* 下拉箭头 */
    .tear-paper::after {
      content: '';
      position: absolute; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      width: 24px; height: 24px;
      border-left: 2.5px solid var(--ink-soft);
      border-bottom: 2.5px solid var(--ink-soft);
      transform: translateX(-50%) rotate(-45deg);
      animation: tearArrow 2s ease-in-out infinite;
    }
    @keyframes tearHint {
      0%,100% { opacity: .5; }
      50%     { opacity: 1; }
    }
    @keyframes tearArrow {
      0%,100% { opacity: .4; transform: translateX(-50%) rotate(-45deg) translateY(0); }
      50%     { opacity: 1; transform: translateX(-50%) rotate(-45deg) translateY(6px); }
    }

    /* 纸层悬停 — 微微掀起 */
    .tear-paper:hover {
      transform: translateY(-6px);
      cursor: pointer;
    }
    .tear-paper.peeled:hover {
      transform: translateY(105%);  /* 撕开后恢复正常 */
      cursor: default;
    }

    /* ── Steam 成就弹窗 ── */
    .achievement-toast {
      position: fixed; top: 28px; right: 28px; z-index: 10000;
      display: flex; align-items: center; gap: 16px;
      padding: 16px 22px 16px 16px; min-width: 340px; max-width: 420px;
      background: linear-gradient(135deg, #1b2838 0%, #1e3a2f 50%, #1b2838 100%);
      border: 1px solid #4a6741; border-radius: 4px;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.5), 0 0 20px rgba(78,154,65,0.25), 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
      opacity: 0; transform: translateX(120%) scale(0.95); pointer-events: none;
      transition: opacity 0.5s cubic-bezier(0.34,1.56,0.64,1), transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    .achievement-toast.show { opacity: 1; transform: translateX(0) scale(1); pointer-events: auto; }
    .ach-icon {
      width: 64px; height: 64px; flex-shrink: 0; border-radius: 4px;
      background: linear-gradient(145deg, #2a4a3a 0%, #1a3028 100%);
      border: 2px solid #5a8a50; display: grid; place-items: center;
      box-shadow: 0 0 12px rgba(78,154,65,0.3), inset 0 1px 0 rgba(255,255,255,0.08);
      position: relative; overflow: hidden;
    }
    .ach-icon::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.05) 50%, transparent 70%);
      animation: iconShine 3s ease-in-out infinite;
    }
    @keyframes iconShine { 0%,100%{opacity:0} 50%{opacity:1} }
    .ach-emoji { font-size: 30px; line-height: 1; position: relative; z-index: 1; }
    .ach-text { flex: 1; min-width: 0; }
    .ach-label {
      font-size: 11px; font-weight: 500; letter-spacing: 0.12em;
      color: #8fbc5a; margin-bottom: 3px;
      display: flex; align-items: center; gap: 6px;
    }
    .ach-label::before {
      content: ''; display: inline-block; width: 6px; height: 6px;
      background: #8fbc5a; border-radius: 50%;
      box-shadow: 0 0 6px #8fbc5a; animation: dotPulse 2s ease-in-out infinite;
    }
    @keyframes dotPulse { 0%,100%{opacity:1;box-shadow:0 0 6px #8fbc5a} 50%{opacity:.6;box-shadow:0 0 2px #8fbc5a} }
    .ach-title {
      font-family: var(--font-display); font-weight: 700; font-size: 17px;
      color: #e5e5e5; line-height: 1.2; margin-bottom: 3px; letter-spacing: -0.01em;
    }
    .ach-desc { font-size: 12.5px; color: #8f98a0; line-height: 1.4; }
    .achievement-toast::after {
      content: ''; position: absolute; bottom: 0; left: 0;
      height: 3px; width: 100%;
      background: linear-gradient(90deg, #5a8a2a, #8fbc5a, #b8e060);
      border-radius: 0 0 4px 4px; transform-origin: left; transform: scaleX(0);
    }
    .achievement-toast.show::after { animation: progressShrink 5s 0.5s linear forwards; }
    @keyframes progressShrink { 0%{transform:scaleX(1)} 100%{transform:scaleX(0)} }
    .ach-particles { position: absolute; inset: 0; pointer-events: none; overflow: hidden; border-radius: 4px; }
    .ach-particle {
      position: absolute; width: 3px; height: 3px;
      background: #8fbc5a; border-radius: 50%; opacity: 0;
    }
    .achievement-toast.show .ach-particle {
      animation: particleFloat 2s ease-out forwards;
    }
    @keyframes particleFloat {
      0%   { opacity:0.8; transform:translate(0,0) scale(1); }
      100% { opacity:0; transform:translate(var(--dx),var(--dy)) scale(0); }
    }
    @media (max-width: 480px) {
      .achievement-toast { top: 16px; right: 16px; left: 16px; min-width: 0; max-width: none; }
    }
  </style>
</head>
<body>

  <div class="container">

    <header>
      <a href="xhs1.html" class="site-logo">
        <img src="images/tomatologo.png">
      </a>
      <a href="xhs1.html" class="back-link">← 返回列表</a>
    </header>

    <div class="hero">
      <img src="images/huajiayuanwen.png" alt="毛米">
    </div>

    <div class="post-meta">
      <div class="avatar">
          <img src="images/coco.png" alt="头像">
      </div>
      <div class="meta-text">
          <div class="user-id">@肖佑袅 (你)</div>
          <div class="meta-sub">3 小时前 · 阅读 73</div>
      </div>
    </div>

    <h1 class="post-title">雪地上的小画家这篇课文真的不错</h1>

    <div class="post-body">
      <p>我是一名小学语文老师，昨晚在备课的时候又重温了一下雪地里的小画家这篇课文</p>
      <p>真是太有意思了，短短几行写出了人与自然和谐共生 同时又富有童趣</p>

    </div>

    <div class="post-tags">
      <span class="tag">语文书</span>
      <span class="tag">教师</span>
    </div>

    <div class="post-actions">
      <button class="action-btn" id="likeBtn" aria-pressed="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 21s-7-4.35-7-10a4 4 0 0 1 7-2.65A4 4 0 0 1 19 11c0 5.65-7 10-7 10z" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="count" id="likeCount">13</span>
      </button>
      <button class="action-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span class="count" id="commentTopCount">4</span>
      </button>
      <button class="action-btn share-btn" onclick="alert('链接已复制!')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13" stroke-linecap="round" stroke-linejoin="round"/></svg>
        分享
      </button>
    </div>

    <h2 class="comments-title">
      评论 <span class="num" id="commentNumLabel">4</span>
    </h2>

    <div class="comment-input">
      <div class="avatar sm av-3">你</div>
      <div class="input-wrap">
        <textarea id="commentInput" placeholder="留下你的看法..." rows="1"></textarea>
        <div class="input-foot">
            <button class="submit-btn" id="submitBtn" disabled>发布</button>
        </div>
      </div>
    </div>

    <ul class="comment-list" id="commentList"></ul>

    <!-- ═══════════ 撕纸效果 · 问卷横幅 ═══════════ -->
    <div class="tear-section" id="tearSection">
      <div class="tear-banner">
        <div class="tear-marquee">
          <span>★ 重磅问卷 ★</span><span>万众期待 · 不填后悔</span>
          <span>★ 历史性时刻 ★</span><span>你的意见改变世界</span>
        </div>
        <div class="tear-title">请 填 写 问 卷</div>
        <div class="tear-sub">你 的 意 见 最 重 要</div>
        <div class="tear-arrow-wrap">
          <span class="tear-arrow">↓ 点击进入 ↓</span>
        </div>
        <div class="tear-corner tl"></div><div class="tear-corner tr"></div>
        <div class="tear-corner bl"></div><div class="tear-corner br"></div>
      </div>
      <div class="tear-paper" id="tearPaper">
        <div class="tear-jagged"></div>
      </div>
    </div>

  </div>

  <script>
    /* ============================================================
       通用:复用的 SVG 图标字符串
       ============================================================ */
    const HEART_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 21s-7-4.35-7-10a4 4 0 0 1 7-2.65A4 4 0 0 1 19 11c0 5.65-7 10-7 10z" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const REPLY_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 17l-5-5 5-5M4 12h11a5 5 0 0 1 5 5v3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

    /* ============================================================
       种子评论数据
       ============================================================ */
    const seedComments = [

      {
        userId: '@风清',
        avatar: 'av-4',
        initial: 'F',
        time: '1 小时前',
        text: '我也记得这篇课文！现在原来还在呀',
        likes: 2,

      },

      {
        userId: '@力大无穷',
        avatar: 'av-5',
        initial: 'L',
        time: '2 分钟前',
        text: '我也是在这篇课文知道青蛙冬眠的',
        likes: 1
      },
    ];

    /* ============================================================
       1. 评论渲染函数
       ============================================================ */
    const commentList = document.getElementById('commentList');
 
    function renderComment(c, prepend = false) {
      const li = document.createElement('li');
      li.className = 'comment';
      li.innerHTML = `
        <div class="avatar sm ${c.avatar}">${c.initial}</div>
        <div class="comment-body">
          <div class="comment-head">
            <span class="user-id">${c.userId}</span>
            <span class="time">${c.time}</span>
          </div>
          <p class="comment-text"></p>
          <div class="comment-actions">
            <button class="comment-action like-comment" data-likes="${c.likes}" aria-pressed="false">
              ${HEART_SVG}<span class="lc">${c.likes}</span>
            </button>
            <button class="comment-action">
              ${REPLY_SVG}回复
            </button>
          </div>
        </div>
      `;
      const textEl = li.querySelector('.comment-text');
      if (c.replyTo) {
        const replyMark = document.createElement('span');
        replyMark.className = 'reply-to';
        replyMark.textContent = '回复 ' + c.replyTo + ':';
        textEl.appendChild(replyMark);
        textEl.appendChild(document.createTextNode(c.text));
      } else {
        textEl.textContent = c.text;
      }
 
      if (Array.isArray(c.replies) && c.replies.length > 0) {
        const repliesUl = document.createElement('ul');
        repliesUl.className = 'comment-replies';
        c.replies.forEach(r => {
          const replyLi = renderReplyItem(r);
          repliesUl.appendChild(replyLi);
        });
        li.querySelector('.comment-body').appendChild(repliesUl);
      }
 
      if (prepend) commentList.prepend(li);
      else commentList.appendChild(li);
      return li;
    }
 
    function renderReplyItem(r) {
      const li = document.createElement('li');
      li.className = 'comment';
      li.innerHTML = `
        <div class="avatar sm ${r.avatar}">${r.initial}</div>
        <div class="comment-body">
          <div class="comment-head">
            <span class="user-id">${r.userId}</span>
            <span class="time">${r.time}</span>
          </div>
          <p class="comment-text"></p>
          <div class="comment-actions">
            <button class="comment-action like-comment" data-likes="${r.likes}" aria-pressed="false">
              ${HEART_SVG}<span class="lc">${r.likes}</span>
            </button>
            <button class="comment-action">
              ${REPLY_SVG}回复
            </button>
          </div>
        </div>
      `;
      const textEl = li.querySelector('.comment-text');
      if (r.replyTo) {
        const replyMark = document.createElement('span');
        replyMark.className = 'reply-to';
        replyMark.textContent = '回复 ' + r.replyTo + ':';
        textEl.appendChild(replyMark);
        textEl.appendChild(document.createTextNode(r.text));
      } else {
        textEl.textContent = r.text;
      }
      return li;
    }

    seedComments.forEach(c => renderComment(c));

    /* ============================================================
       2. 帖子主点赞按钮
       ============================================================ */
    const likeBtn = document.getElementById('likeBtn');
    const likeCount = document.getElementById('likeCount');
    let postLiked = false;
    let postLikes = 13; // 修复了初始同步显示值的问题，使逻辑中的数字和HTML初始化一致

    likeBtn.addEventListener('click', () => {
      postLiked = !postLiked;
      postLikes += postLiked ? 1 : -1;
      likeCount.textContent = postLikes;
      likeBtn.classList.toggle('liked', postLiked);
      likeBtn.setAttribute('aria-pressed', postLiked);
    });

    /* ============================================================
       3. 评论点赞
       ============================================================ */
    document.addEventListener('click', e => {
      const btn = e.target.closest('.like-comment');
      if (!btn) return;
      const isLiked = btn.classList.toggle('liked');
      let n = parseInt(btn.dataset.likes, 10);
      n += isLiked ? 1 : -1;
      btn.dataset.likes = n;
      btn.querySelector('.lc').textContent = n;
      btn.setAttribute('aria-pressed', isLiked);
    });

    /* ============================================================
       4. 评论输入框 — 自动撑高 + 发布按钮启用/禁用
       ============================================================ */
    const input = document.getElementById('commentInput');
    const submitBtn = document.getElementById('submitBtn');
    const commentNumLabel = document.getElementById('commentNumLabel');
    const commentTopCount = document.getElementById('commentTopCount');
    let commentTotal = seedComments.length;

    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 160) + 'px';
      submitBtn.disabled = input.value.trim().length === 0;
    });

    /* ============================================================
       5. 提交评论 (真正将评论发布至列表并同步更新数字)
       ============================================================ */
    function submit() {
      const text = input.value.trim();
      if (!text) return;

      // 1. 构造新的评论数据对象
      const newComment = {
        userId: '@肖佑袅 (你)',
        avatar: 'av-3',
        initial: '你',
        time: '刚刚',
        text: text,
        likes: 0
      };

      // 2. 渲染并插入到评论列表顶部
      renderComment(newComment, true);

      // 3. 更新评论计数器
      commentTotal++;
      commentNumLabel.textContent = commentTotal;
      commentTopCount.textContent = commentTotal;

      // 4. 清空输入框并重置发布按钮状态
      input.value = '';
      input.style.height = 'auto';
      submitBtn.disabled = true;
    }

    /* ============================================================
       6. 提交事件绑定 (按钮点击 + Cmd/Ctrl + Enter 快捷键)
       ============================================================ */
    submitBtn.addEventListener('click', submit);

    input.addEventListener('keydown', e => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
        e.preventDefault();
        submit();
      }
    });

    /* ============================================================
       7. 撕纸效果 — 交互与跳转
       ============================================================ */
    (function() {
      const section = document.getElementById('tearSection');
      const paper = document.getElementById('tearPaper');
      const banner = section.querySelector('.tear-banner');
      let peeled = false;

      function doPeel() {
        if (peeled) return;
        peeled = true;
        paper.classList.add('peeled');
      }

      // 点击纸层 → 撕开（不跳转）
      paper.addEventListener('click', doPeel);

      // 撕开后点击横幅 → 跳转
      banner.addEventListener('click', () => {
        if (!peeled) return;
        window.location.href = 'diaochawenjuan.html';
      });
    })();

    /* ── 阅读全部帖子成就 ── */
    (function() {
      var ACH_KEY = 'xhs-allposts-ach-shown';
      if (localStorage.getItem(ACH_KEY) === '1') return;

      var NEED = [
        "xhsyingwu","xhstroisbody","xhsjiankang","xhsyiqing","xhshuajia","xhsyubian",
        "xhsfumao","xhschongyan","xhsxunyu","xhsshangzhua",
        "xhsbwbj","xhsmbc","xhswangle",
        "xhscasetubu","xhscasexiaban","xhscaseyouyong","xhscasexiangxia"
      ];

      var visited = [];
      try { visited = JSON.parse(localStorage.getItem('xhs-pages-visited') || '[]'); }
      catch(e) {}

      var allDone = NEED.every(function(p) { return visited.indexOf(p) !== -1; });
      if (!allDone) return;

      localStorage.setItem(ACH_KEY, '1');

      var toast     = document.getElementById('achToast');
      var emojiEl   = document.getElementById('achEmoji');
      var titleEl   = document.getElementById('achTitle');
      var descEl    = document.getElementById('achDesc');
      var particles = document.getElementById('achParticles');

      emojiEl.textContent = '📖';
      titleEl.textContent = '西红柿重度依赖';
      descEl.textContent  = '你看完了西红柿首页的所有帖子';

      particles.innerHTML = '';
      for (var i = 0; i < 14; i++) {
        var p = document.createElement('span');
        p.className = 'ach-particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.top  = Math.random() * 100 + '%';
        p.style.setProperty('--dx', (Math.random() - 0.5) * 90 + 'px');
        p.style.setProperty('--dy', (Math.random() - 0.5) * 90 + 'px');
        p.style.animationDelay = Math.random() * 0.5 + 's';
        particles.appendChild(p);
      }

      toast.classList.remove('show');
      void toast.offsetWidth;
      requestAnimationFrame(function() { toast.classList.add('show'); });
      setTimeout(function() { toast.classList.remove('show'); }, 5500);
    })();
  </script>
<!-- Steam 成就弹窗 -->
<div class="achievement-toast" id="achToast" role="alert">
  <div class="ach-particles" id="achParticles"></div>
  <div class="ach-icon"><span class="ach-emoji" id="achEmoji">📖</span></div>
  <div class="ach-text">
    <div class="ach-label">成就已解锁</div>
    <div class="ach-title" id="achTitle">西红柿重度依赖</div>
    <div class="ach-desc" id="achDesc">你看完了西红柿的所有帖子</div>
  </div>
</div>

<script src="nav.js"></script>
</body>
