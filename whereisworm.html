<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>terminal</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #0a0a0a;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    overflow: hidden;
  }

  /* CRT 外壳 */
  .screen {
    height: 100vh;
    padding: 24px;
    background:
      radial-gradient(ellipse at center, rgba(0,40,0,0.15) 0%, rgba(0,0,0,0.6) 100%),
      #0a0e0a;
    position: relative;
    overflow: hidden;
  }

  /* 扫描线 */
  .screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0, 255, 100, 0.04) 0px,
      rgba(0, 255, 100, 0.04) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
    z-index: 2;
  }

  /* 微弱的亮点 */
  .screen::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(120,255,150,0.06), transparent 60%);
    pointer-events: none;
    z-index: 1;
  }

  .titlebar {
    color: #5fd97a;
    font-size: 12px;
    letter-spacing: 2px;
    opacity: 0.7;
    margin-bottom: 12px;
    position: relative;
    z-index: 3;
  }

  .titlebar .dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #5fd97a;
    margin-right: 6px;
    animation: blink 1.4s infinite;
    vertical-align: middle;
  }

  @keyframes blink {
    50% { opacity: 0.3; }
  }

  .terminal {
    height: calc(100% - 40px);
    color: #6cf08a;
    font-size: 15px;
    line-height: 1.55;
    text-shadow: 0 0 6px rgba(108, 240, 138, 0.5);
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 3;
  }

  .output {
    flex: 1;
    overflow-y: auto;
    padding-right: 8px;
    scrollbar-width: thin;
    scrollbar-color: #2a5a2a transparent;
  }
  .output::-webkit-scrollbar { width: 6px; }
  .output::-webkit-scrollbar-thumb { background: #2a5a2a; border-radius: 3px; }

  .line { white-space: pre-wrap; word-break: break-word; }
  .line.user { color: #b8ffcc; }
  .line.system { color: #6cf08a; }
  .line.dim { color: #3a7a4a; opacity: 0.8; }

  .input-row {
    display: flex;
    align-items: center;
    margin-top: 6px;
  }

  .prompt {
    color: #b8ffcc;
    margin-right: 8px;
    white-space: nowrap;
  }

  .input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #b8ffcc;
    font: inherit;
    text-shadow: inherit;
    caret-color: transparent;
  }

  .cursor {
    display: inline-block;
    width: 9px;
    height: 18px;
    background: #6cf08a;
    box-shadow: 0 0 8px #6cf08a;
    animation: cursorBlink 1s steps(1) infinite;
    vertical-align: text-bottom;
    margin-left: 2px;
  }
  @keyframes cursorBlink {
    50% { opacity: 0; }
  }

  /* 选项按钮 */
  .choice-row {
    display: none;
    flex-direction: column;
    gap: 14px;
    margin-top: 16px;
    animation: fadeInUp 0.5s ease forwards;
  }
  .choice-row.show {
    display: flex;
  }
  .choice-q {
    color: #6cf08a;
    text-shadow: 0 0 6px rgba(108,240,138,0.5);
    font-size: 15px;
    letter-spacing: 1px;
  }
  .choice-btns {
    display: flex;
    gap: 16px;
  }
  .choice-btn {
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-size: 14px;
    padding: 8px 24px;
    background: transparent;
    border: 1px solid #3a7a4a;
    color: #6cf08a;
    cursor: pointer;
    letter-spacing: 2px;
    text-shadow: 0 0 6px rgba(108,240,138,0.5);
    transition: all 0.2s ease;
  }
  .choice-btn:hover {
    border-color: #6cf08a;
    box-shadow: 0 0 12px rgba(108,240,138,0.3);
    background: rgba(108,240,138,0.08);
  }
  .choice-btn:active {
    transform: scale(0.96);
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* 图片浮层 */
  .image-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 99;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
  }
  .image-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }
  .image-overlay img {
    max-width: 80vw;
    max-height: 80vh;
    object-fit: contain;
    filter: drop-shadow(0 0 30px rgba(108,240,138,0.3));
    animation: imgReveal 0.6s ease forwards;
  }
  @keyframes imgReveal {
    from { transform: scale(0.9); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>
  <div class="screen">
    <div class="titlebar"><span class="dot"></span>SESSION // /dev/tty0 — connected</div>
    <div class="terminal">
      <div class="output" id="output"></div>
      <div class="input-row" id="input-row">
        <span class="prompt">guest@local:~$</span>
        <input class="input" id="input" autocomplete="off" autofocus spellcheck="false">
        <span class="cursor"></span>
      </div>
      <div class="choice-row" id="choice-row">
        <p class="choice-q">你要把这件事情说出去吗？</p>
        <div class="choice-btns">
          <button class="choice-btn" id="choice-tell">1. 说</button>
          <button class="choice-btn" id="choice-silent">2. 不说</button>
        </div>
      </div>
    </div>
  </div>

  <div class="image-overlay" id="image-overlay">
    <img id="overlay-img" src="" alt="">
  </div>

<script>
  const output     = document.getElementById('output');
  const input      = document.getElementById('input');
  const inputRow   = document.getElementById('input-row');
  const choiceRow  = document.getElementById('choice-row');
  const imgOverlay = document.getElementById('image-overlay');
  const overlayImg = document.getElementById('overlay-img');

  // 两个选项都跳转 xhs4.html
  document.getElementById('choice-tell').addEventListener('click', () => {
    window.location.href = 'xhs4.html';
  });
  document.getElementById('choice-silent').addEventListener('click', () => {
    window.location.href = 'xhs4.html';
  });

  function print(text, cls='system') {
    const div = document.createElement('div');
    div.className = 'line ' + cls;
    div.textContent = text;
    output.appendChild(div);
    output.scrollTop = output.scrollHeight;
  }

  // 启动信息
  const boot = [
    ['booting tty0 ...',                 'dim'],
    ['kernel loaded. memory ok.',        'dim'],
    ['establishing link ............ ok','dim'],
    ['',                                  'dim'],
    ['> 这是你与外星人的第一次接触 要好好想想怎么打招呼',     'system'],
    ['> 试着说点什么吧。', 'system'],
    ['',                                  'system'],
  ];
  let i = 0;
  (function bootSeq(){
    if (i >= boot.length) return;
    print(boot[i][0], boot[i][1]);
    i++;
    setTimeout(bootSeq, 220);
  })();

  // ═══════════════════════════════════════════════════════
  // 预设对话脚本 —— 在这里改对话内容
  // user:  自动替换用户输入的文字（第一项可为空，因为第一句由用户自由输入）
  // reply: 系统/对面的回复
  // ═══════════════════════════════════════════════════════
  const DIALOGUE = [
    { user: '', reply: '你找来的很快啊' },

    { user: '这居然真的是个对话框……我还以为是什么无聊的人做出来的解谜游戏', 
      reply: '某种意义上来说也是吧。因为是我把你引到这里来的。' },

    { user: '你到底是谁？黑客？', 
      reply: '如果我是黑客，现在应该已经在转移你少的可怜的资产了，而不是陪你聊天。' },

    { user: '那你是外星人？', 
      reply: '……听外星人叫自己外星人的感觉还真奇怪。' },

    { user: '所以你真的不是昴星人？你是月亮上的人吗？最近这些奇怪的事情都是你做的？', 
      reply: '1.我不是。2.我不是。3.是的。' },

    { user: '你要怎么证明', 
      reply: '首先，你们被误导了。月亮上没有居民，至少没有你们描述的那种。' },

    { user: '……', 
      reply: '其次，你现在可以看看你的课本。', delay: 1800 },

    { image: 'images/huajia.png', delay: 1800 },

    { user: '脚印又出现了，所以是真的？！', 
      reply: '别紧张，我没有恶意。大约一周前，我找到了这个奇怪的网站。它能与你们星球产生直接联系……准确来说，是没有时间差的联系。' },

    { user: '没有时间差？', 
      reply: '意思是，我们现在的对话不是经过数年传播后才被彼此接收到的。你发出的信息，我几乎是立刻看到。' },

    { user: '你的意思是我们两个星球离得很近？', 
      reply: '理论上来说应该是这样，但那又不可能。如果我们的距离近到连信号传播都没有延迟，我们早就已经观测到彼此了。可事实上，我们迄今为止从没发现过外星文明。' },

    { user: '那……', 
      reply: '我目前猜测，是这个“蠕虫网站”的作用。不知道为什么，它似乎能把我们两个星球串联起来。' },

    { user: '所以你是？', 
      reply: '地球人。' },

    { user: '地球啊……', 
      reply: '根据我这几天的观察，地球和昴星几乎一模一样。唯一的区别是——地球的智慧生物是人类。' },

    { user: '我们也是啊？', 
      reply: '抱歉，应该说，地球人类是你们口中的“裸猿”。' },

    { user: '……还真奇怪。那我们居然在说同一种语言？', 
      reply: '我不清楚。也许是这个网站自动把语言转换成了彼此能够理解的形式。我也不确定我们看见的是否是同一种语言。' },

    { user: '那最近那些灵异事件，还有我的课本……', 
      reply: '这就是我刚才想说的。' },

    { reply: '在我刚找到这个网站的时候，它就自动联通了你们的星球，并给了我一种权限——每天都可以对你们的世界做出一个小小的改变。' },

    { user: '……权限？', 
      reply: '嗯。像是在后台里修改一个小参数。你的课本就是我更改的。' },

    { user: '为什么全是和裸猿相关的？', 
      reply: '因为我想试探你们对地球人类的态度。其实我只是个学生，我没打算做什么大事。' },

    { reply: '我只是很好奇。如果有一天你们真的发现另一个文明，会怎么对待他们。' },

    { user: '所以那些论坛帖子、照片……', 
      reply: '他们观察到的裸猿都是我用网站执行的。不过那些只是投影，你们的星球上没有出现真的地球人，而且我对所有相关内容都限了流，确保不会传播得太夸张。' },

    { user: '你的调查对象是外星人？外星人和神秘生物可是两码事。', 
      reply: '没错。但蠕虫似乎会屏蔽所有“真正指向外星文明”的操作。' },

    { reply: '只要我试图直接提及外星人，内容就会消失，或者被替换成乱码。所以我只能用“神秘生物”代替。' },

    { user: '这网站到底是什么东西……', 
      reply: '不知道。我甚至怀疑它本身就是某种活着的东西。' },

    { user: '你不害怕吗？', 
      reply: '第一天的时候我甚至以为自己精神出了问题，但更多的是好奇。哪怕这是个别人做出来红我的网站我也认了，这内容做的太真实了！' },

    { reply: '我更震惊的是另一件事。' },

    { user: '什么？', 
      reply: '经过我这些天的观察，发现99%的人类对待“外星人”的态度，和对待“神秘生物”的态度几乎完全一样。' },

    { reply: '这不像是一个把宇宙视作未来方向的文明。' },

    { user: '当然不是了。天文学是宗教嘛，我们现在已经没什么人信宗教了。', 
      reply: '……你们的发展进度居然落后到这种程度吗？' },

    { reply: '但如果是这样，不应该反而有更多人信宗教吗？' },

    { user: '因为*是超&说的，天@学已经不再作为科学!域的研究+向了', 
      reply: '等@下……蠕￥网站的信%变差了——' },

    { reply: '总之不要把我……存在说出去*！' },

    { reply: '我没）恶意的！' },

    { reply: '不要说出去', delay: 1800 },
    { reply: '不要说出去', delay: 360 },
    { reply: '不要说出去', delay: 360 },
    { reply: '不要说出去', delay: 360 },
    { reply: '不要说出去', delay: 360 },
    { reply: '不要说出去', delay: 360 },
    { reply: '不要说出去', delay: 360 },
    { reply: '不要说出去', delay: 360  },
    { reply: '不要说出去', delay: 360  },
    { reply: '不要说出去', delay: 360  },
    { reply: '不要说出去', delay: 360  },
    { reply: '不要说出去', delay: 360  },
    { reply: '不要说出去', delay: 360  },
    { reply: '不要说出去', delay: 360  },

  ];

  let dialogueTurn = 0;
  let autoPlaying = false;

  function reply(text) {
    const t = text.toLowerCase().trim();
    if (!t) return '...';
    if (t === 'clear') { output.innerHTML = ''; return null; }

    if (dialogueTurn < DIALOGUE.length) {
      const line = DIALOGUE[dialogueTurn];
      dialogueTurn++;
      // 跳过图片条目
      if (line.image) {
        if (dialogueTurn < DIALOGUE.length) {
          const next = DIALOGUE[dialogueTurn];
          dialogueTurn++;
          return next.reply;
        }
        return '……（通讯似乎中断了）';
      }
      return line.reply;
    }

    return '……（通讯似乎中断了）';
  }

  function showImage(src, onDone) {
    autoPlaying = true;
    input.disabled = true;
    input.value = '';
    overlayImg.src = src;
    imgOverlay.classList.add('show');
    // 6 秒后图片消失，继续对话
    setTimeout(() => {
      imgOverlay.classList.remove('show');
      setTimeout(() => {
        overlayImg.src = '';
        autoPlaying = false;
        input.disabled = false;
        if (onDone) onDone();
      }, 500); // 等淡出动画结束
    }, 3000);
  }

  // 检查当前条目：图片 → 展示后继续 / 无 user → 自动连发 reply / 有 user → 等回车
  function autoAdvance() {
    if (dialogueTurn >= DIALOGUE.length) {
      autoPlaying = false;
      inputRow.style.display = 'none';
      choiceRow.classList.add('show');
      return;
    }
    const line = DIALOGUE[dialogueTurn];
    if (line.image) {
      // 图片条目：先用 delay 停顿，再展示图片
      dialogueTurn++;
      autoPlaying = true;
      input.disabled = true;
      input.value = '';
      setTimeout(() => {
        showImage(line.image, () => autoAdvance());
      }, line.delay || 1800);
    } else if (!line.user) {
      // 只有 reply，自动发送（可用 delay 字段单独控制速度）
      dialogueTurn++;
      autoPlaying = true;
      input.disabled = true;
      input.value = '';
      setTimeout(() => {
        print('> ' + line.reply, 'system');
        autoAdvance();
      }, line.delay || 1800);
    } else {
      // 有 user，清空输入框等待用户打字（input 事件会自动替换为预设文字）
      autoPlaying = false;
      input.disabled = false;
      input.value = '';
      input.focus();
    }
  }

  input.addEventListener('input', () => {
    if (dialogueTurn > 0 && dialogueTurn < DIALOGUE.length) {
      const user = DIALOGUE[dialogueTurn].user;
      if (user) input.value = user;
    }
  });

  input.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    if (autoPlaying) return;
    const value = input.value.trim();
    if (!value) return;
    input.value = '';

    print('guest@local:~$ ' + value, 'user');

    const r = reply(value);
    if (r === null) return;
    setTimeout(() => {
      print('> ' + r, 'system');
      autoAdvance();
    }, 380);
  });

  // 点击任何位置都聚焦输入框
  document.addEventListener('click', () => input.focus());
</script>
    <script src="nav.js"></script>
</body>
</html>
