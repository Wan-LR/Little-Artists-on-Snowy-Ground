<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>消除</title>
<style>
  @import url('https://gs.jurieo.com/gemini/fonts-googleapis/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap');

  :root {
    --bg:     #0a1628;
    --accent: #4a90d9;
    --light:  #a8ccf0;
    --white:  #e8f2ff;
    --border: #2a4a7a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Ma Shan Zheng', 'Noto Serif SC', serif;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 28% 22%, rgba(74,144,217,0.18) 0%, transparent 52%),
      radial-gradient(ellipse at 76% 80%, rgba(20,60,140,0.22) 0%, transparent 50%),
      repeating-linear-gradient(45deg, transparent, transparent 38px,
        rgba(74,144,217,0.022) 38px, rgba(74,144,217,0.022) 39px);
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
  }

  .subtitle {
    font-size: 0.72rem;
    color: rgba(168,204,240,0.45);
    letter-spacing: 0.28em;
    text-align: center;
    font-family: 'Noto Serif SC', serif;
  }

  /* ── 3D 卡片 ── */
  .card-scene {
    width: 442px;
    height: 442px;
    perspective: 1600px;
    position: relative;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.75s cubic-bezier(0.4, 0.2, 0.2, 1);
  }
  .card.flipped { transform: rotateY(180deg); }

  .card-scene.zooming-in {
    position: fixed;
    z-index: 100;
    transition:
      top 0.7s cubic-bezier(0.4, 0, 0.2, 1),
      left 0.7s cubic-bezier(0.4, 0, 0.2, 1),
      width 0.7s cubic-bezier(0.4, 0, 0.2, 1),
      height 0.7s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 4px;
    overflow: hidden;
  }

  .card-front { cursor: default; }

  .card-back {
    transform: rotateY(180deg);
    cursor: pointer;
  }
  .card-back img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }

  /* ── 游戏棋盘 ── */
  .board-wrap {
    width: 100%;
    height: 100%;
    padding: 10px;
    background: rgba(8,18,36,0.9);
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow:
      0 0 0 1px rgba(74,144,217,0.08),
      0 10px 44px rgba(0,0,0,0.65),
      0 0 60px rgba(74,144,217,0.07),
      inset 0 1px 0 rgba(74,144,217,0.13);
  }

  #game-board {
    width: 100%;
    height: 100%;
    background: #040a14;
    position: relative;
    overflow: hidden;
    border-radius: 2px;
  }

  /* 题目 */
  .quiz-question {
    position: absolute;
    top: 20px;
    left: 0; right: 0;
    text-align: center;
    color: var(--white);
    font-family: 'Noto Serif SC', serif;
    font-size: 0.98rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    padding: 0 18px;
    text-shadow: 0 0 12px rgba(74,144,217,0.4);
  }

  /* ── 消消乐区域：背景词 + 上层方块 ── */
  .board-area {
    position: absolute;
    top: 54px; left: 0; right: 0; bottom: 14px;
    display: flex; align-items: center; justify-content: center;
  }

  .board-stack {
    position: relative;
    padding: 6px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: rgba(8,18,36,0.35);
    box-shadow: inset 0 0 22px rgba(0,0,0,0.5);
    overflow: hidden;
  }

  /* 背后的单词（被方块盖住，方块消失后从空格里透出来） */
  .word-bg {
    position: absolute;
    inset: 6px;
    z-index: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0.92;
    pointer-events: none;
    filter: drop-shadow(0 0 7px rgba(74,144,217,0.55));
    transition: opacity 0.6s ease, filter 0.6s ease;
  }
  .word-bg svg { width: 100%; height: 100%; display: block; }
  .wtext {
    fill: #d4e8ff;
    font-family: 'Noto Serif SC', serif;
    font-weight: 700;
  }
  .board-stack.revealed .word-bg {
    opacity: 1;
    filter: drop-shadow(0 0 14px rgba(74,144,217,0.9));
  }

  /* 方块网格（透明，空格处能看见背景词） */
  .match-board {
    position: relative;
    z-index: 1;
    display: grid;
    gap: 4px;
    background: transparent;
  }

  .gem, .cell-empty { width: 100%; height: 100%; }
  .cell-empty { background: transparent; }   /* 已消除：透出背景词 */

  .gem {
    border-radius: 11px;
    cursor: pointer;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; line-height: 1;
    box-shadow:
      inset -3px -4px 8px rgba(0,0,0,0.32),
      inset 3px 3px 7px rgba(255,255,255,0.22);
    transition: transform 0.12s ease, box-shadow 0.15s ease, opacity 0.2s ease;
    -webkit-user-select: none; user-select: none;
  }
  .gem:hover { transform: scale(1.06); z-index: 2; }
  .gem.selected {
    box-shadow: 0 0 0 3px var(--white), 0 0 14px rgba(232,242,255,0.85),
                inset -3px -4px 8px rgba(0,0,0,0.3);
    transform: scale(1.08); z-index: 3;
  }
  .gem.clearing { animation: gemClear 0.26s ease forwards; pointer-events: none; }
  @keyframes gemClear { to { transform: scale(0.15) rotate(45deg); opacity: 0; } }

  /* ★ 方块底色（不透明，盖住背景词）+ 上面的 emoji —— 想换颜色改这 5 行就行 */
  .gem.t0 { background: radial-gradient(circle at 34% 30%, #ff8a8a, #c81e3a); } /* 红 */
  .gem.t1 { background: radial-gradient(circle at 34% 30%, #ffc266, #e0851e); } /* 橙 */
  .gem.t2 { background: radial-gradient(circle at 34% 30%, #5fd6ef, #1f93c4); } /* 青 */
  .gem.t3 { background: radial-gradient(circle at 34% 30%, #6fe0a0, #1f9c5c); } /* 绿 */
  .gem.t4 { background: radial-gradient(circle at 34% 30%, #c79af0, #8a46c0); } /* 紫 */

  /* ── 底部交互区 ── */
  .action-area {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .action-area.show { display: flex; animation: fadeInUp 0.4s ease; }

  .word-input-wrap { display: flex; align-items: center; gap: 8px; }
  .btn-row { display: flex; gap: 16px; }

  .btn-replay, .btn-submit {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    padding: 7px 18px;
    border: 1px solid var(--border);
    background: rgba(8,18,36,0.8);
    color: var(--light);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.25s ease;
  }
  .btn-replay:hover, .btn-submit:hover {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(74,144,217,0.2);
  }
  .btn-submit { background: rgba(74,144,217,0.2); border-color: var(--accent); }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .word-input {
    font-family: 'Noto Serif SC', serif;
    font-size: 1rem;
    letter-spacing: 0.12em;
    padding: 8px 16px;
    border: 1px solid var(--border);
    background: rgba(8,18,36,0.8);
    color: var(--white);
    border-radius: 3px;
    width: 200px;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
    text-align: center;
  }
  .word-input::placeholder { color: rgba(168,204,240,0.3); font-size: 0.82rem; letter-spacing: 0.1em; }
  .word-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(74,144,217,0.2); }
  .word-input.correct { border-color: #4ad980; box-shadow: 0 0 0 2px rgba(74,217,128,0.25); }
  .word-input.wrong {
    border-color: #d94a4a;
    box-shadow: 0 0 0 2px rgba(217,74,74,0.25);
    animation: shake 0.35s ease;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-6px); }
    75%      { transform: translateX(6px); }
  }

  .hint {
    font-size: 0.66rem;
    color: rgba(168,204,240,0.28);
    letter-spacing: 0.1em;
    text-align: center;
    font-family: 'Noto Serif SC', serif;
    transition: opacity 0.3s;
  }

  #flip-hint {
    font-size: 0.66rem;
    color: rgba(168,204,240,0.35);
    letter-spacing: 0.15em;
    text-align: center;
    font-family: 'Noto Serif SC', serif;
    opacity: 0;
    transition: opacity 0.5s ease;
    height: 1em;
  }
  #flip-hint.show { opacity: 1; }

  .container.exiting .subtitle,
  .container.exiting .action-area,
  .container.exiting .hint,
  .container.exiting #flip-hint {
    transition: opacity 0.35s ease;
    opacity: 0;
  }

  /* ───────────── 公鸡 NPC ───────────── */
  .rooster-container {
    position: fixed;
    right: 36px;
    bottom: 28px;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 14px;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .rooster-container.fade-out { opacity: 0; pointer-events: none; }

  .speech-bubble {
    position: relative;
    background: linear-gradient(135deg, rgba(244, 233, 210, 0.97), rgba(220, 207, 178, 0.95));
    color: #2a1a0a;
    padding: 14px 18px 22px 18px;
    border-radius: 4px;
    font-family: 'Noto Serif SC', serif;
    font-size: 0.86rem;
    font-weight: 500;
    line-height: 1.6;
    letter-spacing: 0.04em;
    max-width: 280px;
    min-width: 180px;
    box-shadow:
      0 6px 24px rgba(0,0,0,0.55),
      0 0 0 1px rgba(139, 90, 43, 0.5),
      inset 0 1px 0 rgba(255, 255, 255, 0.5);
    opacity: 0;
    transform: translateY(8px) scale(0.96);
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
    margin-right: 40px;
    will-change: transform, opacity;
  }
  .speech-bubble.show { opacity: 1; transform: translateY(0) scale(1); }
  .speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -10px;
    right: 32px;
    width: 0; height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 10px solid rgba(228, 215, 186, 0.96);
    filter: drop-shadow(0 2px 1px rgba(139, 90, 43, 0.4));
  }
  .speech-bubble::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px dashed rgba(139, 90, 43, 0.35);
    border-radius: 2px;
    pointer-events: none;
  }

  .next-arrow {
    position: absolute;
    right: 12px;
    bottom: 4px;
    font-size: 0.85rem;
    color: #8b5a2b;
    animation: arrow-blink 1.2s ease-in-out infinite;
  }
  @keyframes arrow-blink {
    0%, 100% { opacity: 0.25; transform: translateX(0); }
    50%      { opacity: 1;    transform: translateX(3px); }
  }

  .rooster {
    width: 260px;
    height: 260px;
    cursor: pointer;
    user-select: none;
    pointer-events: auto;
    position: relative;
    filter: drop-shadow(0 10px 18px rgba(0,0,0,0.6));
    transition: filter 0.3s ease, transform 0.2s ease;
  }
  .rooster.bobbing { animation: rooster-bob 0.8s ease-in-out 5; }
  @keyframes rooster-bob {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    25%      { transform: translateY(-9px) rotate(-2.5deg); }
    50%      { transform: translateY(0) rotate(0deg); }
    75%      { transform: translateY(-9px) rotate(2.5deg); }
  }
  .rooster:hover {
    filter: drop-shadow(0 10px 20px rgba(74,144,217,0.5))
            drop-shadow(0 8px 14px rgba(0,0,0,0.55));
  }
  .rooster img {
    width: 100%; height: 100%;
    object-fit: contain;
    display: block;
    -webkit-user-drag: none;
    pointer-events: none;
  }
  .rooster-fallback {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 8rem; line-height: 1;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="container" id="page-container">
  <p class="subtitle">互动收集 · 还原密码</p>

  <div class="card-scene" id="card-scene">
    <div class="card" id="card">
      <div class="card-face card-front" id="card-front">
        <div class="board-wrap">
          <div id="game-board">
            <div class="quiz-question" id="quiz-question"></div>

            <!-- 消消乐：背景词 + 上层方块 -->
            <div class="board-area" id="board-area">
              <div class="board-stack" id="board-stack">
                <div class="word-bg" id="word-bg"></div>
                <div class="match-board" id="match-board"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="card-face card-back" id="card-back">
        <img id="back-img" src="images/minerva.png" alt="背面">
      </div>
    </div>
  </div>

  <div class="action-area" id="action-area">
    <div class="word-input-wrap">
      <input class="word-input" id="word-input" type="text"
             placeholder="输入最终密码…" autocomplete="off" spellcheck="false">
    </div>
    <div class="btn-row">
      <button class="btn-replay" id="btn-replay" onclick="resetGame()">↻ 重新作答</button>
      <button class="btn-submit" id="btn-submit" onclick="checkPassword()">确 认</button>
    </div>
  </div>

  <p class="hint" id="main-hint"></p>
  <p id="flip-hint">点击图片可翻回正面</p>
</div>

<!-- ───────────── 公鸡 NPC ───────────── -->
<div class="rooster-container" id="rooster-container">
  <div class="speech-bubble" id="speech-bubble">
    <span id="bubble-text"></span>
    <span class="next-arrow">▸</span>
  </div>
  <div class="rooster" id="rooster">
    <img id="rooster-img" src="images/mojingji.png" alt="公鸡"
         onerror="this.style.display='none';document.getElementById('rooster-fallback').style.display='flex';">
    <div class="rooster-fallback" id="rooster-fallback" style="display:none;">🐓</div>
  </div>
</div>

<script>
  // ═══════════════════════════════════════════
  const BACK_IMAGE  = 'images/minerva.png';  // ← 换成你的背面图
  const PASSWORD    = 'minerva';
  const PUZZLE_ID   = 'puzzle_7';
  const PUZZLE_INDEX = 6;          // 九宫格里的第 7 格（索引 6）
  const RETURN_URL  = 'mxhuitu.html';
  // ═══════════════════════════════════════════

  const WORD = 'MINERVA';          // 画在方块背后的词（= 密码，大写显示）
  // 方块上的 emoji（种类数 = 数组长度，可随意替换）
  const EMOJIS = ['🪖', '🔫', '⚔️', '🛡️', '♟️'];
  const ROWS = 5, COLS = 7, CELL = 46, GAP = 4;
  const NUM_TYPES = EMOJIS.length;

  // ★ 需要把方块【全部】消除后，才揭晓并进入对话（1.0 = 100%）。
  //   说明：消消乐不补位，靠 3 连消时极少能正好清到 0；万一最后剩下
  //   实在凑不齐的零头（<3 个、无法再消），会自动化开收尾，避免卡死。
  const REVEAL_TARGET = 1.0;

  let grid = [];          // grid[r][c] = 方块种类(0..NUM_TYPES-1) 或 null(已消除)
  let sel = null;
  let busy = false;
  let clearedCount = 0;

  let gameSolved = false;
  let gamePhase = 'intro';   // intro → playing → answer → ending → done
  let dialogueIndex = 0;
  let hintIdx = -1;

  const dialogues = {
    intro: [
      '咯咯咯——消消乐',
      '我想应该不用解释吧',

    ],
    playHint: [
      'Unbelievable！',
      'Good!',
      'Exellent!'
    ],
    // ★ 新增：方块全部消除后、答题阶段公鸡说的话
    //   （原代码缺这一组，导致通关时 dialogues.answer[0] 报错、卡住没法继续）
    answer: [
      '咯咯咯，方块全清光了',
      '把背后露出来的词，原样填进下面的框里吧',
    ],
    ending: [
      '如果说之前的所有事件都还有可以解释的余地',
      '那么这次完全不一样了',
      '昴星的一处爆发了热点',
      '而在宣布开战的一个小时内，两个国家的所有武器包括军队，全部消失了',
      '而这个结果，超脑竟然在一个小时前就已经预测到了',
      '自此我们确定——————确实有人在操纵着这一切，从吃鸭子开始就是了',
      '我们终于放弃了与命运抗衡，因为我们掌握的一切都毫无规律可言',
      '让它归位吧,咯咯咯——'
    ]
  };

  // ═══════════ 消消乐核心逻辑（消掉不补位） ═══════════
  function makeGem() { return Math.floor(Math.random() * NUM_TYPES); }

  // 生成一个没有现成三连的满棋盘
  function initGrid() {
    grid = [];
    for (let r = 0; r < ROWS; r++) {
      grid[r] = [];
      for (let c = 0; c < COLS; c++) {
        let t;
        do { t = makeGem(); }
        while ((c >= 2 && grid[r][c-1] === t && grid[r][c-2] === t) ||
               (r >= 2 && grid[r-1][c] === t && grid[r-2][c] === t));
        grid[r][c] = t;
      }
    }
  }
  function initGridSafe() {
    let guard = 0;
    do { initGrid(); guard++; } while (!hasAnyMove() && guard < 50);
  }

  function swapCells(r1, c1, r2, c2) {
    const t = grid[r1][c1]; grid[r1][c1] = grid[r2][c2]; grid[r2][c2] = t;
  }
  function isAdjacent(a, b) { return (Math.abs(a.r - b.r) + Math.abs(a.c - b.c)) === 1; }

  // 找出所有处于 3+ 连线中的格子（忽略 null）
  function findMatches(g) {
    const matched = new Set();
    for (let r = 0; r < ROWS; r++) {
      let run = 1;
      for (let c = 1; c < COLS; c++) {
        if (g[r][c] != null && g[r][c] === g[r][c-1]) run++;
        else { if (run >= 3) for (let k = c - run; k < c; k++) matched.add(r + ',' + k); run = 1; }
      }
      if (run >= 3) for (let k = COLS - run; k < COLS; k++) matched.add(r + ',' + k);
    }
    for (let c = 0; c < COLS; c++) {
      let run = 1;
      for (let r = 1; r < ROWS; r++) {
        if (g[r][c] != null && g[r][c] === g[r-1][c]) run++;
        else { if (run >= 3) for (let k = r - run; k < r; k++) matched.add(k + ',' + c); run = 1; }
      }
      if (run >= 3) for (let k = ROWS - run; k < ROWS; k++) matched.add(k + ',' + c);
    }
    return matched;
  }

  // 是否还存在能凑出三连的一步（只在两个都是方块时交换）
  function hasAnyMove() {
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (grid[r][c] == null) continue;
        if (c + 1 < COLS && grid[r][c+1] != null) {
          swapCells(r, c, r, c+1);
          const ok = findMatches(grid).size > 0;
          swapCells(r, c, r, c+1);
          if (ok) return true;
        }
        if (r + 1 < ROWS && grid[r+1][c] != null) {
          swapCells(r, c, r+1, c);
          const ok = findMatches(grid).size > 0;
          swapCells(r, c, r+1, c);
          if (ok) return true;
        }
      }
    }
    return false;
  }

  // 重力下落：方块往下掉，空格升到列顶（不补新方块）
  function collapse() {
    for (let c = 0; c < COLS; c++) {
      let writeR = ROWS - 1;
      for (let r = ROWS - 1; r >= 0; r--) {
        if (grid[r][c] != null) {
          grid[writeR][c] = grid[r][c];
          if (writeR !== r) grid[r][c] = null;
          writeR--;
        }
      }
      for (let r = writeR; r >= 0; r--) grid[r][c] = null;
    }
  }

  // 快没招时，把剩余方块重新摆一摆（同样数量，确保有一步可走、且无现成三连）
  function shuffleArr(a) {
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const t = a[i]; a[i] = a[j]; a[j] = t;
    }
  }
  function reshuffleRemaining() {
    const gems = [];
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (grid[r][c] != null) gems.push(grid[r][c]);
    const N = gems.length;
    if (N < 3) return false;
    for (let tries = 0; tries < 80; tries++) {
      shuffleArr(gems);
      for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) grid[r][c] = null;
      let idx = 0;
      for (let r = ROWS - 1; r >= 0 && idx < N; r--) {
        for (let c = 0; c < COLS && idx < N; c++) grid[r][c] = gems[idx++];
      }
      if (findMatches(grid).size === 0 && hasAnyMove()) return true;
    }
    return false;
  }

  function renderBoard() {
    const board = document.getElementById('match-board');
    board.style.gridTemplateColumns = 'repeat(' + COLS + ', ' + CELL + 'px)';
    board.style.gridTemplateRows = 'repeat(' + ROWS + ', ' + CELL + 'px)';
    board.innerHTML = '';
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const t = grid[r][c];
        if (t == null) {
          const e = document.createElement('div');
          e.className = 'cell-empty';
          board.appendChild(e);
          continue;
        }
        const g = document.createElement('div');
        g.className = 'gem t' + t;
        g.textContent = EMOJIS[t] || '';
        if (sel && sel.r === r && sel.c === c) g.classList.add('selected');
        const rr = r, cc = c;
        g.addEventListener('click', () => onGemClick(rr, cc));
        board.appendChild(g);
      }
    }
  }

  function onGemClick(r, c) {
    if (busy || gamePhase !== 'playing' || grid[r][c] == null) return;
    if (sel && sel.r === r && sel.c === c) { sel = null; renderBoard(); return; }
    if (!sel) { sel = { r, c }; renderBoard(); return; }
    if (isAdjacent(sel, { r, c })) {
      const a = { r: sel.r, c: sel.c };
      sel = null;
      trySwap(a.r, a.c, r, c);
    } else {
      sel = { r, c }; renderBoard();
    }
  }

  function trySwap(r1, c1, r2, c2) {
    busy = true;
    swapCells(r1, c1, r2, c2);
    renderBoard();
    if (findMatches(grid).size === 0) {
      setTimeout(() => { swapCells(r1, c1, r2, c2); renderBoard(); busy = false; }, 220);
    } else {
      setTimeout(resolveMatches, 200);
    }
  }

  // 消除 → 下落（不补位）→ 连锁
  function resolveMatches() {
    const m = findMatches(grid);
    if (m.size === 0) { busy = false; afterSettle(); return; }
    const board = document.getElementById('match-board');
    m.forEach(key => {
      const [r, c] = key.split(',').map(Number);
      const el = board.children[r * COLS + c];
      if (el) el.classList.add('clearing');
    });
    setTimeout(() => {
      m.forEach(key => { const [r, c] = key.split(',').map(Number); grid[r][c] = null; });
      clearedCount += m.size;
      collapse();               // 只下落，不补新方块
      renderBoard();
      setTimeout(resolveMatches, 200);
    }, 260);
  }

  // 一轮稳定后：全消了就揭晓；没招了就重排；否则继续玩
  function afterSettle() {
    if (gamePhase !== 'playing') return;
    const ratio = clearedCount / (ROWS * COLS);
    if (ratio >= REVEAL_TARGET) { completeReveal(); return; }   // 已全部消除 → 揭晓
    if (!hasAnyMove()) {
      if (reshuffleRemaining()) {
        renderBoard();
        showDialogue('咯咯咯，凑不上了，我把剩下的重新摆一摆');
      } else {
        completeReveal();   // 实在没法继续（剩的零头无法再消）→ 把剩下的也化开，露出整词
      }
    }
  }

  // 整个词露出：把剩余方块全化开，背景词点亮
  function completeReveal() {
    if (gamePhase === 'answer' || gamePhase === 'ending' || gamePhase === 'done') return;
    gamePhase = 'answer';
    busy = true; sel = null;

    const board = document.getElementById('match-board');
    [...board.querySelectorAll('.gem')].forEach(el => el.classList.add('clearing'));

    setTimeout(() => {
      for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) grid[r][c] = null;
      renderBoard();
      document.getElementById('board-stack').classList.add('revealed');
      document.getElementById('quiz-question').textContent = '全都暴露';
      document.getElementById('main-hint').textContent = '';

      const rooster = document.getElementById('rooster');
      rooster.classList.remove('bobbing'); void rooster.offsetWidth; rooster.classList.add('bobbing');
      showDialogue(dialogues.answer[0]);
      setTimeout(() => showDialogue(dialogues.answer[1]), 1900);
      setTimeout(() => {
        document.getElementById('action-area').classList.add('show');
        document.getElementById('main-hint').textContent = '把后面露出来的词，填进下面的框';
        document.getElementById('word-input').focus();
        busy = false;
      }, 2200);
    }, 320);
  }

  // 背景词（SVG，按棋盘大小铺满）
  function buildWordBg() {
    const W = COLS * CELL + (COLS - 1) * GAP;
    const H = ROWS * CELL + (ROWS - 1) * GAP;
    const tl = Math.round(W * 0.9);
    const fs = Math.round(H * 0.52);
    document.getElementById('word-bg').innerHTML =
      '<svg viewBox="0 0 ' + W + ' ' + H + '" preserveAspectRatio="xMidYMid meet">' +
        '<text class="wtext" x="' + (W / 2) + '" y="' + (H / 2) + '" text-anchor="middle" ' +
        'dominant-baseline="central" textLength="' + tl + '" lengthAdjust="spacingAndGlyphs" ' +
        'font-size="' + fs + '">' + WORD + '</text>' +
      '</svg>';
  }

  // ═══════════ 通用框架（与其它 puzzle 一致） ═══════════
  window.onload = () => {
    document.getElementById('back-img').src = BACK_IMAGE;

    document.getElementById('card-back').addEventListener('click', () => {
      if (gameSolved && gamePhase === 'done') flipCard();
    });

    document.getElementById('rooster').addEventListener('click', clickRooster);

    document.getElementById('word-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkPassword();
    });

    setupBoard();

    playEnterAnimation(() => {
      setTimeout(() => { showDialogue(dialogues.intro[0]); }, 250);
    });
  };

  function setupBoard() {
    document.getElementById('quiz-question').textContent = '消掉方块，露出后面藏的词';
    buildWordBg();
    initGridSafe();
    renderBoard();
  }

  function playEnterAnimation(onDone) {
    let originRaw = sessionStorage.getItem('puzzle_origin');
    let origin = null;
    if (originRaw) { try { origin = JSON.parse(originRaw); } catch (e) {} }

    const scene = document.getElementById('card-scene');

    if (!origin || origin.index !== PUZZLE_INDEX) {
      if (onDone) onDone();
      return;
    }

    const finalRect = scene.getBoundingClientRect();

    scene.classList.add('zooming-in');
    scene.style.left   = origin.left + 'px';
    scene.style.top    = origin.top + 'px';
    scene.style.width  = origin.width + 'px';
    scene.style.height = origin.height + 'px';

    void scene.offsetWidth;

    requestAnimationFrame(() => {
      scene.style.left   = finalRect.left + 'px';
      scene.style.top    = finalRect.top + 'px';
      scene.style.width  = finalRect.width + 'px';
      scene.style.height = finalRect.height + 'px';
    });

    setTimeout(() => {
      scene.classList.remove('zooming-in');
      scene.style.left = ''; scene.style.top = '';
      scene.style.width = ''; scene.style.height = '';
      if (onDone) onDone();
    }, 720);
  }

  function showDialogue(text) {
    const bubble = document.getElementById('speech-bubble');
    const bubbleText = document.getElementById('bubble-text');
    const rooster = document.getElementById('rooster');
    bubbleText.textContent = text;
    bubble.classList.remove('show');
    void bubble.offsetWidth;
    bubble.classList.add('show');
    rooster.classList.remove('bobbing');
    void rooster.offsetWidth;
    rooster.classList.add('bobbing');
  }
  function hideDialogue() {
    document.getElementById('speech-bubble').classList.remove('show');
    document.getElementById('rooster').classList.remove('bobbing');
  }

  function clickRooster() {
    if (gamePhase === 'intro') {
      dialogueIndex++;
      if (dialogueIndex < dialogues.intro.length) {
        showDialogue(dialogues.intro[dialogueIndex]);
      } else {
        gamePhase = 'playing';
        dialogueIndex = -1;
        hintIdx = -1;
        hideDialogue();
        document.getElementById('main-hint').textContent = '点两个相邻方块交换，凑成三连消除';
      }
    } else if (gamePhase === 'playing') {
      hintIdx = (hintIdx + 1) % dialogues.playHint.length;
      showDialogue(dialogues.playHint[hintIdx]);
    } else if (gamePhase === 'answer') {
      showDialogue(dialogues.answer[1]);
    } else if (gamePhase === 'ending') {
      dialogueIndex++;
      if (dialogueIndex < dialogues.ending.length) {
        showDialogue(dialogues.ending[dialogueIndex]);
      } else {
        hideDialogue();
        gamePhase = 'done';
        setTimeout(() => triggerFlyOut(), 450);
      }
    }
  }

  function resetGame() {
    gameSolved = false;
    busy = false;
    sel = null;
    clearedCount = 0;
    hintIdx = -1;
    gamePhase = 'playing';
    hideDialogue();

    document.getElementById('board-stack').classList.remove('revealed');
    document.getElementById('quiz-question').textContent = '消掉方块，露出后面藏的词';
    initGridSafe();
    renderBoard();

    document.getElementById('action-area').classList.remove('show');
    document.getElementById('main-hint').textContent = '点两个相邻方块交换，凑成三连消除';

    const input = document.getElementById('word-input');
    input.value = '';
    input.disabled = false;
    input.classList.remove('correct', 'wrong');

    const card = document.getElementById('card');
    if (card.classList.contains('flipped')) card.classList.remove('flipped');
    document.getElementById('flip-hint').classList.remove('show');
  }

  function flipCard() {
    const card = document.getElementById('card');
    const nowFlipped = card.classList.toggle('flipped');
    document.getElementById('flip-hint').classList.add('show');

    if (nowFlipped) {
      document.getElementById('flip-hint').textContent = '听我说完先…';
      setTimeout(() => {
        gamePhase = 'ending';
        dialogueIndex = 0;
        showDialogue(dialogues.ending[0]);
      }, 850);
    } else {
      document.getElementById('flip-hint').textContent = '密码已解锁,再次点击图片查看';
    }
  }

  function triggerFlyOut() {
    const scene = document.getElementById('card-scene');
    const r = scene.getBoundingClientRect();

    sessionStorage.setItem('puzzle_returning', JSON.stringify({
      index: PUZZLE_INDEX,
      from: { left: r.left, top: r.top, width: r.width, height: r.height }
    }));

    document.getElementById('page-container').classList.add('exiting');
    document.getElementById('rooster-container').classList.add('fade-out');
    document.getElementById('flip-hint').textContent = '即将返回大九宫格…';

    scene.classList.add('zooming-in');
    scene.style.left   = r.left + 'px';
    scene.style.top    = r.top + 'px';
    scene.style.width  = r.width + 'px';
    scene.style.height = r.height + 'px';
    void scene.offsetWidth;

    requestAnimationFrame(() => {
      scene.style.transition =
        'top 0.5s ease, left 0.5s ease, width 0.5s ease, height 0.5s ease, opacity 0.5s ease';
      scene.style.opacity = '0';
      scene.style.left   = (r.left + r.width * 0.15) + 'px';
      scene.style.top    = (r.top + r.height * 0.15) + 'px';
      scene.style.width  = (r.width * 0.7) + 'px';
      scene.style.height = (r.height * 0.7) + 'px';
    });

    setTimeout(() => { window.location.href = RETURN_URL; }, 550);
  }

  function checkPassword() {
    const input = document.getElementById('word-input');
    const val = input.value.trim();

    if (val.toLowerCase() === PASSWORD.toLowerCase()) {
      input.classList.remove('wrong');
      input.classList.add('correct');
      gameSolved = true;

      const card = document.getElementById('card');
      if (!card.classList.contains('flipped')) flipCard();

      localStorage.setItem(PUZZLE_ID + '_unlocked', 'true');
      input.disabled = true;
    } else {
      input.classList.remove('correct', 'wrong');
      void input.offsetWidth;
      input.classList.add('wrong');
      input.value = '';
      setTimeout(() => input.classList.remove('wrong'), 400);
    }
  }
</script>
