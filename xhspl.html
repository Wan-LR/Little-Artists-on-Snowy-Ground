<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>帖子</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700&family=Noto+Sans+SC:wght@500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:        #faf7f2;
      --surface:   #ffffff;
      --ink:       #1a1a1a;
      --ink-soft:  #6b6b6b;
      --line:      #ece7df;
      --accent:    #e33932;
      --shadow:    0 1px 2px rgba(0,0,0,0.04), 0 8px 24px -12px rgba(0,0,0,0.08);
      --shadow-lift: 0 2px 4px rgba(0,0,0,0.06), 0 20px 40px -16px rgba(0,0,0,0.18);
      --radius:    14px;
      --font-display: 'Bricolage Grotesque', 'Noto Sans SC', system-ui, sans-serif;
      --font-body:    'Noto Sans SC', system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      line-height: 1.5;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 32px 80px;
    }

    @media (max-width: 640px) {
      .container { padding: 28px 18px 56px; }
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding-bottom: 32px;
      margin-bottom: 36px;
      border-bottom: 1px solid var(--line);
    }

    .site-logo {
      display: inline-block;
      line-height: 0;
    }

    .site-logo img {
      height: 90px;
      width: auto;
      display: block;
    }

    @media (max-width: 640px) {
      .site-logo img { height: 32px; }
    }

    /* ===== 瀑布流 ===== */
    .grid {
      column-count: 3;
      column-gap: 24px;
    }

    @media (max-width: 900px) {
      .grid { column-count: 2; }
    }

    @media (max-width: 480px) {
      .grid { column-count: 2; column-gap: 14px; }
    }

    .post-card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1),
                  box-shadow 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid var(--line);
      break-inside: avoid;
      margin-bottom: 24px;
      width: 100%;
      position: relative;       /* 给广告标志做定位锚点 */
    }

    .post-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lift);
    }

    .post-card:active {
      transform: translateY(-1px);
      transition-duration: 0.1s;
    }

    .post-card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 3px;
    }

    .post-card .image {
      width: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #f0ece4 0%, #e6e0d4 100%);
    }

    .post-card .image img {
      width: 100%;
      height: auto;
      display: block;
      transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .post-card:hover .image img {
      transform: scale(1.05);
    }

    .post-card .title {
      padding: 16px 16px 18px;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 16px;
      line-height: 1.35;
      letter-spacing: -0.01em;
      color: var(--ink);
    }

    .mine-tag {
      padding: 0 16px 14px;
      margin-top: -10px;
      font-size: 12px;
      color: var(--ink-soft);
    }

    @media (max-width: 480px) {
      .post-card .title { padding: 12px 12px 14px; font-size: 14px; }
    }

    /* ===== 隐秘的广告标志 ===== */
    /* 浅灰小字,贴在卡片右下角,缩进一点点,很容易被忽略 */
    .ad-badge {
      position: absolute;
      bottom: 6px;
      right: 8px;
      font-size: 9px;
      color: #c8c2b6;            /* 比正文还浅的灰 */
      letter-spacing: 0.05em;
      padding: 1px 5px;
      border: 1px solid #e8e3da;
      border-radius: 3px;
      background: rgba(255,255,255,0.6);
      font-weight: 400;
      font-family: var(--font-body);
      pointer-events: none;       /* 不影响整张卡片的点击 */
      user-select: none;
      transition: color 0.2s, border-color 0.2s;
    }

    /* 鼠标悬停时变得稍微清晰点(可选,想完全隐秘就删掉这条) */
    .post-card:hover .ad-badge {
      color: #a39a8a;
      border-color: #d8d2c5;
    }

    @media (max-width: 480px) {
      .ad-badge { font-size: 8px; bottom: 4px; right: 6px; }
    }
  </style>
</head>
<body>
  <div class="container">

    <header>
      <a href="#" class="site-logo">
        <img src="images/tomatologo.png" alt="帖子">
      </a>
      <div class="header-right">
        <div class="site-meta">最近更新</div>
      </div>
    </header>

    <div class="grid">

      <a class="post-card" href="xhsyingwupl.html">
        <div class="image">
          <img src="images/yingwu.png" alt="" loading="lazy">
        </div>
        <h2 class="title">问问大家国内能养金刚鹦鹉吗?</h2>
      </a>

      <a class="post-card" href="xhstroisbodypl.html">
        <div class="image">
          <img src="images/troisbody.png" alt="" loading="lazy">
        </div>
        <h2 class="title">《仨体》阅读 Day2</h2>
      </a>

      <a class="post-card" href="xhsbuxiupl.html">
        <div class="image">
          <img src="images/buxiu.png" alt="" loading="lazy">
        </div>
        <h2 class="title">一人接一句不腐歌词</h2>
      </a>

      <a class="post-card" href="xhsyiqingpl.html">
        <div class="image">
          <img src="images/yiqing.png" alt="" loading="lazy">
        </div>
        <h2 class="title">yq居然已经是六年以前了 当年的小学生今年要上大学了</h2>
      </a>

      <a class="post-card" href="xhsyubianpl.html">
        <div class="image">
          <img src="images/yubian.png" alt="" loading="lazy">
        </div>
        <h2 class="title">这周和我们一起回顾:宇宙探索编撰部!</h2>
      </a>

      <!-- ★ 新增:千百度广告 ★ -->
      <!-- href 改成你的目标页面 -->
      <a class="post-card" href="qianbaidu.html">
        <div class="image">
          <img src="images/qianbaidu.png" alt="" loading="lazy">
        </div>
        <h2 class="title">浏览器 就用千百度!</h2>
        <span class="ad-badge">广告</span>
      </a>

    </div>

  </div>
</body>
</html>
