<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>搜一下</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       设计令牌 — 与主站保持一致
       ============================================================ */
    :root {
      --bg:        #ffffff;
      --surface:   #ffffff;
      --ink:       #1a1a1a;
      --ink-soft:  #6b6b6b;
      --ink-faint: #9a9a9a;
      --line:      #ece7df;
      --line-soft: #f4f0e8;
      --accent:    #3252e3;
      --accent-hover: #c2241d;
      --accent-soft: #fde8e7;
      --shadow-search: 0 2px 4px rgba(0,0,0,0.04), 0 16px 40px -12px rgba(0,0,0,0.12);
      --shadow-lift:   0 2px 4px rgba(0,0,0,0.06), 0 20px 40px -16px rgba(0,0,0,0.18);
      --radius:    14px;
      --font-display: 'Bricolage Grotesque', 'Noto Sans SC', system-ui, sans-serif;
      --font-body:    'Noto Sans SC', system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      line-height: 1.6;
      background-image:
        radial-gradient(circle at 12% 18%, rgba(227, 57, 50, 0.06) 0, transparent 38%),
        radial-gradient(circle at 88% 82%, rgba(227, 57, 50, 0.05) 0, transparent 42%);
    }

    /* 页面布局 */
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px 96px;
    }

    /* LOGO */
    .logo-wrap { margin-bottom: 0px; line-height: 0; }
    .logo-wrap img { height: 200px; width: auto; display: block; }
    @media (max-width: 480px) {
      .logo-wrap { margin-bottom: 40px; }
      .logo-wrap img { height: 110px; }
    }

    /* 搜索框 */
    .search-form { width: 100%; max-width: 560px; }

    .search-wrap {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 999px;
      box-shadow: var(--shadow-search);
      transition: box-shadow 0.25s, border-color 0.25s;
    }
    .search-wrap:hover {
      box-shadow: 0 4px 8px rgba(0,0,0,0.05), 0 24px 48px -16px rgba(0,0,0,0.16);
    }
    .search-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 4px 8px rgba(0,0,0,0.05), 0 24px 48px -16px rgba(227, 57, 50, 0.22);
    }

    .search-wrap > svg.icon {
      position: absolute;
      left: 22px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      color: var(--ink-faint);
      pointer-events: none;
      transition: color 0.2s;
    }
    .search-wrap:focus-within > svg.icon { color: var(--accent); }

    .search-input {
      width: 100%;
      height: 60px;
      padding: 0 70px 0 56px;
      background: transparent;
      border: none;
      font-family: var(--font-body);
      font-size: 16px;
      color: var(--ink);
      border-radius: 999px;
    }
    .search-input::placeholder { color: var(--ink-faint); }
    .search-input:focus { outline: none; }

    .search-btn {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: background 0.2s, transform 0.15s;
      box-shadow: 0 4px 10px -2px rgba(227, 57, 50, 0.4);
    }
    .search-btn:hover { background: var(--accent-hover); }
    .search-btn:active { transform: translateY(-50%) scale(0.94); }
    .search-btn svg { width: 18px; height: 18px; }

    @media (max-width: 480px) {
      .search-input { height: 54px; font-size: 15px; padding: 0 62px 0 50px; }
      .search-wrap > svg.icon { left: 18px; }
      .search-btn { width: 40px; height: 40px; right: 7px; }
    }

    /* 页脚 */
    .page-footer {
      position: fixed;
      bottom: 24px;
      left: 0; right: 0;
      text-align: center;
      font-size: 12.5px;
      color: var(--ink-faint);
    }

    /* 弹窗 */
    .modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(26, 26, 26, 0.45);
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 100;
    }
    .modal-mask.show { display: flex; animation: fadeIn 0.2s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lift);
      padding: 36px 32px 28px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      transform: scale(0.94) translateY(8px);
      animation: popIn 0.28s cubic-bezier(0.2, 0.8, 0.4, 1) forwards;
    }
    @keyframes popIn { to { transform: scale(1) translateY(0); } }

    .modal-emoji { font-size: 44px; line-height: 1; margin-bottom: 16px; }

    .modal-title {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -0.01em;
      color: var(--ink);
      margin-bottom: 8px;
    }

    .modal-desc {
      font-size: 14px;
      color: var(--ink-soft);
      margin-bottom: 24px;
    }

    .modal-btn {
      width: 100%;
      height: 44px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.2s;
    }
    .modal-btn:hover { background: var(--accent-hover); }

    /* ★ 两个按钮并排：一会再去 / 去看看 */
    .modal-actions {
      display: flex;
      gap: 12px;
    }
    .modal-actions .modal-btn {
      flex: 1 1 0;
      width: auto;          /* 覆盖单按钮时的 100% 宽 */
    }
    /* 次要按钮（一会再去）：描边幽灵样式 */
    .modal-btn-ghost {
      background: transparent;
      color: var(--ink-soft);
      border: 1px solid var(--line);
    }
    .modal-btn-ghost:hover {
      background: var(--line-soft);
      color: var(--ink);
      border-color: var(--ink);
    }

    /* ── Steam 风格成就弹窗 ── */
    .achievement-toast {
      position: fixed;
      top: 28px; right: 28px;
      z-index: 10000;
      display: flex; align-items: center; gap: 16px;
      padding: 16px 22px 16px 16px;
      min-width: 340px; max-width: 420px;
      background: linear-gradient(135deg, #1b2838 0%, #1e3a2f 50%, #1b2838 100%);
      border: 1px solid #4a6741; border-radius: 4px;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.5), 0 0 20px rgba(78,154,65,0.25), 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
      opacity: 0; transform: translateX(120%) scale(0.95);
      pointer-events: none;
      transition: opacity 0.5s cubic-bezier(0.34,1.56,0.64,1), transform 0.5s cubic-bezier(0.34,1.56,0.64,1);
    }
    .achievement-toast.show { opacity: 1; transform: translateX(0) scale(1); pointer-events: auto; }
    .ach-icon {
      width: 64px; height: 64px; flex-shrink: 0; border-radius: 4px;
      background: linear-gradient(145deg, #2a4a3a 0%, #1a3028 100%);
      border: 2px solid #5a8a50;
      display: grid; place-items: center;
      box-shadow: 0 0 12px rgba(78,154,65,0.3), inset 0 1px 0 rgba(255,255,255,0.08);
      position: relative; overflow: hidden;
    }
    .ach-icon::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.05) 50%, transparent 70%);
      animation: iconShine 3s ease-in-out infinite;
    }
    @keyframes iconShine { 0%,100%{opacity:0} 50%{opacity:1} }
    .ach-emoji { font-size: 30px; line-height: 1; position: relative; z-index: 1; }
    .ach-text { flex: 1; min-width: 0; }
    .ach-label {
      font-size: 11px; font-weight: 500; letter-spacing: 0.12em;
      color: #8fbc5a; margin-bottom: 3px;
      display: flex; align-items: center; gap: 6px;
    }
    .ach-label::before {
      content: ''; display: inline-block; width: 6px; height: 6px;
      background: #8fbc5a; border-radius: 50%;
      box-shadow: 0 0 6px #8fbc5a;
      animation: dotPulse 2s ease-in-out infinite;
    }
    @keyframes dotPulse { 0%,100%{opacity:1;box-shadow:0 0 6px #8fbc5a} 50%{opacity:.6;box-shadow:0 0 2px #8fbc5a} }
    .ach-title {
      font-family: var(--font-display); font-weight: 700; font-size: 17px;
      color: #e5e5e5; line-height: 1.2; margin-bottom: 3px; letter-spacing: -0.01em;
    }
    .ach-desc { font-size: 12.5px; color: #8f98a0; line-height: 1.4; }
    .achievement-toast::after {
      content: ''; position: absolute; bottom: 0; left: 0;
      height: 3px; width: 100%;
      background: linear-gradient(90deg, #5a8a2a, #8fbc5a, #b8e060);
      border-radius: 0 0 4px 4px; transform-origin: left; transform: scaleX(0);
    }
    .achievement-toast.show::after { animation: progressShrink 5s 0.5s linear forwards; }
    @keyframes progressShrink { 0%{transform:scaleX(1)} 100%{transform:scaleX(0)} }
    .ach-particles { position: absolute; inset: 0; pointer-events: none; overflow: hidden; border-radius: 4px; }
    .ach-particle {
      position: absolute; width: 3px; height: 3px;
      background: #8fbc5a; border-radius: 50%; opacity: 0;
    }
    .achievement-toast.show .ach-particle {
      animation: particleFloat 2s ease-out forwards;
    }
    @keyframes particleFloat {
      0%   { opacity:0.8; transform:translate(0,0) scale(1); }
      100% { opacity:0; transform:translate(var(--dx),var(--dy)) scale(0); }
    }
    @media (max-width: 480px) {
      .achievement-toast { top: 16px; right: 16px; left: 16px; min-width: 0; max-width: none; }
    }
  </style>
</head>
<body>

  <div class="page">

    <div class="logo-wrap">
      <img src="images/qianbaidu.png" alt="LOGO">
    </div>

    <form class="search-form" id="searchForm" novalidate>
      <div class="search-wrap">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="寻你一下 你就知道!"
          autocomplete="off"
        >
        <button type="submit" class="search-btn" aria-label="搜索">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </div>
    </form>

  </div>

  <p class="page-footer">© 2025 千百度</p>

  <!-- Steam 成就弹窗 -->
  <div class="achievement-toast" id="achToast" role="alert">
    <div class="ach-particles" id="achParticles"></div>
    <div class="ach-icon"><span class="ach-emoji" id="achEmoji">🏆</span></div>
    <div class="ach-text">
      <div class="ach-label">成就已解锁</div>
      <div class="ach-title" id="achTitle">成就</div>
      <div class="ach-desc" id="achDesc"></div>
    </div>
  </div>

  <!-- 弹窗：未收录(单按钮) / 西红柿更新了(两个按钮:一会再去 + 去看看) -->
  <div class="modal-mask" id="modalMask" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-card">
      <h2 class="modal-title" id="modalTitle">抱歉 该词条尚未收录</h2>
      <div class="modal-actions">
        <!-- 仅在"西红柿更新了"时显示；默认隐藏 -->
        <button type="button" class="modal-btn modal-btn-ghost" id="modalLaterBtn" hidden>一 会 再 去</button>
        <button type="button" class="modal-btn" id="modalCloseBtn">我 知 道 了</button>
      </div>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════
    // 两组关键词，每组找齐后弹出"西红柿更新了"跳转
    // "鉴定网络热门生物" → 仅成就，不计入进度
    // 全部找齐 → 最终成就弹窗
    // ═══════════════════════════════════════════════════════
    const GROUPS = [
      {
        keywords: [ "旧城疫", "小石子", "月球", "人","昴星"],
        unlockUrl: "xhs2.html",
      },
      {
        keywords: [ "彩南", "上爪", "过目不忘"],
        unlockUrl: "xhs3.html",
      },
    ];

    // 仅弹成就的关键词（不计入进度）
    const ACHIEVEMENT_ONLY = {
      "鉴定网络热门生物": { emoji: '🌌', title: '鉴定网络热门生物', desc: '你找到了隐藏的关键词' },
    };

    // ═══════════════════════════════════════════════════════
    // 【自己填写】每个关键词搜到后跳转的页面文件名
    //   · 留空 "" = 该关键词不跳转（保持仅记录、不跳页）
    //   · 注意：「昴星」同时属于两个组，这里只能配一个页面
    //   · 当某个关键词正好把一整组搜齐时，会优先走「组解锁」
    //     （弹成就 +「西红柿更新了」跳到 xhs2/xhs3），不跳本词页面
    // ═══════════════════════════════════════════════════════
    const KEYWORD_PAGES = {
      "旧城疫":   "qbdxcy.html",
      "小石子":   "qbdxsz.html",
      "月球":     "qbdyq.html",
      "昴星":     "qbdmaoxing.html",
      "人":       "qbdrenlei.html",
      "彩南":     "qbdcainan.html",
      "上爪":     "qbdshangzhua.html",
      "过目不忘": "qbdgmbw.html",
      "鉴定网络热门生物": "",   // 隐藏成就词；留空则只弹成就不跳转
    };

    // 全部关键词找齐后的成就
    const FINAL_ACHIEVEMENT = { emoji: '🏆', title: '却不在灯火阑珊处', desc: '所有关键词全部找到！' };

    // 构建搜索用全集 + 标记每个词属于哪个组
    const allKeywords = {};
    const keywordGroup = {}; // key → group index
    GROUPS.forEach((g, gi) => {
      g.keywords.forEach(kw => {
        allKeywords[kw.toLowerCase()] = kw;
        keywordGroup[kw.toLowerCase()] = gi;
      });
    });
    // 成就关键词也加入搜索
    for (const k in ACHIEVEMENT_ONLY) {
      allKeywords[k.toLowerCase()] = k;
    }

    const totalKeywords = Object.keys(keywordGroup).length; // 不含成就关键词

    // 取某个关键词配置的跳转页面（没配或为空则返回 null）
    function pageFor(matched) {
      const p = KEYWORD_PAGES[matched];
      return (p && p.trim()) ? p.trim() : null;
    }

    // ── DOM ──
    const form          = document.getElementById('searchForm');
    const input         = document.getElementById('searchInput');
    const modalMask     = document.getElementById('modalMask');
    const modalTitle    = document.getElementById('modalTitle');
    const modalCloseBtn = document.getElementById('modalCloseBtn');
    const modalLaterBtn = document.getElementById('modalLaterBtn');   // ★ 新增：一会再去

    // ── 已解锁的组 (防重复弹窗) ──
    function getUnlockedGroups() {
      try { return JSON.parse(localStorage.getItem('qbd-groups-unlocked') || '[]'); }
      catch (e) { return []; }
    }
    function markGroupUnlocked(gi) {
      const arr = getUnlockedGroups();
      if (arr.indexOf(gi) === -1) { arr.push(gi); }
      localStorage.setItem('qbd-groups-unlocked', JSON.stringify(arr));
    }

    // ── 成就弹窗 ──
    function showAchievement({ emoji, title, desc }) {
      const toast     = document.getElementById('achToast');
      const emojiEl   = document.getElementById('achEmoji');
      const titleEl   = document.getElementById('achTitle');
      const descEl    = document.getElementById('achDesc');
      const particles = document.getElementById('achParticles');

      emojiEl.textContent = emoji;
      titleEl.textContent = title;
      descEl.textContent  = desc;

      particles.innerHTML = '';
      for (let i = 0; i < 14; i++) {
        const p = document.createElement('span');
        p.className = 'ach-particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.top  = Math.random() * 100 + '%';
        p.style.setProperty('--dx', (Math.random() - 0.5) * 90 + 'px');
        p.style.setProperty('--dy', (Math.random() - 0.5) * 90 + 'px');
        p.style.animationDelay = Math.random() * 0.5 + 's';
        particles.appendChild(p);
      }

      toast.classList.remove('show');
      void toast.offsetWidth;
      requestAnimationFrame(() => toast.classList.add('show'));
      setTimeout(() => toast.classList.remove('show'), 5500);

      // 持久化成就
      if (title === '鉴定网络热门生物') localStorage.setItem('ach-youxiandaan', '1');
      if (title === '却不在灯火阑珊处') localStorage.setItem('ach-searchmaster', '1');
    }

    // ── "西红柿更新了" 弹窗（两个选项：一会再去 / 去看看）──
    function showUpdateModal(url) {
      modalTitle.textContent = '西红柿更新了';
      modalCloseBtn.textContent = '去 看 看 →';
      modalLaterBtn.hidden = false;                 // ★ 显示"一会再去"

      modalMask.classList.add('show');

      // 去看看 → 跳转
      modalCloseBtn.onclick = function () { window.location.href = url; };
      // 一会再去 → 关闭弹窗，留在当前搜索页
      modalLaterBtn.onclick = function () { hideModal(); };
      // 点遮罩 = 留在本页（不再像以前那样直接跳转）
      modalMask.onclick = function (ev) {
        if (ev.target === modalMask) hideModal();
      };
    }

    // 计算是否所有关键词（含鉴定网络热门生物）都找到了
    function isAllDone(found) {
      const achKeys = Object.keys(ACHIEVEMENT_ONLY).map(k => k.toLowerCase());
      return GROUPS.every(g =>
        g.keywords.every(kw => found.indexOf(kw.toLowerCase()) !== -1)
      ) && achKeys.every(ak => found.indexOf(ak) !== -1);
    }

    // ── 搜索处理 ──
    form.addEventListener('submit', function (e) {
      e.preventDefault();
      const raw = input.value.trim();
      if (!raw) { input.focus(); return; }

      const key = raw.toLowerCase();
      const matched = allKeywords[key];

      if (matched) {
        // 记录已搜到
        const found = JSON.parse(localStorage.getItem('qbd-found') || '[]');
        if (found.indexOf(key) === -1) {
          found.push(key);
          localStorage.setItem('qbd-found', JSON.stringify(found));
        }

        // 1. 成就关键词（不计入组进度）
        if (ACHIEVEMENT_ONLY[matched]) {
          showAchievement(ACHIEVEMENT_ONLY[matched]);
          if (isAllDone(found)) {
            setTimeout(() => showAchievement(FINAL_ACHIEVEMENT), 1200);
          }
          // 若给这个成就词也配了页面，则在成就弹完后跳转
          const pageA = pageFor(matched);
          if (pageA) {
            setTimeout(() => { window.location.href = pageA; }, 1400);
          }
          return;
        }

        // 2. 检查所属组是否刚刚搜齐（组解锁优先）
        const gi = keywordGroup[key];
        if (gi !== undefined) {
          const group = GROUPS[gi];
          const groupDone = group.keywords.every(kw => found.indexOf(kw.toLowerCase()) !== -1);
          const unlocked = getUnlockedGroups();

          if (groupDone && unlocked.indexOf(gi) === -1) {
            markGroupUnlocked(gi);
            const allDone = isAllDone(found);
            if (allDone) {
              showAchievement(FINAL_ACHIEVEMENT);
            }
            setTimeout(() => showUpdateModal(group.unlockUrl), allDone ? 1200 : 0);
            return; // 组解锁优先，不跳本词页面
          }
        }

        // 3. 普通情况（组未搜齐，或该组之前已解锁）→ 跳到这个关键词自己的页面
        const page = pageFor(matched);
        if (page) {
          window.location.href = page;
          return;
        }
        // 没配页面 → 静默（仅记录，不跳转）

      } else {
        // 未匹配
        modalTitle.textContent = '抱歉 本词条尚未收录';
        modalCloseBtn.textContent = '我 知 道 了';
        modalLaterBtn.hidden = true;          // ★ 该弹窗只要单按钮
        modalMask.classList.add('show');
        modalCloseBtn.onclick = hideModal;
        modalMask.onclick = function (ev) {
          if (ev.target === modalMask) hideModal();
        };
      }
    });

    function hideModal() {
      modalMask.classList.remove('show');
      modalLaterBtn.hidden = true;            // ★ 复位：隐藏"一会再去"，避免带到下一个弹窗
      input.focus();
      input.select();
    }

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && modalMask.classList.contains('show')) hideModal();
    });
  </script>

</body>
