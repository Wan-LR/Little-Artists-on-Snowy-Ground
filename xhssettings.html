<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:        #faf7f2;
      --surface:   #ffffff;
      --ink:       #1a1a1a;
      --ink-soft:  #6b6b6b;
      --ink-faint: #9a9a9a;
      --line:      #ece7df;
      --line-soft: #f4f0e8;
      --accent:    #e33932;
      --accent-soft: #fde8e7;
      --shadow:    0 1px 2px rgba(0,0,0,0.04), 0 8px 24px -12px rgba(0,0,0,0.08);
      --shadow-lift: 0 2px 4px rgba(0,0,0,0.06), 0 20px 40px -16px rgba(0,0,0,0.18);
      --radius:    14px;
      --font-display: 'Bricolage Grotesque', 'Noto Sans SC', system-ui, sans-serif;
      --font-body:    'Noto Sans SC', system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 36px 32px 96px;
    }

    @media (max-width: 640px) {
      .container { padding: 24px 18px 64px; }
    }

    /* ============================================================
       1. 顶部导航
       ============================================================ */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 24px;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--line);
    }

    .site-logo { display: inline-block; line-height: 0; }
    .site-logo img { height: 90px; width: auto; display: block; }
    @media (max-width: 640px) { .site-logo img { height: 60px; } }

    .back-link {
      font-size: 14px;
      color: var(--ink-soft);
      text-decoration: none;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      transition: all 0.2s;
    }

    .back-link:hover {
      color: var(--ink);
      border-color: var(--ink);
      transform: translateX(-2px);
    }

    /* ============================================================
       2. 页面标题
       ============================================================ */
    .page-title {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 36px;
      letter-spacing: -0.025em;
      color: var(--ink);
      margin-bottom: 28px;
    }

    @media (max-width: 640px) {
      .page-title { font-size: 28px; margin-bottom: 22px; }
    }

    /* ============================================================
       3. 设置项列表
       ============================================================ */
    .settings-list {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .settings-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line-soft);
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .settings-item:last-child { border-bottom: none; }

    .settings-item:hover {
      background: var(--line-soft);
    }

    .settings-item:active {
      background: #ede8de;
    }

    /* 图标方框 */
    .settings-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: var(--line-soft);
      color: var(--ink-soft);
      display: grid;
      place-items: center;
      flex-shrink: 0;
      transition: transform 0.15s;
    }

    .settings-item:active .settings-icon {
      transform: scale(0.92);
    }

    .settings-icon svg {
      width: 20px;
      height: 20px;
      stroke-width: 1.8;
    }

    /* 名称 */
    .settings-name {
      flex: 1;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 15px;
      color: var(--ink);
      letter-spacing: -0.005em;
    }

    /* 右箭头 */
    .settings-arrow {
      color: var(--ink-faint);
      flex-shrink: 0;
    }

    .settings-arrow svg {
      width: 16px;
      height: 16px;
      stroke-width: 2;
    }

    /* ============================================================
       内部入口 — 突出样式
       ============================================================ */
    .settings-item.internal-entry {
      background: linear-gradient(135deg, #fff5f5 0%, #fde8e7 100%);
      border-bottom: 1px solid #f5d0ce;
      position: relative;
      overflow: hidden;
    }

    .settings-item.internal-entry::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: var(--accent);
      border-radius: 0 4px 4px 0;
    }

    .settings-item.internal-entry:hover {
      background: linear-gradient(135deg, #ffefef 0%, #fcdcda 100%);
    }

    .settings-item.internal-entry .settings-icon {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 8px rgba(227, 57, 50, 0.3);
    }

    .settings-item.internal-entry .settings-name {
      color: var(--accent);
      font-weight: 700;
      font-size: 15.5px;
    }

    .settings-item.internal-entry .settings-arrow {
      color: var(--accent);
    }

    .entry-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      font-family: var(--font-display);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      background: var(--accent);
      color: #fff;
      padding: 2px 7px;
      border-radius: 4px;
      margin-left: 8px;
      vertical-align: middle;
      line-height: 1.4;
    }

    /* ============================================================
       4. 彩蛋弹窗
       ============================================================ */
    .easter-overlay {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: grid;
      place-items: center;
      background: rgba(15, 13, 10, 0.6);
      backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .easter-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .easter-box {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.2);
      padding: 36px 42px;
      text-align: center;
      max-width: 360px;
      width: 90%;
      transform: scale(0.85) translateY(20px);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .easter-overlay.show .easter-box {
      transform: scale(1) translateY(0);
    }

    .easter-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
      display: grid;
      place-items: center;
      margin: 0 auto 18px;
    }

    .easter-icon svg {
      width: 28px;
      height: 28px;
      color: #2e7d32;
      stroke-width: 2;
    }

    .easter-title {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 20px;
      color: var(--ink);
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .easter-dismiss {
      margin-top: 20px;
      padding: 10px 28px;
      border: none;
      border-radius: 999px;
      background: var(--ink);
      color: #fff;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s, transform 0.15s;
    }

    .easter-dismiss:hover {
      background: #333;
    }

    .easter-dismiss:active {
      transform: scale(0.96);
    }
  </style>
</head>
<body>

  <!-- ============================================================
       彩蛋弹窗
       ============================================================ -->

    <div class="easter-box">

  </div>

    <!-- ═══════════ 2. 页面标题 ═══════════ -->

  <script>
    /* ============================================================
       彩蛋序列检测
       7 个普通按钮编号 1-7，按照密码 334554321123322 点击后弹窗
       ============================================================ */
    const SECRET = [3,3,4,5,5,4,3,2,1,1,2,3,3,2,2];
    let inputBuffer = [];
    let bufferTimeout = null;

    const overlay = document.getElementById('easterOverlay');
    const dismissBtn = document.getElementById('easterDismiss');

    // 给所有带 data-seq 的按钮绑定事件
    document.querySelectorAll('.settings-item[data-seq]').forEach(item => {
      item.addEventListener('click', () => {
        const num = parseInt(item.getAttribute('data-seq'), 10);



        inputBuffer.push(num);

        // 只保留最近 SECRET.length 次点击
        if (inputBuffer.length > SECRET.length) {
          inputBuffer = inputBuffer.slice(-SECRET.length);
        }

        // 匹配检测
        if (inputBuffer.length === SECRET.length &&
            inputBuffer.every((v, i) => v === SECRET[i])) {
          inputBuffer = [];
          clearTimeout(bufferTimeout);
          showEaster();
        }
      });
    });

    function showEaster() {
      overlay.classList.add('show');
      document.body.style.overflow = 'hidden';
    }

    function hideEaster() {
      overlay.classList.remove('show');
      document.body.style.overflow = '';
    }

    dismissBtn.addEventListener('click', () => {
      localStorage.setItem('xhs-version', 'pl');
      window.location.href = 'xhspl.html';
    });

    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) hideEaster();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && overlay.classList.contains('show')) hideEaster();
    });
  </script>
<script src="nav.js"></script>
