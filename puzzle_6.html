<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>华容道 · 起爆器</title>
<style>
  @import url('https://gs.jurieo.com/gemini/fonts-googleapis/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap');

  :root {
    --bg:     #0a1628;
    --accent: #4a90d9;
    --light:  #a8ccf0;
    --white:  #e8f2ff;
    --border: #2a4a7a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Ma Shan Zheng', 'Noto Serif SC', serif;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 28% 22%, rgba(74,144,217,0.18) 0%, transparent 52%),
      radial-gradient(ellipse at 76% 80%, rgba(20,60,140,0.22) 0%, transparent 50%),
      repeating-linear-gradient(45deg, transparent, transparent 38px,
        rgba(74,144,217,0.022) 38px, rgba(74,144,217,0.022) 39px);
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
  }

  .subtitle {
    font-size: 0.72rem;
    color: rgba(168,204,240,0.45);
    letter-spacing: 0.28em;
    text-align: center;
    font-family: 'Noto Serif SC', serif;
  }

  /* ── 3D 卡片 ── */
  .card-scene {
    width: 442px;
    height: 442px;
    perspective: 1600px;
    position: relative;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.75s cubic-bezier(0.4, 0.2, 0.2, 1);
  }
  .card.flipped { transform: rotateY(180deg); }

  .card-scene.zooming-in {
    position: fixed;
    z-index: 100;
    transition:
      top 0.7s cubic-bezier(0.4, 0, 0.2, 1),
      left 0.7s cubic-bezier(0.4, 0, 0.2, 1),
      width 0.7s cubic-bezier(0.4, 0, 0.2, 1),
      height 0.7s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 4px;
    overflow: hidden;
  }

  .card-front { cursor: default; }

  .card-back {
    transform: rotateY(180deg);
    cursor: pointer;
  }
  .card-back img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }

  /* ── 棋盘外框 ── */
  .board-wrap {
    width: 100%;
    height: 100%;
    padding: 10px;
    background: rgba(8,18,36,0.9);
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow:
      0 0 0 1px rgba(74,144,217,0.08),
      0 10px 44px rgba(0,0,0,0.65),
      0 0 60px rgba(74,144,217,0.07),
      inset 0 1px 0 rgba(74,144,217,0.13);
  }

  #game-board {
    width: 100%;
    height: 100%;
    background: #040a14;
    position: relative;
    overflow: hidden;
    border-radius: 2px;
  }

  /* 题目 */
  .quiz-question {
    position: absolute;
    top: 24px;
    left: 0; right: 0;
    text-align: center;
    color: var(--white);
    font-family: 'Noto Serif SC', serif;
    font-size: 1.06rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 0 22px;
    text-shadow: 0 0 12px rgba(74,144,217,0.4);
  }
  .quiz-round-no {
    position: absolute;
    top: 50px;
    left: 0; right: 0;
    text-align: center;
    color: rgba(168,204,240,0.4);
    font-family: 'Noto Serif SC', serif;
    font-size: 0.66rem;
    letter-spacing: 0.24em;
  }

  /* ── 华容道滑块舞台 ── */
  .puzzle-stage {
    position: absolute;
    top: 70px; left: 0; right: 0; bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .puzzle-box {
    position: relative;
    width: 300px;
    height: 300px;
    transition: box-shadow 0.5s ease;
  }
  .puzzle-frame {
    position: absolute;
    inset: 0;
    background: #040a14;
    border-radius: 4px;
    overflow: hidden;
    box-shadow:
      inset 0 0 0 1px var(--border),
      inset 0 0 26px rgba(0,0,0,0.6);
  }

  /* 单块碎片 */
  .tile {
    position: absolute;
    width: 100px;
    height: 100px;
    background-repeat: no-repeat;
    box-shadow: inset 0 0 0 1px rgba(74,144,217,0.14);
    border-radius: 2px;
    cursor: pointer;
    transition:
      left 0.16s cubic-bezier(.4,.2,.2,1),
      top  0.16s cubic-bezier(.4,.2,.2,1),
      filter 0.2s ease, box-shadow 0.2s ease;
  }
  .tile:hover {
    filter: brightness(1.12);
    box-shadow: inset 0 0 0 1px rgba(74,144,217,0.45);
    z-index: 5;
  }

  /* 拼合完成后浮现的完整起爆器 */
  .assembled {
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    border-radius: 4px;
    overflow: hidden;
    transition: opacity 0.6s ease;
  }
  .assembled.show { opacity: 1; pointer-events: auto; }
  .assembled svg { width: 100%; height: 100%; display: block; }
  .assembled svg .btn {
    transition: filter 0.15s ease, transform 0.12s ease;
    cursor: pointer;
    transform-box: fill-box;
    transform-origin: center;
  }
  .assembled svg .btn:hover {
    filter: brightness(1.22) drop-shadow(0 0 8px rgba(255,90,74,0.85));
    transform: scale(1.05);
  }
  .assembled svg .btn:active {
    transform: scale(0.94);
    filter: brightness(0.9);
  }

  .puzzle-box.solved {
    box-shadow: 0 0 26px rgba(74,144,217,0.35);
  }

  /* ── 底部交互区 ── */
  .action-area {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .action-area.show { display: flex; animation: fadeInUp 0.4s ease; }

  .word-input-wrap { display: flex; align-items: center; gap: 8px; }
  .btn-row { display: flex; gap: 16px; }

  .btn-replay, .btn-submit {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    padding: 7px 18px;
    border: 1px solid var(--border);
    background: rgba(8,18,36,0.8);
    color: var(--light);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.25s ease;
  }
  .btn-replay:hover, .btn-submit:hover {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(74,144,217,0.2);
  }
  .btn-submit { background: rgba(74,144,217,0.2); border-color: var(--accent); }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .word-input {
    font-family: 'Noto Serif SC', serif;
    font-size: 1rem;
    letter-spacing: 0.12em;
    padding: 8px 16px;
    border: 1px solid var(--border);
    background: rgba(8,18,36,0.8);
    color: var(--white);
    border-radius: 3px;
    width: 200px;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
    text-align: center;
  }
  .word-input::placeholder { color: rgba(168,204,240,0.3); font-size: 0.82rem; letter-spacing: 0.1em; }
  .word-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(74,144,217,0.2); }
  .word-input.correct { border-color: #4ad980; box-shadow: 0 0 0 2px rgba(74,217,128,0.25); }
  .word-input.wrong {
    border-color: #d94a4a;
    box-shadow: 0 0 0 2px rgba(217,74,74,0.25);
    animation: shake 0.35s ease;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-6px); }
    75%      { transform: translateX(6px); }
  }

  .hint {
    font-size: 0.66rem;
    color: rgba(168,204,240,0.28);
    letter-spacing: 0.1em;
    text-align: center;
    font-family: 'Noto Serif SC', serif;
    transition: opacity 0.3s;
  }

  #flip-hint {
    font-size: 0.66rem;
    color: rgba(168,204,240,0.35);
    letter-spacing: 0.15em;
    text-align: center;
    font-family: 'Noto Serif SC', serif;
    opacity: 0;
    transition: opacity 0.5s ease;
    height: 1em;
  }
  #flip-hint.show { opacity: 1; }

  .container.exiting .subtitle,
  .container.exiting .action-area,
  .container.exiting .hint,
  .container.exiting #flip-hint {
    transition: opacity 0.35s ease;
    opacity: 0;
  }

  /* ───────────── 公鸡 NPC ───────────── */
  .rooster-container {
    position: fixed;
    right: 36px;
    bottom: 28px;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 14px;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .rooster-container.fade-out { opacity: 0; pointer-events: none; }

  .speech-bubble {
    position: relative;
    background: linear-gradient(135deg, rgba(244, 233, 210, 0.97), rgba(220, 207, 178, 0.95));
    color: #2a1a0a;
    padding: 14px 18px 22px 18px;
    border-radius: 4px;
    font-family: 'Noto Serif SC', serif;
    font-size: 0.86rem;
    font-weight: 500;
    line-height: 1.6;
    letter-spacing: 0.04em;
    max-width: 280px;
    min-width: 180px;
    box-shadow:
      0 6px 24px rgba(0,0,0,0.55),
      0 0 0 1px rgba(139, 90, 43, 0.5),
      inset 0 1px 0 rgba(255, 255, 255, 0.5);
    opacity: 0;
    transform: translateY(8px) scale(0.96);
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
    margin-right: 40px;
    will-change: transform, opacity;
  }
  .speech-bubble.show { opacity: 1; transform: translateY(0) scale(1); }
  .speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -10px;
    right: 32px;
    width: 0; height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 10px solid rgba(228, 215, 186, 0.96);
    filter: drop-shadow(0 2px 1px rgba(139, 90, 43, 0.4));
  }
  .speech-bubble::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px dashed rgba(139, 90, 43, 0.35);
    border-radius: 2px;
    pointer-events: none;
  }

  .next-arrow {
    position: absolute;
    right: 12px;
    bottom: 4px;
    font-size: 0.85rem;
    color: #8b5a2b;
    animation: arrow-blink 1.2s ease-in-out infinite;
  }
  @keyframes arrow-blink {
    0%, 100% { opacity: 0.25; transform: translateX(0); }
    50%      { opacity: 1;    transform: translateX(3px); }
  }

  .rooster {
    width: 260px;
    height: 260px;
    cursor: pointer;
    user-select: none;
    pointer-events: auto;
    position: relative;
    filter: drop-shadow(0 10px 18px rgba(0,0,0,0.6));
    transition: filter 0.3s ease, transform 0.2s ease;
  }
  .rooster.bobbing { animation: rooster-bob 0.8s ease-in-out 5; }
  @keyframes rooster-bob {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    25%      { transform: translateY(-9px) rotate(-2.5deg); }
    50%      { transform: translateY(0) rotate(0deg); }
    75%      { transform: translateY(-9px) rotate(2.5deg); }
  }
  .rooster:hover {
    filter: drop-shadow(0 10px 20px rgba(74,144,217,0.5))
            drop-shadow(0 8px 14px rgba(0,0,0,0.55));
  }
  .rooster img {
    width: 100%; height: 100%;
    object-fit: contain;
    display: block;
    -webkit-user-drag: none;
    pointer-events: none;
  }
  .rooster-fallback {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 8rem; line-height: 1;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="container" id="page-container">
  <p class="subtitle">互动收集 · 还原密码</p>

  <div class="card-scene" id="card-scene">
    <div class="card" id="card">
      <div class="card-face card-front" id="card-front">
        <div class="board-wrap">
          <div id="game-board">
            <div class="quiz-question" id="quiz-question">把碎片滑动复原</div>
            <div class="quiz-round-no" id="quiz-round-no">华容道 · 滑块拼图</div>

            <div class="puzzle-stage" id="puzzle-stage">
              <div class="puzzle-box" id="puzzle-box">
                <div class="puzzle-frame" id="puzzle-frame"></div>
                <div class="assembled" id="assembled"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="card-face card-back" id="card-back">
        <img id="back-img" src="images/mercury.png" alt="背面">
      </div>
    </div>
  </div>

  <div class="action-area" id="action-area">
    <div class="word-input-wrap">
      <input class="word-input" id="word-input" type="text"
             placeholder="输入密码…" autocomplete="off" spellcheck="false">
    </div>
    <div class="btn-row">
      <button class="btn-replay" id="btn-replay" onclick="resetGame()">↻ 重新打乱</button>
      <button class="btn-submit" id="btn-submit" onclick="checkPassword()">确 认</button>
    </div>
  </div>

  <p class="hint" id="main-hint"></p>
  <p id="flip-hint">点击图片可翻回正面</p>
</div>

<!-- ───────────── 公鸡 NPC ───────────── -->
<div class="rooster-container" id="rooster-container">
  <div class="speech-bubble" id="speech-bubble">
    <span id="bubble-text"></span>
    <span class="next-arrow">▸</span>
  </div>
  <div class="rooster" id="rooster">
    <img id="rooster-img" src="images/mojingji.png" alt="公鸡"
         onerror="this.style.display='none';document.getElementById('rooster-fallback').style.display='flex';">
    <div class="rooster-fallback" id="rooster-fallback" style="display:none;">🐓</div>
  </div>
</div>

<script>
  // ═══════════════════════════════════════════
  const BACK_IMAGE   = 'images/mercury.png';  // ← 换成这一关的背面图（星球图）
  const PASSWORD     = 'atlas';             // ← 换成这一关的密码
  const PUZZLE_ID    = 'puzzle_6';
  const PUZZLE_INDEX = 5;                      // 九宫格里的第 6 格（索引 5）
  const RETURN_URL   = 'mxhuitu.html';
  // ═══════════════════════════════════════════

  // ── 拼图目标：一个只有一个按钮的起爆器（内联 SVG，会被切成 3×3 九块）──
  const DEVICE_SVG = `
<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bodyG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c3648"/>
      <stop offset="0.5" stop-color="#161f2e"/>
      <stop offset="1" stop-color="#0c1320"/>
    </linearGradient>
    <radialGradient id="redBtn" cx="0.38" cy="0.3" r="0.85">
      <stop offset="0" stop-color="#ff7a64"/>
      <stop offset="0.55" stop-color="#e0392a"/>
      <stop offset="1" stop-color="#8f1c14"/>
    </radialGradient>
    <radialGradient id="ledG" cx="0.4" cy="0.35" r="0.85">
      <stop offset="0" stop-color="#ff8a7a"/>
      <stop offset="1" stop-color="#c2302a"/>
    </radialGradient>
    <linearGradient id="ringG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#27334c"/>
      <stop offset="1" stop-color="#0e1626"/>
    </linearGradient>
  </defs>

  <rect width="300" height="300" fill="#040a14"/>

  <!-- 天线 -->
  <line x1="150" y1="66" x2="150" y2="18" stroke="#8aa0c0" stroke-width="3" stroke-linecap="round"/>
  <circle cx="150" cy="16" r="5" fill="#a8ccf0"/>

  <!-- 通往炸药的两根导线 -->
  <path d="M124 250 C 118 280, 92 286, 74 300" fill="none" stroke="#d6392a" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M176 250 C 182 280, 208 286, 226 300" fill="none" stroke="#3f6098" stroke-width="4.5" stroke-linecap="round"/>

  <!-- 机身 -->
  <rect x="62" y="62" width="176" height="190" rx="20" fill="url(#bodyG)" stroke="#3f6098" stroke-width="1.8"/>
  <rect x="68" y="68" width="164" height="178" rx="15" fill="none" stroke="rgba(120,180,255,0.10)" stroke-width="1"/>

  <!-- 四角螺丝 -->
  <circle cx="80" cy="80" r="4" fill="#0e1626" stroke="#3a5a8a" stroke-width="1"/>
  <circle cx="220" cy="80" r="4" fill="#0e1626" stroke="#3a5a8a" stroke-width="1"/>
  <circle cx="80" cy="234" r="4" fill="#0e1626" stroke="#3a5a8a" stroke-width="1"/>
  <circle cx="220" cy="234" r="4" fill="#0e1626" stroke="#3a5a8a" stroke-width="1"/>

  <!-- 指示灯 + ARMED -->
  <circle cx="92" cy="100" r="6" fill="url(#ledG)"/>
  <circle cx="92" cy="100" r="11" fill="none" stroke="rgba(255,90,74,0.4)" stroke-width="2"/>
  <text x="108" y="104" font-size="10" fill="#a8ccf0" font-family="monospace" letter-spacing="1">ARMED</text>

  <!-- 唯一的大红按钮 -->
  <ellipse cx="150" cy="176" rx="50" ry="17" fill="#0a1322"/>
  <rect x="104" y="150" width="92" height="28" rx="13" fill="url(#ringG)" stroke="#3a5a8a" stroke-width="1.4"/>
  <circle cx="150" cy="150" r="40" fill="url(#ringG)" stroke="#3a5a8a" stroke-width="1.6"/>
  <circle class="btn" cx="150" cy="146" r="34" fill="url(#redBtn)" stroke="#6a140e" stroke-width="1.5"/>
  <ellipse cx="139" cy="134" rx="13" ry="7" fill="rgba(255,255,255,0.35)"/>

  <!-- 底部危险标牌 -->
  <rect x="84" y="210" width="132" height="22" rx="4" fill="#11192a" stroke="#3a5a8a" stroke-width="1"/>
  <path d="M96 227 l6 -12 l6 12 z" fill="#e8c84a" stroke="#11192a" stroke-width="0.8"/>
  <rect x="101.1" y="219" width="1.8" height="4.6" fill="#11192a"/>
  <circle cx="102" cy="225.6" r="1" fill="#11192a"/>
  <path d="M192 227 l6 -12 l6 12 z" fill="#e8c84a" stroke="#11192a" stroke-width="0.8"/>
  <rect x="197.1" y="219" width="1.8" height="4.6" fill="#11192a"/>
  <circle cx="198" cy="225.6" r="1" fill="#11192a"/>
  <text x="150" y="225" text-anchor="middle" font-size="9" fill="#e8c84a" font-family="monospace" letter-spacing="2">DETONATOR</text>
</svg>`;

  const DEVICE_URI = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(DEVICE_SVG);

  // ── 拼图状态 ──
  const SIZE = 3;          // 3×3
  const CELL = 100;        // 每块 100px → 拼图共 300px
  const EMPTY = SIZE * SIZE - 1;  // 用 id=8 表示空位
  let board = [];          // board[位置] = 该位置上的块 id
  let emptyPos = EMPTY;
  let tileEls = [];

  let isAnimating = false;
  let gameSolved = false;

  let gamePhase = 'intro';   // intro → playing → answer → ending → done
  let dialogueIndex = 0;

  const dialogues = {
    intro: [
      '咯咯咯——',
      '来玩玩华容道吧',

    ],
    playing: [

      '别急，实在拼不出来可以刷新'
    ],
    // 拼好后的反应
    answer: [
      '咯咯咯！来欣赏艺术吧',
      '密码是 ' + PASSWORD + '，把它输进去吧'
    ],
    ending: [
      '相比起别的方向，航空是我们遇到难题最多的领域',
      '而我们依旧造出了登月的火箭',
      '但就在发射的前一个星期，超脑提醒我们不要进行登月，甚至还怂恿我们放弃天文学',
      '虽然我们的生活已经离不开超脑，但大部分人并没有相信一台机器所说的话',
      '它警告我们，一旦启动火箭，它会在某个精确的时间点爆炸',
      '我们经过计算后得出，这个时间点已经渡过了前面所有有可能出事的节点，如果要炸早就炸了',
      '所以火箭还是按计划发射了',
      '但这架载着希望的火箭，真的在它说的那个时间点爆炸了',
      '我知道历史上的统治者有时候为了巩固自己的地位，会先制造麻烦再解决麻烦',
      '不论是不是这个路线，超脑做到了',
      '我们也意识到了，这个世界的规则并不是固定的',
      '让它归位吧，咯咯咯——'
    ]
  };

  window.onload = () => {
    document.getElementById('back-img').src = BACK_IMAGE;

    document.getElementById('card-back').addEventListener('click', () => {
      if (gameSolved && gamePhase === 'done') flipCard();
    });

    document.getElementById('rooster').addEventListener('click', clickRooster);

    document.getElementById('word-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkPassword();
    });

    setupBoard();

    playEnterAnimation(() => {
      setTimeout(() => { showDialogue(dialogues.intro[0]); }, 250);
    });
  };

  // ── 初始化棋盘 ──
  function setupBoard() {
    document.getElementById('quiz-question').textContent = '把碎片滑动复原';
    document.getElementById('quiz-round-no').textContent = '华容道 · 滑块拼图';
    buildTiles();
    scramble();
    renderPositions();
  }

  function buildTiles() {
    const frame = document.getElementById('puzzle-frame');
    frame.innerHTML = '';
    tileEls = [];
    for (let id = 0; id < EMPTY; id++) {
      const col = id % SIZE, row = Math.floor(id / SIZE);
      const t = document.createElement('div');
      t.className = 'tile';
      t.style.backgroundImage = `url("${DEVICE_URI}")`;
      t.style.backgroundSize = (CELL * SIZE) + 'px ' + (CELL * SIZE) + 'px';
      t.style.backgroundPosition = `-${col * CELL}px -${row * CELL}px`;
      t.addEventListener('click', () => onTileClick(id));
      frame.appendChild(t);
      tileEls[id] = t;
    }
  }

  // ── 滑块逻辑 ──
  function adjacent(a, b) {
    const ar = Math.floor(a / SIZE), ac = a % SIZE;
    const br = Math.floor(b / SIZE), bc = b % SIZE;
    return (ar === br && Math.abs(ac - bc) === 1) ||
           (ac === bc && Math.abs(ar - br) === 1);
  }
  function neighborsOf(pos) {
    const out = [];
    for (let p = 0; p < SIZE * SIZE; p++) if (adjacent(p, pos)) out.push(p);
    return out;
  }
  function isSolved() {
    for (let i = 0; i < SIZE * SIZE; i++) if (board[i] !== i) return false;
    return true;
  }

  // 从复原态做若干次随机合法移动 → 保证可解
  function scramble() {
    board = [];
    for (let i = 0; i < SIZE * SIZE; i++) board[i] = i;
    emptyPos = EMPTY;

    let prev = -1, moves = 60;
    for (let i = 0; i < moves; i++) {
      const cand = neighborsOf(emptyPos).filter(p => p !== prev);
      const pick = cand[Math.floor(Math.random() * cand.length)];
      board[emptyPos] = board[pick];
      board[pick] = EMPTY;
      prev = emptyPos;
      emptyPos = pick;
    }
    // 极小概率正好复原 → 再随便挪两下
    if (isSolved()) {
      const n = neighborsOf(emptyPos);
      const p = n[0];
      board[emptyPos] = board[p]; board[p] = EMPTY; emptyPos = p;
    }
  }

  function renderPositions() {
    for (let id = 0; id < EMPTY; id++) {
      const pos = board.indexOf(id);
      const col = pos % SIZE, row = Math.floor(pos / SIZE);
      tileEls[id].style.left = (col * CELL) + 'px';
      tileEls[id].style.top  = (row * CELL) + 'px';
    }
  }

  function onTileClick(id) {
    if (gamePhase !== 'playing' || isAnimating || gameSolved) return;
    const pos = board.indexOf(id);
    if (!adjacent(pos, emptyPos)) return;

    board[emptyPos] = id;
    board[pos] = EMPTY;
    emptyPos = pos;
    renderPositions();

    if (isSolved()) onPuzzleSolved();
  }

  // ── 公鸡说话 / 摆动 ──
  function showDialogue(text) {
    const bubble = document.getElementById('speech-bubble');
    const bubbleText = document.getElementById('bubble-text');
    const rooster = document.getElementById('rooster');
    bubbleText.textContent = text;
    bubble.classList.remove('show');
    void bubble.offsetWidth;
    bubble.classList.add('show');
    rooster.classList.remove('bobbing');
    void rooster.offsetWidth;
    rooster.classList.add('bobbing');
  }
  function hideDialogue() {
    document.getElementById('speech-bubble').classList.remove('show');
    document.getElementById('rooster').classList.remove('bobbing');
  }

  function clickRooster() {
    if (gamePhase === 'intro') {
      dialogueIndex++;
      if (dialogueIndex < dialogues.intro.length) {
        showDialogue(dialogues.intro[dialogueIndex]);
      } else {
        gamePhase = 'playing';
        dialogueIndex = -1;
        hideDialogue();
        document.getElementById('main-hint').textContent = '点击空格旁的碎片，把起爆器拼回原样';
      }
    } else if (gamePhase === 'playing') {
      dialogueIndex = (dialogueIndex + 1) % dialogues.playing.length;
      showDialogue(dialogues.playing[dialogueIndex]);
    } else if (gamePhase === 'answer') {
      showDialogue(dialogues.answer[1]);
    } else if (gamePhase === 'ending') {
      dialogueIndex++;
      if (dialogueIndex < dialogues.ending.length) {
        showDialogue(dialogues.ending[dialogueIndex]);
      } else {
        hideDialogue();
        gamePhase = 'done';
        setTimeout(() => triggerFlyOut(), 450);
      }
    }
  }

  // ── 拼好了 ──
  function onPuzzleSolved() {
    if (gamePhase !== 'playing') return;
    isAnimating = true;
    gamePhase = 'answer';
    document.getElementById('main-hint').textContent = '';

    // 浮现完整起爆器（只有一个可按的红色按钮，可悬停 / 按下）
    const asm = document.getElementById('assembled');
    asm.innerHTML = DEVICE_SVG;
    asm.classList.add('show');
    document.getElementById('puzzle-box').classList.add('solved');
    document.getElementById('quiz-question').textContent = '起爆器拼好了';

    const rooster = document.getElementById('rooster');
    rooster.classList.remove('bobbing');
    void rooster.offsetWidth;
    rooster.classList.add('bobbing');

    showDialogue(dialogues.answer[0]);
    setTimeout(() => showDialogue(dialogues.answer[1]), 1700);
    setTimeout(onGameComplete, 2050);
  }

  function onGameComplete() {
    gameSolved = true;
    isAnimating = false;

    document.getElementById('quiz-round-no').style.display = 'none';
    document.getElementById('action-area').classList.add('show');
    document.getElementById('main-hint').style.opacity = '0';

    setTimeout(() => { document.getElementById('word-input').focus(); }, 400);
  }

  function resetGame() {
    gameSolved = false;
    isAnimating = false;
    gamePhase = 'playing';
    dialogueIndex = -1;
    hideDialogue();

    const asm = document.getElementById('assembled');
    asm.classList.remove('show');
    asm.innerHTML = '';
    document.getElementById('puzzle-box').classList.remove('solved');

    document.getElementById('quiz-question').textContent = '把碎片滑动复原';
    document.getElementById('quiz-question').style.display = '';
    document.getElementById('quiz-round-no').style.display = '';

    document.getElementById('action-area').classList.remove('show');
    document.getElementById('main-hint').style.opacity = '';
    document.getElementById('main-hint').textContent = '点击空格旁的碎片，把起爆器拼回原样';

    const input = document.getElementById('word-input');
    input.value = '';
    input.disabled = false;
    input.classList.remove('correct', 'wrong');

    const card = document.getElementById('card');
    if (card.classList.contains('flipped')) card.classList.remove('flipped');
    document.getElementById('flip-hint').classList.remove('show');

    scramble();
    renderPositions();
  }

  function flipCard() {
    const card = document.getElementById('card');
    const nowFlipped = card.classList.toggle('flipped');
    document.getElementById('flip-hint').classList.add('show');

    if (nowFlipped) {
      document.getElementById('flip-hint').textContent = '听我说完先…';
      setTimeout(() => {
        gamePhase = 'ending';
        dialogueIndex = 0;
        showDialogue(dialogues.ending[0]);
      }, 850);
    } else {
      document.getElementById('flip-hint').textContent = '密码已解锁,再次点击图片查看';
    }
  }

  // ── 入场展开动画（与其它 puzzle 完全一致）──
  function playEnterAnimation(onDone) {
    let originRaw = sessionStorage.getItem('puzzle_origin');
    let origin = null;
    if (originRaw) { try { origin = JSON.parse(originRaw); } catch (e) {} }

    const scene = document.getElementById('card-scene');

    if (!origin || origin.index !== PUZZLE_INDEX) {
      if (onDone) onDone();
      return;
    }

    const finalRect = scene.getBoundingClientRect();

    scene.classList.add('zooming-in');
    scene.style.left   = origin.left + 'px';
    scene.style.top    = origin.top + 'px';
    scene.style.width  = origin.width + 'px';
    scene.style.height = origin.height + 'px';

    void scene.offsetWidth;

    requestAnimationFrame(() => {
      scene.style.left   = finalRect.left + 'px';
      scene.style.top    = finalRect.top + 'px';
      scene.style.width  = finalRect.width + 'px';
      scene.style.height = finalRect.height + 'px';
    });

    setTimeout(() => {
      scene.classList.remove('zooming-in');
      scene.style.left = ''; scene.style.top = '';
      scene.style.width = ''; scene.style.height = '';
      if (onDone) onDone();
    }, 720);
  }

  // ── 飞回九宫格（与其它 puzzle 完全一致）──
  function triggerFlyOut() {
    const scene = document.getElementById('card-scene');
    const r = scene.getBoundingClientRect();

    sessionStorage.setItem('puzzle_returning', JSON.stringify({
      index: PUZZLE_INDEX,
      from: { left: r.left, top: r.top, width: r.width, height: r.height }
    }));

    document.getElementById('page-container').classList.add('exiting');
    document.getElementById('rooster-container').classList.add('fade-out');
    document.getElementById('flip-hint').textContent = '即将返回大九宫格…';

    scene.classList.add('zooming-in');
    scene.style.left   = r.left + 'px';
    scene.style.top    = r.top + 'px';
    scene.style.width  = r.width + 'px';
    scene.style.height = r.height + 'px';
    void scene.offsetWidth;

    requestAnimationFrame(() => {
      scene.style.transition =
        'top 0.5s ease, left 0.5s ease, width 0.5s ease, height 0.5s ease, opacity 0.5s ease';
      scene.style.opacity = '0';
      scene.style.left   = (r.left + r.width * 0.15) + 'px';
      scene.style.top    = (r.top + r.height * 0.15) + 'px';
      scene.style.width  = (r.width * 0.7) + 'px';
      scene.style.height = (r.height * 0.7) + 'px';
    });

    setTimeout(() => { window.location.href = RETURN_URL; }, 550);
  }

  function checkPassword() {
    const input = document.getElementById('word-input');
    const val = input.value.trim();

    if (val.toLowerCase() === PASSWORD.toLowerCase()) {
      input.classList.remove('wrong');
      input.classList.add('correct');

      const card = document.getElementById('card');
      if (!card.classList.contains('flipped')) flipCard();

      localStorage.setItem(PUZZLE_ID + '_unlocked', 'true');
      input.disabled = true;
    } else {
      input.classList.remove('correct', 'wrong');
      void input.offsetWidth;
      input.classList.add('wrong');
      input.value = '';
      setTimeout(() => input.classList.remove('wrong'), 400);
    }
  }
</script>
