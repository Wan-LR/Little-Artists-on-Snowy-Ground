<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>END</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Noto+Serif+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep: #050810;
    --bg-soft: #0c1220;
    --text-warm: #e8e0d0;
    --text-dim: #9890a0;
    --gold: #d4a574;
    --reveal: #c46a6a;
    --star: #f8f4e8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--bg-deep);
    color: var(--text-warm);
    font-family: 'Noto Serif SC', serif;
    overflow: hidden;
    cursor: default;
  }

  body {
    background:
      radial-gradient(ellipse at 30% 20%, rgba(40, 50, 80, 0.25), transparent 60%),
      radial-gradient(ellipse at 70% 80%, rgba(80, 50, 60, 0.18), transparent 55%),
      linear-gradient(to bottom, var(--bg-deep) 0%, var(--bg-soft) 50%, var(--bg-deep) 100%);
    position: relative;
  }

  /* 开场白色遮罩 */
  .flash {
    position: fixed;
    inset: 0;
    background: #f8f4e8;
    z-index: 100;
    pointer-events: none;
    animation: flashOut 2.8s cubic-bezier(0.65, 0, 0.35, 1) forwards;
  }

  /* 星空画布 */
  #stars {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    opacity: 0;
    animation: fadeStars 4s ease-out 1.8s forwards;
  }

  /* 颗粒噪点 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.9  0 0 0 0 0.88  0 0 0 0 0.82  0 0 0 0.06 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    opacity: 0.5;
    pointer-events: none;
    z-index: 2;
    mix-blend-mode: overlay;
  }

  /* 装饰边框 */
  .frame {
    position: fixed;
    inset: 32px;
    border: 1px solid rgba(212, 165, 116, 0.12);
    pointer-events: none;
    z-index: 3;
    opacity: 0;
    animation: fadeIn 2s ease-out 2.5s forwards;
  }
  .frame::before, .frame::after {
    content: '';
    position: absolute;
    width: 12px;
    height: 12px;
    border: 1px solid rgba(212, 165, 116, 0.4);
  }
  .frame::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
  .frame::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

  /* 主容器 */
  .stage {
    position: relative;
    z-index: 4;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 0 24px;
    text-align: center;
  }

  /* END 标题 */
  .end-mark {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(80px, 14vw, 180px);
    letter-spacing: 0.35em;
    color: var(--gold);
    text-shadow:
      0 0 20px rgba(212, 165, 116, 0.3),
      0 0 60px rgba(212, 165, 116, 0.1);
    margin-right: -0.35em; /* 抵消末尾字间距 */
    opacity: 0;
    transform: translateY(20px);
    animation: rise 2.5s cubic-bezier(0.2, 0.8, 0.2, 1) 3s forwards;
    position: relative;
  }

  .end-mark::after {
    content: '';
    position: absolute;
    bottom: -24px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    animation: lineGrow 2s ease-out 4.5s forwards;
  }

  /* 感谢游玩 */
  .thanks {
    margin-top: 80px;
    font-size: clamp(16px, 1.8vw, 22px);
    font-weight: 300;
    letter-spacing: 0.5em;
    color: var(--text-dim);
    margin-right: -0.5em;
    opacity: 0;
    animation: rise 2s ease-out 5.5s forwards;
  }

  /* 主信息 */
  .message {
    margin-top: 56px;
    font-size: clamp(17px, 1.9vw, 24px);
    font-weight: 400;
    letter-spacing: 0.15em;
    line-height: 2;
    color: var(--text-warm);
    opacity: 0;
    animation: rise 2.2s ease-out 7s forwards;
    max-width: 720px;
  }

  .name {
    display: inline-block;
    position: relative;
    transition: color 0.4s ease, text-shadow 0.4s ease;
    min-width: 2em;
  }

  .name.glitching {
    color: var(--reveal);
    text-shadow:
      0 0 12px rgba(196, 106, 106, 0.6),
      1px 0 0 rgba(196, 106, 106, 0.4),
      -1px 0 0 rgba(120, 180, 200, 0.4);
  }

  .name.settled {
    color: var(--text-warm);
    text-shadow: 0 0 14px rgba(232, 224, 208, 0.25);
  }

  /* 底部提示 */
  .hint {
    position: fixed;
    bottom: 56px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    letter-spacing: 0.4em;
    color: var(--text-dim);
    opacity: 0;
    animation: fadeIn 3s ease-out 13.5s forwards;
    z-index: 4;
  }

  /* 动画关键帧 */
  @keyframes flashOut {
    0%   { opacity: 1; }
    35%  { opacity: 1; }
    100% { opacity: 0; visibility: hidden; }
  }
  @keyframes fadeStars {
    to { opacity: 1; }
  }
  @keyframes fadeIn {
    to { opacity: 1; }
  }
  @keyframes rise {
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes lineGrow {
    to { width: 220px; }
  }

  @media (max-width: 600px) {
    .frame { inset: 16px; }
    .thanks { margin-top: 60px; letter-spacing: 0.4em; }
    .message { margin-top: 40px; letter-spacing: 0.1em; padding: 0 8px; }
    .hint { bottom: 32px; font-size: 11px; }
  }
</style>
</head>
<body>

<div class="flash"></div>
<canvas id="stars"></canvas>
<div class="frame"></div>

<div class="stage">
  <h1 class="end-mark">END</h1>
  <div class="thanks">感谢你的游玩</div>
  <p class="message">
    你成功帮助<span class="name" id="name-a">李远</span>删除了<span class="name" id="name-b">在昴星</span>留下的痕迹
  </p>
</div>

<div class="hint">— 真相 ——</div>

<script>
/* ============= 星空 ============= */
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let stars = [];
let pleiades = [];

function resize() {
  canvas.width = window.innerWidth * devicePixelRatio;
  canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.scale(devicePixelRatio, devicePixelRatio);
  initStars();
}

function initStars() {
  stars = [];
  const count = Math.floor((window.innerWidth * window.innerHeight) / 4500);
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: Math.random() * 1.2 + 0.2,
      a: Math.random() * 0.6 + 0.2,
      twinkleSpeed: Math.random() * 0.015 + 0.003,
      twinklePhase: Math.random() * Math.PI * 2
    });
  }

  // 昴星团（七姐妹星）—— 在右上角
  const cx = window.innerWidth * 0.82;
  const cy = window.innerHeight * 0.22;
  const offsets = [
    [0, 0], [22, -14], [-18, -8], [14, 18], [-30, 10], [38, 6], [-8, 26]
  ];
  pleiades = offsets.map(([dx, dy], i) => ({
    x: cx + dx,
    y: cy + dy,
    r: i === 0 ? 1.8 : 1.3 + Math.random() * 0.4,
    a: 0.7 + Math.random() * 0.3,
    twinkleSpeed: 0.005 + Math.random() * 0.005,
    twinklePhase: Math.random() * Math.PI * 2
  }));
}

function draw() {
  ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

  // 普通星辰
  for (const s of stars) {
    s.twinklePhase += s.twinkleSpeed;
    const a = s.a * (0.6 + 0.4 * Math.sin(s.twinklePhase));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(248, 244, 232, ${a})`;
    ctx.fill();
  }

  // 昴星团 —— 带柔光
  for (const s of pleiades) {
    s.twinklePhase += s.twinkleSpeed;
    const a = s.a * (0.7 + 0.3 * Math.sin(s.twinklePhase));
    const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r * 6);
    grad.addColorStop(0, `rgba(248, 244, 232, ${a})`);
    grad.addColorStop(0.4, `rgba(212, 200, 180, ${a * 0.3})`);
    grad.addColorStop(1, 'rgba(212, 200, 180, 0)');
    ctx.fillStyle = grad;
    ctx.fillRect(s.x - s.r * 6, s.y - s.r * 6, s.r * 12, s.r * 12);

    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(248, 244, 232, ${a})`;
    ctx.fill();
  }

  requestAnimationFrame(draw);
}

resize();
draw();
window.addEventListener('resize', resize);

/* ============= 文字反转效果 ============= */
const scrambleChars = '李远昴星痕迹删除帮助留下在的成功你了';

function scramble(el, target, duration = 1400) {
  return new Promise(resolve => {
    const start = performance.now();
    const finalLen = target.length;
    el.classList.add('glitching');

    function frame(now) {
      const t = Math.min(1, (now - start) / duration);
      // 越接近结尾，越多字符已经定下来
      const settled = Math.floor(t * finalLen);
      let out = '';
      for (let i = 0; i < finalLen; i++) {
        if (i < settled) {
          out += target[i];
        } else {
          out += scrambleChars[Math.floor(Math.random() * scrambleChars.length)];
        }
      }
      el.textContent = out;

      if (t < 1) {
        requestAnimationFrame(frame);
      } else {
        el.textContent = target;
        el.classList.remove('glitching');
        el.classList.add('settled');
        setTimeout(() => el.classList.remove('settled'), 1500);
        resolve();
      }
    }
    requestAnimationFrame(frame);
  });
}

const nameA = document.getElementById('name-a');
const nameB = document.getElementById('name-b');

// 信息出现后等待数秒，再揭示真相
setTimeout(async () => {
  await Promise.all([
    scramble(nameA, '昴星', 1600),
    scramble(nameB, '李远', 1600)
  ]);
}, 10500);

</script>

</body>
</html>
