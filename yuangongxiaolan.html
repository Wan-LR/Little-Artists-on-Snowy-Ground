<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>内网工作台 · 个人中心</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       设计令牌 (沿用站点配色)
       ============================================================ */
    :root {
      --bg:        #faf7f2;
      --surface:   #ffffff;
      --ink:       #1a1a1a;
      --ink-soft:  #6b6b6b;
      --ink-faint: #9a9a9a;
      --line:      #ece7df;
      --line-soft: #f4f0e8;
      --accent:    #e33932;
      --accent-soft: #fde8e7;
      --shadow:    0 1px 2px rgba(0,0,0,0.04), 0 8px 24px -12px rgba(0,0,0,0.08);
      --shadow-lift: 0 2px 4px rgba(0,0,0,0.06), 0 20px 40px -16px rgba(0,0,0,0.18);
      --radius:    14px;
      --online:    #22c55e;
      --font-display: 'Bricolage Grotesque', 'Noto Sans SC', system-ui, sans-serif;
      --font-body:    'Noto Sans SC', system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 36px 32px 96px;
    }

    @media (max-width: 640px) {
      .container { padding: 24px 18px 64px; }
    }


    /* ============================================================
       1. 顶部导航 (Logo + 内网标识 + 返回)
       ============================================================ */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 24px;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--line);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .site-logo { display: inline-block; line-height: 0; }
    .site-logo img { height: 90px; width: auto; display: block; }
    @media (max-width: 640px) { .site-logo img { height: 60px; } }

    .intranet-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 11px;
      background: #fef7e0;
      border: 1px solid #f4d893;
      border-radius: 999px;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 11.5px;
      color: #7c5a17;
      letter-spacing: 0.05em;
    }

    .intranet-badge::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #c8941e;
    }

    .back-link {
      font-size: 14px;
      color: var(--ink-soft);
      text-decoration: none;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      transition: all 0.2s;
    }

    .back-link:hover {
      color: var(--ink);
      border-color: var(--ink);
      transform: translateX(-2px);
    }


    /* ============================================================
       2. 个人信息横幅 (头像 + 姓名 + 工号 + 部门)
       ============================================================ */
    .profile-banner {
      display: flex;
      align-items: center;
      gap: 24px;
      padding: 24px 28px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      margin-bottom: 28px;
    }

    @media (max-width: 600px) {
      .profile-banner {
        flex-direction: column;
        text-align: center;
        gap: 18px;
        padding: 24px 20px;
      }
    }

    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      overflow: hidden;
      background: linear-gradient(135deg, #e33932, #c2241d);
      flex-shrink: 0;
      box-shadow: var(--shadow);
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .profile-info {
      flex: 1;
      min-width: 0;
    }

    .profile-name {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    @media (max-width: 600px) {
      .profile-name { justify-content: center; }
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      background: rgba(34, 197, 94, 0.12);
      border-radius: 999px;
      font-family: var(--font-body);
      font-size: 11.5px;
      font-weight: 600;
      color: var(--online);
      letter-spacing: 0.02em;
    }

    .status-pill::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--online);
    }

    .profile-role {
      font-size: 14px;
      color: var(--ink-soft);
      margin-bottom: 12px;
    }

    .profile-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 22px;
      font-size: 12.5px;
      color: var(--ink-faint);
    }

    @media (max-width: 600px) {
      .profile-meta { justify-content: center; gap: 16px; }
    }

    .profile-meta .label {
      color: var(--ink-faint);
      margin-right: 5px;
    }

    .profile-meta .value {
      color: var(--ink-soft);
      font-weight: 600;
      font-family: var(--font-display);
      font-variant-numeric: tabular-nums;
    }


    /* ============================================================
       3. 快捷功能区标题
       ============================================================ */
    .section-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.01em;
      margin-bottom: 14px;
      color: var(--ink);
    }


    /* ============================================================
       4. 功能按钮网格 (4 × 2)
       ============================================================ */
    .action-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    @media (max-width: 700px) {
      .action-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .action-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 26px 14px 22px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      text-align: center;
      text-decoration: none;
      color: inherit;
      cursor: not-allowed;
      opacity: 0.55;
      transition: all 0.25s ease;
    }

    /* 唯一可点击的卡片 (工单) */
    .action-card.active {
      cursor: pointer;
      opacity: 1;
      border-color: rgba(227, 57, 50, 0.25);
      box-shadow: var(--shadow);
    }

    .action-card.active:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-lift);
      border-color: var(--accent);
    }

    .action-card.active:active {
      transform: translateY(-1px);
    }

    /* 图标方块 */
    .action-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--line-soft);
      color: var(--ink-soft);
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .action-icon svg {
      width: 24px;
      height: 24px;
      stroke-width: 1.7;
    }

    /* 工单(可点击)的图标:红色调,引导视觉 */
    .action-card.active .action-icon {
      background: var(--accent-soft);
      color: var(--accent);
    }

    .action-name {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: -0.005em;
      color: var(--ink);
    }

    /* "待处理"角标 (工单上的红色数字) */
    .action-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      min-width: 18px;
      height: 18px;
      padding: 0 5px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 10.5px;
      display: grid;
      place-items: center;
      box-shadow: 0 2px 6px rgba(227, 57, 50, 0.35);
    }

    .action-card { position: relative; }
  </style>
</head>
<body>
  <div class="container">

    <!-- ═══════════ 1. 顶部导航 ═══════════ -->
    <header>
      <div class="header-left">
        <a href="xhs1.html" class="site-logo">
          <img src="images/tomatologo.png" alt="内网">
        </a>
        <span class="intranet-badge">内网工作台</span>
      </div>
      <a href="javascript:history.back()" class="back-link">← 返回</a>
    </header>

    <!-- ═══════════ 2. 个人信息卡 ═══════════
         头像 + 姓名 + 部门职位 + 工号/状态 -->
    <div class="profile-banner">
      <div class="profile-avatar">
        <img src="images/lanji.png" alt="头像">
      </div>
      <div class="profile-info">
        <div class="profile-name">
          萧蓝
          <span class="status-pill">在职</span>
        </div>
        <div class="profile-role">客服</div>
        <div class="profile-meta">
          <div><span class="label">工号</span><span class="value">TOMATO642</span></div>
          <div><span class="label">直属主管</span><span class="value">XXX</span></div>
          <div><span class="label">入职</span><span class="value">202X.03.15</span></div>
        </div>
      </div>
    </div>

    <!-- ═══════════ 3. 快捷功能区 ═══════════ -->
    <h2 class="section-title">快捷功能</h2>

    <!-- 8 个按钮,只有"工单"那个可点 -->
    <div class="action-grid">

      <!-- ★ 1. 工单 (唯一可点!) -->
      <a class="action-card active" href="xhsgongdan.html">
        <span class="action-badge"></span>
        <div class="action-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="9" y1="13" x2="15" y2="13"/>
            <line x1="9" y1="17" x2="13" y2="17"/>
          </svg>
        </div>
        <div class="action-name">工单</div>
      </a>

      <!-- 2. 审批 -->
      <div class="action-card" aria-disabled="true">
        <div class="action-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <polyline points="9 15 11 17 15 13"/>
          </svg>
        </div>
        <div class="action-name">审批</div>
      </div>

      <!-- 3. 请假 -->
      <div class="action-card" aria-disabled="true">
        <div class="action-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
        </div>
        <div class="action-name">请假</div>
      </div>

      <!-- 4. 报销 -->
      <div class="action-card" aria-disabled="true">
        <div class="action-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 2v20l3-2 3 2 3-2 3 2 3-2 3 2V2l-3 2-3-2-3 2-3-2-3 2-3-2z"/>
            <line x1="8" y1="9" x2="16" y2="9"/>
            <line x1="8" y1="13" x2="14" y2="13"/>
          </svg>
        </div>
        <div class="action-name">报销</div>
      </div>

      <!-- 5. 考勤 -->
      <div class="action-card" aria-disabled="true">
        <div class="action-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        <div class="action-name">考勤</div>
      </div>

      <!-- 6. 通讯录 -->
      <div class="action-card" aria-disabled="true">
        <div class="action-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <div class="action-name">通讯录</div>
      </div>

      <!-- 7. 公告 -->
      <div class="action-card" aria-disabled="true">
        <div class="action-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          </svg>
        </div>
        <div class="action-name">公告</div>
      </div>

      <!-- 8. 文档 -->
      <div class="action-card" aria-disabled="true">
        <div class="action-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
        </div>
        <div class="action-name">文档</div>
      </div>

    </div>

  </div>
</body>
</html>
