<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>健康生活 · 和谐家园</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:        #faf7f2;
      --surface:   #ffffff;
      --ink:       #1a1a1a;
      --ink-soft:  #6b6b6b;
      --ink-faint: #9a9a9a;
      --line:      #ece7df;
      --line-soft: #f4f0e8;
      --accent:    #e33932;
      --accent-soft: #fde8e7;
      --shadow:    0 1px 2px rgba(0,0,0,0.04), 0 8px 24px -12px rgba(0,0,0,0.08);
      --shadow-lift: 0 2px 4px rgba(0,0,0,0.06), 0 20px 40px -16px rgba(0,0,0,0.18);
      --radius:    14px;
      --radius-sm: 10px;
      --font-display: 'Bricolage Grotesque', 'Noto Sans SC', system-ui, sans-serif;
      --font-body:    'Noto Sans SC', system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 36px 24px 96px;
    }

    @media (max-width: 640px) {
      .container { padding: 20px 16px 64px; }
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 24px;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--line);
    }

    .site-logo {
      display: inline-block;
      line-height: 0;
    }

    .site-logo img {
      height: 90px;
      width: auto;
      display: block;
    }

    .back-link {
      font-size: 14px;
      color: var(--ink-soft);
      text-decoration: none;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      transition: all 0.2s;
    }

    .back-link:hover {
      color: var(--ink);
      border-color: var(--ink);
      transform: translateX(-2px);
    }

    .hero {
      width: 100%;
      border-radius: var(--radius);
      overflow: hidden;
      background: linear-gradient(135deg, #f0ece4 0%, #e6e0d4 100%);
      box-shadow: var(--shadow);
      margin-bottom: 28px;
    }

    .hero img {
      width: 100%;
      height: auto;
      display: block;
      max-height: 520px;
      object-fit: cover;
    }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #fff;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 16px;
      flex-shrink: 0;
      letter-spacing: -0.02em;
    }

    .avatar.sm { width: 36px; height: 36px; font-size: 14px; }

    .meta-text { line-height: 1.3; }

    .user-id {
      font-weight: 700;
      font-size: 14.5px;
      color: var(--ink);
    }

    .meta-sub {
      font-size: 12.5px;
      color: var(--ink-faint);
      margin-top: 2px;
    }

    .post-title {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 38px;
      line-height: 1.18;
      letter-spacing: -0.025em;
      color: var(--ink);
      margin-bottom: 24px;
    }

    @media (max-width: 640px) {
      .post-title { font-size: 28px; }
    }

    .post-body {
      font-size: 16px;
      line-height: 1.8;
      color: #2a2a2a;
      margin-bottom: 36px;
    }

    .post-body p { margin-bottom: 18px; }
    .post-body p:last-child { margin-bottom: 0; }

    .post-body ol {
      padding-left: 22px;
      margin-bottom: 18px;
    }

    .post-body ol li {
      margin-bottom: 8px;
      padding-left: 4px;
    }

    .post-body ol li::marker {
      color: var(--accent);
      font-weight: 700;
    }

    .post-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: -16px 0 32px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 5px 12px;
      background: #eaf1ff;
      color: #2563eb;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: all 0.18s ease;
    }

    .tag::before {
      content: '#';
      margin-right: 2px;
      opacity: 0.7;
    }

    .tag:hover {
      background: #2563eb;
      color: #fff;
      transform: translateY(-1px);
    }

    .post-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 4px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      margin-bottom: 40px;
    }

    .action-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 14px;
      background: transparent;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      color: var(--ink-soft);
      transition: all 0.18s ease;
    }

    .action-btn:hover {
      background: var(--line-soft);
      color: var(--ink);
    }

    .action-btn svg {
      width: 18px; height: 18px;
      stroke-width: 1.8;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .action-btn.liked {
      color: var(--accent);
      background: var(--accent-soft);
    }

    .action-btn.liked svg {
      fill: var(--accent);
      stroke: var(--accent);
      animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.35); }
      100% { transform: scale(1); }
    }

    .action-btn .count {
      font-variant-numeric: tabular-nums;
    }

    .action-btn.share-btn {
      margin-left: auto;
    }

    .comments-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 22px;
      letter-spacing: -0.01em;
      margin-bottom: 18px;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .comments-title .num {
      color: var(--accent);
      font-size: 18px;
    }

    .comment-input {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
      margin-bottom: 28px;
      transition: border-color 0.2s;
    }

    .comment-input:focus-within {
      border-color: var(--ink);
    }

    .input-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .comment-input textarea {
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      font-family: inherit;
      font-size: 15px;
      line-height: 1.55;
      color: var(--ink);
      background: transparent;
      min-height: 24px;
      max-height: 160px;
    }

    .comment-input textarea::placeholder {
      color: var(--ink-faint);
    }

    .input-foot {
      display: flex;
      justify-content: flex-end;
      align-items: center;
    }

    .submit-btn {
      padding: 8px 18px;
      background: var(--ink);
      color: #fff;
      border: none;
      border-radius: 999px;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 13.5px;
      cursor: pointer;
      transition: all 0.18s;
      letter-spacing: 0.01em;
    }

    .submit-btn:hover:not(:disabled) {
      background: var(--accent);
      transform: translateY(-1px);
    }

    .submit-btn:disabled {
      background: var(--line);
      color: var(--ink-faint);
      cursor: not-allowed;
    }

    .comment-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .comment {
      display: flex;
      gap: 12px;
      padding: 18px 4px;
      border-bottom: 1px solid var(--line-soft);
      animation: slideIn 0.3s ease-out;
    }

    .comment:last-child { border-bottom: none; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .comment-body { flex: 1; min-width: 0; }

    .comment-head {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 4px;
      flex-wrap: wrap;
    }

    .comment-head .user-id { font-size: 14px; }
    .comment-head .time {
      font-size: 12.5px;
      color: var(--ink-faint);
    }

    .comment-text {
      font-size: 14.5px;
      line-height: 1.65;
      color: #2a2a2a;
      margin-bottom: 8px;
      word-wrap: break-word;
    }

    .comment-actions {
      display: flex;
      gap: 4px;
    }

    .comment-action {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px 4px 6px;
      background: transparent;
      border: none;
      border-radius: 999px;
      font-family: inherit;
      font-size: 12.5px;
      color: var(--ink-faint);
      cursor: pointer;
      transition: all 0.15s;
    }

    .comment-action:hover { color: var(--ink); background: var(--line-soft); }

    .comment-action svg {
      width: 14px; height: 14px;
      stroke-width: 1.8;
      transition: transform 0.2s;
    }

    .comment-action.liked {
      color: var(--accent);
    }

    .comment-action.liked svg {
      fill: var(--accent);
      stroke: var(--accent);
      animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* 嵌套回复 */
    .comment-replies {
      list-style: none;
      margin: 12px 0 0;
      padding: 0 0 0 16px;
      border-left: 2px solid var(--line);
    }

    .comment-replies .comment {
      padding: 12px 0;
      border-bottom: 1px solid var(--line-soft);
    }

    .comment-replies .comment:first-child { padding-top: 4px; }
    .comment-replies .comment:last-child {
      padding-bottom: 0;
      border-bottom: none;
    }

    .comment-replies .reply-to {
      color: #2563eb;
      font-weight: 500;
      margin-right: 4px;
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translate(-50%, -100%);
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 22px 14px 18px;
      margin-top: 18px;
      background: var(--ink);
      color: #fff;
      border-radius: 999px;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 14.5px;
      letter-spacing: 0.005em;
      box-shadow: 0 10px 40px -10px rgba(0,0,0,0.35), 0 4px 12px rgba(0,0,0,0.15);
      transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1),
                  opacity 0.3s ease;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
      max-width: calc(100vw - 32px);
    }

    .toast.show {
      transform: translate(-50%, 0);
      opacity: 1;
      pointer-events: auto;
    }

    .toast .toast-dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      flex-shrink: 0;
      animation: pulse 1.6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(0.85); }
    }

    @media (max-width: 480px) {
      .toast {
        font-size: 13px;
        padding: 12px 18px 12px 14px;
        white-space: normal;
        text-align: center;
      }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-4px); }
      40%, 80% { transform: translateX(4px); }
    }

    .comment-input.shake {
      animation: shake 0.4s ease;
      border-color: var(--accent) !important;
    }

    .av-1 { background: linear-gradient(135deg, #e33932, #c2241d); }
    .av-2 { background: linear-gradient(135deg, #2d8a87, #1f6663); }
    .av-3 { background: linear-gradient(135deg, #d4a226, #b08418); }
    .av-4 { background: linear-gradient(135deg, #8e4a7e, #6f3760); }
    .av-5 { background: linear-gradient(135deg, #6b8e5a, #4f6d40); }
    .av-6 { background: linear-gradient(135deg, #c97b3a, #a55e22); }

    /* ============================================================
       🐟 浴缸喂金鱼小游戏
       ============================================================ */
    .fish-game {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 999;
      width: 300px;
      background: linear-gradient(180deg, #fefcf7 0%, #faf6ec 100%);
      border-radius: 16px;
      box-shadow:
        0 1px 2px rgba(0,0,0,0.04),
        0 4px 12px rgba(0,0,0,0.08),
        0 20px 50px -15px rgba(0,0,0,0.18);
      border: 1px solid #e8e0cd;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      font-family: var(--font-body);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                  opacity 0.3s;
    }

    .fish-game.collapsed .fg-body {
      display: none;
    }

    .fg-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 14px;
      background: rgba(0,0,0,0.025);
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      transition: background 0.18s;
    }

    .fg-header:hover { background: rgba(0,0,0,0.05); }

    .fg-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 13.5px;
      color: var(--ink);
      letter-spacing: 0.005em;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .fg-toggle {
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--ink-soft);
      font-size: 18px;
      font-weight: 700;
      line-height: 1;
      padding: 2px 8px;
      border-radius: 6px;
      font-family: var(--font-display);
      transition: background 0.18s, color 0.18s;
    }

    .fg-toggle:hover {
      background: rgba(0,0,0,0.08);
      color: var(--ink);
    }

    .fg-body {
      position: relative;
      padding: 6px 8px 8px;
    }

    .fg-stage { position: relative; }

    .bathtub-svg {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 8px;
    }

    .food-bowl {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 58px;
      height: 64px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: grab;
      padding: 3px 4px 4px;
      border-radius: 10px;
      background: rgba(255,255,255,0.72);
      border: 1px dashed #c8b894;
      transition: background 0.18s, border-color 0.18s, transform 0.15s;
      z-index: 3;
      backdrop-filter: blur(4px);
    }

    .food-bowl:hover {
      background: rgba(255,255,255,0.95);
      border-color: var(--accent);
      transform: scale(1.05);
    }

    .food-bowl:active { cursor: grabbing; }

    .food-bowl svg {
      width: 38px;
      height: 34px;
      display: block;
      pointer-events: none;
    }

    .food-bowl-hint {
      font-size: 10px;
      color: var(--ink-faint);
      font-weight: 600;
      letter-spacing: 0.03em;
      margin-top: 1px;
      pointer-events: none;
    }

    .food-bowl:hover .food-bowl-hint { color: var(--accent); }

    .dragging-pellet {
      position: fixed;
      width: 11px;
      height: 11px;
      background: radial-gradient(circle at 30% 30%, #c89968, #5a3810);
      border-radius: 50%;
      pointer-events: none;
      z-index: 10001;
      transform: translate(-50%, -50%);
      box-shadow: 0 2px 6px rgba(0,0,0,0.35),
                  inset 0 -2px 2px rgba(0,0,0,0.25);
      display: none;
    }

    @keyframes blink {
      0%, 96%, 100% { transform: scaleY(1); }
      98% { transform: scaleY(0.15); }
    }

    .fish-eye {
      transform-origin: center;
      transform-box: fill-box;
    }

    @media (max-width: 600px) {
      .fish-game {
        width: 250px;
        bottom: 12px;
        right: 12px;
      }
      .food-bowl { width: 50px; height: 56px; }
      .food-bowl svg { width: 32px; height: 28px; }
      .food-bowl-hint { font-size: 9px; }
    }

    @media (max-width: 380px) {
      .fish-game { display: none; }
    }

    /* ============================================================
       Steam 风格成就弹窗
       ============================================================ */
    .achievement-toast {
      position: fixed;
      top: 28px;
      right: 28px;
      z-index: 10000;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 22px 16px 16px;
      min-width: 340px;
      max-width: 420px;
      background: linear-gradient(135deg, #1b2838 0%, #1e3a2f 50%, #1b2838 100%);
      border: 1px solid #4a6741;
      border-radius: 4px;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.5),
        0 0 20px rgba(78, 154, 65, 0.25),
        0 8px 32px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.06);
      opacity: 0;
      transform: translateX(120%) scale(0.95);
      pointer-events: none;
      transition:
        opacity 0.5s cubic-bezier(0.34, 1.56, 0.64, 1),
        transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-family: var(--font-body);
    }

    .achievement-toast.show {
      opacity: 1;
      transform: translateX(0) scale(1);
      pointer-events: auto;
    }

    .achievement-icon {
      width: 64px;
      height: 64px;
      flex-shrink: 0;
      border-radius: 4px;
      background: linear-gradient(145deg, #2a4a3a 0%, #1a3028 100%);
      border: 2px solid #5a8a50;
      display: grid;
      place-items: center;
      box-shadow:
        0 0 12px rgba(78, 154, 65, 0.3),
        inset 0 1px 0 rgba(255,255,255,0.08);
      position: relative;
      overflow: hidden;
    }

    .achievement-icon::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.05) 50%, transparent 70%);
      animation: iconShine 3s ease-in-out infinite;
    }

    @keyframes iconShine {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }

    /* 成就图标内的 emoji 文字 */
    .achievement-icon .icon-emoji {
      font-size: 30px;
      line-height: 1;
      filter: drop-shadow(0 0 6px rgba(180, 220, 100, 0.55));
      position: relative;
      z-index: 1;
      /* 给 emoji 叠一层绿色光晕 */
      text-shadow: 0 0 10px rgba(143, 188, 90, 0.7), 0 0 20px rgba(143, 188, 90, 0.35);
    }

    .achievement-text {
      flex: 1;
      min-width: 0;
    }

    .achievement-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #8fbc5a;
      margin-bottom: 3px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .achievement-label::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #8fbc5a;
      border-radius: 50%;
      box-shadow: 0 0 6px #8fbc5a;
      animation: dotPulse 2s ease-in-out infinite;
    }

    @keyframes dotPulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 6px #8fbc5a; }
      50% { opacity: 0.6; box-shadow: 0 0 2px #8fbc5a; }
    }

    .achievement-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 17px;
      color: #e5e5e5;
      line-height: 1.2;
      margin-bottom: 3px;
      letter-spacing: -0.01em;
    }

    .achievement-desc {
      font-size: 12.5px;
      color: #8f98a0;
      line-height: 1.4;
    }

    .achievement-toast::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      width: 100%;
      background: linear-gradient(90deg, #5a8a2a, #8fbc5a, #b8e060);
      border-radius: 0 0 4px 4px;
      transform-origin: left;
      transform: scaleX(0);
    }

    .achievement-toast.show::after {
      animation: progressShrink 5s 0.5s linear forwards;
    }

    @keyframes progressShrink {
      0%   { transform: scaleX(1); }
      100% { transform: scaleX(0); }
    }

    .achievement-particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      border-radius: 4px;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;

      let last = 0, m;
      while ((m = regex.exec(text)) !== null) {
        if (m.index > last) {
          parent.appendChild(document.createTextNode(text.slice(last, m.index)));
        }
        if (m[1]) {
          const s = document.createElement('strong');
          const e = document.createElement('em');

          const e = document.createElement('em');
          e.textContent = m[3];
          parent.appendChild(e);
        }
        last = m.index + m[0].length;
      }
      if (last < text.length) {
        parent.appendChild(document.createTextNode(text.slice(last)));

              if (!hasFedThisSession) {
                hasFedThisSession = true;
                setTimeout(showAchievement, 700);
              }
            } else {
              const speed = 1.5;
              f.vx = (dx / dist) * speed;
              f.vy = (dy / dist) * speed;
              f.x += f.vx;
              f.y += f.vy;
              f.dir = f.vx >= 0 ? 1 : -1;
            }
          } else {
            let nearest = null;
            let nd = Infinity;
            for (const p of pellets) {
              if (p.claimedBy) continue;
              const d = Math.hypot(p.x - f.x, p.y - f.y);
              if (d < nd) { nd = d; nearest = p; }
            }
            if (nearest) {
              nearest.claimedBy = id;
              f.target = nearest;
            } else {
              f.x += f.vx;
              f.y += f.vy;

              if (Math.random() < 0.015) {
                f.vy += (Math.random() - 0.5) * 0.12;
              }
              f.vy *= 0.985;
              f.vy = Math.max(-0.35, Math.min(0.35, f.vy));

              if (f.x < WATER.left + 18) {
                f.vx = Math.abs(f.vx) || f.baseSpeed;
                f.dir = 1;
              }
              if (f.x > WATER.right - 18) {
                f.vx = -(Math.abs(f.vx) || f.baseSpeed);
                f.dir = -1;
              }
              if (f.y < WATER.top + 10) {
                f.vy = Math.abs(f.vy) + 0.06;
              }
              if (f.y > WATER.bottom - 8) {
                f.vy = -(Math.abs(f.vy) + 0.06);
              }

              f.y += Math.sin(now / 600 + (id === 'fish1' ? 0 : 2)) * 0.08;
            }
          }

          const wiggle = f.eating > 0 ? Math.sin(now / 45) * 6 : 0;
          f.el.setAttribute('transform',
            `translate(${f.x.toFixed(2)} ${f.y.toFixed(2)}) scale(${f.dir} 1) rotate(${wiggle})`);
        }

        for (const p of pellets) {
          if (p.y < p.targetY) {
            p.y = Math.min(p.targetY, p.y + 0.42);
            p.el.setAttribute('cy', p.y.toFixed(2));
          } else if (p.y < WATER.bottom - 4) {
            p.y += 0.06;
            p.el.setAttribute('cy', p.y.toFixed(2));
          }
        }

        requestAnimationFrame(tick);
      }
      tick();

      let isDragging = false;

      function startDrag(cx, cy) {
        isDragging = true;
        draggingPellet.style.display = 'block';
        moveDrag(cx, cy);
      }

      function moveDrag(cx, cy) {
        draggingPellet.style.left = cx + 'px';
        draggingPellet.style.top  = cy + 'px';
      }

      function endDrag(cx, cy) {
        if (!isDragging) return;
        isDragging = false;
        draggingPellet.style.display = 'none';

        const rect = bathtubSvg.getBoundingClientRect();
        if (cx < rect.left || cx > rect.right || cy < rect.top || cy > rect.bottom) return;

        const sx = (cx - rect.left) / rect.width  * SVG_VB.w;
        const sy = (cy - rect.top)  / rect.height * SVG_VB.h;

        if (sx < WATER.left || sx > WATER.right) return;
        if (sy < WATER.top - 6 || sy > WATER.bottom) return;

        spawnPellet(sx, Math.max(WATER.top + 4, sy));
      }

      function spawnPellet(x, targetY) {
        const ns = 'http://www.w3.org/2000/svg';
        const el = document.createElementNS(ns, 'circle');
        el.setAttribute('cx', x);
        el.setAttribute('cy', WATER.top);
        el.setAttribute('r', 3);
        el.setAttribute('fill', '#7a5524');
        el.setAttribute('stroke', '#3a2008');
        el.setAttribute('stroke-width', '0.4');
        pelletsLayer.appendChild(el);

        pellets.push({
          id: ++pid,
          el,
          x,
          y: WATER.top,
          targetY: Math.min(targetY, WATER.bottom - 10),
          claimedBy: null
        });
      }

      foodBowl.addEventListener('mousedown', e => {
        e.preventDefault();
        startDrag(e.clientX, e.clientY);
      });
      window.addEventListener('mousemove', e => {
        if (isDragging) moveDrag(e.clientX, e.clientY);
      });
      window.addEventListener('mouseup', e => {
        if (isDragging) endDrag(e.clientX, e.clientY);
      });

      foodBowl.addEventListener('touchstart', e => {
        e.preventDefault();
        const t = e.touches[0];
        startDrag(t.clientX, t.clientY);
      }, { passive: false });
      window.addEventListener('touchmove', e => {
        if (!isDragging) return;
        const t = e.touches[0];
        moveDrag(t.clientX, t.clientY);
      }, { passive: true });
      window.addEventListener('touchend', e => {
        if (!isDragging) return;
        const t = e.changedTouches[0];
        endDrag(t.clientX, t.clientY);
      });

      function toggleCollapse() {
        const isCollapsed = fg.classList.toggle('collapsed');
        fgToggle.textContent = isCollapsed ? '+' : '−';
      }

      fgToggle.addEventListener('click', e => {
        e.stopPropagation();
        toggleCollapse();
      });
      fgHeader.addEventListener('click', toggleCollapse);

      function spawnParticles() {
        const c = document.getElementById('particles');
        if (!c) return;
        c.innerHTML = '';
        for (let i = 0; i < 12; i++) {
          const p = document.createElement('span');
          p.className = 'particle';
          p.style.left = Math.random() * 100 + '%';
          p.style.top  = Math.random() * 100 + '%';
          p.style.setProperty('--dx', (Math.random() - 0.5) * 80 + 'px');
          p.style.setProperty('--dy', (Math.random() - 0.5) * 80 + 'px');
          p.style.animationDelay = Math.random() * 0.6 + 's';
          c.appendChild(p);
        }
      }

      function showAchievement() {
        spawnParticles();

        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const playNote = (freq, time, dur) => {
            const osc  = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.18, time);
            gain.gain.exponentialRampToValueAtTime(0.001, time + dur);
            osc.connect(gain).connect(ctx.destination);
            osc.start(time);
            osc.stop(time + dur);
          };
          const t = ctx.currentTime;
          playNote(587, t, 0.15);
          playNote(784, t + 0.12, 0.15);
          playNote(988, t + 0.24, 0.3);
        } catch(e) { /* 无声也行 */ }

        requestAnimationFrame(() => achievementToast.classList.add('show'));
        setTimeout(() => achievementToast.classList.remove('show'), 5500);
      }
    })();
  </script>
