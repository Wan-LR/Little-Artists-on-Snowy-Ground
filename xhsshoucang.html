<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>内网工作台 · 我的收藏</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    /* ============================================================
       设计令牌 (沿用站点配色)
       ============================================================ */
    :root {
      --bg:        #faf7f2;
      --surface:   #ffffff;
      --ink:       #1a1a1a;
      --ink-soft:  #6b6b6b;
      --ink-faint: #9a9a9a;
      --line:      #ece7df;
      --line-soft: #f4f0e8;
      --accent:    #e33932;
      --accent-soft: #fde8e7;
      --shadow:    0 1px 2px rgba(0,0,0,0.04), 0 8px 24px -12px rgba(0,0,0,0.08);
      --shadow-lift: 0 2px 4px rgba(0,0,0,0.06), 0 20px 40px -16px rgba(0,0,0,0.18);
      --radius:    14px;
      --font-display: 'Bricolage Grotesque', 'Noto Sans SC', system-ui, sans-serif;
      --font-body:    'Noto Sans SC', system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 36px 32px 96px;
    }

    @media (max-width: 640px) {
      .container { padding: 24px 18px 64px; }
    }


    /* ============================================================
       1. 顶部导航
       ============================================================ */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 24px;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--line);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .site-logo { display: inline-block; line-height: 0; }
    .site-logo img { height: 90px; width: auto; display: block; }
    @media (max-width: 640px) { .site-logo img { height: 60px; } }

    .intranet-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 11px;
      background: #fef7e0;
      border: 1px solid #f4d893;
      border-radius: 999px;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 11.5px;
      color: #7c5a17;
      letter-spacing: 0.05em;
    }

    .intranet-badge::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #c8941e;
    }

    .back-link {
      font-size: 14px;
      color: var(--ink-soft);
      text-decoration: none;
      padding: 8px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      transition: all 0.2s;
    }

    .back-link:hover {
      color: var(--ink);
      border-color: var(--ink);
      transform: translateX(-2px);
    }


    /* ============================================================
       2. 页面标题区
       ============================================================ */
    .page-head {
      margin-bottom: 24px;
    }

    .page-title {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 26px;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .page-title .star {
      color: var(--accent);
      display: inline-flex;
    }

    .page-title .star svg {
      width: 22px;
      height: 22px;
      stroke-width: 2;
      fill: var(--accent);
    }

    .page-sub {
      font-size: 13.5px;
      color: var(--ink-faint);
    }

    .page-sub .count {
      font-family: var(--font-display);
      font-weight: 700;
      color: var(--ink-soft);
      font-variant-numeric: tabular-nums;
    }


    /* ============================================================
       3. 收藏列表
       ============================================================ */
    .fav-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .fav-item {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 18px 22px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      text-decoration: none;
      color: inherit;
      transition: all 0.22s ease;
      position: relative;
      overflow: hidden;
    }

    .fav-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--accent);
      transform: scaleY(0);
      transform-origin: center;
      transition: transform 0.25s ease;
    }

    .fav-item:hover {
      transform: translateX(3px);
      box-shadow: var(--shadow-lift);
      border-color: rgba(227, 57, 50, 0.25);
    }

    .fav-item:hover::before {
      transform: scaleY(1);
    }

    .fav-icon {
      width: 46px;
      height: 46px;
      border-radius: 11px;
      background: var(--accent-soft);
      color: var(--accent);
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .fav-icon svg {
      width: 22px;
      height: 22px;
      stroke-width: 1.8;
    }

    .fav-body {
      flex: 1;
      min-width: 0;
    }

    .fav-name {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 15.5px;
      letter-spacing: -0.005em;
      color: var(--ink);
      margin-bottom: 3px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .fav-tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 7px;
      background: var(--line-soft);
      border-radius: 999px;
      font-family: var(--font-body);
      font-size: 10.5px;
      font-weight: 600;
      color: var(--ink-faint);
      letter-spacing: 0.02em;
    }

    .fav-url {
      font-family: var(--font-display);
      font-weight: 500;
      font-size: 12.5px;
      color: var(--ink-faint);
      font-variant-numeric: tabular-nums;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .fav-arrow {
      color: var(--ink-faint);
      flex-shrink: 0;
      transition: transform 0.25s ease, color 0.25s ease;
    }

    .fav-arrow svg {
      width: 18px;
      height: 18px;
      stroke-width: 2;
    }

    .fav-item:hover .fav-arrow {
      color: var(--accent);
      transform: translateX(4px);
    }

    @media (max-width: 600px) {
      .fav-item { padding: 16px 18px; gap: 14px; }
      .fav-icon { width: 42px; height: 42px; }
      .fav-icon svg { width: 20px; height: 20px; }
      .fav-name { font-size: 14.5px; }
      .fav-url { font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- ═══════════ 1. 顶部导航 ═══════════ -->
    <header>
      <div class="header-left">
        <a href="xhs1.html" class="site-logo">
          <img src="images/tomatologo.png" alt="内网">
        </a>
        <span class="intranet-badge">内网工作台破解版</span>
      </div>
      <a href="javascript:history.back()" class="back-link">← 返回</a>
    </header>

    <!-- ═══════════ 2. 页面标题 ═══════════ -->
    <div class="page-head">
      <h1 class="page-title">
        <span class="star">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
        </span>
        我的收藏
      </h1>
      <div class="page-sub">已收藏 <span class="count">2</span> 项 · 点击进入</div>
    </div>

    <!-- ═══════════ 3. 收藏列表 ═══════════ -->
    <div class="fav-list">

      <!-- ↓↓↓ 第 1 条:改 href 改跳转链接,改 .fav-name 改名字 ↓↓↓ -->
      <a class="fav-item" href="qbdxdldxhj.html">
        <div class="fav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="9" y1="13" x2="15" y2="13"/>
            <line x1="9" y1="17" x2="15" y2="17"/>
          </svg>
        </div>
        <div class="fav-body">
          <div class="fav-name">

            <span class="fav-tag">词条</span>

        </div>
        <div class="fav-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>

      </a>

      <!-- ↓↓↓ 第 2 条 ↓↓↓ -->
      <a class="fav-item" href="shiershengxiao.html">
        <div class="fav-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <div class="fav-body">
          <div class="fav-name">
            十二生肖
            <span class="fav-tag">词条</span>
          </div>
        </div>
        <div class="fav-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </div>
      </a>

    </div>

  </div>
</body>
</html>
