<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>矢呼景明 · Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0a2540;
    --ink-soft: #1a3a5c;
    --ink-mute: #5a708a;
    --paper: #f6f8fc;
    --paper-warm: #ffffff;
    --line: #d6e1ee;
    --accent: #2563eb;
    --accent-deep: #1e40af;
    --wash: #e8f0fb;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Manrope', -apple-system, sans-serif;
    background: var(--paper);
    color: var(--ink);
    font-weight: 400;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(37, 99, 235, 0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(30, 64, 175, 0.03) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1180px;
    margin: 0 auto;
    padding: 0 48px;
    position: relative;
    z-index: 1;
  }

  header {
    padding: 40px 0 24px;
    border-bottom: 1px solid var(--line);
  }

  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo {
    font-family: 'Instrument Serif', serif;
    font-size: 28px;
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo em {
    font-style: italic;
    color: var(--accent);
  }

  /* ★★ 新增:破解版小印章 ★★ */
  .cracked-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: #dc2626;
    letter-spacing: 0.5px;
    padding: 2px 7px;
    border: 1px dashed #dc2626;
    border-radius: 3px;
    background: rgba(220, 38, 38, 0.06);
    transform: rotate(-4deg);
    align-self: center;
    margin-left: 4px;
    display: inline-block;
    animation: crack-jitter 6s ease-in-out infinite;
  }
  @keyframes crack-jitter {
    0%, 100% { transform: rotate(-4deg); }
    50%      { transform: rotate(-2deg) translateY(-1px); }
  }

  .nav-links {
    display: flex;
    gap: 36px;
    list-style: none;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .nav-links a {
    color: var(--ink-soft);
    text-decoration: none;
    text-transform: uppercase;
    transition: color 0.2s;
    position: relative;
  }
  .nav-links a:hover { color: var(--accent); }
  .nav-links a.active::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    bottom: -8px;
    height: 2px;
    background: var(--accent);
  }

  .section-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 56px 0 32px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .section-head h2 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: 36px;
    letter-spacing: -0.5px;
  }
  .section-head h2 em {
    font-style: italic;
    color: var(--accent);
  }
  .section-head .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-mute);
    letter-spacing: 1px;
  }

  .posts {
    display: flex;
    flex-direction: column;
    gap: 0;
    border-top: 1px solid var(--line);
  }

  .post {
    display: grid;
    grid-template-columns: 80px 1fr 280px;
    gap: 40px;
    padding: 32px 8px;
    border-bottom: 1px solid var(--line);
    align-items: center;
    transition: background 0.3s ease, padding-left 0.3s ease,
                opacity 0.45s ease, transform 0.45s ease;
    cursor: pointer;
    position: relative;
    text-decoration: none;
    color: inherit;
  }

  .post:hover {
    background: var(--wash);
    padding-left: 24px;
  }

  .post::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    transform: scaleY(0);
    transform-origin: top;
    transition: transform 0.4s ease;
  }
  .post:hover::before { transform: scaleY(1); }

  .post.deleting {
    opacity: 0;
    transform: translateX(80px);
    pointer-events: none;
  }

  .post-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-mute);
    letter-spacing: 1px;
  }
  .post-num span {
    display: block;
    font-size: 24px;
    color: var(--ink);
    margin-top: 4px;
    font-weight: 500;
  }

  .post-body { min-width: 0; }

  .post-tag {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--accent);
    background: var(--wash);
    padding: 4px 10px;
    border-radius: 100px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .post h3 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: 30px;
    line-height: 1.15;
    letter-spacing: -0.3px;
    margin-bottom: 10px;
    color: var(--ink);
  }
  .post h3 em {
    font-style: italic;
    color: var(--accent-deep);
  }

  .post p {
    color: var(--ink-mute);
    font-size: 15px;
    line-height: 1.6;
    max-width: 56ch;
  }

  .post-foot {
    display: flex;
    gap: 16px;
    margin-top: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-mute);
    letter-spacing: 0.5px;
  }
  .post-foot span { display: inline-flex; align-items: center; gap: 6px; }
  .post-foot .dotsep {
    width: 3px; height: 3px; border-radius: 50%;
    background: var(--line);
    align-self: center;
  }

  .post-img {
    width: 280px;
    height: 180px;
    overflow: hidden;
    position: relative;
    background: var(--ink);
    border-radius: 4px;
  }
  .post-img img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s ease;
    filter: saturate(0.85) contrast(1.05);
  }
  .post:hover .post-img img {
    transform: scale(1.06);
  }
  .post-img::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(37,99,235,0.15) 0%, transparent 50%);
    pointer-events: none;
  }

  .empty-state {
    text-align: center;
    padding: 80px 24px 60px;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
    opacity: 0;
    transform: translateY(12px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .empty-state.show {
    opacity: 1;
    transform: translateY(0);
  }
  .empty-icon {
    font-size: 44px;
    margin-bottom: 14px;
    opacity: 0.55;
  }
  .empty-state h3 {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: 26px;
    color: var(--ink);
    margin-bottom: 6px;
    letter-spacing: -0.3px;
  }
  .empty-state p {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-mute);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .confirm-modal {
    position: fixed;
    inset: 0;
    background: rgba(10, 37, 64, 0.55);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    padding: 20px;
  }
  .confirm-modal.show {
    opacity: 1;
    pointer-events: auto;
  }
  .confirm-box {
    background: white;
    border-radius: 16px;
    padding: 32px 28px 24px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 20px 60px rgba(10, 37, 64, 0.30);
    text-align: center;
    transform: scale(0.85) translateY(10px);
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .confirm-modal.show .confirm-box {
    transform: scale(1) translateY(0);
  }
  .confirm-icon {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--wash);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
  }
  .confirm-icon svg {
    width: 26px;
    height: 26px;
    stroke: var(--accent);
    fill: none;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .confirm-title {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: 26px;
    color: var(--ink);
    margin-bottom: 10px;
    letter-spacing: -0.3px;
  }
  .confirm-msg {
    font-size: 12px;
    color: var(--ink-mute);
    margin-bottom: 22px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .confirm-btn {
    width: 100%;
    padding: 13px 16px;
    background: var(--ink);
    color: white;
    border: none;
    border-radius: 100px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }
  .confirm-btn:hover {
    background: var(--accent);
    transform: translateY(-1px);
  }
  .confirm-btn:active {
    transform: translateY(0);
  }

  footer {
    margin-top: 80px;
    padding: 48px 0 64px;
    border-top: 2px solid var(--ink);
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 24px;
  }
  .foot-text {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 22px;
    color: var(--ink-soft);
  }
  .foot-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-mute);
    letter-spacing: 1px;
    text-align: right;
  }

  @media (max-width: 820px) {
    .container { padding: 0 24px; }
    .nav-links { gap: 20px; font-size: 12px; }
    .post {
      grid-template-columns: 1fr;
      gap: 16px;
      padding: 28px 0;
    }
    .post-num { display: flex; gap: 12px; align-items: baseline; }
    .post-num span { display: inline; }
    .post-img { width: 100%; height: 220px; }
    .post:hover { padding-left: 12px; }
    footer { grid-template-columns: 1fr; }
    .foot-meta { text-align: left; }
    .cracked-tag { font-size: 10px; padding: 2px 5px; }
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .post {
    opacity: 0;
    transform: translateY(20px);
    animation: rise 0.7s ease 0.1s forwards;
  }
</style>
</head>
<body>

<div class="container">

  <header>
    <nav class="nav">
      <div class="logo">
        <img src="images/shihu.png" width="50" height="50" alt="logo">
        <span>矢<em>呼</em></span>
        <span class="cracked-tag">破解版</span>
      </div>
      <ul class="nav-links">
        <li><a href="shjm.html">日志</a></li>
        <li><a href="shjmcgx.html" class="active">草稿箱</a></li>
      </ul>
    </nav>
  </header>

  <div class="section-head">
    <h2>草稿箱</h2>
    <span class="count">景明 · UPDATED TODAY</span>
  </div>

  <article class="posts" id="postsList">

    <a class="post" href="#" id="draftPost">
      <div class="post-num">NO.<span>01</span></div>
      <div class="post-body">
        <span class="post-tag">求助</span>
        <h3>我看见了<em>裸猿</em></h3>
        <p>我知道我一直是一个写这类事件的博主 但这次真的是真的!</p>
        <div class="post-foot">
          <span>1 小时前</span>
          <span class="dotsep"></span>
          <span>3 min read</span>
        </div>
      </div>
      <div class="post-img">
        <img>
      </div>
    </a>

    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📭</div>
      <h3>草稿箱已清空</h3>
      <p>NOTHING IN DRAFTS</p>
    </div>

  </article>

  <footer>
    <div class="foot-text">「这个世界,不止人类」</div>
    <div class="foot-meta"></div>
  </footer>

</div>

<div class="confirm-modal" id="confirmModal">
  <div class="confirm-box">
    <div class="confirm-icon">
      <svg viewBox="0 0 24 24">
        <path d="M3 6h18"/>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/>
        <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        <line x1="10" y1="11" x2="10" y2="17"/>
        <line x1="14" y1="11" x2="14" y2="17"/>
      </svg>
    </div>
    <h3 class="confirm-title">你确定要删除吗?</h3>

    <button class="confirm-btn" id="confirmBtn">确定</button>
  </div>
</div>

<script>
  const draftPost   = document.getElementById('draftPost');
  const modal       = document.getElementById('confirmModal');
  const confirmBtn  = document.getElementById('confirmBtn');
  const emptyState  = document.getElementById('emptyState');

  draftPost.addEventListener('click', (e) => {
    e.preventDefault();
    modal.classList.add('show');
  });

  confirmBtn.addEventListener('click', () => {
    modal.classList.remove('show');
    draftPost.classList.add('deleting');

    setTimeout(() => {
      draftPost.remove();
      emptyState.classList.add('show');
    }, 450);
  });
</script>
</body>
</html>
