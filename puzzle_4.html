<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>怎么孵化</title>
<style>
  @import url('https://gs.jurieo.com/gemini/fonts-googleapis/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap');

  :root {
    --bg:     #0a1628;
    --accent: #4a90d9;
    --light:  #a8ccf0;
    --white:  #e8f2ff;
    --border: #2a4a7a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Ma Shan Zheng', 'Noto Serif SC', serif;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 28% 22%, rgba(74,144,217,0.18) 0%, transparent 52%),
      radial-gradient(ellipse at 76% 80%, rgba(20,60,140,0.22) 0%, transparent 50%),
      repeating-linear-gradient(45deg, transparent, transparent 38px,
        rgba(74,144,217,0.022) 38px, rgba(74,144,217,0.022) 39px);
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 22px;
  }

  .subtitle {
    font-size: 0.72rem;
    color: rgba(168,204,240,0.45);
    letter-spacing: 0.28em;
    text-align: center;
    font-family: 'Noto Serif SC', serif;
  }

  /* ── 3D 卡片 ── */
  .card-scene {
    width: 442px;
    height: 442px;
    perspective: 1600px;
    position: relative;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.75s cubic-bezier(0.4, 0.2, 0.2, 1);
  }
  .card.flipped { transform: rotateY(180deg); }

  .card-scene.zooming-in {
    position: fixed;
    z-index: 100;
    transition:
      top 0.7s cubic-bezier(0.4, 0, 0.2, 1),
      left 0.7s cubic-bezier(0.4, 0, 0.2, 1),
      width 0.7s cubic-bezier(0.4, 0, 0.2, 1),
      height 0.7s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 4px;
    overflow: hidden;
  }

  .card-front { cursor: default; }

  .card-back {
    transform: rotateY(180deg);
    cursor: pointer;
  }
  .card-back img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    user-select: none;
    -webkit-user-drag: none;
  }

  /* ── 游戏棋盘 ── */
  .board-wrap {
    width: 100%;
    height: 100%;
    padding: 10px;
    background: rgba(8,18,36,0.9);
    border: 1px solid var(--border);
    border-radius: 4px;
    box-shadow:
      0 0 0 1px rgba(74,144,217,0.08),
      0 10px 44px rgba(0,0,0,0.65),
      0 0 60px rgba(74,144,217,0.07),
      inset 0 1px 0 rgba(74,144,217,0.13);
  }

  #game-board {
    width: 100%;
    height: 100%;
    background: #040a14;
    position: relative;
    overflow: hidden;
    border-radius: 2px;
  }

  /* 题目 */
  .quiz-question {
    position: absolute;
    top: 28px;
    left: 0; right: 0;
    text-align: center;
    color: var(--white);
    font-family: 'Noto Serif SC', serif;
    font-size: 1.08rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 0 22px;
    text-shadow: 0 0 12px rgba(74,144,217,0.4);
  }
  .quiz-round-no {
    position: absolute;
    top: 60px;
    left: 0; right: 0;
    text-align: center;
    color: rgba(168,204,240,0.4);
    font-family: 'Noto Serif SC', serif;
    font-size: 0.66rem;
    letter-spacing: 0.24em;
  }

  /* ── 孵蛋舞台 ── */
  .hatch-stage { position: absolute; inset: 0; }

  .zones {
    position: absolute;
    top: 116px; left: 0; right: 0;
    display: flex;
    justify-content: space-around;
    align-items: flex-end;
    padding: 0 24px;
  }
  .zone {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    transition: transform 0.2s, filter 0.2s;
  }
  .zone.hot { transform: translateY(-4px) scale(1.05); filter: drop-shadow(0 0 10px rgba(74,144,217,0.5)); }
  .zone-label {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.74rem;
    color: var(--light);
    letter-spacing: 0.08em;
  }

  /* 孵蛋器 / 母产房 —— 用图片 */
  .zone-img {
    width: 120px;
    height: 100px;
    object-fit: contain;
    display: block;
    -webkit-user-drag: none;
    user-select: none;
    pointer-events: none;          /* 拖放靠坐标判定，图片本身不拦截事件 */
    filter: drop-shadow(0 6px 12px rgba(0,0,0,0.5));
  }
  /* 图片加载失败时的占位（虚线框 + 问号），方便你还没放图时也能看到判定区 */
  .zone-img.broken {
    width: 120px; height: 100px;
    background: rgba(74,144,217,0.06);
    border: 1px dashed var(--border);
    border-radius: 8px;
  }

  /* 鸡蛋托盘 */
  .egg-tray {
    position: absolute;
    bottom: 40px; left: 0; right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .tray-label {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.66rem;
    color: rgba(168,204,240,0.5);
    letter-spacing: 0.12em;
  }

  /* 鸡蛋 */
  .egg {
    width: 54px; height: 70px;
    background: radial-gradient(ellipse at 38% 30%, #fffdf6 0%, #f2e4c4 56%, #ddc89a 100%);
    border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    box-shadow:
      inset -6px -8px 14px rgba(150,120,70,0.35),
      inset 4px 5px 9px rgba(255,255,255,0.45),
      0 6px 12px rgba(0,0,0,0.45);
    cursor: grab;
    touch-action: none;
    transition: opacity 0.2s;
  }
  .egg:hover { filter: brightness(1.04); }
  .egg:active { cursor: grabbing; }

  /* 拖动中的浮空鸡蛋 */
  #float-egg {
    cursor: grabbing;
    pointer-events: none;
    z-index: 9999;
    transform: scale(1.08) rotate(-6deg);
    filter: drop-shadow(0 12px 16px rgba(0,0,0,0.5));
  }

  #success-msg {
    display: none;
    position: absolute;
    inset: 0;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    color: var(--light);
    letter-spacing: 0.2em;
    animation: fadeInUp 0.6s ease forwards;
  }

  /* ── 底部交互区 ── */
  .action-area {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .action-area.show { display: flex; animation: fadeInUp 0.4s ease; }

  .word-input-wrap { display: flex; align-items: center; gap: 8px; }
  .btn-row { display: flex; gap: 16px; }

  .btn-replay, .btn-submit {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    padding: 7px 18px;
    border: 1px solid var(--border);
    background: rgba(8,18,36,0.8);
    color: var(--light);
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.25s ease;
  }
  .btn-replay:hover, .btn-submit:hover {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(74,144,217,0.2);
  }
  .btn-submit { background: rgba(74,144,217,0.2); border-color: var(--accent); }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .word-input {
    font-family: 'Noto Serif SC', serif;
    font-size: 1rem;
    letter-spacing: 0.12em;
    padding: 8px 16px;
    border: 1px solid var(--border);
    background: rgba(8,18,36,0.8);
    color: var(--white);
    border-radius: 3px;
    width: 200px;
    outline: none;
    transition: border-color 0.25s, box-shadow 0.25s;
    text-align: center;
  }
  .word-input::placeholder { color: rgba(168,204,240,0.3); font-size: 0.82rem; letter-spacing: 0.1em; }
  .word-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(74,144,217,0.2); }
  .word-input.correct { border-color: #4ad980; box-shadow: 0 0 0 2px rgba(74,217,128,0.25); }
  .word-input.wrong {
    border-color: #d94a4a;
    box-shadow: 0 0 0 2px rgba(217,74,74,0.25);
    animation: shake 0.35s ease;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%      { transform: translateX(-6px); }
    75%      { transform: translateX(6px); }
  }

  .hint {
    font-size: 0.66rem;
    color: rgba(168,204,240,0.28);
    letter-spacing: 0.1em;
    text-align: center;
    font-family: 'Noto Serif SC', serif;
    transition: opacity 0.3s;
  }

  #flip-hint {
    font-size: 0.66rem;
    color: rgba(168,204,240,0.35);
    letter-spacing: 0.15em;
    text-align: center;
    font-family: 'Noto Serif SC', serif;
    opacity: 0;
    transition: opacity 0.5s ease;
    height: 1em;
  }
  #flip-hint.show { opacity: 1; }

  .container.exiting .subtitle,
  .container.exiting .action-area,
  .container.exiting .hint,
  .container.exiting #flip-hint {
    transition: opacity 0.35s ease;
    opacity: 0;
  }

  /* ───────────── 公鸡 NPC ───────────── */
  .rooster-container {
    position: fixed;
    right: 36px;
    bottom: 28px;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 14px;
    pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .rooster-container.fade-out { opacity: 0; pointer-events: none; }

  .speech-bubble {
    position: relative;
    background: linear-gradient(135deg, rgba(244, 233, 210, 0.97), rgba(220, 207, 178, 0.95));
    color: #2a1a0a;
    padding: 14px 18px 22px 18px;
    border-radius: 4px;
    font-family: 'Noto Serif SC', serif;
    font-size: 0.86rem;
    font-weight: 500;
    line-height: 1.6;
    letter-spacing: 0.04em;
    max-width: 280px;
    min-width: 180px;
    box-shadow:
      0 6px 24px rgba(0,0,0,0.55),
      0 0 0 1px rgba(139, 90, 43, 0.5),
      inset 0 1px 0 rgba(255, 255, 255, 0.5);
    opacity: 0;
    transform: translateY(8px) scale(0.96);
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
    margin-right: 40px;
    will-change: transform, opacity;
  }
  .speech-bubble.show { opacity: 1; transform: translateY(0) scale(1); }
  .speech-bubble::after {
    content: '';
    position: absolute;
    bottom: -10px;
    right: 32px;
    width: 0; height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 10px solid rgba(228, 215, 186, 0.96);
    filter: drop-shadow(0 2px 1px rgba(139, 90, 43, 0.4));
  }
  .speech-bubble::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px dashed rgba(139, 90, 43, 0.35);
    border-radius: 2px;
    pointer-events: none;
  }

  .next-arrow {
    position: absolute;
    right: 12px;
    bottom: 4px;
    font-size: 0.85rem;
    color: #8b5a2b;
    animation: arrow-blink 1.2s ease-in-out infinite;
  }
  @keyframes arrow-blink {
    0%, 100% { opacity: 0.25; transform: translateX(0); }
    50%      { opacity: 1;    transform: translateX(3px); }
  }

  .rooster {
    width: 260px;
    height: 260px;
    cursor: pointer;
    user-select: none;
    pointer-events: auto;
    position: relative;
    filter: drop-shadow(0 10px 18px rgba(0,0,0,0.6));
    transition: filter 0.3s ease, transform 0.2s ease;
  }
  .rooster.bobbing { animation: rooster-bob 0.8s ease-in-out 5; }
  @keyframes rooster-bob {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    25%      { transform: translateY(-9px) rotate(-2.5deg); }
    50%      { transform: translateY(0) rotate(0deg); }
    75%      { transform: translateY(-9px) rotate(2.5deg); }
  }
  .rooster:hover {
    filter: drop-shadow(0 10px 20px rgba(74,144,217,0.5))
            drop-shadow(0 8px 14px rgba(0,0,0,0.55));
  }
  /* 鸡蛋悬到公鸡上时高亮 */
  .rooster.egg-hot {
    filter: drop-shadow(0 0 18px rgba(255,210,120,0.7))
            drop-shadow(0 8px 14px rgba(0,0,0,0.55));
    transform: scale(1.06);
  }
  .rooster img {
    width: 100%; height: 100%;
    object-fit: contain;
    display: block;
    -webkit-user-drag: none;
    pointer-events: none;
  }
  .rooster-fallback {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 8rem; line-height: 1;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="container" id="page-container">
  <p class="subtitle">互动收集 · 还原密码</p>

  <div class="card-scene" id="card-scene">
    <div class="card" id="card">
      <div class="card-face card-front" id="card-front">
        <div class="board-wrap">
          <div id="game-board">
            <div class="quiz-question" id="quiz-question"></div>
            <div class="quiz-round-no" id="quiz-round-no"></div>

            <div class="hatch-stage" id="hatch-stage">
              <div class="zones">
                <div class="zone" id="incubator-zone">
                  <img class="zone-img" id="incubator" src="images/fudanqi.png" alt="人工孵蛋器"
                       onerror="this.classList.add('broken');this.removeAttribute('src');">
                  <div class="zone-label">人工孵蛋器</div>
                </div>
                <div class="zone" id="nest-zone">
                  <img class="zone-img" id="hen-nest" src="images/jiwo.png" alt="产房"
                       onerror="this.classList.add('broken');this.removeAttribute('src');">
                  <div class="zone-label">产房</div>
                </div>
              </div>

              <div class="egg-tray">
                <div class="egg" id="egg"></div>
                <div class="tray-label">抓起这颗蛋</div>
              </div>
            </div>

            <div id="success-msg">放对地方了</div>
          </div>
        </div>
      </div>
      <div class="card-face card-back" id="card-back">
        <img id="back-img" src="images/pluto.png" alt="背面">
      </div>
    </div>
  </div>

  <div class="action-area" id="action-area">
    <div class="word-input-wrap">
      <input class="word-input" id="word-input" type="text"
             placeholder="输入密码…" autocomplete="off" spellcheck="false">
    </div>
    <div class="btn-row">
      <button class="btn-replay" id="btn-replay" onclick="resetGame()">↻ 重新作答</button>
      <button class="btn-submit" id="btn-submit" onclick="checkPassword()">确 认</button>
    </div>
  </div>

  <p class="hint" id="main-hint"></p>
  <p id="flip-hint">点击图片可翻回正面</p>
</div>

<!-- ───────────── 公鸡 NPC ───────────── -->
<div class="rooster-container" id="rooster-container">
  <div class="speech-bubble" id="speech-bubble">
    <span id="bubble-text"></span>
    <span class="next-arrow">▸</span>
  </div>
  <div class="rooster" id="rooster">
    <img id="rooster-img" src="images/mojingji.png" alt="公鸡"
         onerror="this.style.display='none';document.getElementById('rooster-fallback').style.display='flex';">
    <div class="rooster-fallback" id="rooster-fallback" style="display:none;">🐓</div>
  </div>
</div>

<script>
  // ═══════════════════════════════════════════
  const BACK_IMAGE  = 'images/pluto.png';   // ← 换成你的背面图
  const PASSWORD    = 'pluto';
  const PUZZLE_ID   = 'puzzle_4';
  const PUZZLE_INDEX = 3;          // 九宫格里的第 4 格（索引 3）
  const RETURN_URL  = 'mxhuitu.html';
  // ═══════════════════════════════════════════

  let isAnimating = false;
  let gameSolved = false;
  let wrongCount = 0;

  let gamePhase = 'intro';   // intro → playing → answer → ending → done
  let dialogueIndex = 0;

  const dialogues = {
    intro: [
      '咯咯咯——又是你',
      '这回很简单：孵一颗蛋',
      '左边是人工孵蛋器，右边是产房',
      '一只小昴星人，要怎么孵出来呢？',
      '抓起这颗蛋，放到你觉得对的地方'
    ],
    playing: [
      '咯咯咯，想好放哪了吗',

    ],
    // 放错的反应
    incubator: '机器嗡嗡转了半天……壳都没动一下',
    nest:      '母亲趴了许久，但蛋还是没有动静',

    // 放对（落到公鸡身上）
    answer: [
      '咯咯咯！被你猜对了',
      '记住——答案是 pluto，把它输进去吧'
    ],
    ending: [
      '冥王星，你也来了',
      '话说我用的密码都是地球上的神话呢',
      '怎么样，是不是很亲切',
      '在突破了癌症这一关后，仿佛需要抑制我们的生存，新出生的卵突然无论如何都无法孵化',
      '原本使用的人工孵蛋器也不起作用，产房里的小昴星人总是死在壳里',
      '然后在某一天，有人突然发现他家的蛋壳有了动静',
      '排除了一切变量后，大家终于发现唯一的不同是，这颗蛋是父亲孵出来的',
      '仿佛大家在这一刻才突然发现原来不只是母亲可以孵蛋',
      '让它归位吧,咯咯咯——'
    ]
  };

  window.onload = () => {
    document.getElementById('back-img').src = BACK_IMAGE;

    document.getElementById('card-back').addEventListener('click', () => {
      if (gameSolved && gamePhase === 'done') flipCard();
    });

    document.getElementById('rooster').addEventListener('click', clickRooster);

    document.getElementById('word-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkPassword();
    });

    document.getElementById('egg').addEventListener('pointerdown', onEggPointerDown);

    setupBoard();

    playEnterAnimation(() => {
      setTimeout(() => { showDialogue(dialogues.intro[0]); }, 250);
    });
  };

  function setupBoard() {
    document.getElementById('quiz-question').textContent = '小昴星人……要怎么孵出来呢？';
    document.getElementById('quiz-round-no').textContent = '';
  }

  // ── 入场展开动画（与其它 puzzle 完全一致）──
  function playEnterAnimation(onDone) {
    let originRaw = sessionStorage.getItem('puzzle_origin');
    let origin = null;
    if (originRaw) { try { origin = JSON.parse(originRaw); } catch (e) {} }

    const scene = document.getElementById('card-scene');

    if (!origin || origin.index !== PUZZLE_INDEX) {
      if (onDone) onDone();
      return;
    }

    const finalRect = scene.getBoundingClientRect();

    scene.classList.add('zooming-in');
    scene.style.left   = origin.left + 'px';
    scene.style.top    = origin.top + 'px';
    scene.style.width  = origin.width + 'px';
    scene.style.height = origin.height + 'px';

    void scene.offsetWidth;

    requestAnimationFrame(() => {
      scene.style.left   = finalRect.left + 'px';
      scene.style.top    = finalRect.top + 'px';
      scene.style.width  = finalRect.width + 'px';
      scene.style.height = finalRect.height + 'px';
    });

    setTimeout(() => {
      scene.classList.remove('zooming-in');
      scene.style.left = ''; scene.style.top = '';
      scene.style.width = ''; scene.style.height = '';
      if (onDone) onDone();
    }, 720);
  }

  // ── 公鸡说话与摆动 ──
  function showDialogue(text) {
    const bubble = document.getElementById('speech-bubble');
    const bubbleText = document.getElementById('bubble-text');
    const rooster = document.getElementById('rooster');
    bubbleText.textContent = text;
    bubble.classList.remove('show');
    void bubble.offsetWidth;
    bubble.classList.add('show');
    rooster.classList.remove('bobbing');
    void rooster.offsetWidth;
    rooster.classList.add('bobbing');
  }
  function hideDialogue() {
    document.getElementById('speech-bubble').classList.remove('show');
    document.getElementById('rooster').classList.remove('bobbing');
  }

  function clickRooster() {
    if (gamePhase === 'intro') {
      dialogueIndex++;
      if (dialogueIndex < dialogues.intro.length) {
        showDialogue(dialogues.intro[dialogueIndex]);
      } else {
        gamePhase = 'playing';
        dialogueIndex = -1;
        hideDialogue();
        document.getElementById('main-hint').textContent = '把鸡蛋抓起来，放到该放的地方';
      }
    } else if (gamePhase === 'playing') {
      dialogueIndex = (dialogueIndex + 1) % dialogues.playing.length;
      showDialogue(dialogues.playing[dialogueIndex]);
    } else if (gamePhase === 'answer') {
      showDialogue(dialogues.answer[1]);
    } else if (gamePhase === 'ending') {
      dialogueIndex++;
      if (dialogueIndex < dialogues.ending.length) {
        showDialogue(dialogues.ending[dialogueIndex]);
      } else {
        hideDialogue();
        gamePhase = 'done';
        setTimeout(() => triggerFlyOut(), 450);
      }
    }
  }

  // ── 鸡蛋拖放 ────────────────────────────────────────────────
  let dragging = false;
  let floatEgg = null;
  let dragOffset = { x: 0, y: 0 };

  function inRect(x, y, el) {
    if (!el) return false;
    const r = el.getBoundingClientRect();
    return x >= r.left && x <= r.right && y >= r.top && y <= r.bottom;
  }
  function hitZone(x, y) {
    if (inRect(x, y, document.getElementById('rooster')))   return 'rooster';
    if (inRect(x, y, document.getElementById('incubator'))) return 'incubator';
    if (inRect(x, y, document.getElementById('hen-nest')))  return 'nest';
    return null;
  }

  function onEggPointerDown(e) {
    // intro 阶段：摸蛋 → 让公鸡接着说
    if (gamePhase === 'intro') {
      const rooster = document.getElementById('rooster');
      rooster.classList.remove('bobbing');
      void rooster.offsetWidth;
      rooster.classList.add('bobbing');
      const bubble = document.getElementById('speech-bubble');
      if (!bubble.classList.contains('show')) {
        showDialogue(dialogues.intro[dialogueIndex] || dialogues.intro[0]);
      }
      return;
    }
    if (gamePhase !== 'playing' || isAnimating) return;

    e.preventDefault();
    dragging = true;

    const srcEgg = document.getElementById('egg');
    const rect = srcEgg.getBoundingClientRect();

    floatEgg = srcEgg.cloneNode(true);
    floatEgg.id = 'float-egg';
    floatEgg.style.position = 'fixed';
    floatEgg.style.left   = rect.left + 'px';
    floatEgg.style.top    = rect.top + 'px';
    floatEgg.style.width  = rect.width + 'px';
    floatEgg.style.height = rect.height + 'px';
    floatEgg.style.margin = '0';
    document.body.appendChild(floatEgg);

    srcEgg.style.opacity = '0';

    dragOffset.x = e.clientX - rect.left;
    dragOffset.y = e.clientY - rect.top;

    window.addEventListener('pointermove', onPointerMove);
    window.addEventListener('pointerup', onPointerUp);
  }

  function onPointerMove(e) {
    if (!dragging) return;
    floatEgg.style.left = (e.clientX - dragOffset.x) + 'px';
    floatEgg.style.top  = (e.clientY - dragOffset.y) + 'px';

    // 实时高亮悬停目标
    const z = hitZone(e.clientX, e.clientY);
    document.getElementById('rooster').classList.toggle('egg-hot', z === 'rooster');
    document.getElementById('incubator-zone').classList.toggle('hot', z === 'incubator');
    document.getElementById('nest-zone').classList.toggle('hot', z === 'nest');
  }

  function onPointerUp(e) {
    if (!dragging) return;
    dragging = false;
    window.removeEventListener('pointermove', onPointerMove);
    window.removeEventListener('pointerup', onPointerUp);

    const z = hitZone(e.clientX, e.clientY);

    if (floatEgg) { floatEgg.remove(); floatEgg = null; }
    document.getElementById('egg').style.opacity = '';
    document.getElementById('rooster').classList.remove('egg-hot');
    document.getElementById('incubator-zone').classList.remove('hot');
    document.getElementById('nest-zone').classList.remove('hot');

    if (z === 'rooster') {
      onCorrectDrop();
    } else if (z === 'incubator' || z === 'nest') {
      onWrongDrop(z);
    }
    // 其它地方：鸡蛋自动回到原位（什么都不做）
  }

  function onWrongDrop(zone) {
    wrongCount++;
    let line;
    if (wrongCount >= 3)      line = dialogues.nudge3;
    else if (wrongCount === 2) line = dialogues.nudge2;
    else line = (zone === 'incubator') ? dialogues.incubator : dialogues.nest;
    showDialogue(line);
  }

  function onCorrectDrop() {
    if (gamePhase !== 'playing') return;
    isAnimating = true;
    gamePhase = 'answer';
    document.getElementById('main-hint').textContent = '';

    const rooster = document.getElementById('rooster');
    rooster.classList.remove('bobbing');
    void rooster.offsetWidth;
    rooster.classList.add('bobbing');

    showDialogue(dialogues.answer[0]);
    setTimeout(() => showDialogue(dialogues.answer[1]), 1700);
    setTimeout(onGameComplete, 2050);
  }

  function onGameComplete() {
    gameSolved = true;

    document.getElementById('quiz-question').style.display = 'none';
    document.getElementById('quiz-round-no').style.display = 'none';
    document.getElementById('hatch-stage').style.display = 'none';
    document.getElementById('success-msg').style.display = 'flex';

    document.getElementById('action-area').classList.add('show');
    document.getElementById('main-hint').style.opacity = '0';

    setTimeout(() => { document.getElementById('word-input').focus(); }, 400);
  }

  function resetGame() {
    gameSolved = false;
    wrongCount = 0;
    isAnimating = false;
    gamePhase = 'playing';
    dialogueIndex = -1;
    hideDialogue();

    if (floatEgg) { floatEgg.remove(); floatEgg = null; }

    document.getElementById('quiz-question').style.display = '';
    document.getElementById('quiz-round-no').style.display = '';
    document.getElementById('hatch-stage').style.display = '';
    document.getElementById('success-msg').style.display = 'none';
    document.getElementById('egg').style.opacity = '';
    document.getElementById('rooster').classList.remove('egg-hot');

    document.getElementById('action-area').classList.remove('show');
    document.getElementById('main-hint').style.opacity = '';
    document.getElementById('main-hint').textContent = '把鸡蛋抓起来，放到该放的地方';

    const input = document.getElementById('word-input');
    input.value = '';
    input.disabled = false;
    input.classList.remove('correct', 'wrong');

    const card = document.getElementById('card');
    if (card.classList.contains('flipped')) card.classList.remove('flipped');
    document.getElementById('flip-hint').classList.remove('show');
  }

  function flipCard() {
    const card = document.getElementById('card');
    const nowFlipped = card.classList.toggle('flipped');
    document.getElementById('flip-hint').classList.add('show');

    if (nowFlipped) {
      document.getElementById('flip-hint').textContent = '听我说完先…';
      setTimeout(() => {
        gamePhase = 'ending';
        dialogueIndex = 0;
        showDialogue(dialogues.ending[0]);
      }, 850);
    } else {
      document.getElementById('flip-hint').textContent = '密码已解锁,再次点击图片查看';
    }
  }

  // ── 飞回九宫格（与其它 puzzle 完全一致）──
  function triggerFlyOut() {
    const scene = document.getElementById('card-scene');
    const r = scene.getBoundingClientRect();

    sessionStorage.setItem('puzzle_returning', JSON.stringify({
      index: PUZZLE_INDEX,
      from: { left: r.left, top: r.top, width: r.width, height: r.height }
    }));

    document.getElementById('page-container').classList.add('exiting');
    document.getElementById('rooster-container').classList.add('fade-out');
    document.getElementById('flip-hint').textContent = '即将返回大九宫格…';

    scene.classList.add('zooming-in');
    scene.style.left   = r.left + 'px';
    scene.style.top    = r.top + 'px';
    scene.style.width  = r.width + 'px';
    scene.style.height = r.height + 'px';
    void scene.offsetWidth;

    requestAnimationFrame(() => {
      scene.style.transition =
        'top 0.5s ease, left 0.5s ease, width 0.5s ease, height 0.5s ease, opacity 0.5s ease';
      scene.style.opacity = '0';
      scene.style.left   = (r.left + r.width * 0.15) + 'px';
      scene.style.top    = (r.top + r.height * 0.15) + 'px';
      scene.style.width  = (r.width * 0.7) + 'px';
      scene.style.height = (r.height * 0.7) + 'px';
    });

    setTimeout(() => { window.location.href = RETURN_URL; }, 550);
  }

  function checkPassword() {
    const input = document.getElementById('word-input');
    const val = input.value.trim();

    if (val.toLowerCase() === PASSWORD.toLowerCase()) {
      input.classList.remove('wrong');
      input.classList.add('correct');

      const card = document.getElementById('card');
      if (!card.classList.contains('flipped')) flipCard();

      localStorage.setItem(PUZZLE_ID + '_unlocked', 'true');
      input.disabled = true;
    } else {
      input.classList.remove('correct', 'wrong');
      void input.offsetWidth;
      input.classList.add('wrong');
      input.value = '';
      setTimeout(() => input.classList.remove('wrong'), 400);
    }
  }
</script>
</body>
